ent = this.parseContent();\\n\\tthis.root = new components.Root(this.content);\\n\\tthis.checkFinished();\\n};\\n\\n/////////////////////////// Parser dispatch\\n\\nParser.prototype.parseContent = function() {\\n\\tvar content = [];\\n\\t// Parse zero or more components\\n\\twhile(true) {\\n\\t\\tvar component = this.parseComponent();\\n\\t\\tif(!component) {\\n\\t\\t\\tbreak;\\n\\t\\t}\\n\\t\\tif(!component.isPragma) {\\n\\t\\t\\tcontent.push(component);\\n\\t\\t}\\n\\t}\\n\\treturn content;\\n};\\n\\nParser.prototype.parseComponent = function() {\\n\\tvar component = null;\\n\\tif(this.token) {\\n\\t\\tif(this.at(\\\"string\\\")) {\\n\\t\\t\\tcomponent = this.parseTerminal();\\n\\t\\t} else if(this.at(\\\"name\\\")) {\\n\\t\\t\\tcomponent = this.parseName();\\n\\t\\t} else if(this.at(\\\"pragma\\\")) {\\n\\t\\t\\tcomponent = this.parsePragma();\\n\\t\\t} else {\\n\\t\\t\\tswitch(this.token.value) {\\n\\t\\t\\t\\tcase \\\"[\\\":\\n\\t\\t\\t\\t\\tcomponent = this.parseOptional();\\n\\t\\t\\t\\t\\tbreak;\\n\\t\\t\\t\\tcase \\\"{\\\":\\n\\t\\t\\t\\t\\tcomponent = this.parseRepeated();\\n\\t\\t\\t\\t\\tbreak;\\n\\t\\t\\t\\tcase \\\"\u003C\\\":\\n\\t\\t\\t\\t\\tcomponent = this.parseNonterminal();\\n\\t\\t\\t\\t\\tbreak;\\n\\t\\t\\t\\tcase \\\"(\\\":\\n\\t\\t\\t\\t\\tcomponent = this.parseChoice();\\n\\t\\t\\t\\t\\tbreak;\\n\\t\\t\\t\\tcase \\\"/\\\":\\n\\t\\t\\t\\t\\tcomponent = this.parseComment();\\n\\t\\t\\t\\t\\tbreak;\\n\\t\\t\\t\\tcase \\\"[[\\\":\\n\\t\\t\\t\\t\\tcomponent = this.parseLink();\\n\\t\\t\\t\\t\\tbreak;\\n\\t\\t\\t\\tcase \\\"{{\\\":\\n\\t\\t\\t\\t\\tcomponent = this.parseTransclusion();\\n\\t\\t\\t\\t\\tbreak;\\n\\t\\t\\t\\tcase \\\"\u003C-\\\":\\n\\t\\t\\t\\t\\tcomponent = this.parseSequence();\\n\\t\\t\\t\\t\\tbreak;\\n\\t\\t\\t\\tcase \\\"-\\\":\\n\\t\\t\\t\\t\\tcomponent = this.parseDummy();\\n\\t\\t\\t\\t\\tbreak;\\n\\t\\t\\t}\\n\\t\\t}\\n\\t}\\n\\treturn component;\\n};\\n\\n/////////////////////////// Specific components\\n\\nParser.prototype.parseChoice = function() {\\n\\t// Consume the (\\n\\tthis.advance();\\n\\tvar content = [],\\n\\t\\tcolon = -1;\\n\\tdo {\\n\\t\\t// Allow at most one branch to be prefixed with a colon\\n\\t\\tif(colon === -1 && this.eat(\\\":\\\")) {\\n\\t\\t\\tcolon = content.length;\\n\\t\\t}\\n\\t\\t// Parse the next branch\\n\\t\\tcontent.push(this.parseContent());\\n\\t} while(this.eat(\\\"|\\\"));\\n\\t// Consume the closing bracket\\n\\tthis.close(\\\")\\\");\\n\\t// Create a component\\n\\treturn new components.Choice(content,colon === -1 ? 0 : colon);\\n};\\n\\nParser.prototype.parseComment = function() {\\n\\t// Consume the /\\n\\tthis.advance();\\n\\t// The comment's content should be in a string literal\\n\\tvar content = this.expectString(\\\"after /\\\");\\n\\t// Consume the closing /\\n\\tthis.close(\\\"/\\\");\\n\\t// Create a component\\n\\treturn new components.Comment(content);\\n};\\n\\nParser.prototype.parseDummy = function() {\\n\\t// Consume the -\\n\\tthis.advance();\\n\\t// Create a component\\n\\treturn new components.Dummy();\\n};\\n\\nParser.prototype.parseLink = function() {\\n\\t// Consume the [[\\n\\tthis.advance();\\n\\t// Parse the content\\n\\tvar content = this.parseContent();\\n\\t// Consume the |\\n\\tthis.expect(\\\"|\\\");\\n\\t// Consume the target\\n\\tvar target = this.expectNameOrString(\\\"as link target\\\");\\n\\t// Prepare some attributes for the SVG \\\"a\\\" element to carry\\n\\tvar options = {\\\"data-tw-target\\\": target};\\n\\tif($tw.utils.isLinkExternal(target)) {\\n\\t\\toptions[\\\"data-tw-external\\\"] = true;\\n\\t}\\n\\t// Consume the closing ]]\\n\\tthis.close(\\\"]]\\\");\\n\\t// Create a component\\n\\treturn new components.Link(content,options);\\n};\\n\\nParser.prototype.parseName = function() {\\n\\t// Create a component\\n\\tvar component = new components.Nonterminal(this.token.value);\\n\\t// Consume the name\\n\\tthis.advance();\\n\\treturn component;\\n};\\n\\nParser.prototype.parseNonterminal = function() {\\n\\t// Consume the \u003C\\n\\tthis.advance();\\n\\t// The nonterminal's name should be in a string literal\\n\\tvar content = this.expectString(\\\"after \u003C\\\");\\n\\t// Consume the closing bracket\\n\\tthis.close(\\\">\\\");\\n\\t// Create a component\\n\\treturn new components.Nonterminal(content);\\n};\\n\\nParser.prototype.parseOptional = function() {\\n\\tvar wantArrow = this.options.arrow;\\n\\t// Consume the [\\n\\tthis.advance();\\n\\t// Consume the { if there is one\\n\\tvar repeated = this.eat(\\\"{\\\");\\n\\t// Note whether omission is the normal route\\n\\tvar normal = this.eat(\\\":\\\");\\n\\t// Parse the content\\n\\tvar content = this.parseContent(),\\n\\t\\tseparator = null;\\n\\t// Parse the separator if there is one\\n\\tif(repeated && this.eat(\\\"+\\\")) {\\n\\t\\tseparator = this.parseContent();\\n\\t}\\n\\t// Consume the closing brackets\\n\\tif(repeated) {\\n\\t\\tthis.close(\\\"}\\\");\\n\\t}\\n\\tthis.close(\\\"]\\\");\\n\\t// Create a component\\n\\treturn repeated ? new components.OptionalRepeated(content,separator,normal,wantArrow)\\n\\t\\t: new components.Optional(content,normal);\\n};\\n\\nParser.prototype.parseRepeated = function() {\\n\\tvar wantArrow = this.options.arrow;\\n\\t// Consume the {\\n\\tthis.advance();\\n\\t// Parse the content\\n\\tvar content = this.parseContent(),\\n\\t\\tseparator = null;\\n\\t// Parse the separator if there is one\\n\\tif(this.eat(\\\"+\\\")) {\\n\\t\\tseparator = this.parseContent();\\n\\t}\\n\\t// Consume the closing bracket\\n\\tthis.close(\\\"}\\\");\\n\\t// Create a component\\n\\treturn new components.Repeated(content,separator,wantArrow);\\n};\\n\\nParser.prototype.parseSequence = function() {\\n\\t// Consume the \u003C-\\n\\tthis.advance();\\n\\t// Parse the content\\n\\tvar content = this.parseContent();\\n\\t// Consume the closing ->\\n\\tthis.close(\\\"->\\\");\\n\\t// Create a component\\n\\treturn new components.Sequence(content);\\n};\\n\\nParser.prototype.parseTerminal = function() {\\n\\tvar component = new components.Terminal(this.token.value);\\n\\t// Consume the string literal\\n\\tthis.advance();\\n    return component;\\n};\\n\\nParser.prototype.parseTransclusion = function() {\\n\\t// Consume the {{\\n\\tthis.advance();\\n\\t// Consume the text reference\\n\\tvar textRef = this.expectNameOrString(\\\"as transclusion source\\\");\\n\\t// Consume the closing }}\\n\\tthis.close(\\\"}}\\\");\\n\\t// Retrieve the content of the text reference\\n\\tvar source = this.widget.wiki.getTextReference(textRef,\\\"\\\",this.widget.getVariable(\\\"currentTiddler\\\"));\\n\\t// Parse the content\\n\\tvar content = new Parser(this.widget,source).content;\\n\\t// Create a component\\n\\treturn new components.Transclusion(content);\\n};\\n\\n/////////////////////////// Pragmas\\n\\nParser.prototype.parsePragma = function() {\\n\\t// Create a dummy component\\n\\tvar component = { isPragma: true };\\n\\t// Consume the pragma\\n\\tvar pragma = this.token.value;\\n\\tthis.advance();\\n\\t// Apply the setting\\n\\tif(pragma === \\\"arrow\\\") {\\n\\t\\tthis.options.arrow = this.parseYesNo(pragma);\\t\\t\\n\\t} else if(pragma === \\\"debug\\\") {\\n\\t\\tthis.options.debug = true;\\n\\t} else if(pragma === \\\"start\\\") {\\n\\t\\tthis.options.start = this.parseTerminusStyle(pragma);\\t\\t\\n\\t} else if(pragma === \\\"end\\\") {\\n\\t\\tthis.options.end = this.parseTerminusStyle(pragma);\\t\\t\\n\\t} else {\\n\\t\\tthrow \\\"Invalid pragma\\\";\\n\\t}\\n\\treturn component;\\n};\\n\\nParser.prototype.parseYesNo = function(pragma) {\\n\\treturn this.parseSetting([\\\"yes\\\",\\\"no\\\"],pragma) === \\\"yes\\\";\\n}\\n\\nParser.prototype.parseTerminusStyle = function(pragma) {\\n\\treturn this.parseSetting([\\\"single\\\",\\\"double\\\",\\\"none\\\"],pragma);\\n}\\n\\nParser.prototype.parseSetting = function(options,pragma) {\\n\\tif(this.at(\\\"name\\\") && options.indexOf(this.token.value) !== -1) {\\n\\t\\treturn this.tokenValueEaten();\\t\\t\\n\\t}\\n\\tthrow options.join(\\\" or \\\") + \\\" expected after \\\\\\\\\\\" + pragma;\\n}\\n\\n/////////////////////////// Token manipulation\\n\\nParser.prototype.advance = function() {\\n\\tif(this.tokenPos >= this.tokens.length) {\\n\\t\\tthis.token = null;\\n\\t}\\n\\tthis.token = this.tokens[this.tokenPos++];\\n};\\n\\nParser.prototype.at = function(token) {\\n\\treturn this.token && (this.token.type === token || this.token.type === \\\"token\\\" && this.token.value === token);\\n};\\n\\nParser.prototype.eat = function(token) {\\n\\tvar at = this.at(token);\\n\\tif(at) {\\n\\t\\tthis.advance();\\n\\t}\\n\\treturn at;\\n};\\n\\nParser.prototype.tokenValueEaten = function() {\\n\\tvar output = this.token.value;\\n\\tthis.advance();\\n\\treturn output;\\n};\\n\\nParser.prototype.close = function(token) {\\n\\tif(!this.eat(token)) {\\n\\t\\tthrow \\\"Closing \\\" + token + \\\" expected\\\";\\n\\t}\\n};\\n\\nParser.prototype.checkFinished = function() {\\n\\tif(this.token) {\\n\\t\\tthrow \\\"Syntax error at \\\" + this.token.value;\\n\\t}\\n};\\n\\nParser.prototype.expect = function(token) {\\n\\tif(!this.eat(token)) {\\n\\t\\tthrow token + \\\" expected\\\";\\n\\t}\\n};\\n\\nParser.prototype.expectString = function(context,token) {\\n\\tif(!this.at(\\\"string\\\")) {\\n\\t\\ttoken = token || \\\"String\\\";\\n\\t\\tthrow token + \\\" expected \\\" + context;\\n\\t}\\n\\treturn this.tokenValueEaten();\\n};\\n\\nParser.prototype.expectNameOrString = function(context) {\\n\\tif(this.at(\\\"name\\\")) {\\n\\t\\treturn this.tokenValueEaten();\\n\\t}\\n\\treturn this.expectString(context,\\\"Name or string\\\");\\n};\\n\\n/////////////////////////// Tokenisation\\n\\nParser.prototype.tokenise = function(source) {\\n\\tvar tokens = [],\\n\\t\\tpos = 0,\\n\\t\\tc, s, token;\\n\\twhile(pos \u003C source.length) {\\n\\t\\t// Initialise this iteration\\n\\t\\ts = token = null;\\n\\t\\t// Skip whitespace\\n\\t\\tpos = $tw.utils.skipWhiteSpace(source,pos);\\n\\t\\t// Avoid falling off the end of the string\\n\\t\\tif(pos >= source.length) {\\n\\t\\t\\tbreak;\\n\\t\\t}\\n\\t\\t// Examine the next character\\n\\t\\tc = source.charAt(pos);\\n\\t\\tif(\\\"\\\\\\\"'\\\".indexOf(c) !== -1) {\\n\\t\\t\\t// String literal\\n\\t\\t\\ttoken = $tw.utils.parseStringLiteral(source,pos);\\n\\t\\t\\tif(!token) {\\n\\t\\t\\t\\tthrow \\\"Unterminated string literal\\\";\\n\\t\\t\\t}\\n\\t\\t} else if(\\\"[]{}\\\".indexOf(c) !== -1) {\\n\\t\\t\\t// Single or double character\\n\\t\\t\\ts = source.charAt(pos+1) === c ? c + c : c;\\n\\t\\t} else if(c === \\\"\u003C\\\") {\\n\\t\\t\\t// \u003C or \u003C-\\n\\t\\t\\ts = source.charAt(pos+1) === \\\"-\\\" ? \\\"\u003C-\\\" : \\\"\u003C\\\";\\n\\t\\t} else if(c === \\\"-\\\") {\\n\\t\\t\\t// - or ->\\n\\t\\t\\ts = source.charAt(pos+1) === \\\">\\\" ? \\\"->\\\" : \\\"-\\\";\\n\\t\\t} else if(\\\"()>+/:|\\\".indexOf(c) !== -1) {\\n\\t\\t\\t// Single character\\n\\t\\t\\ts = c;\\n\\t\\t} else if(c.match(/[a-zA-Z]/)) {\\n\\t\\t\\t// Name\\n\\t\\t\\ttoken = this.readName(source,pos);\\n\\t\\t} else if(c.match(/\\\\\\\\/)) {\\n\\t\\t\\t// Pragma\\n\\t\\t\\ttoken = this.readPragma(source,pos);\\n\\t\\t} else {\\n\\t\\t\\tthrow \\\"Syntax error at \\\" + c;\\n\\t\\t}\\n\\t\\t// Add our findings to the return array\\n\\t\\tif(token) {\\n\\t\\t\\ttokens.push(token);\\n\\t\\t} else {\\n\\t\\t\\ttoken = $tw.utils.parseTokenString(source,pos,s);\\n\\t\\t\\ttokens.push(token);\\n\\t\\t}\\n\\t\\t// Prepare for the next character\\n\\t\\tpos = token.end;\\n\\t}\\n\\treturn tokens;\\n};\\n\\nParser.prototype.readName = function(source,pos) {\\n\\tvar re = /([a-zA-Z0-9_.-]+)/g;\\n\\tre.lastIndex = pos;\\n\\tvar match = re.exec(source);\\n\\tif(match && match.index === pos) {\\n\\t\\treturn {type: \\\"name\\\", value: match[1], start: pos, end: pos+match[1].length};\\n\\t} else {\\n\\t\\tthrow \\\"Invalid name\\\";\\n\\t}\\n};\\n\\nParser.prototype.readPragma = function(source,pos) {\\n\\tvar re = /([a-z]+)/g;\\n\\tpos++;\\n\\tre.lastIndex = pos;\\n\\tvar match = re.exec(source);\\n\\tif(match && match.index === pos) {\\n\\t\\treturn {type: \\\"pragma\\\", value: match[1], start: pos, end: pos+match[1].length};\\n\\t} else {\\n\\t\\tthrow \\\"Invalid pragma\\\";\\n\\t}\\n};\\n\\n/////////////////////////// Exports\\n\\nexports.parser = Parser;\\n\",\"type\":\"application/javascript\",\"module-type\":\"library\"},\"$:/plugins/tiddlywiki/railroad/typed-parser.js\":{\"title\":\"$:/plugins/tiddlywiki/railroad/typed-parser.js\",\"text\":\"/*\\\\\\ntitle: $:/plugins/tiddlywiki/railroad/typed-parser.js\\ntype: application/javascript\\nmodule-type: parser\\n\\nThis parser wraps unadorned railroad syntax into a railroad widget\\n\\n\\\\*/\\n\\n\\\"use strict\\\";\\n\\nvar RailroadParser = function(type,text,options) {\\n\\tvar element = {\\n\\t\\t\\ttype: \\\"railroad\\\",\\n\\t\\t\\ttag: \\\"$railroad\\\",\\n\\t\\t\\ttext: text\\n\\t\\t};\\n\\tthis.tree = [element];\\nconsole.log(text);\\n};\\n\\nexports[\\\"text/vnd.tiddlywiki.railroad\\\"] = RailroadParser;\\n\",\"type\":\"application/javascript\",\"module-type\":\"parser\"},\"$:/plugins/tiddlywiki/railroad/wrapper.js\":{\"title\":\"$:/plugins/tiddlywiki/railroad/wrapper.js\",\"text\":\"/*\\\\\\ntitle: $:/plugins/tiddlywiki/railroad/wrapper.js\\ntype: application/javascript\\nmodule-type: widget\\n\\nWrapper for `railroad-diagrams.js` that provides a `\u003C$railroad>` widget.\\n\\n\\\\*/\\n\\n\\\"use strict\\\";\\n\\nvar Parser = require(\\\"$:/plugins/tiddlywiki/railroad/parser.js\\\").parser,\\n\\tWidget = require(\\\"$:/core/modules/widgets/widget.js\\\").widget;\\n\\nvar RailroadWidget = function(parseTreeNode,options) {\\n\\tthis.initialise(parseTreeNode,options);\\n};\\n\\nvar RAILROAD_OPTIONS = \\\"$:/config/railroad\\\";\\n\\n/*\\nInherit from the base widget class\\n*/\\nRailroadWidget.prototype = new Widget();\\n\\n/*\\nRender this widget into the DOM\\n*/\\nRailroadWidget.prototype.render = function(parent,nextSibling) {\\n\\t// Housekeeping\\n\\tthis.parentDomNode = parent;\\n\\tthis.computeAttributes();\\n\\tthis.execute();\\n\\t// Get the source text\\n\\tvar source = this.getAttribute(\\\"text\\\",this.parseTreeNode.text || \\\"\\\");\\n\\t// Create a div to contain the SVG or error message\\n\\tvar div = this.document.createElement(\\\"div\\\");\\n\\ttry {\\n\\t\\t// Initialise options from the config tiddler or widget attributes\\n\\t\\tvar config = this.wiki.getTiddlerData(RAILROAD_OPTIONS,{});\\n\\t\\tvar options = {\\n\\t\\t\\tarrow: this.getAttribute(\\\"arrow\\\", config.arrow || \\\"yes\\\") === \\\"yes\\\",\\n\\t\\t\\tdebug: this.getAttribute(\\\"debug\\\", config.debug || \\\"no\\\") === \\\"yes\\\",\\n\\t\\t\\tstart: this.getAttribute(\\\"start\\\", config.start || \\\"single\\\"),\\n\\t\\t\\tend: this.getAttribute(\\\"end\\\", config.end || \\\"single\\\")\\n\\t\\t};\\n\\t\\t// Parse the source\\n\\t\\tvar parser = new Parser(this,source,options);\\n\\t\\t// Generate content into the div\\n\\t\\tif(parser.options.debug) {\\n\\t\\t\\tthis.renderDebug(parser,div);\\n\\t\\t} else {\\n\\t\\t\\tthis.renderSvg(parser,div);\\n\\t\\t}\\n\\t} catch(ex) {\\n\\t\\tdiv.className = \\\"tc-error\\\";\\n\\t\\tdiv.textContent = ex;\\n\\t}\\n\\t// Insert the div into the DOM\\n\\tparent.insertBefore(div,nextSibling);\\n\\tthis.domNodes.push(div);\\n};\\n\\nRailroadWidget.prototype.renderDebug = function(parser,div) {\\n\\tvar output = [\\\"\u003Cpre>\\\"];\\n\\tparser.root.debug(output, \\\"\\\");\\n\\toutput.push(\\\"\u003C/pre>\\\");\\n\\tdiv.innerHTML = output.join(\\\"\\\");\\n};\\n\\nRailroadWidget.prototype.renderSvg = function(parser,div) {\\n\\t// Generate a model of the diagram\\n\\tvar fakeSvg = parser.root.toSvg(parser.options);\\n\\t// Render the model into a tree of SVG DOM nodes\\n\\tvar svg = fakeSvg.toSVG();\\n\\t// Fill in the remaining attributes of any link nodes\\n\\tthis.patchLinks(svg);\\n\\t// Insert the SVG tree into the div\\n\\tdiv.appendChild(svg);\\n};\\n\\nRailroadWidget.prototype.patchLinks = function(node) {\\n\\tvar self = this;\\n\\tif(!$tw.node && node.hasChildNodes()) {\\n\\t\\tvar children = node.childNodes;\\n\\t\\tfor(var i=0; i\u003Cchildren.length; i++) {\\n\\t\\t\\tvar child = children[i];\\n\\t\\t\\tvar attributes = child.attributes;\\n\\t\\t\\tif(attributes) {\\n\\t\\t\\t\\t// Find each element that has a data-tw-target attribute\\n\\t\\t\\t\\tvar target = child.attributes[\\\"data-tw-target\\\"];\\n\\t\\t\\t\\tif(target !== undefined) {\\n\\t\\t\\t\\t\\ttarget = target.value;\\n\\t\\t\\t\\t\\tif(child.attributes[\\\"data-tw-external\\\"]) {\\n\\t\\t\\t\\t\\t\\t// External links are straightforward\\n\\t\\t\\t\\t\\t\\tchild.setAttribute(\\\"target\\\",\\\"_blank\\\");\\n\\t\\t\\t\\t\\t\\tchild.setAttribute(\\\"rel\\\",\\\"noopener noreferrer\\\");\\n\\t\\t\\t\\t\\t} else {\\n\\t\\t\\t\\t\\t\\t// Each internal link gets its own onclick handler, capturing its own copy of target\\n\\t\\t\\t\\t\\t\\t(function(myTarget) {\\n\\t\\t\\t\\t\\t\\t\\tchild.onclick = function(event) {\\n\\t\\t\\t\\t\\t\\t\\t\\tself.dispatchLink(myTarget,event);\\n\\t\\t\\t\\t\\t\\t\\t\\treturn false;\\n\\t\\t\\t\\t\\t\\t\\t}\\n\\t\\t\\t\\t\\t\\t})(target);\\n\\t\\t\\t\\t\\t\\ttarget = \\\"#\\\" + target;\\n\\t\\t\\t\\t\\t}\\n\\t\\t\\t\\t\\tchild.setAttributeNS(\\\"http://www.w3.org/1999/xlink\\\",\\\"href\\\",target);\\n\\t\\t\\t\\t}\\n\\t\\t\\t}\\n\\t\\t\\tthis.patchLinks(child);\\n\\t\\t}\\n\\t}\\n};\\n\\nRailroadWidget.prototype.refresh = function(changedTiddlers) {\\n\\tvar changedAttributes = this.computeAttributes();\\n\\tif(changedAttributes.text || changedTiddlers[RAILROAD_OPTIONS]) {\\n\\t\\tthis.refreshSelf();\\n\\t\\treturn true;\\n\\t}\\n\\treturn false;\\t\\n};\\n\\nRailroadWidget.prototype.dispatchLink = function(to,event) {\\n\\t// Send the click on its way as a navigate event\\n\\tvar bounds = this.domNodes[0].getBoundingClientRect();\\n\\tthis.dispatchEvent({\\n\\t\\ttype: \\\"tm-navigate\\\",\\n\\t\\tnavigateTo: to,\\n\\t\\tnavigateFromTitle: this.getVariable(\\\"storyTiddler\\\"),\\n\\t\\tnavigateFromNode: this,\\n\\t\\tnavigateFromClientRect: { top: bounds.top, left: bounds.left, width: bounds.width, right: bounds.right, bottom: bounds.bottom, height: bounds.height\\n\\t\\t},\\n\\t\\tnavigateSuppressNavigation: event.metaKey || event.ctrlKey || (event.button === 1)\\n\\t});\\n\\tevent.preventDefault();\\n\\tevent.stopPropagation();\\n\\treturn false;\\n};\\n\\nexports.railroad = RailroadWidget;\\n\",\"type\":\"application/javascript\",\"module-type\":\"widget\"}}}"},

{"title":"$:/themes/tiddlywiki/snowwhite","name":"Snow White","author":"JeremyRuston","core-version":">=5.0.0","plugin-type":"theme","description":"Emphasises individual tiddlers","dependents":"$:/themes/tiddlywiki/vanilla","plugin-priority":"0","version":"5.3.8","type":"application/json","text":"{\"tiddlers\":{\"$:/themes/tiddlywiki/snowwhite/base\":{\"title\":\"$:/themes/tiddlywiki/snowwhite/base\",\"tags\":\"[[$:/tags/Stylesheet]]\",\"text\":\"\\\\define sidebarbreakpoint-minus-one()\\n\u003C$text text={{{ [{$:/themes/tiddlywiki/vanilla/metrics/sidebarbreakpoint}removesuffix[px]subtract[1]addsuffix[px]] ~[{$:/themes/tiddlywiki/vanilla/metrics/sidebarbreakpoint}] }}}/>\\n\\\\end\\n\\n\\\\rules only filteredtranscludeinline transcludeinline macrodef macrocallinline\\n\\n.tc-sidebar-header {\\n\\ttext-shadow: 0 1px 0 \u003C\u003Ccolour sidebar-foreground-shadow>>;\\n}\\n\\n.tc-tiddler-info {\\n\\t\u003C\u003Cbox-shadow \\\"inset 1px 2px 3px rgba(0,0,0,0.1)\\\">>\\n}\\n\\n@media screen {\\n\\t.tc-tiddler-frame {\\n\\t\\t\u003C\u003Cbox-shadow \\\"1px 1px 5px rgba(0, 0, 0, 0.3)\\\">>\\n\\t}\\n}\\n\\n@media (max-width: \u003C\u003Csidebarbreakpoint-minus-one>>) {\\n\\t.tc-tiddler-frame {\\n\\t\\t\u003C\u003Cbox-shadow none>>\\n\\t}\\n}\\n\\n.tc-page-controls button svg, .tc-tiddler-controls button svg, .tc-topbar button svg {\\n\\t\u003C\u003Ctransition \\\"fill 150ms ease-in-out\\\">>\\n}\\n\\n.tc-tiddler-controls button.tc-selected,\\n.tc-page-controls button.tc-selected {\\n\\t\u003C\u003Cfilter \\\"drop-shadow(0px -1px 2px rgba(0,0,0,0.25))\\\">>\\n}\\n\\n.tc-tiddler-frame input.tc-edit-texteditor,\\n.tc-tiddler-frame select.tc-edit-texteditor {\\n\\t\u003C\u003Cbox-shadow \\\"inset 0 1px 8px rgba(0, 0, 0, 0.15)\\\">>\\n}\\n\\n.tc-edit-tags {\\n\\t\u003C\u003Cbox-shadow \\\"inset 0 1px 8px rgba(0, 0, 0, 0.15)\\\">>\\n}\\n\\n.tc-tiddler-frame .tc-edit-tags input.tc-edit-texteditor {\\n\\t\u003C\u003Cbox-shadow \\\"none\\\">>\\n\\tborder: none;\\n\\toutline: none;\\n}\\n\\ntextarea.tc-edit-texteditor {\\n\\tfont-family: {{$:/themes/tiddlywiki/vanilla/settings/editorfontfamily}};\\n}\\n\\ncanvas.tc-edit-bitmapeditor  {\\n\\t\u003C\u003Cbox-shadow \\\"2px 2px 5px rgba(0, 0, 0, 0.5)\\\">>\\n}\\n\\n.tc-drop-down {\\n\\tborder-radius: 4px;\\n\\t\u003C\u003Cbox-shadow \\\"2px 2px 10px rgba(0, 0, 0, 0.5)\\\">>\\n}\\n\\n.tc-block-dropdown {\\n\\tborder-radius: 4px;\\n\\t\u003C\u003Cbox-shadow \\\"2px 2px 10px rgba(0, 0, 0, 0.5)\\\">>\\n}\\n\\n.tc-modal {\\n\\tborder-radius: 6px;\\n\\t\u003C\u003Cbox-shadow \\\"0 3px 7px rgba(0,0,0,0.3)\\\">>\\n}\\n\\n.tc-modal-footer {\\n\\tborder-radius: 0 0 6px 6px;\\n\\t\u003C\u003Cbox-shadow \\\"inset 0 1px 0 #fff\\\">>;\\n}\\n\\n\\n.tc-alert {\\n\\tborder-radius: 6px;\\n\\t\u003C\u003Cbox-shadow \\\"0 3px 7px rgba(0,0,0,0.6)\\\">>\\n}\\n\\n.tc-notification {\\n\\tborder-radius: 6px;\\n\\t\u003C\u003Cbox-shadow \\\"0 3px 7px rgba(0,0,0,0.3)\\\">>\\n\\ttext-shadow: 0 1px 0 rgba(255,255,255, 0.8);\\n}\\n\\n.tc-sidebar-lists .tc-tab-set .tc-tab-divider {\\n\\tborder-top: none;\\n\\theight: 1px;\\n\\t\u003C\u003Cbackground-linear-gradient \\\"left, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.0) 100%\\\">>\\n}\\n\\n.tc-more-sidebar > .tc-tab-set > .tc-tab-buttons > button {\\n\\t\u003C\u003Cbackground-linear-gradient \\\"left, rgba(0,0,0,0.01) 0%, rgba(0,0,0,0.1) 100%\\\">>\\n}\\n\\n.tc-more-sidebar > .tc-tab-set > .tc-tab-buttons > button.tc-tab-selected {\\n\\t\u003C\u003Cbackground-linear-gradient \\\"left, rgba(0,0,0,0.05) 0%, rgba(255,255,255,0.05) 100%\\\">>\\n}\\n\\n.tc-message-box img {\\n\\t\u003C\u003Cbox-shadow \\\"1px 1px 3px rgba(0,0,0,0.5)\\\">>\\n}\\n\\n.tc-plugin-info {\\n\\t\u003C\u003Cbox-shadow \\\"1px 1px 3px rgba(0,0,0,0.5)\\\">>\\n}\\n\"}}}"},
{"title":"$:/themes/tiddlywiki/vanilla","name":"Vanilla","author":"JeremyRuston","core-version":">=5.0.0","plugin-type":"theme","description":"Basic theme","plugin-priority":"0","version":"5.3.8","dependents":"","type":"application/json","text":"{\"tiddlers\":{\"$:/themes/tiddlywiki/vanilla/themetweaks\":{\"title\":\"$:/themes/tiddlywiki/vanilla/themetweaks\",\"tags\":\"$:/tags/ControlPanel/Appearance\",\"caption\":\"{{$:/language/ThemeTweaks/ThemeTweaks}}\",\"text\":\"\\\\define lingo-base() $:/language/ThemeTweaks/\\n\\n\\\\define replacement-text()\\n[img[$(imageTitle)$]]\\n\\\\end\\n\\n\\\\define backgroundimage-dropdown()\\n\u003Cdiv class=\\\"tc-drop-down-wrapper\\\">\\n\u003C$set name=\\\"state\\\" value=\u003C\u003Cqualify \\\"$:/state/popup/themetweaks/backgroundimage\\\">>>\\n\u003C$button popup=\u003C\u003Cstate>> class=\\\"tc-btn-invisible tc-btn-dropdown\\\">{{$:/core/images/down-arrow}}\u003C/$button>\\n\u003C$reveal state=\u003C\u003Cstate>> type=\\\"popup\\\" position=\\\"belowleft\\\" text=\\\"\\\" default=\\\"\\\" class=\\\"tc-popup-keep\\\">\\n\u003Cdiv class=\\\"tc-drop-down\\\" style=\\\"text-align:center;\\\">\\n\u003C$macrocall $name=\\\"image-picker\\\" actions=\\\"\\\"\\\"\\n\\n\u003C$action-setfield\\n\\t$tiddler=\\\"$:/themes/tiddlywiki/vanilla/settings/backgroundimage\\\"\\n\\t$value=\u003C\u003CimageTitle>>\\n/>\\n\\n\u003C$action-deletetiddler $tiddler=\u003C\u003Cstate>>/>\\n\\n\\\"\\\"\\\"/>\\n\u003C/div>\\n\u003C/$reveal>\\n\u003C/$set>\\n\u003C/div>\\n\\\\end\\n\\n\\\\define backgroundimageattachment-dropdown()\\n\u003C$select tiddler=\\\"$:/themes/tiddlywiki/vanilla/settings/backgroundimageattachment\\\" default=\\\"scroll\\\">\\n\u003Coption value=\\\"scroll\\\">\u003C\u003Clingo Settings/BackgroundImageAttachment/Scroll>>\u003C/option>\\n\u003Coption value=\\\"fixed\\\">\u003C\u003Clingo Settings/BackgroundImageAttachment/Fixed>>\u003C/option>\\n\u003C/$select>\\n\\\\end\\n\\n\\\\define backgroundimagesize-dropdown()\\n\u003C$select tiddler=\\\"$:/themes/tiddlywiki/vanilla/settings/backgroundimagesize\\\" default=\\\"scroll\\\">\\n\u003Coption value=\\\"auto\\\">\u003C\u003Clingo Settings/BackgroundImageSize/Auto>>\u003C/option>\\n\u003Coption value=\\\"cover\\\">\u003C\u003Clingo Settings/BackgroundImageSize/Cover>>\u003C/option>\\n\u003Coption value=\\\"contain\\\">\u003C\u003Clingo Settings/BackgroundImageSize/Contain>>\u003C/option>\\n\u003C/$select>\\n\\\\end\\n\\n\u003C\u003Clingo ThemeTweaks/Hint>>\\n\\n! \u003C\u003Clingo Options>>\\n\\n|\u003C$link to=\\\"$:/themes/tiddlywiki/vanilla/options/sidebarlayout\\\">\u003C\u003Clingo Options/SidebarLayout>>\u003C/$link> |\u003C$select tiddler=\\\"$:/themes/tiddlywiki/vanilla/options/sidebarlayout\\\">\u003Coption value=\\\"fixed-fluid\\\">\u003C\u003Clingo Options/SidebarLayout/Fixed-Fluid>>\u003C/option>\u003Coption value=\\\"fluid-fixed\\\">\u003C\u003Clingo Options/SidebarLayout/Fluid-Fixed>>\u003C/option>\u003C/$select> |\\n|\u003C$link to=\\\"$:/themes/tiddlywiki/vanilla/options/stickytitles\\\">\u003C\u003Clingo Options/StickyTitles>>\u003C/$link>\u003Cbr>//\u003C\u003Clingo Options/StickyTitles/Hint>>// |\u003C$select tiddler=\\\"$:/themes/tiddlywiki/vanilla/options/stickytitles\\\">\u003Coption value=\\\"no\\\">{{$:/language/No}}\u003C/option>\u003Coption value=\\\"yes\\\">{{$:/language/Yes}}\u003C/option>\u003C/$select> |\\n|\u003C$link to=\\\"$:/themes/tiddlywiki/vanilla/options/codewrapping\\\">\u003C\u003Clingo Options/CodeWrapping>>\u003C/$link> |\u003C$select tiddler=\\\"$:/themes/tiddlywiki/vanilla/options/codewrapping\\\">\u003Coption value=\\\"pre\\\">{{$:/language/No}}\u003C/option>\u003Coption value=\\\"pre-wrap\\\">{{$:/language/Yes}}\u003C/option>\u003C/$select> |\\n\\n! \u003C\u003Clingo Settings>>\\n\\n|\u003C$link to=\\\"$:/themes/tiddlywiki/vanilla/settings/fontfamily\\\">\u003C\u003Clingo Settings/FontFamily>>\u003C/$link> |\u003C$edit-text tiddler=\\\"$:/themes/tiddlywiki/vanilla/settings/fontfamily\\\" default=\\\"\\\" tag=\\\"input\\\"/> | |\\n|\u003C$link to=\\\"$:/themes/tiddlywiki/vanilla/settings/codefontfamily\\\">\u003C\u003Clingo Settings/CodeFontFamily>>\u003C/$link> |\u003C$edit-text tiddler=\\\"$:/themes/tiddlywiki/vanilla/settings/codefontfamily\\\" default=\\\"\\\" tag=\\\"input\\\"/> | |\\n|\u003C$link to=\\\"$:/themes/tiddlywiki/vanilla/settings/editorfontfamily\\\">\u003C\u003Clingo Settings/EditorFontFamily>>\u003C/$link> |\u003C$edit-text tiddler=\\\"$:/themes/tiddlywiki/vanilla/settings/editorfontfamily\\\" default=\\\"\\\" tag=\\\"input\\\"/> | |\\n|\u003C$link to=\\\"$:/themes/tiddlywiki/vanilla/settings/backgroundimage\\\">\u003C\u003Clingo Settings/BackgroundImage>>\u003C/$link> |\u003C$edit-text tiddler=\\\"$:/themes/tiddlywiki/vanilla/settings/backgroundimage\\\" default=\\\"\\\" tag=\\\"input\\\"/> |\u003C\u003Cbackgroundimage-dropdown>> |\\n|\u003C$link to=\\\"$:/themes/tiddlywiki/vanilla/settings/backgroundimageattachment\\\">\u003C\u003Clingo Settings/BackgroundImageAttachment>>\u003C/$link> |\u003C\u003Cbackgroundimageattachment-dropdown>> | |\\n|\u003C$link to=\\\"$:/themes/tiddlywiki/vanilla/settings/backgroundimagesize\\\">\u003C\u003Clingo Settings/BackgroundImageSize>>\u003C/$link> |\u003C\u003Cbackgroundimagesize-dropdown>> | |\\n\\n! \u003C\u003Clingo Metrics>>\\n\\n|\u003C$link to=\\\"$:/themes/tiddlywiki/vanilla/metrics/fontsize\\\">\u003C\u003Clingo Metrics/FontSize>>\u003C/$link> |\u003C$edit-text tiddler=\\\"$:/themes/tiddlywiki/vanilla/metrics/fontsize\\\" default=\\\"\\\" tag=\\\"input\\\"/> |\\n|\u003C$link to=\\\"$:/themes/tiddlywiki/vanilla/metrics/lineheight\\\">\u003C\u003Clingo Metrics/LineHeight>>\u003C/$link> |\u003C$edit-text tiddler=\\\"$:/themes/tiddlywiki/vanilla/metrics/lineheight\\\" default=\\\"\\\" tag=\\\"input\\\"/> |\\n|\u003C$link to=\\\"$:/themes/tiddlywiki/vanilla/metrics/bodyfontsize\\\">\u003C\u003Clingo Metrics/BodyFontSize>>\u003C/$link> |\u003C$edit-text tiddler=\\\"$:/themes/tiddlywiki/vanilla/metrics illa/metrics/storyleft\":{\"title\":\"$:/themes/tiddlywiki/vanilla/metrics/storyleft\",\"text\":\"0px\"},\"$:/themes/tiddlywiki/vanilla/metrics/storytop\":{\"title\":\"$:/themes/tiddlywiki/vanilla/metrics/storytop\",\"text\":\"0px\"},\"$:/themes/tiddlywiki/vanilla/metrics/storyright\":{\"title\":\"$:/themes/tiddlywiki/vanilla/metrics/storyright\",\"text\":\"770px\"},\"$:/themes/tiddlywiki/vanilla/metrics/storywidth\":{\"title\":\"$:/themes/tiddlywiki/vanilla/metrics/storywidth\",\"text\":\"770px\"},\"$:/themes/tiddlywiki/vanilla/metrics/tiddlerwidth\":{\"title\":\"$:/themes/tiddlywiki/vanilla/metrics/tiddlerwidth\",\"text\":\"686px\"},\"$:/themes/tiddlywiki/vanilla/metrics/sidebarbreakpoint\":{\"title\":\"$:/themes/tiddlywiki/vanilla/metrics/sidebarbreakpoint\",\"text\":\"960px\"},\"$:/themes/tiddlywiki/vanilla/metrics/sidebarwidth\":{\"title\":\"$:/themes/tiddlywiki/vanilla/metrics/sidebarwidth\",\"text\":\"350px\"},\"$:/themes/tiddlywiki/vanilla/options/stickytitles\":{\"title\":\"$:/themes/tiddlywiki/vanilla/options/stickytitles\",\"text\":\"no\"},\"$:/themes/tiddlywiki/vanilla/options/sidebarlayout\":{\"title\":\"$:/themes/tiddlywiki/vanilla/options/sidebarlayout\",\"text\":\"fixed-fluid\"},\"$:/themes/tiddlywiki/vanilla/options/codewrapping\":{\"title\":\"$:/themes/tiddlywiki/vanilla/options/codewrapping\",\"text\":\"pre-wrap\"},\"$:/themes/tiddlywiki/vanilla/reset\":{\"title\":\"$:/themes/tiddlywiki/vanilla/reset\",\"type\":\"text/css\",\"text\":\"/*! modern-normalize v2.0.0 | MIT License | https://github.com/sindresorhus/modern-normalize */\\n\\n/*\\nDocument\\n========\\n*/\\n\\n/**\\nUse a better box model (opinionated).\\n*/\\n\\n*,\\n::before,\\n::after {\\n\\tbox-sizing: border-box;\\n}\\n\\nhtml {\\n\\t/* Improve consistency of default fonts in all browsers. (https://github.com/sindresorhus/modern-normalize/issues/3) */\\n\\tfont-family:\\n\\t\\tsystem-ui,\\n\\t\\t'Segoe UI',\\n\\t\\tRoboto,\\n\\t\\tHelvetica,\\n\\t\\tArial,\\n\\t\\tsans-serif,\\n\\t\\t'Apple Color Emoji',\\n\\t\\t'Segoe UI Emoji';\\n\\tline-height: 1.15; /* 1. Correct the line height in all browsers. */\\n\\t-webkit-text-size-adjust: 100%; /* 2. Prevent adjustments of font size after orientation changes in iOS. */\\n\\t-moz-tab-size: 4; /* 3. Use a more readable tab size (opinionated). */\\n\\ttab-size: 4; /* 3 */\\n}\\n\\n/*\\nSections\\n========\\n*/\\n\\nbody {\\n\\tmargin: 0; /* Remove the margin in all browsers. */\\n}\\n\\n/*\\nGrouping content\\n================\\n*/\\n\\n/**\\n1. Add the correct height in Firefox.\\n2. Correct the inheritance of border color in Firefox. (https://bugzilla.mozilla.org/show_bug.cgi?id=190655)\\n*/\\n\\nhr {\\n\\theight: 0; /* 1 */\\n\\tcolor: inherit; /* 2 */\\n}\\n\\n/*\\nText-level semantics\\n====================\\n*/\\n\\n/**\\nAdd the correct text decoration in Chrome, Edge, and Safari.\\n*/\\n\\nabbr[title] {\\n\\ttext-decoration: underline dotted;\\n}\\n\\n/**\\nAdd the correct font weight in Edge and Safari.\\n*/\\n\\nb,\\nstrong {\\n\\tfont-weight: bolder;\\n}\\n\\n/**\\n1. Improve consistency of default fonts in all browsers. (https://github.com/sindresorhus/modern-normalize/issues/3)\\n2. Correct the odd 'em' font sizing in all browsers.\\n*/\\n\\ncode,\\nkbd,\\nsamp,\\npre {\\n\\tfont-family:\\n\\t\\tui-monospace,\\n\\t\\tSFMono-Regular,\\n\\t\\tConsolas,\\n\\t\\t'Liberation Mono',\\n\\t\\tMenlo,\\n\\t\\tmonospace; /* 1 */\\n\\tfont-size: 1em; /* 2 */\\n}\\n\\n/**\\nAdd the correct font size in all browsers.\\n*/\\n\\nsmall {\\n\\tfont-size: 80%;\\n}\\n\\n/**\\nPrevent 'sub' and 'sup' elements from affecting the line height in all browsers.\\n*/\\n\\nsub,\\nsup {\\n\\tfont-size: 75%;\\n\\tline-height: 0;\\n\\tposition: relative;\\n\\tvertical-align: baseline;\\n}\\n\\nsub {\\n\\tbottom: -0.25em;\\n}\\n\\nsup {\\n\\ttop: -0.5em;\\n}\\n\\n/*\\nTabular data\\n============\\n*/\\n\\n/**\\n1. Remove text indentation from table contents in Chrome and Safari. (https://bugs.chromium.org/p/chromium/issues/detail?id=999088, https://bugs.webkit.org/show_bug.cgi?id=201297)\\n2. Correct table border color inheritance in Chrome and Safari. (https://bugs.chromium.org/p/chromium/issues/detail?id=935729, https://bugs.webkit.org/show_bug.cgi?id=195016)\\n*/\\n\\ntable {\\n\\ttext-indent: 0; /* 1 */\\n\\tborder-color: inherit; /* 2 */\\n}\\n\\n/*\\nForms\\n=====\\n*/\\n\\n/**\\n1. Change the font styles in all browsers.\\n2. Remove the margin in Firefox and Safari.\\n*/\\n\\nbutton,\\ninput,\\noptgroup,\\nselect,\\ntextarea {\\n\\tfont-family: inherit; /* 1 */\\n\\tfont-size: 100%; /* 1 */\\n\\tline-height: 1.15; /* 1 */\\n\\tmargin: 0; /* 2 */\\n}\\n\\n/**\\nRemove the inheritance of text transform in Edge and Firefox.\\n*/\\n\\nbutton,\\nselect {\\n\\ttext-transform: none;\\n}\\n\\n/**\\nCorrect the inability to style clickable types in iOS and Safari.\\n*/\\n\\nbutton,\\n[type='button'],\\n[type='reset'],\\n[type='submit'] {\\n\\t-webkit-appearance: button;\\n}\\n\\n/**\\nRemove the inner border and padding in Firefox.\\n*/\\n\\n::-moz-focus-inner {\\n\\tborder-style: none;\\n\\tpadding: 0;\\n}\\n\\n/**\\nRestore the focus styles unset by the previous rule.\\n*/\\n\\n:-moz-focusring {\\n\\toutline: 1px dotted ButtonText;\\n}\\n\\n/**\\nRemove the additional ':invalid' styles in Firefox.\\nSee: https://github.com/mozilla/gecko-dev/blob/2f9eacd9d3d995c937b4251a5557d95d494c9be1/layout/style/res/forms.css#L728-L737\\n*/\\n\\n:-moz-ui-invalid {\\n\\tbox-shadow: none;\\n}\\n\\n/**\\nRemove the padding so developers are not caught out when they zero out 'fieldset' elements in all browsers.\\n*/\\n\\nlegend {\\n\\tpadding: 0;\\n}\\n\\n/**\\nAdd the correct vertical alignment in Chrome and Firefox.\\n*/\\n\\nprogress {\\n\\tvertical-align: baseline;\\n}\\n\\n/**\\nCorrect the cursor style of increment and decrement buttons in Safari.\\n*/\\n\\n::-webkit-inner-spin-button,\\n::-webkit-outer-spin-button {\\n\\theight: auto;\\n}\\n\\n/**\\n1. Correct the odd appearance in Chrome and Safari.\\n2. Correct the outline style in Safari.\\n*/\\n\\n[type='search'] {\\n\\t-webkit-appearance: textfield; /* 1 */\\n\\toutline-offset: -2px; /* 2 */\\n}\\n\\n/**\\nRemove the inner padding in Chrome and Safari on macOS.\\n*/\\n\\n::-webkit-search-decoration {\\n\\t-webkit-appearance: none;\\n}\\n\\n/**\\n1. Correct the inability to style clickable types in iOS and Safari.\\n2. Change font properties to 'inherit' in Safari.\\n*/\\n\\n::-webkit-file-upload-button {\\n\\t-webkit-appearance: button; /* 1 */\\n\\tfont: inherit; /* 2 */\\n}\\n\\n/*\\nInteractive\\n===========\\n*/\\n\\n/*\\nAdd the correct display in Chrome and Safari.\\n*/\\n\\nsummary {\\n\\tdisplay: list-item;\\n}\\n\"},\"$:/themes/tiddlywiki/vanilla/settings/fontfamily\":{\"title\":\"$:/themes/tiddlywiki/vanilla/settings/fontfamily\",\"text\":\"-apple-system, BlinkMacSystemFont, \\\"Segoe UI\\\", \\\"Noto Sans\\\", sans-serif, Helvetica, Arial, \\\"Apple Color Emoji\\\", \\\"Segoe UI Emoji\\\"\"},\"$:/themes/tiddlywiki/vanilla/settings/codefontfamily\":{\"title\":\"$:/themes/tiddlywiki/vanilla/settings/codefontfamily\",\"text\":\"ui-monospace, \\\"SFMono-Regular\\\", \\\"SF Mono\\\", Menlo, Consolas, \\\"Liberation Mono\\\", monospace\"},\"$:/themes/tiddlywiki/vanilla/settings/backgroundimageattachment\":{\"title\":\"$:/themes/tiddlywiki/vanilla/settings/backgroundimageattachment\",\"text\":\"fixed\"},\"$:/themes/tiddlywiki/vanilla/settings/backgroundimagesize\":{\"title\":\"$:/themes/tiddlywiki/vanilla/settings/backgroundimagesize\",\"text\":\"auto\"},\"$:/themes/tiddlywiki/vanilla/sticky\":{\"title\":\"$:/themes/tiddlywiki/vanilla/sticky\",\"code-body\":\"yes\",\"text\":\"\u003C$reveal state=\\\"$:/themes/tiddlywiki/vanilla/options/stickytitles\\\" type=\\\"match\\\" text=\\\"yes\\\">\\n``\\n.tc-tiddler-title {\\n\\tposition: -webkit-sticky;\\n\\tposition: -moz-sticky;\\n\\tposition: -o-sticky;\\n\\tposition: -ms-sticky;\\n\\tposition: sticky;\\n\\ttop: 0px;\\n\\tbackground: ``\u003C\u003Ccolour tiddler-background>>``;\\n\\tz-index: 500;\\n}\\n\\n``\\n\u003C$list filter=\\\"[range[100]]\\\">\\n`.tc-story-river .tc-tiddler-frame:nth-child(100n+`\u003C$text text=\u003C\u003CcurrentTiddler>>/>`) {\\nz-index: `\u003C$text text={{{ [[200]subtract\u003CcurrentTiddler>] }}}/>`;\\n}\\n`\\n\u003C/$list>\\n\u003C/$reveal>\\n\"}}}"},
{"title":"HelloThere","text":"This is a demo of TiddlyWiki 5's ''innerwiki'' plugin.\n\nTo try these examples under Node.js:\n\n# Install Puppeteer, as described in the [[readme|$:/plugins/tiddlywiki/innerwiki/readme]]\n# Execute the following command in the root of the TiddlyWiki 5 repo:\n\n```\n./tiddlywiki.js editions/innerwikidemo --screenshot '[[$:/plugins/tiddlywiki/innerwiki/examples]]' 4 --render '[[$:/plugins/tiddlywiki/innerwiki/examples]]' \"examples.html\"\n```\n\nOpen `examples.html` to see the generated static HTML rendering.\n"},
