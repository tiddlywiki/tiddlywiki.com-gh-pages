 '\"Will you walk a little faster?\" said a whiting to a snail.\n \"There's a porpoise close behind us, and he's treading on my tail.\n\n See how eagerly the lobsters and the turtles all advance!\n They are waiting on the shingle--will you come and join the dance?\n\n Will you, won't you, will you, won't you, will you join the dance?\n Will you, won't you, will you, won't you, won't you join the dance?\n\n \"You can really have no notion how delightful it will be\n When they take us up and throw us, with the lobsters, out to sea!\"\n But the snail replied \"Too far, too far!\" and gave a look askance--\n Said he thanked the whiting kindly, but he would not join the dance.\n\n Would not, could not, would not, could not, would not join the dance.\n Would not, could not, would not, could not, could not join the dance.\n\n '\"What matters it how far we go?\" his scaly friend replied.\n \"There is another shore, you know, upon the other side.\n The further off from England the nearer is to France--\n Then turn not pale, beloved snail, but come and join the dance.\n\n Will you, won't you, will you, won't you, will you join the dance?\n Will you, won't you, will you, won't you, won't you join the dance?\"'\n\n'Thank you, it's a very interesting dance to watch,' said Alice, feeling\nvery glad that it was over at last: 'and I do so like that curious song\nabout the whiting!'\n\n'Oh, as to the whiting,' said the Mock Turtle, 'they--you've seen them,\nof course?'\n\n'Yes,' said Alice, 'I've often seen them at dinn--' she checked herself\nhastily.\n\n'I don't know where Dinn may be,' said the Mock Turtle, 'but if you've\nseen them so often, of course you know what they're like.'\n\n'I believe so,' Alice replied thoughtfully. 'They have their tails in\ntheir mouths--and they're all over crumbs.'\n\n'You're wrong about the crumbs,' said the Mock Turtle: 'crumbs would all\nwash off in the sea. But they HAVE their tails in their mouths; and the\nreason is--' here the Mock Turtle yawned and shut his eyes.--'Tell her\nabout the reason and all that,' he said to the Gryphon.\n\n'The reason is,' said the Gryphon, 'that they WOULD go with the lobsters\nto the dance. So they got thrown out to sea. So they had to fall a long\nway. So they got their tails fast in their mouths. So they couldn't get\nthem out again. That's all.'\n\n'Thank you,' said Alice, 'it's very interesting. I never knew so much\nabout a whiting before.'\n\n'I can tell you more than that, if you like,' said the Gryphon. 'Do you\nknow why it's called a whiting?'\n\n'I never thought about it,' said Alice. 'Why?'\n\n'IT DOES THE BOOTS AND SHOES.' the Gryphon replied very solemnly.\n\nAlice was thoroughly puzzled. 'Does the boots and shoes!' she repeated\nin a wondering tone.\n\n'Why, what are YOUR shoes done with?' said the Gryphon. 'I mean, what\nmakes them so shiny?'\n\nAlice looked down at them, and considered a little before she gave her\nanswer. 'They're done with blacking, I believe.'\n\n'Boots and shoes under the sea,' the Gryphon went on in a deep voice,\n'are done with a whiting. Now you know.'\n\n'And what are they made of?' Alice asked in a tone of great curiosity.\n\n'Soles and eels, of course,' the Gryphon replied rather impatiently:\n'any shrimp could have told you that.'\n\n'If I'd been the whiting,' said Alice, whose thoughts were still running\non the song, 'I'd have said to the porpoise, \"Keep back, please: we\ndon't want YOU with us!\"'\n\n'They were obliged to have him with them,' the Mock Turtle said: 'no\nwise fish would go anywhere without a porpoise.'\n\n'Wouldn't it really?' said Alice in a tone of great surprise.\n\n'Of course not,' said the Mock Turtle: 'why, if a fish came to ME, and\ntold me he was going a journey, I should say \"With what porpoise?\"'\n\n'Don't you mean \"purpose\"?' said Alice.\n\n'I mean what I say,' the Mock Turtle replied in an offended tone. And\nthe Gryphon added 'Come, let's hear some of YOUR adventures.'\n\n'I could tell you my adventures--beginning from this morning,' said\nAlice a little timidly: 'but it's no use going back to yesterday,\nbecause I was a different person then.'\n\n'Explain all that,' said the Mock Turtle.\n\n'No, no! The adventures first,' said the Gryphon in an impatient tone:\n'explanations take such a dreadful time.'\n\nSo Alice began telling them her adventures from the time when she first\nsaw the White Rabbit. She was a little nervous about it just at first,\nthe two creatures got so close to her, one on each side, and opened\ntheir eyes and mouths so VERY wide, but she gained courage as she went\non. Her listeners were perfectly quiet till she got to the part about\nher repeating 'YOU ARE OLD, FATHER WILLIAM,' to the Caterpillar, and the\nwords all coming different, and then the Mock Turtle drew a long breath,\nand said 'That's very curious.'\n\n'It's all about as curious as it can be,' said the Gryphon.\n\n'It all came different!' the Mock Turtle repeated thoughtfully. 'I\nshould like to hear her try and repeat something now. Tell her to\nbegin.' He looked at the Gryphon as if he thought it had some kind of\nauthority over Alice.\n\n'Stand up and repeat \"'TIS THE VOICE OF THE SLUGGARD,\"' said the\nGryphon.\n\n'How the creatures order one about, and make one repeat lessons!'\nthought Alice; 'I might as well be at school at once.' However, she\ngot up, and began to repeat it, but her head was so full of the Lobster\nQuadrille, that she hardly knew what she was saying, and the words came\nvery queer indeed:--\n\n  ' 'Tis the voice of the Lobster; I heard him declare,\n  \"You have baked me too brown, I must sugar my hair.\"\n  As a duck with its eyelids, so he with his nose\n  Trims his belt and his buttons, and turns out his toes.'\n\n       [later editions continued as follows\n  When the sands are all dry, he is gay as a lark,\n  And will talk in contemptuous tones of the Shark,\n  But, when the tide rises and sharks are around,\n  His voice has a timid and tremulous sound.]\n\n'That's different from what I used to say when I was a child,' said the\nGryphon.\n\n'Well, I never heard it before,' said the Mock Turtle; 'but it sounds\nuncommon nonsense.'\n\nAlice said nothing; she had sat down with her face in her hands,\nwondering if anything would EVER happen in a natural way again.\n\n'I should like to have it explained,' said the Mock Turtle.\n\n'She can't explain it,' said the Gryphon hastily. 'Go on with the next\nverse.'\n\n'But about his toes?' the Mock Turtle persisted. 'How COULD he turn them\nout with his nose, you know?'\n\n'It's the first position in dancing.' Alice said; but was dreadfully\npuzzled by the whole thing, and longed to change the subject.\n\n'Go on with the next verse,' the Gryphon repeated impatiently: 'it\nbegins \"I passed by his garden.\"'\n\nAlice did not dare to disobey, though she felt sure it would all come\nwrong, and she went on in a trembling voice:--\n\n  'I passed by his garden, and marked, with one eye,\n  How the Owl and the Panther were sharing a pie--'\n\n    [later editions continued as follows\n  The Panther took pie-crust, and gravy, and meat,\n  While the Owl had the dish as its share of the treat.\n  When the pie was all finished, the Owl, as a boon,\n  Was kindly permitted to pocket the spoon:\n  While the Panther received knife and fork with a growl,\n  And concluded the banquet--]\n\n'What IS the use of repeating all that stuff,' the Mock Turtle\ninterrupted, 'if you don't explain it as you go on? It's by far the most\nconfusing thing I ever heard!'\n\n'Yes, I think you'd better leave off,' said the Gryphon: and Alice was\nonly too glad to do so.\n\n'Shall we try another figure of the Lobster Quadrille?' the Gryphon went\non. 'Or would you like the Mock Turtle to sing you a song?'\n\n'Oh, a song, please, if the Mock Turtle would be so kind,' Alice\nreplied, so eagerly that the Gryphon said, in a rather offended tone,\n'Hm! No accounting for tastes! Sing her \"Turtle Soup,\" will you, old\nfellow?'\n\nThe Mock Turtle sighed deeply, and began, in a voice sometimes choked\nwith sobs, to sing this:--\n\n   'Beautiful Soup, so rich and green,\n   Waiting in a hot tureen!\n   Who for such dainties would not stoop?\n   Soup of the evening, beautiful Soup!\n   Soup of the evening, beautiful Soup!\n     Beau--ootiful Soo--oop!\n     Beau--ootiful Soo--oop!\n   Soo--oop of the e--e--evening,\n     Beautiful, beautiful Soup!\n\n   'Beautiful Soup! Who cares for fish,\n   Game, or any other dish?\n   Who would not give all else for two\n   Pennyworth only of beautiful Soup?\n   Pennyworth only of beautiful Soup?\n     Beau--ootiful Soo--oop!\n     Beau--ootiful Soo--oop!\n   Soo--oop of the e--e--evening,\n     Beautiful, beauti--FUL SOUP!'\n\n'Chorus again!' cried the Gryphon, and the Mock Turtle had just begun\nto repeat it, when a cry of 'The trial's beginning!' was heard in the\ndistance.\n\n'Come on!' cried the Gryphon, and, taking Alice by the hand, it hurried\noff, without waiting for the end of the song.\n\n'What trial is it?' Alice panted as she ran; but the Gryphon only\nanswered 'Come on!' and ran the faster, while more and more faintly\ncame, carried on the breeze that followed them, the melancholy words:--\n\n   'Soo--oop of the e--e--evening,\n     Beautiful, beautiful Soup!'\n\n\n\n\n!!! CHAPTER XI. Who Stole the Tarts?\n\nThe King and Queen of Hearts were seated on their throne when they\narrived, with a great crowd assembled about them--all sorts of little\nbirds and beasts, as well as the whole pack of cards: the Knave was\nstanding before them, in chains, with a soldier on each side to guard\nhim; and near the King was the White Rabbit, with a trumpet in one hand,\nand a scroll of parchment in the other. In the very middle of the court\nwas a table, with a large dish of tarts upon it: they looked so good,\nthat it made Alice quite hungry to look at them--'I wish they'd get the\ntrial done,' she thought, 'and hand round the refreshments!' But there\nseemed to be no chance of this, so she began looking at everything about\nher, to pass away the time.\n\nAlice had never been in a court of justice before, but she had read\nabout them in books, and she was quite pleased to find that she knew\nthe name of nearly everything there. 'That's the judge,' she said to\nherself, 'because of his great wig.'\n\nThe judge, by the way, was the King; and as he wore his crown over the\nwig, (look at the frontispiece if you want to see how he did it,) he did\nnot look at all comfortable, and it was certainly not becoming.\n\n'And that's the jury-box,' thought Alice, 'and those twelve creatures,'\n(she was obliged to say 'creatures,' you see, because some of them were\nanimals, and some were birds,) 'I suppose they are the jurors.' She said\nthis last word two or three times over to herself, being rather proud of\nit: for she thought, and rightly too, that very few little girls of her\nage knew the meaning of it at all. However, 'jury-men' would have done\njust as well.\n\nThe twelve jurors were all writing very busily on slates. 'What are they\ndoing?' Alice whispered to the Gryphon. 'They can't have anything to put\ndown yet, before the trial's begun.'\n\n'They're putting down their names,' the Gryphon whispered in reply, 'for\nfear they should forget them before the end of the trial.'\n\n'Stupid things!' Alice began in a loud, indignant voice, but she stopped\nhastily, for the White Rabbit cried out, 'Silence in the court!' and the\nKing put on his spectacles and looked anxiously round, to make out who\nwas talking.\n\nAlice could see, as well as if she were looking over their shoulders,\nthat all the jurors were writing down 'stupid things!' on their slates,\nand she could even make out that one of them didn't know how to spell\n'stupid,' and that he had to ask his neighbour to tell him. 'A nice\nmuddle their slates'll be in before the trial's over!' thought Alice.\n\nOne of the jurors had a pencil that squeaked. This of course, Alice\ncould not stand, and she went round the court and got behind him, and\nvery soon found an opportunity of taking it away. She did it so quickly\nthat the poor little juror (it was Bill, the Lizard) could not make out\nat all what had become of it; so, after hunting all about for it, he was\nobliged to write with one finger for the rest of the day; and this was\nof very little use, as it left no mark on the slate.\n\n'Herald, read the accusation!' said the King.\n\nOn this the White Rabbit blew three blasts on the trumpet, and then\nunrolled the parchment scroll, and read as follows:--\n\n   'The Queen of Hearts, she made some tarts,\n      All on a summer day:\n    The Knave of Hearts, he stole those tarts,\n      And took them quite away!'\n\n'Consider your verdict,' the King said to the jury.\n\n'Not yet, not yet!' the Rabbit hastily interrupted. 'There's a great\ndeal to come before that!'\n\n'Call the first witness,' said the King; and the White Rabbit blew three\nblasts on the trumpet, and called out, 'First witness!'\n\nThe first witness was the Hatter. He came in with a teacup in one\nhand and a piece of bread-and-butter in the other. 'I beg pardon, your\nMajesty,' he began, 'for bringing these in: but I hadn't quite finished\nmy tea when I was sent for.'\n\n'You ought to have finished,' said the King. 'When did you begin?'\n\nThe Hatter looked at the March Hare, who had followed him into the\ncourt, arm-in-arm with the Dormouse. 'Fourteenth of March, I think it\nwas,' he said.\n\n'Fifteenth,' said the March Hare.\n\n'Sixteenth,' added the Dormouse.\n\n'Write that down,' the King said to the jury, and the jury eagerly\nwrote down all three dates on their slates, and then added them up, and\nreduced the answer to shillings and pence.\n\n'Take off your hat,' the King said to the Hatter.\n\n'It isn't mine,' said the Hatter.\n\n'Stolen!' the King exclaimed, turning to the jury, who instantly made a\nmemorandum of the fact.\n\n'I keep them to sell,' the Hatter added as an explanation; 'I've none of\nmy own. I'm a hatter.'\n\nHere the Queen put on her spectacles, and began staring at the Hatter,\nwho turned pale and fidgeted.\n\n'Give your evidence,' said the King; 'and don't be nervous, or I'll have\nyou executed on the spot.'\n\nThis did not seem to encourage the witness at all: he kept shifting\nfrom one foot to the other, looking uneasily at the Queen, and in\nhis confusion he bit a large piece out of his teacup instead of the\nbread-and-butter.\n\nJust at this moment Alice felt a very curious sensation, which puzzled\nher a good deal until she made out what it was: she was beginning to\ngrow larger again, and she thought at first she would get up and leave\nthe court; but on second thoughts she decided to remain where she was as\nlong as there was room for her.\n\n'I wish you wouldn't squeeze so.' said the Dormouse, who was sitting\nnext to her. 'I can hardly breathe.'\n\n'I can't help it,' said Alice very meekly: 'I'm growing.'\n\n'You've no right to grow here,' said the Dormouse.\n\n'Don't talk nonsense,' said Alice more boldly: 'you know you're growing\ntoo.'\n\n'Yes, but I grow at a reasonable pace,' said the Dormouse: 'not in that\nridiculous fashion.' And he got up very sulkily and crossed over to the\nother side of the court.\n\nAll this time the Queen had never left off staring at the Hatter, and,\njust as the Dormouse crossed the court, she said to one of the officers\nof the court, 'Bring me the list of the singers in the last concert!' on\nwhich the wretched Hatter trembled so, that he shook both his shoes off.\n\n'Give your evidence,' the King repeated angrily, 'or I'll have you\nexecuted, whether you're nervous or not.'\n\n'I'm a poor man, your Majesty,' the Hatter began, in a trembling voice,\n'--and I hadn't begun my tea--not above a week or so--and what with the\nbread-and-butter getting so thin--and the twinkling of the tea--'\n\n'The twinkling of the what?' said the King.\n\n'It began with the tea,' the Hatter replied.\n\n'Of course twinkling begins with a T!' said the King sharply. 'Do you\ntake me for a dunce? Go on!'\n\n'I'm a poor man,' the Hatter went on, 'and most things twinkled after\nthat--only the March Hare said--'\n\n'I didn't!' the March Hare interrupted in a great hurry.\n\n'You did!' said the Hatter.\n\n'I deny it!' said the March Hare.\n\n'He denies it,' said the King: 'leave out that part.'\n\n'Well, at any rate, the Dormouse said--' the Hatter went on, looking\nanxiously round to see if he would deny it too: but the Dormouse denied\nnothing, being fast asleep.\n\n'After that,' continued the Hatter, 'I cut some more bread-and-butter--'\n\n'But what did the Dormouse say?' one of the jury asked.\n\n'That I can't remember,' said the Hatter.\n\n'You MUST remember,' remarked the King, 'or I'll have you executed.'\n\nThe miserable Hatter dropped his teacup and bread-and-butter, and went\ndown on one knee. 'I'm a poor man, your Majesty,' he began.\n\n'You're a very poor speaker,' said the King.\n\nHere one of the guinea-pigs cheered, and was immediately suppressed by\nthe officers of the court. (As that is rather a hard word, I will just\nexplain to you how it was done. They had a large canvas bag, which tied\nup at the mouth with strings: into this they slipped the guinea-pig,\nhead first, and then sat upon it.)\n\n'I'm glad I've seen that done,' thought Alice. 'I've so often read\nin the newspapers, at the end of trials, \"There was some attempts\nat applause, which was immediately suppressed by the officers of the\ncourt,\" and I never understood what it meant till now.'\n\n'If that's all you know about it, you may stand down,' continued the\nKing.\n\n'I can't go no lower,' said the Hatter: 'I'm on the floor, as it is.'\n\n'Then you may SIT down,' the King replied.\n\nHere the other guinea-pig cheered, and was suppressed.\n\n'Come, that finished the guinea-pigs!' thought Alice. 'Now we shall get\non better.'\n\n'I'd rather finish my tea,' said the Hatter, with an anxious look at the\nQueen, who was reading the list of singers.\n\n'You may go,' said the King, and the Hatter hurriedly left the court,\nwithout even waiting to put his shoes on.\n\n'--and just take his head off outside,' the Queen added to one of the\nofficers: but the Hatter was out of sight before the officer could get\nto the door.\n\n'Call the next witness!' said the King.\n\nThe next witness was the Duchess's cook. She carried the pepper-box in\nher hand, and Alice guessed who it was, even before she got into the\ncourt, by the way the people near the door began sneezing all at once.\n\n'Give your evidence,' said the King.\n\n'Shan't,' said the cook.\n\nThe King looked anxiously at the White Rabbit, who said in a low voice,\n'Your Majesty must cross-examine THIS witness.'\n\n'Well, if I must, I must,' the King said, with a melancholy air, and,\nafter folding his arms and frowning at the cook till his eyes were\nnearly out of sight, he said in a deep voice, 'What are tarts made of?'\n\n'Pepper, mostly,' said the cook.\n\n'Treacle,' said a sleepy voice behind her.\n\n'Collar that Dormouse,' the Queen shrieked out. 'Behead that Dormouse!\nTurn that Dormouse out of court! Suppress him! Pinch him! Off with his\nwhiskers!'\n\nFor some minutes the whole court was in confusion, getting the Dormouse\nturned out, and, by the time they had settled down again, the cook had\ndisappeared.\n\n'Never mind!' said the King, with an air of great relief. 'Call the next\nwitness.' And he added in an undertone to the Queen, 'Really, my dear,\nYOU must cross-examine the next witness. It quite makes my forehead\nache!'\n\nAlice watched the White Rabbit as he fumbled over the list, feeling very\ncurious to see what the next witness would be like, '--for they haven't\ngot much evidence YET,' she said to herself. Imagine her surprise, when\nthe White Rabbit read out, at the top of his shrill little voice, the\nname 'Alice!'\n\n\n\n\n!!! CHAPTER XII. Alice's Evidence\n\n\n'Here!' cried Alice, quite forgetting in the flurry of the moment how\nlarge she had grown in the last few minutes, and she jumped up in such\na hurry that she tipped over the jury-box with the edge of her skirt,\nupsetting all the jurymen on to the heads of the crowd below, and there\nthey lay sprawling about, reminding her very much of a globe of goldfish\nshe had accidentally upset the week before.\n\n'Oh, I BEG your pardon!' she exclaimed in a tone of great dismay, and\nbegan picking them up again as quickly as she could, for the accident of\nthe goldfish kept running in her head, and she had a vague sort of idea\nthat they must be collected at once and put back into the jury-box, or\nthey would die.\n\n'The trial cannot proceed,' said the King in a very grave voice, 'until\nall the jurymen are back in their proper places--ALL,' he repeated with\ngreat emphasis, looking hard at Alice as he said do.\n\nAlice looked at the jury-box, and saw that, in her haste, she had put\nthe Lizard in head downwards, and the poor little thing was waving its\ntail about in a melancholy way, being quite unable to move. She soon got\nit out again, and put it right; 'not that it signifies much,' she said\nto herself; 'I should think it would be QUITE as much use in the trial\none way up as the other.'\n\nAs soon as the jury had a little recovered from the shock of being\nupset, and their slates and pencils had been found and handed back to\nthem, they set to work very diligently to write out a history of the\naccident, all except the Lizard, who seemed too much overcome to do\nanything but sit with its mouth open, gazing up into the roof of the\ncourt.\n\n'What do you know about this business?' the King said to Alice.\n\n'Nothing,' said Alice.\n\n'Nothing WHATEVER?' persisted the King.\n\n'Nothing whatever,' said Alice.\n\n'That's very important,' the King said, turning to the jury. They were\njust beginning to write this down on their slates, when the White Rabbit\ninterrupted: 'UNimportant, your Majesty means, of course,' he said in a\nvery respectful tone, but frowning and making faces at him as he spoke.\n\n'UNimportant, of course, I meant,' the King hastily said, and went on\nto himself in an undertone,\n\n'important--unimportant--unimportant--important--' as if he were trying\nwhich word sounded best.\n\nSome of the jury wrote it down 'important,' and some 'unimportant.'\nAlice could see this, as she was near enough to look over their slates;\n'but it doesn't matter a bit,' she thought to herself.\n\nAt this moment the King, who had been for some time busily writing in\nhis note-book, cackled out 'Silence!' and read out from his book, 'Rule\nForty-two. ALL PERSONS MORE THAN A MILE HIGH TO LEAVE THE COURT.'\n\nEverybody looked at Alice.\n\n'I'M not a mile high,' said Alice.\n\n'You are,' said the King.\n\n'Nearly two miles high,' added the Queen.\n\n'Well, I shan't go, at any rate,' said Alice: 'besides, that's not a\nregular rule: you invented it just now.'\n\n'It's the oldest rule in the book,' said the King.\n\n'Then it ought to be Number One,' said Alice.\n\nThe King turned pale, and shut his note-book hastily. 'Consider your\nverdict,' he said to the jury, in a low, trembling voice.\n\n'There's more evidence to come yet, please your Majesty,' said the White\nRabbit, jumping up in a great hurry; 'this paper has just been picked\nup.'\n\n'What's in it?' said the Queen.\n\n'I haven't opened it yet,' said the White Rabbit, 'but it seems to be a\nletter, written by the prisoner to--to somebody.'\n\n'It must have been that,' said the King, 'unless it was written to\nnobody, which isn't usual, you know.'\n\n'Who is it directed to?' said one of the jurymen.\n\n'It isn't directed at all,' said the White Rabbit; 'in fact, there's\nnothing written on the OUTSIDE.' He unfolded the paper as he spoke, and\nadded 'It isn't a letter, after all: it's a set of verses.'\n\n'Are they in the prisoner's handwriting?' asked another of the jurymen.\n\n'No, they're not,' said the White Rabbit, 'and that's the queerest thing\nabout it.' (The jury all looked puzzled.)\n\n'He must have imitated somebody else's hand,' said the King. (The jury\nall brightened up again.)\n\n'Please your Majesty,' said the Knave, 'I didn't write it, and they\ncan't prove I did: there's no name signed at the end.'\n\n'If you didn't sign it,' said the King, 'that only makes the matter\nworse. You MUST have meant some mischief, or else you'd have signed your\nname like an honest man.'\n\nThere was a general clapping of hands at this: it was the first really\nclever thing the King had said that day.\n\n'That PROVES his guilt,' said the Queen.\n\n'It proves nothing of the sort!' said Alice. 'Why, you don't even know\nwhat they're about!'\n\n'Read them,' said the King.\n\nThe White Rabbit put on his spectacles. 'Where shall I begin, please\nyour Majesty?' he asked.\n\n'Begin at the beginning,' the King said gravely, 'and go on till you\ncome to the end: then stop.'\n\nThese were the verses the White Rabbit read:--\n\n   'They told me you had been to her,\n    And mentioned me to him:\n   She gave me a good character,\n    But said I could not swim.\n\n   He sent them word I had not gone\n    (We know it to be true):\n   If she should push the matter on,\n    What would become of you?\n\n   I gave her one, they gave him two,\n    You gave us three or more;\n   They all returned from him to you,\n    Though they were mine before.\n\n   If I or she should chance to be\n    Involved in this affair,\n   He trusts to you to set them free,\n    Exactly as we were.\n\n   My notion was that you had been\n    (Before she had this fit)\n   An obstacle that came between\n    Him, and ourselves, and it.\n\n   Don't let him know she liked them best,\n    For this must ever be\n   A secret, kept from all the rest,\n    Between yourself and me.'\n\n'That's the most important piece of evidence we've heard yet,' said the\nKing, rubbing his hands; 'so now let the jury--'\n\n'If any one of them can explain it,' said Alice, (she had grown so large\nin the last few minutes that she wasn't a bit afraid of interrupting\nhim,) 'I'll give him sixpence. _I_ don't believe there's an atom of\nmeaning in it.'\n\nThe jury all wrote down on their slates, 'SHE doesn't believe there's an\natom of meaning in it,' but none of them attempted to explain the paper.\n\n'If there's no meaning in it,' said the King, 'that saves a world of\ntrouble, you know, as we needn't try to find any. And yet I don't know,'\nhe went on, spreading out the verses on his knee, and looking at them\nwith one eye; 'I seem to see some meaning in them, after all. \"--SAID\nI COULD NOT SWIM--\" you can't swim, can you?' he added, turning to the\nKnave.\n\nThe Knave shook his head sadly. 'Do I look like it?' he said. (Which he\ncertainly did NOT, being made entirely of cardboard.)\n\n'All right, so far,' said the King, and he went on muttering over\nthe verses to himself: '\"WE KNOW IT TO BE TRUE--\" that's the jury, of\ncourse--\"I GAVE HER ONE, THEY GAVE HIM TWO--\" why, that must be what he\ndid with the tarts, you know--'\n\n'But, it goes on \"THEY ALL RETURNED FROM HIM TO YOU,\"' said Alice.\n\n'Why, there they are!' said the King triumphantly, pointing to the tarts\non the table. 'Nothing can be clearer than THAT. Then again--\"BEFORE SHE\nHAD THIS FIT--\" you never had fits, my dear, I think?' he said to the\nQueen.\n\n'Never!' said the Queen furiously, throwing an inkstand at the Lizard\nas she spoke. (The unfortunate little Bill had left off writing on his\nslate with one finger, as he found it made no mark; but he now hastily\nbegan again, using the ink, that was trickling down his face, as long as\nit lasted.)\n\n'Then the words don't FIT you,' said the King, looking round the court\nwith a smile. There was a dead silence.\n\n'It's a pun!' the King added in an offended tone, and everybody laughed,\n'Let the jury consider their verdict,' the King said, for about the\ntwentieth time that day.\n\n'No, no!' said the Queen. 'Sentence first--verdict afterwards.'\n\n'Stuff and nonsense!' said Alice loudly. 'The idea of having the\nsentence first!'\n\n'Hold your tongue!' said the Queen, turning purple.\n\n'I won't!' said Alice.\n\n'Off with her head!' the Queen shouted at the top of her voice. Nobody\nmoved.\n\n'Who cares for you?' said Alice, (she had grown to her full size by this\ntime.) 'You're nothing but a pack of cards!'\n\nAt this the whole pack rose up into the air, and came flying down upon\nher: she gave a little scream, half of fright and half of anger, and\ntried to beat them off, and found herself lying on the bank, with her\nhead in the lap of her sister, who was gently brushing away some dead\nleaves that had fluttered down from the trees upon her face.\n\n'Wake up, Alice dear!' said her sister; 'Why, what a long sleep you've\nhad!'\n\n'Oh, I've had such a curious dream!' said Alice, and she told her\nsister, as well as she could remember them, all these strange Adventures\nof hers that you have just been reading about; and when she had\nfinished, her sister kissed her, and said, 'It WAS a curious dream,\ndear, certainly: but now run in to your tea; it's getting late.' So\nAlice got up and ran off, thinking while she ran, as well she might,\nwhat a wonderful dream it had been.\n\nBut her sister sat still just as she left her, leaning her head on her\nhand, watching the setting sun, and thinking of little Alice and all her\nwonderful Adventures, till she too began dreaming after a fashion, and\nthis was her dream:--\n\nFirst, she dreamed of little Alice herself, and once again the tiny\nhands were clasped upon her knee, and the bright eager eyes were looking\nup into hers--she could hear the very tones of her voice, and see that\nqueer little toss of her head to keep back the wandering hair that\nWOULD always get into her eyes--and still as she listened, or seemed to\nlisten, the whole place around her became alive with the strange creatures\nof her little sister's dream.\n\nThe long grass rustled at her feet as the White Rabbit hurried by--the\nfrightened Mouse splashed his way through the neighbouring pool--she\ncould hear the rattle of the teacups as the March Hare and his friends\nshared their never-ending meal, and the shrill voice of the Queen\nordering off her unfortunate guests to execution--once more the pig-baby\nwas sneezing on the Duchess's knee, while plates and dishes crashed\naround it--once more the shriek of the Gryphon, the squeaking of the\nLizard's slate-pencil, and the choking of the suppressed guinea-pigs,\nfilled the air, mixed up with the distant sobs of the miserable Mock\nTurtle.\n\nSo she sat on, with closed eyes, and half believed herself in\nWonderland, though she knew she had but to open them again, and all\nwould change to dull reality--the grass would be only rustling in the\nwind, and the pool rippling to the waving of the reeds--the rattling\nteacups would change to tinkling sheep-bells, and the Queen's shrill\ncries to the voice of the shepherd boy--and the sneeze of the baby, the\nshriek of the Gryphon, and all the other queer noises, would change (she\nknew) to the confused clamour of the busy farm-yard--while the lowing\nof the cattle in the distance would take the place of the Mock Turtle's\nheavy sobs.\n\nLastly, she pictured to herself how this same little sister of hers\nwould, in the after-time, be herself a grown woman; and how she would\nkeep, through all her riper years, the simple and loving heart of her\nchildhood: and how she would gather about her other little children, and\nmake THEIR eyes bright and eager with many a strange tale, perhaps even\nwith the dream of Wonderland of long ago: and how she would feel with\nall their simple sorrows, and find a pleasure in all their simple joys,\nremembering her own child-life, and the happy summer days.\n\n              THE END\n"},

{"title":"Alice in Wonderland:-paragraph-1","text":"\u003Ch3>CHAPTER I. Down the Rabbit-Hole\u003C/h3>","caption":"CHAPTER I. Down the Rabbit-Hole","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-10","text":"Presently she began again. 'I wonder if I shall fall right THROUGH the\nearth! How funny it'll seem to come out among the people that walk with\ntheir heads downward! The Antipathies, I think–' (she was rather glad\nthere WAS no one listening, this time, as it didn't sound at all the\nright word) '–but I shall have to ask them what the name of the country\nis, you know. Please, Ma'am, is this New Zealand or Australia?' (and\nshe tried to curtsey as she spoke–fancy CURTSEYING as you're falling\nthrough the air! Do you think you could manage it?) 'And what an\nignorant little girl she'll think me for asking! No, it'll never do to\nask: perhaps I shall see it written up somewhere.'","caption":"Presently she began again. 'I wonder if I shall fall right THROUGH the\nearth! How funny it'll seem to come out among the people that walk with\ntheir heads downward! The Antipathies, I think–' (she was rather glad\nthere WAS no one listening, this time, as it didn't sound at all the\nright word) '–but I shall have to ask them what the name of the country\nis, you know. Please, Ma'am, is this New Zealand or Australia?' (and\nshe tried to curtsey as she spoke–fancy CURTSEYING as you're falling\nthrough the air! Do you think you could manage it?) 'And what an\nignorant little girl she'll think me for asking! No, it'll never do to\nask: perhaps I shall see it written up somewhere.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-100","text":"'And who is Dinah, if I might venture to ask the question?' said the\nLory.","caption":"'And who is Dinah, if I might venture to ask the question?' said the\nLory.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-101","text":"Alice replied eagerly, for she was always ready to talk about her pet:\n'Dinah's our cat. And she's such a capital one for catching mice you\ncan't think! And oh, I wish you could see her after the birds! Why,\nshe'll eat a little bird as soon as look at it!'","caption":"Alice replied eagerly, for she was always ready to talk about her pet:\n'Dinah's our cat. And she's such a capital one for catching mice you\ncan't think! And oh, I wish you could see her after the birds! Why,\nshe'll eat a little bird as soon as look at it!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-102","text":"This speech caused a remarkable sensation among the party. Some of the\nbirds hurried off at once: one old Magpie began wrapping itself up very\ncarefully, remarking, 'I really must be getting home; the night-air\ndoesn't suit my throat!' and a Canary called out in a trembling voice to\nits children, 'Come away, my dears! It's high time you were all in bed!'\nOn various pretexts they all moved off, and Alice was soon left alone.","caption":"This speech caused a remarkable sensation among the party. Some of the\nbirds hurried off at once: one old Magpie began wrapping itself up very\ncarefully, remarking, 'I really must be getting home; the night-air\ndoesn't suit my throat!' and a Canary called out in a trembling voice to\nits children, 'Come away, my dears! It's high time you were all in bed!'\nOn various pretexts they all moved off, and Alice was soon left alone.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-103","text":"'I wish I hadn't mentioned Dinah!' she said to herself in a melancholy\ntone. 'Nobody seems to like her, down here, and I'm sure she's the best\ncat in the world! Oh, my dear Dinah! I wonder if I shall ever see you\nany more!' And here poor Alice began to cry again, for she felt very\nlonely and low-spirited. In a little while, however, she again heard\na little pattering of footsteps in the distance, and she looked up\neagerly, half hoping that the Mouse had changed his mind, and was coming\nback to finish his story.","caption":"'I wish I hadn't mentioned Dinah!' she said to herself in a melancholy\ntone. 'Nobody seems to like her, down here, and I'm sure she's the best\ncat in the world! Oh, my dear Dinah! I wonder if I shall ever see you\nany more!' And here poor Alice began to cry again, for she felt very\nlonely and low-spirited. In a little while, however, she again heard\na little pattering of footsteps in the distance, and she looked up\neagerly, half hoping that the Mouse had changed his mind, and was coming\nback to finish his story.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-104","text":"\u003Ch3>CHAPTER IV. The Rabbit Sends in a Little Bill\u003C/h3>","caption":"CHAPTER IV. The Rabbit Sends in a Little Bill","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-105","text":"It was the White Rabbit, trotting slowly back again, and looking\nanxiously about as it went, as if it had lost something; and she heard\nit muttering to itself 'The Duchess! The Duchess! Oh my dear paws! Oh\nmy fur and whiskers! She'll get me executed, as sure as ferrets are\nferrets! Where CAN I have dropped them, I wonder?' Alice guessed in a\nmoment that it was looking for the fan and the pair of white kid gloves,\nand she very good-naturedly began hunting about for them, but they were\nnowhere to be seen–everything seemed to have changed since her swim in\nthe pool, and the great hall, with the glass table and the little door,\nhad vanished completely.","caption":"It was the White Rabbit, trotting slowly back again, and looking\nanxiously about as it went, as if it had lost something; and she heard\nit muttering to itself 'The Duchess! The Duchess! Oh my dear paws! Oh\nmy fur and whiskers! She'll get me executed, as sure as ferrets are\nferrets! Where CAN I have dropped them, I wonder?' Alice guessed in a\nmoment that it was looking for the fan and the pair of white kid gloves,\nand she very good-naturedly began hunting about for them, but they were\nnowhere to be seen–everything seemed to have changed since her swim in\nthe pool, and the great hall, with the glass table and the little door,\nhad vanished completely.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-106","text":"Very soon the Rabbit noticed Alice, as she went hunting about, and\ncalled out to her in an angry tone, 'Why, Mary Ann, what ARE you doing\nout here? Run home this moment, and fetch me a pair of gloves and a fan!\nQuick, now!' And Alice was so much frightened that she ran off at once\nin the direction it pointed to, without trying to explain the mistake it\nhad made.","caption":"Very soon the Rabbit noticed Alice, as she went hunting about, and\ncalled out to her in an angry tone, 'Why, Mary Ann, what ARE you doing\nout here? Run home this moment, and fetch me a pair of gloves and a fan!\nQuick, now!' And Alice was so much frightened that she ran off at once\nin the direction it pointed to, without trying to explain the mistake it\nhad made.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-107","text":"'He took me for his housemaid,' she said to herself as she ran. 'How\nsurprised he'll be when he finds out who I am! But I'd better take him\nhis fan and gloves–that is, if I can find them.' As she said this, she\ncame upon a neat little house, on the door of which was a bright brass\nplate with the name 'W. RABBIT' engraved upon it. She went in without\nknocking, and hurried upstairs, in great fear lest she should meet the\nreal Mary Ann, and be turned out of the house before she had found the\nfan and gloves.","caption":"'He took me for his housemaid,' she said to herself as she ran. 'How\nsurprised he'll be when he finds out who I am! But I'd better take him\nhis fan and gloves–that is, if I can find them.' As she said this, she\ncame upon a neat little house, on the door of which was a bright brass\nplate with the name 'W. RABBIT' engraved upon it. She went in without\nknocking, and hurried upstairs, in great fear lest she should meet the\nreal Mary Ann, and be turned out of the house before she had found the\nfan and gloves.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-108","text":"'How queer it seems,' Alice said to herself, 'to be going messages for\na rabbit! I suppose Dinah'll be sending me on messages next!' And she\nbegan fancying the sort of thing that would happen: '&quot;Miss Alice! Come\nhere directly, and get ready for your walk!&quot; &quot;Coming in a minute,\nnurse! But I've got to see that the mouse doesn't get out.&quot; Only I don't\nthink,' Alice went on, 'that they'd let Dinah stop in the house if it\nbegan ordering people about like that!'","caption":"'How queer it seems,' Alice said to herself, 'to be going messages for\na rabbit! I suppose Dinah'll be sending me on messages next!' And she\nbegan fancying the sort of thing that would happen: '&quot;Miss Alice! Come\nhere directly, and get ready for your walk!&quot; &quot;Coming in a minute,\nnurse! But I've got to see that the mouse doesn't get out.&quot; Only I don't\nthink,' Alice went on, 'that they'd let Dinah stop in the house if it\nbegan ordering people about like that!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-109","text":"By this time she had found her way into a tidy little room with a table\nin the window, and on it (as she had hoped) a fan and two or three pairs\nof tiny white kid gloves: she took up the fan and a pair of the gloves,\nand was just going to leave the room, when her eye fell upon a little\nbottle that stood near the looking-glass. There was no label this time\nwith the words 'DRINK ME,' but nevertheless she uncorked it and put it\nto her lips. 'I know SOMETHING interesting is sure to happen,' she said\nto herself, 'whenever I eat or drink anything; so I'll just see what\nthis bottle does. I do hope it'll make me grow large again, for really\nI'm quite tired of being such a tiny little thing!'","caption":"By this time she had found her way into a tidy little room with a table\nin the window, and on it (as she had hoped) a fan and two or three pairs\nof tiny white kid gloves: she took up the fan and a pair of the gloves,\nand was just going to leave the room, when her eye fell upon a little\nbottle that stood near the looking-glass. There was no label this time\nwith the words 'DRINK ME,' but nevertheless she uncorked it and put it\nto her lips. 'I know SOMETHING interesting is sure to happen,' she said\nto herself, 'whenever I eat or drink anything; so I'll just see what\nthis bottle does. I do hope it'll make me grow large again, for really\nI'm quite tired of being such a tiny little thing!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-11","text":"Down, down, down. There was nothing else to do, so Alice soon began\ntalking again. 'Dinah'll miss me very much to-night, I should think!'\n(Dinah was the cat.) 'I hope they'll remember her saucer of milk at\ntea-time. Dinah my dear! I wish you were down here with me! There are no\nmice in the air, I'm afraid, but you might catch a bat, and that's very\nlike a mouse, you know. But do cats eat bats, I wonder?' And here Alice\nbegan to get rather sleepy, and went on saying to herself, in a dreamy\nsort of way, 'Do cats eat bats? Do cats eat bats?' and sometimes, 'Do\nbats eat cats?' for, you see, as she couldn't answer either question,\nit didn't much matter which way she put it. She felt that she was dozing\noff, and had just begun to dream that she was walking hand in hand with\nDinah, and saying to her very earnestly, 'Now, Dinah, tell me the truth:\ndid you ever eat a bat?' when suddenly, thump! thump! down she came upon\na heap of sticks and dry leaves, and the fall was over.","caption":"Down, down, down. There was nothing else to do, so Alice soon began\ntalking again. 'Dinah'll miss me very much to-night, I should think!'\n(Dinah was the cat.) 'I hope they'll remember her saucer of milk at\ntea-time. Dinah my dear! I wish you were down here with me! There are no\nmice in the air, I'm afraid, but you might catch a bat, and that's very\nlike a mouse, you know. But do cats eat bats, I wonder?' And here Alice\nbegan to get rather sleepy, and went on saying to herself, in a dreamy\nsort of way, 'Do cats eat bats? Do cats eat bats?' and sometimes, 'Do\nbats eat cats?' for, you see, as she couldn't answer either question,\nit didn't much matter which way she put it. She felt that she was dozing\noff, and had just begun to dream that she was walking hand in hand with\nDinah, and saying to her very earnestly, 'Now, Dinah, tell me the truth:\ndid you ever eat a bat?' when suddenly, thump! thump! down she came upon\na heap of sticks and dry leaves, and the fall was over.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-110","text":"It did so indeed, and much sooner than she had expected: before she had\ndrunk half the bottle, she found her head pressing against the ceiling,\nand had to stoop to save her neck from being broken. She hastily put\ndown the bottle, saying to herself 'That's quite enough–I hope I shan't\ngrow any more–As it is, I can't get out at the door–I do wish I hadn't\ndrunk quite so much!'","caption":"It did so indeed, and much sooner than she had expected: before she had\ndrunk half the bottle, she found her head pressing against the ceiling,\nand had to stoop to save her neck from being broken. She hastily put\ndown the bottle, saying to herself 'That's quite enough–I hope I shan't\ngrow any more–As it is, I can't get out at the door–I do wish I hadn't\ndrunk quite so much!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-111","text":"Alas! it was too late to wish that! She went on growing, and growing,\nand very soon had to kneel down on the floor: in another minute there\nwas not even room for this, and she tried the effect of lying down with\none elbow against the door, and the other arm curled round her head.\nStill she went on growing, and, as a last resource, she put one arm out\nof the window, and one foot up the chimney, and said to herself 'Now I\ncan do no more, whatever happens. What WILL become of me?'","caption":"Alas! it was too late to wish that! She went on growing, and growing,\nand very soon had to kneel down on the floor: in another minute there\nwas not even room for this, and she tried the effect of lying down with\none elbow against the door, and the other arm curled round her head.\nStill she went on growing, and, as a last resource, she put one arm out\nof the window, and one foot up the chimney, and said to herself 'Now I\ncan do no more, whatever happens. What WILL become of me?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-112","text":"Luckily for Alice, the little magic bottle had now had its full effect,\nand she grew no larger: still it was very uncomfortable, and, as there\nseemed to be no sort of chance of her ever getting out of the room\nagain, no wonder she felt unhappy.","caption":"Luckily for Alice, the little magic bottle had now had its full effect,\nand she grew no larger: still it was very uncomfortable, and, as there\nseemed to be no sort of chance of her ever getting out of the room\nagain, no wonder she felt unhappy.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-113","text":"'It was much pleasanter at home,' thought poor Alice, 'when one wasn't\nalways growing larger and smaller, and being ordered about by mice and\nrabbits. I almost wish I hadn't gone down that rabbit-hole–and yet–and\nyet–it's rather curious, you know, this sort of life! I do wonder what\nCAN have happened to me! When I used to read fairy-tales, I fancied that\nkind of thing never happened, and now here I am in the middle of one!\nThere ought to be a book written about me, that there ought! And when I\ngrow up, I'll write one–but I'm grown up now,' she added in a sorrowful\ntone; 'at least there's no room to grow up any more HERE.'","caption":"'It was much pleasanter at home,' thought poor Alice, 'when one wasn't\nalways growing larger and smaller, and being ordered about by mice and\nrabbits. I almost wish I hadn't gone down that rabbit-hole–and yet–and\nyet–it's rather curious, you know, this sort of life! I do wonder what\nCAN have happened to me! When I used to read fairy-tales, I fancied that\nkind of thing never happened, and now here I am in the middle of one!\nThere ought to be a book written about me, that there ought! And when I\ngrow up, I'll write one–but I'm grown up now,' she added in a sorrowful\ntone; 'at least there's no room to grow up any more HERE.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-114","text":"'But then,' thought Alice, 'shall I NEVER get any older than I am\nnow? That'll be a comfort, one way–never to be an old woman–but\nthen–always to have lessons to learn! Oh, I shouldn't like THAT!'","caption":"'But then,' thought Alice, 'shall I NEVER get any older than I am\nnow? That'll be a comfort, one way–never to be an old woman–but\nthen–always to have lessons to learn! Oh, I shouldn't like THAT!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-115","text":"'Oh, you foolish Alice!' she answered herself. 'How can you learn\nlessons in here? Why, there's hardly room for YOU, and no room at all\nfor any lesson-books!'","caption":"'Oh, you foolish Alice!' she answered herself. 'How can you learn\nlessons in here? Why, there's hardly room for YOU, and no room at all\nfor any lesson-books!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-116","text":"And so she went on, taking first one side and then the other, and making\nquite a conversation of it altogether; but after a few minutes she heard\na voice outside, and stopped to listen.","caption":"And so she went on, taking first one side and then the other, and making\nquite a conversation of it altogether; but after a few minutes she heard\na voice outside, and stopped to listen.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-117","text":"'Mary Ann! Mary Ann!' said the voice. 'Fetch me my gloves this moment!'\nThen came a little pattering of feet on the stairs. Alice knew it was\nthe Rabbit coming to look for her, and she trembled till she shook the\nhouse, quite forgetting that she was now about a thousand times as large\nas the Rabbit, and had no reason to be afraid of it.","caption":"'Mary Ann! Mary Ann!' said the voice. 'Fetch me my gloves this moment!'\nThen came a little pattering of feet on the stairs. Alice knew it was\nthe Rabbit coming to look for her, and she trembled till she shook the\nhouse, quite forgetting that she was now about a thousand times as large\nas the Rabbit, and had no reason to be afraid of it.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-118","text":"Presently the Rabbit came up to the door, and tried to open it; but, as\nthe door opened inwards, and Alice's elbow was pressed hard against it,\nthat attempt proved a failure. Alice heard it say to itself 'Then I'll\ngo round and get in at the window.'","caption":"Presently the Rabbit came up to the door, and tried to open it; but, as\nthe door opened inwards, and Alice's elbow was pressed hard against it,\nthat attempt proved a failure. Alice heard it say to itself 'Then I'll\ngo round and get in at the window.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-119","text":"'THAT you won't' thought Alice, and, after waiting till she fancied\nshe heard the Rabbit just under the window, she suddenly spread out her\nhand, and made a snatch in the air. She did not get hold of anything,\nbut she heard a little shriek and a fall, and a crash of broken glass,\nfrom which she concluded that it was just possible it had fallen into a\ncucumber-frame, or something of the sort.","caption":"'THAT you won't' thought Alice, and, after waiting till she fancied\nshe heard the Rabbit just under the window, she suddenly spread out her\nhand, and made a snatch in the air. She did not get hold of anything,\nbut she heard a little shriek and a fall, and a crash of broken glass,\nfrom which she concluded that it was just possible it had fallen into a\ncucumber-frame, or something of the sort.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-12","text":"Alice was not a bit hurt, and she jumped up on to her feet in a moment:\nshe looked up, but it was all dark overhead; before her was another\nlong passage, and the White Rabbit was still in sight, hurrying down it.\nThere was not a moment to be lost: away went Alice like the wind, and\nwas just in time to hear it say, as it turned a corner, 'Oh my ears\nand whiskers, how late it's getting!' She was close behind it when she\nturned the corner, but the Rabbit was no longer to be seen: she found\nherself in a long, low hall, which was lit up by a row of lamps hanging\nfrom the roof.","caption":"Alice was not a bit hurt, and she jumped up on to her feet in a moment:\nshe looked up, but it was all dark overhead; before her was another\nlong passage, and the White Rabbit was still in sight, hurrying down it.\nThere was not a moment to be lost: away went Alice like the wind, and\nwas just in time to hear it say, as it turned a corner, 'Oh my ears\nand whiskers, how late it's getting!' She was close behind it when she\nturned the corner, but the Rabbit was no longer to be seen: she found\nherself in a long, low hall, which was lit up by a row of lamps hanging\nfrom the roof.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-120","text":"Next came an angry voice–the Rabbit's–'Pat! Pat! Where are you?' And\nthen a voice she had never heard before, 'Sure then I'm here! Digging\nfor apples, yer honour!'","caption":"Next came an angry voice–the Rabbit's–'Pat! Pat! Where are you?' And\nthen a voice she had never heard before, 'Sure then I'm here! Digging\nfor apples, yer honour!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-121","text":"'Digging for apples, indeed!' said the Rabbit angrily. 'Here! Come and\nhelp me out of THIS!' (Sounds of more broken glass.)","caption":"'Digging for apples, indeed!' said the Rabbit angrily. 'Here! Come and\nhelp me out of THIS!' (Sounds of more broken glass.)","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-122","text":"'Now tell me, Pat, what's that in the window?'","caption":"'Now tell me, Pat, what's that in the window?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-123","text":"'Sure, it's an arm, yer honour!' (He pronounced it 'arrum.')","caption":"'Sure, it's an arm, yer honour!' (He pronounced it 'arrum.')","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-124","text":"'An arm, you goose! Who ever saw one that size? Why, it fills the whole\nwindow!'","caption":"'An arm, you goose! Who ever saw one that size? Why, it fills the whole\nwindow!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-125","text":"'Sure, it does, yer honour: but it's an arm for all that.'","caption":"'Sure, it does, yer honour: but it's an arm for all that.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-126","text":"'Well, it's got no business there, at any rate: go and take it away!'","caption":"'Well, it's got no business there, at any rate: go and take it away!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-127","text":"There was a long silence after this, and Alice could only hear whispers\nnow and then; such as, 'Sure, I don't like it, yer honour, at all, at\nall!' 'Do as I tell you, you coward!' and at last she spread out her\nhand again, and made another snatch in the air. This time there were\nTWO little shrieks, and more sounds of broken glass. 'What a number of\ncucumber-frames there must be!' thought Alice. 'I wonder what they'll do\nnext! As for pulling me out of the window, I only wish they COULD! I'm\nsure I don't want to stay in here any longer!'","caption":"There was a long silence after this, and Alice could only hear whispers\nnow and then; such as, 'Sure, I don't like it, yer honour, at all, at\nall!' 'Do as I tell you, you coward!' and at last she spread out her\nhand again, and made another snatch in the air. This time there were\nTWO little shrieks, and more sounds of broken glass. 'What a number of\ncucumber-frames there must be!' thought Alice. 'I wonder what they'll do\nnext! As for pulling me out of the window, I only wish they COULD! I'm\nsure I don't want to stay in here any longer!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-128","text":"She waited for some time without hearing anything more: at last came a\nrumbling of little cartwheels, and the sound of a good many voices\nall talking together: she made out the words: 'Where's the other\nladder?–Why, I hadn't to bring but one; Bill's got the other–Bill!\nfetch it here, lad!–Here, put 'em up at this corner–No, tie 'em\ntogether first–they don't reach half high enough yet–Oh! they'll\ndo well enough; don't be particular–Here, Bill! catch hold of this\nrope–Will the roof bear?–Mind that loose slate–Oh, it's coming\ndown! Heads below!' (a loud crash)–'Now, who did that?–It was Bill, I\nfancy–Who's to go down the chimney?–Nay, I shan't! YOU do it!–That I\nwon't, then!–Bill's to go down–Here, Bill! the master says you're to\ngo down the chimney!'","caption":"She waited for some time without hearing anything more: at last came a\nrumbling of little cartwheels, and the sound of a good many voices\nall talking together: she made out the words: 'Where's the other\nladder?–Why, I hadn't to bring but one; Bill's got the other–Bill!\nfetch it here, lad!–Here, put 'em up at this corner–No, tie 'em\ntogether first–they don't reach half high enough yet–Oh! they'll\ndo well enough; don't be particular–Here, Bill! catch hold of this\nrope–Will the roof bear?–Mind that loose slate–Oh, it's coming\ndown! Heads below!' (a loud crash)–'Now, who did that?–It was Bill, I\nfancy–Who's to go down the chimney?–Nay, I shan't! YOU do it!–That I\nwon't, then!–Bill's to go down–Here, Bill! the master says you're to\ngo down the chimney!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-129","text":"'Oh! So Bill's got to come down the chimney, has he?' said Alice to\nherself. 'Shy, they seem to put everything upon Bill! I wouldn't be in\nBill's place for a good deal: this fireplace is narrow, to be sure; but\nI THINK I can kick a little!'","caption":"'Oh! So Bill's got to come down the chimney, has he?' said Alice to\nherself. 'Shy, they seem to put everything upon Bill! I wouldn't be in\nBill's place for a good deal: this fireplace is narrow, to be sure; but\nI THINK I can kick a little!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-13","text":"There were doors all round the hall, but they were all locked; and when\nAlice had been all the way down one side and up the other, trying every\ndoor, she walked sadly down the middle, wondering how she was ever to\nget out again.","caption":"There were doors all round the hall, but they were all locked; and when\nAlice had been all the way down one side and up the other, trying every\ndoor, she walked sadly down the middle, wondering how she was ever to\nget out again.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-130","text":"She drew her foot as far down the chimney as she could, and waited\ntill she heard a little animal (she couldn't guess of what sort it was)\nscratching and scrambling about in the chimney close above her: then,\nsaying to herself 'This is Bill,' she gave one sharp kick, and waited to\nsee what would happen next.","caption":"She drew her foot as far down the chimney as she could, and waited\ntill she heard a little animal (she couldn't guess of what sort it was)\nscratching and scrambling about in the chimney close above her: then,\nsaying to herself 'This is Bill,' she gave one sharp kick, and waited to\nsee what would happen next.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-131","text":"The first thing she heard was a general chorus of 'There goes Bill!'\nthen the Rabbit's voice along–'Catch him, you by the hedge!' then\nsilence, and then another confusion of voices–'Hold up his head–Brandy\nnow–Don't choke him–How was it, old fellow? What happened to you? Tell\nus all about it!'","caption":"The first thing she heard was a general chorus of 'There goes Bill!'\nthen the Rabbit's voice along–'Catch him, you by the hedge!' then\nsilence, and then another confusion of voices–'Hold up his head–Brandy\nnow–Don't choke him–How was it, old fellow? What happened to you? Tell\nus all about it!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-132","text":"Last came a little feeble, squeaking voice, ('That's Bill,' thought\nAlice,) 'Well, I hardly know–No more, thank ye; I'm better now–but I'm\na deal too flustered to tell you–all I know is, something comes at me\nlike a Jack-in-the-box, and up I goes like a sky-rocket!'","caption":"Last came a little feeble, squeaking voice, ('That's Bill,' thought\nAlice,) 'Well, I hardly know–No more, thank ye; I'm better now–but I'm\na deal too flustered to tell you–all I know is, something comes at me\nlike a Jack-in-the-box, and up I goes like a sky-rocket!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-133","text":"'So you did, old fellow!' said the others.","caption":"'So you did, old fellow!' said the others.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-134","text":"'We must burn the house down!' said the Rabbit's voice; and Alice called\nout as loud as she could, 'If you do. I'll set Dinah at you!'","caption":"'We must burn the house down!' said the Rabbit's voice; and Alice called\nout as loud as she could, 'If you do. I'll set Dinah at you!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-135","text":"There was a dead silence instantly, and Alice thought to herself, 'I\nwonder what they WILL do next! If they had any sense, they'd take the\nroof off.' After a minute or two, they began moving about again, and\nAlice heard the Rabbit say, 'A barrowful will do, to begin with.'","caption":"There was a dead silence instantly, and Alice thought to herself, 'I\nwonder what they WILL do next! If they had any sense, they'd take the\nroof off.' After a minute or two, they began moving about again, and\nAlice heard the Rabbit say, 'A barrowful will do, to begin with.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-136","text":"'A barrowful of WHAT?' thought Alice; but she had not long to doubt,\nfor the next moment a shower of little pebbles came rattling in at the\nwindow, and some of them hit her in the face. 'I'll put a stop to this,'\nshe said to herself, and shouted out, 'You'd better not do that again!'\nwhich produced another dead silence.","caption":"'A barrowful of WHAT?' thought Alice; but she had not long to doubt,\nfor the next moment a shower of little pebbles came rattling in at the\nwindow, and some of them hit her in the face. 'I'll put a stop to this,'\nshe said to herself, and shouted out, 'You'd better not do that again!'\nwhich produced another dead silence.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-137","text":"Alice noticed with some surprise that the pebbles were all turning into\nlittle cakes as they lay on the floor, and a bright idea came into her\nhead. 'If I eat one of these cakes,' she thought, 'it's sure to make\nSOME change in my size; and as it can't possibly make me larger, it must\nmake me smaller, I suppose.'","caption":"Alice noticed with some surprise that the pebbles were all turning into\nlittle cakes as they lay on the floor, and a bright idea came into her\nhead. 'If I eat one of these cakes,' she thought, 'it's sure to make\nSOME change in my size; and as it can't possibly make me larger, it must\nmake me smaller, I suppose.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-138","text":"So she swallowed one of the cakes, and was delighted to find that she\nbegan shrinking directly. As soon as she was small enough to get through\nthe door, she ran out of the house, and found quite a crowd of little\nanimals and birds waiting outside. The poor little Lizard, Bill, was\nin the middle, being held up by two guinea-pigs, who were giving it\nsomething out of a bottle. They all made a rush at Alice the moment she\nappeared; but she ran off as hard as she could, and soon found herself\nsafe in a thick wood.","caption":"So she swallowed one of the cakes, and was delighted to find that she\nbegan shrinking directly. As soon as she was small enough to get through\nthe door, she ran out of the house, and found quite a crowd of little\nanimals and birds waiting outside. The poor little Lizard, Bill, was\nin the middle, being held up by two guinea-pigs, who were giving it\nsomething out of a bottle. They all made a rush at Alice the moment she\nappeared; but she ran off as hard as she could, and soon found herself\nsafe in a thick wood.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-139","text":"'The first thing I've got to do,' said Alice to herself, as she wandered\nabout in the wood, 'is to grow to my right size again; and the second\nthing is to find my way into that lovely garden. I think that will be\nthe best plan.'","caption":"'The first thing I've got to do,' said Alice to herself, as she wandered\nabout in the wood, 'is to grow to my right size again; and the second\nthing is to find my way into that lovely garden. I think that will be\nthe best plan.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-14","text":"Suddenly she came upon a little three-legged table, all made of solid\nglass; there was nothing on it except a tiny golden key, and Alice's\nfirst thought was that it might belong to one of the doors of the hall;\nbut, alas! either the locks were too large, or the key was too small,\nbut at any rate it would not open any of them. However, on the second\ntime round, she came upon a low curtain she had not noticed before, and\nbehind it was a little door about fifteen inches high: she tried the\nlittle golden key in the lock, and to her great delight it fitted!","caption":"Suddenly she came upon a little three-legged table, all made of solid\nglass; there was nothing on it except a tiny golden key, and Alice's\nfirst thought was that it might belong to one of the doors of the hall;\nbut, alas! either the locks were too large, or the key was too small,\nbut at any rate it would not open any of them. However, on the second\ntime round, she came upon a low curtain she had not noticed before, and\nbehind it was a little door about fifteen inches high: she tried the\nlittle golden key in the lock, and to her great delight it fitted!","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-140","text":"It sounded an excellent plan, no doubt, and very neatly and simply\narranged; the only difficulty was, that she had not the smallest idea\nhow to set about it; and while she was peering about anxiously among\nthe trees, a little sharp bark just over her head made her look up in a\ngreat hurry.","caption":"It sounded an excellent plan, no doubt, and very neatly and simply\narranged; the only difficulty was, that she had not the smallest idea\nhow to set about it; and while she was peering about anxiously among\nthe trees, a little sharp bark just over her head made her look up in a\ngreat hurry.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-141","text":"An enormous puppy was looking down at her with large round eyes, and\nfeebly stretching out one paw, trying to touch her. 'Poor little thing!'\nsaid Alice, in a coaxing tone, and she tried hard to whistle to it; but\nshe was terribly frightened all the time at the thought that it might be\nhungry, in which case it would be very likely to eat her up in spite of\nall her coaxing.","caption":"An enormous puppy was looking down at her with large round eyes, and\nfeebly stretching out one paw, trying to touch her. 'Poor little thing!'\nsaid Alice, in a coaxing tone, and she tried hard to whistle to it; but\nshe was terribly frightened all the time at the thought that it might be\nhungry, in which case it would be very likely to eat her up in spite of\nall her coaxing.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-142","text":"Hardly knowing what she did, she picked up a little bit of stick, and\nheld it out to the puppy; whereupon the puppy jumped into the air off\nall its feet at once, with a yelp of delight, and rushed at the stick,\nand made believe to worry it; then Alice dodged behind a great thistle,\nto keep herself from being run over; and the moment she appeared on the\nother side, the puppy made another rush at the stick, and tumbled head\nover heels in its hurry to get hold of it; then Alice, thinking it was\nvery like having a game of play with a cart-horse, and expecting every\nmoment to be trampled under its feet, ran round the thistle again; then\nthe puppy began a series of short charges at the stick, running a very\nlittle way forwards each time and a long way back, and barking hoarsely\nall the while, till at last it sat down a good way off, panting, with\nits tongue hanging out of its mouth, and its great eyes half shut.","caption":"Hardly knowing what she did, she picked up a little bit of stick, and\nheld it out to the puppy; whereupon the puppy jumped into the air off\nall its feet at once, with a yelp of delight, and rushed at the stick,\nand made believe to worry it; then Alice dodged behind a great thistle,\nto keep herself from being run over; and the moment she appeared on the\nother side, the puppy made another rush at the stick, and tumbled head\nover heels in its hurry to get hold of it; then Alice, thinking it was\nvery like having a game of play with a cart-horse, and expecting every\nmoment to be trampled under its feet, ran round the thistle again; then\nthe puppy began a series of short charges at the stick, running a very\nlittle way forwards each time and a long way back, and barking hoarsely\nall the while, till at last it sat down a good way off, panting, with\nits tongue hanging out of its mouth, and its great eyes half shut.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-143","text":"This seemed to Alice a good opportunity for making her escape; so she\nset off at once, and ran till she was quite tired and out of breath, and\ntill the puppy's bark sounded quite faint in the distance.","caption":"This seemed to Alice a good opportunity for making her escape; so she\nset off at once, and ran till she was quite tired and out of breath, and\ntill the puppy's bark sounded quite faint in the distance.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-144","text":"'And yet what a dear little puppy it was!' said Alice, as she leant\nagainst a buttercup to rest herself, and fanned herself with one of the\nleaves: 'I should have liked teaching it tricks very much, if–if I'd\nonly been the right size to do it! Oh dear! I'd nearly forgotten that\nI've got to grow up again! Let me see–how IS it to be managed? I\nsuppose I ought to eat or drink something or other; but the great\nquestion is, what?'","caption":"'And yet what a dear little puppy it was!' said Alice, as she leant\nagainst a buttercup to rest herself, and fanned herself with one of the\nleaves: 'I should have liked teaching it tricks very much, if–if I'd\nonly been the right size to do it! Oh dear! I'd nearly forgotten that\nI've got to grow up again! Let me see–how IS it to be managed? I\nsuppose I ought to eat or drink something or other; but the great\nquestion is, what?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-145","text":"The great question certainly was, what? Alice looked all round her at\nthe flowers and the blades of grass, but she did not see anything that\nlooked like the right thing to eat or drink under the circumstances.\nThere was a large mushroom growing near her, about the same height as\nherself; and when she had looked under it, and on both sides of it, and\nbehind it, it occurred to her that she might as well look and see what\nwas on the top of it.","caption":"The great question certainly was, what? Alice looked all round her at\nthe flowers and the blades of grass, but she did not see anything that\nlooked like the right thing to eat or drink under the circumstances.\nThere was a large mushroom growing near her, about the same height as\nherself; and when she had looked under it, and on both sides of it, and\nbehind it, it occurred to her that she might as well look and see what\nwas on the top of it.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-146","text":"She stretched herself up on tiptoe, and peeped over the edge of the\nmushroom, and her eyes immediately met those of a large caterpillar,\nthat was sitting on the top with its arms folded, quietly smoking a long\nhookah, and taking not the smallest notice of her or of anything else.","caption":"She stretched herself up on tiptoe, and peeped over the edge of the\nmushroom, and her eyes immediately met those of a large caterpillar,\nthat was sitting on the top with its arms folded, quietly smoking a long\nhookah, and taking not the smallest notice of her or of anything else.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-147","text":"\u003Ch3>CHAPTER V. Advice from a Caterpillar\u003C/h3>","caption":"CHAPTER V. Advice from a Caterpillar","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-148","text":"The Caterpillar and Alice looked at each other for some time in silence:\nat last the Caterpillar took the hookah out of its mouth, and addressed\nher in a languid, sleepy voice.","caption":"The Caterpillar and Alice looked at each other for some time in silence:\nat last the Caterpillar took the hookah out of its mouth, and addressed\nher in a languid, sleepy voice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-149","text":"'Who are YOU?' said the Caterpillar.","caption":"'Who are YOU?' said the Caterpillar.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-15","text":"Alice opened the door and found that it led into a small passage, not\nmuch larger than a rat-hole: she knelt down and looked along the passage\ninto the loveliest garden you ever saw. How she longed to get out of\nthat dark hall, and wander about among those beds of bright flowers and\nthose cool fountains, but she could not even get her head through the\ndoorway; 'and even if my head would go through,' thought poor Alice, 'it\nwould be of very little use without my shoulders. Oh, how I wish I could\nshut up like a telescope! I think I could, if I only knew how to begin.'\nFor, you see, so many out-of-the-way things had happened lately,\nthat Alice had begun to think that very few things indeed were really\nimpossible.","caption":"Alice opened the door and found that it led into a small passage, not\nmuch larger than a rat-hole: she knelt down and looked along the passage\ninto the loveliest garden you ever saw. How she longed to get out of\nthat dark hall, and wander about among those beds of bright flowers and\nthose cool fountains, but she could not even get her head through the\ndoorway; 'and even if my head would go through,' thought poor Alice, 'it\nwould be of very little use without my shoulders. Oh, how I wish I could\nshut up like a telescope! I think I could, if I only knew how to begin.'\nFor, you see, so many out-of-the-way things had happened lately,\nthat Alice had begun to think that very few things indeed were really\nimpossible.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
