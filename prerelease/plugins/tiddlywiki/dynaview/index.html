{"title":"Alice in Wonderland:-paragraph-150","text":"This was not an encouraging opening for a conversation. Alice replied,\nrather shyly, 'I–I hardly know, sir, just at present–at least I know\nwho I WAS when I got up this morning, but I think I must have been\nchanged several times since then.'","caption":"This was not an encouraging opening for a conversation. Alice replied,\nrather shyly, 'I–I hardly know, sir, just at present–at least I know\nwho I WAS when I got up this morning, but I think I must have been\nchanged several times since then.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-151","text":"'What do you mean by that?' said the Caterpillar sternly. 'Explain\nyourself!'","caption":"'What do you mean by that?' said the Caterpillar sternly. 'Explain\nyourself!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-152","text":"'I can't explain MYSELF, I'm afraid, sir' said Alice, 'because I'm not\nmyself, you see.'","caption":"'I can't explain MYSELF, I'm afraid, sir' said Alice, 'because I'm not\nmyself, you see.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-153","text":"'I don't see,' said the Caterpillar.","caption":"'I don't see,' said the Caterpillar.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-154","text":"'I'm afraid I can't put it more clearly,' Alice replied very politely,\n'for I can't understand it myself to begin with; and being so many\ndifferent sizes in a day is very confusing.'","caption":"'I'm afraid I can't put it more clearly,' Alice replied very politely,\n'for I can't understand it myself to begin with; and being so many\ndifferent sizes in a day is very confusing.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-155","text":"'It isn't,' said the Caterpillar.","caption":"'It isn't,' said the Caterpillar.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-156","text":"'Well, perhaps you haven't found it so yet,' said Alice; 'but when you\nhave to turn into a chrysalis–you will some day, you know–and then\nafter that into a butterfly, I should think you'll feel it a little\nqueer, won't you?'","caption":"'Well, perhaps you haven't found it so yet,' said Alice; 'but when you\nhave to turn into a chrysalis–you will some day, you know–and then\nafter that into a butterfly, I should think you'll feel it a little\nqueer, won't you?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-157","text":"'Not a bit,' said the Caterpillar.","caption":"'Not a bit,' said the Caterpillar.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-158","text":"'Well, perhaps your feelings may be different,' said Alice; 'all I know\nis, it would feel very queer to ME.'","caption":"'Well, perhaps your feelings may be different,' said Alice; 'all I know\nis, it would feel very queer to ME.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-159","text":"'You!' said the Caterpillar contemptuously. 'Who are YOU?'","caption":"'You!' said the Caterpillar contemptuously. 'Who are YOU?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-16","text":"There seemed to be no use in waiting by the little door, so she went\nback to the table, half hoping she might find another key on it, or at\nany rate a book of rules for shutting people up like telescopes: this\ntime she found a little bottle on it, ('which certainly was not here\nbefore,' said Alice,) and round the neck of the bottle was a paper\nlabel, with the words 'DRINK ME' beautifully printed on it in large\nletters.","caption":"There seemed to be no use in waiting by the little door, so she went\nback to the table, half hoping she might find another key on it, or at\nany rate a book of rules for shutting people up like telescopes: this\ntime she found a little bottle on it, ('which certainly was not here\nbefore,' said Alice,) and round the neck of the bottle was a paper\nlabel, with the words 'DRINK ME' beautifully printed on it in large\nletters.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-160","text":"Which brought them back again to the beginning of the conversation.\nAlice felt a little irritated at the Caterpillar's making such VERY\nshort remarks, and she drew herself up and said, very gravely, 'I think,\nyou ought to tell me who YOU are, first.'","caption":"Which brought them back again to the beginning of the conversation.\nAlice felt a little irritated at the Caterpillar's making such VERY\nshort remarks, and she drew herself up and said, very gravely, 'I think,\nyou ought to tell me who YOU are, first.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-161","text":"'Why?' said the Caterpillar.","caption":"'Why?' said the Caterpillar.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-162","text":"Here was another puzzling question; and as Alice could not think of any\ngood reason, and as the Caterpillar seemed to be in a VERY unpleasant\nstate of mind, she turned away.","caption":"Here was another puzzling question; and as Alice could not think of any\ngood reason, and as the Caterpillar seemed to be in a VERY unpleasant\nstate of mind, she turned away.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-163","text":"'Come back!' the Caterpillar called after her. 'I've something important\nto say!'","caption":"'Come back!' the Caterpillar called after her. 'I've something important\nto say!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-164","text":"This sounded promising, certainly: Alice turned and came back again.","caption":"This sounded promising, certainly: Alice turned and came back again.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-165","text":"'Keep your temper,' said the Caterpillar.","caption":"'Keep your temper,' said the Caterpillar.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-166","text":"'Is that all?' said Alice, swallowing down her anger as well as she\ncould.","caption":"'Is that all?' said Alice, swallowing down her anger as well as she\ncould.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-167","text":"'No,' said the Caterpillar.","caption":"'No,' said the Caterpillar.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-168","text":"Alice thought she might as well wait, as she had nothing else to do, and\nperhaps after all it might tell her something worth hearing. For some\nminutes it puffed away without speaking, but at last it unfolded its\narms, took the hookah out of its mouth again, and said, 'So you think\nyou're changed, do you?'","caption":"Alice thought she might as well wait, as she had nothing else to do, and\nperhaps after all it might tell her something worth hearing. For some\nminutes it puffed away without speaking, but at last it unfolded its\narms, took the hookah out of its mouth again, and said, 'So you think\nyou're changed, do you?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-169","text":"'I'm afraid I am, sir,' said Alice; 'I can't remember things as I\nused–and I don't keep the same size for ten minutes together!'","caption":"'I'm afraid I am, sir,' said Alice; 'I can't remember things as I\nused–and I don't keep the same size for ten minutes together!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-17","text":"It was all very well to say 'Drink me,' but the wise little Alice was\nnot going to do THAT in a hurry. 'No, I'll look first,' she said, 'and\nsee whether it's marked &quot;poison&quot; or not'; for she had read several nice\nlittle histories about children who had got burnt, and eaten up by wild\nbeasts and other unpleasant things, all because they WOULD not remember\nthe simple rules their friends had taught them: such as, that a red-hot\npoker will burn you if you hold it too long; and that if you cut your\nfinger VERY deeply with a knife, it usually bleeds; and she had never\nforgotten that, if you drink much from a bottle marked 'poison,' it is\nalmost certain to disagree with you, sooner or later.","caption":"It was all very well to say 'Drink me,' but the wise little Alice was\nnot going to do THAT in a hurry. 'No, I'll look first,' she said, 'and\nsee whether it's marked &quot;poison&quot; or not'; for she had read several nice\nlittle histories about children who had got burnt, and eaten up by wild\nbeasts and other unpleasant things, all because they WOULD not remember\nthe simple rules their friends had taught them: such as, that a red-hot\npoker will burn you if you hold it too long; and that if you cut your\nfinger VERY deeply with a knife, it usually bleeds; and she had never\nforgotten that, if you drink much from a bottle marked 'poison,' it is\nalmost certain to disagree with you, sooner or later.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-170","text":"'Can't remember WHAT things?' said the Caterpillar.","caption":"'Can't remember WHAT things?' said the Caterpillar.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-171","text":"'Well, I've tried to say &quot;HOW DOTH THE LITTLE BUSY BEE,&quot; but it all came\ndifferent!' Alice replied in a very melancholy voice.","caption":"'Well, I've tried to say &quot;HOW DOTH THE LITTLE BUSY BEE,&quot; but it all came\ndifferent!' Alice replied in a very melancholy voice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-172","text":"'Repeat, &quot;YOU ARE OLD, FATHER WILLIAM,&quot;' said the Caterpillar.","caption":"'Repeat, &quot;YOU ARE OLD, FATHER WILLIAM,&quot;' said the Caterpillar.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-173","text":"Alice folded her hands, and began:–","caption":"Alice folded her hands, and began:–","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-174","text":"'You are old, Father William,' the young man said,\n    'And your hair has become very white;\n   And yet you incessantly stand on your head–\n    Do you think, at your age, it is right?'","caption":"'You are old, Father William,' the young man said,\n    'And your hair has become very white;\n   And yet you incessantly stand on your head–\n    Do you think, at your age, it is right?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-175","text":"'In my youth,' Father William replied to his son,\n    'I feared it might injure the brain;\n   But, now that I'm perfectly sure I have none,\n    Why, I do it again and again.'","caption":"'In my youth,' Father William replied to his son,\n    'I feared it might injure the brain;\n   But, now that I'm perfectly sure I have none,\n    Why, I do it again and again.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-176","text":"'You are old,' said the youth, 'as I mentioned before,\n    And have grown most uncommonly fat;\n   Yet you turned a back-somersault in at the door–\n    Pray, what is the reason of that?'","caption":"'You are old,' said the youth, 'as I mentioned before,\n    And have grown most uncommonly fat;\n   Yet you turned a back-somersault in at the door–\n    Pray, what is the reason of that?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-177","text":"'In my youth,' said the sage, as he shook his grey locks,\n    'I kept all my limbs very supple\n   By the use of this ointment–one shilling the box–\n    Allow me to sell you a couple?'","caption":"'In my youth,' said the sage, as he shook his grey locks,\n    'I kept all my limbs very supple\n   By the use of this ointment–one shilling the box–\n    Allow me to sell you a couple?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-178","text":"'You are old,' said the youth, 'and your jaws are too weak\n    For anything tougher than suet;\n   Yet you finished the goose, with the bones and the beak–\n    Pray how did you manage to do it?'","caption":"'You are old,' said the youth, 'and your jaws are too weak\n    For anything tougher than suet;\n   Yet you finished the goose, with the bones and the beak–\n    Pray how did you manage to do it?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-179","text":"'In my youth,' said his father, 'I took to the law,\n    And argued each case with my wife;\n   And the muscular strength, which it gave to my jaw,\n    Has lasted the rest of my life.'","caption":"'In my youth,' said his father, 'I took to the law,\n    And argued each case with my wife;\n   And the muscular strength, which it gave to my jaw,\n    Has lasted the rest of my life.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-18","text":"However, this bottle was NOT marked 'poison,' so Alice ventured to taste\nit, and finding it very nice, (it had, in fact, a sort of mixed flavour\nof cherry-tart, custard, pine-apple, roast turkey, toffee, and hot\nbuttered toast,) she very soon finished it off.","caption":"However, this bottle was NOT marked 'poison,' so Alice ventured to taste\nit, and finding it very nice, (it had, in fact, a sort of mixed flavour\nof cherry-tart, custard, pine-apple, roast turkey, toffee, and hot\nbuttered toast,) she very soon finished it off.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-180","text":"'You are old,' said the youth, 'one would hardly suppose\n    That your eye was as steady as ever;\n   Yet you balanced an eel on the end of your nose–\n    What made you so awfully clever?'","caption":"'You are old,' said the youth, 'one would hardly suppose\n    That your eye was as steady as ever;\n   Yet you balanced an eel on the end of your nose–\n    What made you so awfully clever?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-181","text":"'I have answered three questions, and that is enough,'\n    Said his father; 'don't give yourself airs!\n   Do you think I can listen all day to such stuff?\n    Be off, or I'll kick you down stairs!'","caption":"'I have answered three questions, and that is enough,'\n    Said his father; 'don't give yourself airs!\n   Do you think I can listen all day to such stuff?\n    Be off, or I'll kick you down stairs!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-182","text":"'That is not said right,' said the Caterpillar.","caption":"'That is not said right,' said the Caterpillar.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-183","text":"'Not QUITE right, I'm afraid,' said Alice, timidly; 'some of the words\nhave got altered.'","caption":"'Not QUITE right, I'm afraid,' said Alice, timidly; 'some of the words\nhave got altered.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-184","text":"'It is wrong from beginning to end,' said the Caterpillar decidedly, and\nthere was silence for some minutes.","caption":"'It is wrong from beginning to end,' said the Caterpillar decidedly, and\nthere was silence for some minutes.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-185","text":"The Caterpillar was the first to speak.","caption":"The Caterpillar was the first to speak.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-186","text":"'What size do you want to be?' it asked.","caption":"'What size do you want to be?' it asked.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-187","text":"'Oh, I'm not particular as to size,' Alice hastily replied; 'only one\ndoesn't like changing so often, you know.'","caption":"'Oh, I'm not particular as to size,' Alice hastily replied; 'only one\ndoesn't like changing so often, you know.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-188","text":"'I DON'T know,' said the Caterpillar.","caption":"'I DON'T know,' said the Caterpillar.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-189","text":"Alice said nothing: she had never been so much contradicted in her life\nbefore, and she felt that she was losing her temper.","caption":"Alice said nothing: she had never been so much contradicted in her life\nbefore, and she felt that she was losing her temper.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-19","text":"\u003Cul>\u003Cli>*    *    *    *    *    *\u003C/li>\u003Cli>*    *    *    *    *\u003C/li>\u003Cli>*    *    *    *    *    *\u003C/li>\u003C/ul>","caption":"*    *    *    *    *    **    *    *    *    **    *    *    *    *    *","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-190","text":"'Are you content now?' said the Caterpillar.","caption":"'Are you content now?' said the Caterpillar.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-191","text":"'Well, I should like to be a LITTLE larger, sir, if you wouldn't mind,'\nsaid Alice: 'three inches is such a wretched height to be.'","caption":"'Well, I should like to be a LITTLE larger, sir, if you wouldn't mind,'\nsaid Alice: 'three inches is such a wretched height to be.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-192","text":"'It is a very good height indeed!' said the Caterpillar angrily, rearing\nitself upright as it spoke (it was exactly three inches high).","caption":"'It is a very good height indeed!' said the Caterpillar angrily, rearing\nitself upright as it spoke (it was exactly three inches high).","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-193","text":"'But I'm not used to it!' pleaded poor Alice in a piteous tone. And\nshe thought of herself, 'I wish the creatures wouldn't be so easily\noffended!'","caption":"'But I'm not used to it!' pleaded poor Alice in a piteous tone. And\nshe thought of herself, 'I wish the creatures wouldn't be so easily\noffended!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-194","text":"'You'll get used to it in time,' said the Caterpillar; and it put the\nhookah into its mouth and began smoking again.","caption":"'You'll get used to it in time,' said the Caterpillar; and it put the\nhookah into its mouth and began smoking again.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-195","text":"This time Alice waited patiently until it chose to speak again. In\na minute or two the Caterpillar took the hookah out of its mouth\nand yawned once or twice, and shook itself. Then it got down off the\nmushroom, and crawled away in the grass, merely remarking as it went,\n'One side will make you grow taller, and the other side will make you\ngrow shorter.'","caption":"This time Alice waited patiently until it chose to speak again. In\na minute or two the Caterpillar took the hookah out of its mouth\nand yawned once or twice, and shook itself. Then it got down off the\nmushroom, and crawled away in the grass, merely remarking as it went,\n'One side will make you grow taller, and the other side will make you\ngrow shorter.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-196","text":"'One side of WHAT? The other side of WHAT?' thought Alice to herself.","caption":"'One side of WHAT? The other side of WHAT?' thought Alice to herself.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-197","text":"'Of the mushroom,' said the Caterpillar, just as if she had asked it\naloud; and in another moment it was out of sight.","caption":"'Of the mushroom,' said the Caterpillar, just as if she had asked it\naloud; and in another moment it was out of sight.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-198","text":"Alice remained looking thoughtfully at the mushroom for a minute, trying\nto make out which were the two sides of it; and as it was perfectly\nround, she found this a very difficult question. However, at last she\nstretched her arms round it as far as they would go, and broke off a bit\nof the edge with each hand.","caption":"Alice remained looking thoughtfully at the mushroom for a minute, trying\nto make out which were the two sides of it; and as it was perfectly\nround, she found this a very difficult question. However, at last she\nstretched her arms round it as far as they would go, and broke off a bit\nof the edge with each hand.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-199","text":"'And now which is which?' she said to herself, and nibbled a little of\nthe right-hand bit to try the effect: the next moment she felt a violent\nblow underneath her chin: it had struck her foot!","caption":"'And now which is which?' she said to herself, and nibbled a little of\nthe right-hand bit to try the effect: the next moment she felt a violent\nblow underneath her chin: it had struck her foot!","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-2","text":"Alice was beginning to get very tired of sitting by her sister on the\nbank, and of having nothing to do: once or twice she had peeped into the\nbook her sister was reading, but it had no pictures or conversations in\nit, 'and what is the use of a book,' thought Alice 'without pictures or\nconversations?'","caption":"Alice was beginning to get very tired of sitting by her sister on the\nbank, and of having nothing to do: once or twice she had peeped into the\nbook her sister was reading, but it had no pictures or conversations in\nit, 'and what is the use of a book,' thought Alice 'without pictures or\nconversations?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-20","text":"'What a curious feeling!' said Alice; 'I must be shutting up like a\ntelescope.'","caption":"'What a curious feeling!' said Alice; 'I must be shutting up like a\ntelescope.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-200","text":"She was a good deal frightened by this very sudden change, but she felt\nthat there was no time to be lost, as she was shrinking rapidly; so she\nset to work at once to eat some of the other bit. Her chin was pressed\nso closely against her foot, that there was hardly room to open her\nmouth; but she did it at last, and managed to swallow a morsel of the\nlefthand bit.","caption":"She was a good deal frightened by this very sudden change, but she felt\nthat there was no time to be lost, as she was shrinking rapidly; so she\nset to work at once to eat some of the other bit. Her chin was pressed\nso closely against her foot, that there was hardly room to open her\nmouth; but she did it at last, and managed to swallow a morsel of the\nlefthand bit.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-201","text":"\u003Cul>\u003Cli>*    *    *    *    *    *\u003C/li>\u003Cli>*    *    *    *    *\u003C/li>\u003Cli>*    *    *    *    *    *\u003C/li>\u003C/ul>","caption":"*    *    *    *    *    **    *    *    *    **    *    *    *    *    *","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-202","text":"'Come, my head's free at last!' said Alice in a tone of delight, which\nchanged into alarm in another moment, when she found that her shoulders\nwere nowhere to be found: all she could see, when she looked down, was\nan immense length of neck, which seemed to rise like a stalk out of a\nsea of green leaves that lay far below her.","caption":"'Come, my head's free at last!' said Alice in a tone of delight, which\nchanged into alarm in another moment, when she found that her shoulders\nwere nowhere to be found: all she could see, when she looked down, was\nan immense length of neck, which seemed to rise like a stalk out of a\nsea of green leaves that lay far below her.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-203","text":"'What CAN all that green stuff be?' said Alice. 'And where HAVE my\nshoulders got to? And oh, my poor hands, how is it I can't see you?'\nShe was moving them about as she spoke, but no result seemed to follow,\nexcept a little shaking among the distant green leaves.","caption":"'What CAN all that green stuff be?' said Alice. 'And where HAVE my\nshoulders got to? And oh, my poor hands, how is it I can't see you?'\nShe was moving them about as she spoke, but no result seemed to follow,\nexcept a little shaking among the distant green leaves.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-204","text":"As there seemed to be no chance of getting her hands up to her head, she\ntried to get her head down to them, and was delighted to find that her\nneck would bend about easily in any direction, like a serpent. She had\njust succeeded in curving it down into a graceful zigzag, and was going\nto dive in among the leaves, which she found to be nothing but the tops\nof the trees under which she had been wandering, when a sharp hiss made\nher draw back in a hurry: a large pigeon had flown into her face, and\nwas beating her violently with its wings.","caption":"As there seemed to be no chance of getting her hands up to her head, she\ntried to get her head down to them, and was delighted to find that her\nneck would bend about easily in any direction, like a serpent. She had\njust succeeded in curving it down into a graceful zigzag, and was going\nto dive in among the leaves, which she found to be nothing but the tops\nof the trees under which she had been wandering, when a sharp hiss made\nher draw back in a hurry: a large pigeon had flown into her face, and\nwas beating her violently with its wings.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-205","text":"'Serpent!' screamed the Pigeon.","caption":"'Serpent!' screamed the Pigeon.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-206","text":"'I'm NOT a serpent!' said Alice indignantly. 'Let me alone!'","caption":"'I'm NOT a serpent!' said Alice indignantly. 'Let me alone!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-207","text":"'Serpent, I say again!' repeated the Pigeon, but in a more subdued tone,\nand added with a kind of sob, 'I've tried every way, and nothing seems\nto suit them!'","caption":"'Serpent, I say again!' repeated the Pigeon, but in a more subdued tone,\nand added with a kind of sob, 'I've tried every way, and nothing seems\nto suit them!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-208","text":"'I haven't the least idea what you're talking about,' said Alice.","caption":"'I haven't the least idea what you're talking about,' said Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-209","text":"'I've tried the roots of trees, and I've tried banks, and I've tried\nhedges,' the Pigeon went on, without attending to her; 'but those\nserpents! There's no pleasing them!'","caption":"'I've tried the roots of trees, and I've tried banks, and I've tried\nhedges,' the Pigeon went on, without attending to her; 'but those\nserpents! There's no pleasing them!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-21","text":"And so it was indeed: she was now only ten inches high, and her face\nbrightened up at the thought that she was now the right size for going\nthrough the little door into that lovely garden. First, however, she\nwaited for a few minutes to see if she was going to shrink any further:\nshe felt a little nervous about this; 'for it might end, you know,' said\nAlice to herself, 'in my going out altogether, like a candle. I wonder\nwhat I should be like then?' And she tried to fancy what the flame of a\ncandle is like after the candle is blown out, for she could not remember\never having seen such a thing.","caption":"And so it was indeed: she was now only ten inches high, and her face\nbrightened up at the thought that she was now the right size for going\nthrough the little door into that lovely garden. First, however, she\nwaited for a few minutes to see if she was going to shrink any further:\nshe felt a little nervous about this; 'for it might end, you know,' said\nAlice to herself, 'in my going out altogether, like a candle. I wonder\nwhat I should be like then?' And she tried to fancy what the flame of a\ncandle is like after the candle is blown out, for she could not remember\never having seen such a thing.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-210","text":"Alice was more and more puzzled, but she thought there was no use in\nsaying anything more till the Pigeon had finished.","caption":"Alice was more and more puzzled, but she thought there was no use in\nsaying anything more till the Pigeon had finished.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-211","text":"'As if it wasn't trouble enough hatching the eggs,' said the Pigeon;\n'but I must be on the look-out for serpents night and day! Why, I\nhaven't had a wink of sleep these three weeks!'","caption":"'As if it wasn't trouble enough hatching the eggs,' said the Pigeon;\n'but I must be on the look-out for serpents night and day! Why, I\nhaven't had a wink of sleep these three weeks!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-212","text":"'I'm very sorry you've been annoyed,' said Alice, who was beginning to\nsee its meaning.","caption":"'I'm very sorry you've been annoyed,' said Alice, who was beginning to\nsee its meaning.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-213","text":"'And just as I'd taken the highest tree in the wood,' continued the\nPigeon, raising its voice to a shriek, 'and just as I was thinking I\nshould be free of them at last, they must needs come wriggling down from\nthe sky! Ugh, Serpent!'","caption":"'And just as I'd taken the highest tree in the wood,' continued the\nPigeon, raising its voice to a shriek, 'and just as I was thinking I\nshould be free of them at last, they must needs come wriggling down from\nthe sky! Ugh, Serpent!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-214","text":"'But I'm NOT a serpent, I tell you!' said Alice. 'I'm a–I'm a–'","caption":"'But I'm NOT a serpent, I tell you!' said Alice. 'I'm a–I'm a–'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-215","text":"'Well! WHAT are you?' said the Pigeon. 'I can see you're trying to\ninvent something!'","caption":"'Well! WHAT are you?' said the Pigeon. 'I can see you're trying to\ninvent something!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-216","text":"'I–I'm a little girl,' said Alice, rather doubtfully, as she remembered\nthe number of changes she had gone through that day.","caption":"'I–I'm a little girl,' said Alice, rather doubtfully, as she remembered\nthe number of changes she had gone through that day.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-217","text":"'A likely story indeed!' said the Pigeon in a tone of the deepest\ncontempt. 'I've seen a good many little girls in my time, but never ONE\nwith such a neck as that! No, no! You're a serpent; and there's no use\ndenying it. I suppose you'll be telling me next that you never tasted an\negg!'","caption":"'A likely story indeed!' said the Pigeon in a tone of the deepest\ncontempt. 'I've seen a good many little girls in my time, but never ONE\nwith such a neck as that! No, no! You're a serpent; and there's no use\ndenying it. I suppose you'll be telling me next that you never tasted an\negg!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-218","text":"'I HAVE tasted eggs, certainly,' said Alice, who was a very truthful\nchild; 'but little girls eat eggs quite as much as serpents do, you\nknow.'","caption":"'I HAVE tasted eggs, certainly,' said Alice, who was a very truthful\nchild; 'but little girls eat eggs quite as much as serpents do, you\nknow.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-219","text":"'I don't believe it,' said the Pigeon; 'but if they do, why then they're\na kind of serpent, that's all I can say.'","caption":"'I don't believe it,' said the Pigeon; 'but if they do, why then they're\na kind of serpent, that's all I can say.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-22","text":"After a while, finding that nothing more happened, she decided on going\ninto the garden at once; but, alas for poor Alice! when she got to the\ndoor, she found she had forgotten the little golden key, and when she\nwent back to the table for it, she found she could not possibly reach\nit: she could see it quite plainly through the glass, and she tried her\nbest to climb up one of the legs of the table, but it was too slippery;\nand when she had tired herself out with trying, the poor little thing\nsat down and cried.","caption":"After a while, finding that nothing more happened, she decided on going\ninto the garden at once; but, alas for poor Alice! when she got to the\ndoor, she found she had forgotten the little golden key, and when she\nwent back to the table for it, she found she could not possibly reach\nit: she could see it quite plainly through the glass, and she tried her\nbest to climb up one of the legs of the table, but it was too slippery;\nand when she had tired herself out with trying, the poor little thing\nsat down and cried.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-220","text":"This was such a new idea to Alice, that she was quite silent for a\nminute or two, which gave the Pigeon the opportunity of adding, 'You're\nlooking for eggs, I know THAT well enough; and what does it matter to me\nwhether you're a little girl or a serpent?'","caption":"This was such a new idea to Alice, that she was quite silent for a\nminute or two, which gave the Pigeon the opportunity of adding, 'You're\nlooking for eggs, I know THAT well enough; and what does it matter to me\nwhether you're a little girl or a serpent?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-221","text":"'It matters a good deal to ME,' said Alice hastily; 'but I'm not looking\nfor eggs, as it happens; and if I was, I shouldn't want YOURS: I don't\nlike them raw.'","caption":"'It matters a good deal to ME,' said Alice hastily; 'but I'm not looking\nfor eggs, as it happens; and if I was, I shouldn't want YOURS: I don't\nlike them raw.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-222","text":"'Well, be off, then!' said the Pigeon in a sulky tone, as it settled\ndown again into its nest. Alice crouched down among the trees as well as\nshe could, for her neck kept getting entangled among the branches, and\nevery now and then she had to stop and untwist it. After a while she\nremembered that she still held the pieces of mushroom in her hands, and\nshe set to work very carefully, nibbling first at one and then at the\nother, and growing sometimes taller and sometimes shorter, until she had\nsucceeded in bringing herself down to her usual height.","caption":"'Well, be off, then!' said the Pigeon in a sulky tone, as it settled\ndown again into its nest. Alice crouched down among the trees as well as\nshe could, for her neck kept getting entangled among the branches, and\nevery now and then she had to stop and untwist it. After a while she\nremembered that she still held the pieces of mushroom in her hands, and\nshe set to work very carefully, nibbling first at one and then at the\nother, and growing sometimes taller and sometimes shorter, until she had\nsucceeded in bringing herself down to her usual height.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-223","text":"It was so long since she had been anything near the right size, that it\nfelt quite strange at first; but she got used to it in a few minutes,\nand began talking to herself, as usual. 'Come, there's half my plan done\nnow! How puzzling all these changes are! I'm never sure what I'm going\nto be, from one minute to another! However, I've got back to my right\nsize: the next thing is, to get into that beautiful garden–how IS that\nto be done, I wonder?' As she said this, she came suddenly upon an open\nplace, with a little house in it about four feet high. 'Whoever lives\nthere,' thought Alice, 'it'll never do to come upon them THIS size: why,\nI should frighten them out of their wits!' So she began nibbling at the\nrighthand bit again, and did not venture to go near the house till she\nhad brought herself down to nine inches high.","caption":"It was so long since she had been anything near the right size, that it\nfelt quite strange at first; but she got used to it in a few minutes,\nand began talking to herself, as usual. 'Come, there's half my plan done\nnow! How puzzling all these changes are! I'm never sure what I'm going\nto be, from one minute to another! However, I've got back to my right\nsize: the next thing is, to get into that beautiful garden–how IS that\nto be done, I wonder?' As she said this, she came suddenly upon an open\nplace, with a little house in it about four feet high. 'Whoever lives\nthere,' thought Alice, 'it'll never do to come upon them THIS size: why,\nI should frighten them out of their wits!' So she began nibbling at the\nrighthand bit again, and did not venture to go near the house till she\nhad brought herself down to nine inches high.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-224","text":"\u003Ch3>CHAPTER VI. Pig and Pepper\u003C/h3>","caption":"CHAPTER VI. Pig and Pepper","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-225","text":"For a minute or two she stood looking at the house, and wondering what\nto do next, when suddenly a footman in livery came running out of the\nwood–(she considered him to be a footman because he was in livery:\notherwise, judging by his face only, she would have called him a\nfish)–and rapped loudly at the door with his knuckles. It was opened\nby another footman in livery, with a round face, and large eyes like a\nfrog; and both footmen, Alice noticed, had powdered hair that curled all\nover their heads. She felt very curious to know what it was all about,\nand crept a little way out of the wood to listen.","caption":"For a minute or two she stood looking at the house, and wondering what\nto do next, when suddenly a footman in livery came running out of the\nwood–(she considered him to be a footman because he was in livery:\notherwise, judging by his face only, she would have called him a\nfish)–and rapped loudly at the door with his knuckles. It was opened\nby another footman in livery, with a round face, and large eyes like a\nfrog; and both footmen, Alice noticed, had powdered hair that curled all\nover their heads. She felt very curious to know what it was all about,\nand crept a little way out of the wood to listen.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-226","text":"The Fish-Footman began by producing from under his arm a great letter,\nnearly as large as himself, and this he handed over to the other,\nsaying, in a solemn tone, 'For the Duchess. An invitation from the Queen\nto play croquet.' The Frog-Footman repeated, in the same solemn tone,\nonly changing the order of the words a little, 'From the Queen. An\ninvitation for the Duchess to play croquet.'","caption":"The Fish-Footman began by producing from under his arm a great letter,\nnearly as large as himself, and this he handed over to the other,\nsaying, in a solemn tone, 'For the Duchess. An invitation from the Queen\nto play croquet.' The Frog-Footman repeated, in the same solemn tone,\nonly changing the order of the words a little, 'From the Queen. An\ninvitation for the Duchess to play croquet.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-227","text":"Then they both bowed low, and their curls got entangled together.","caption":"Then they both bowed low, and their curls got entangled together.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-228","text":"Alice laughed so much at this, that she had to run back into the\nwood for fear of their hearing her; and when she next peeped out the\nFish-Footman was gone, and the other was sitting on the ground near the\ndoor, staring stupidly up into the sky.","caption":"Alice laughed so much at this, that she had to run back into the\nwood for fear of their hearing her; and when she next peeped out the\nFish-Footman was gone, and the other was sitting on the ground near the\ndoor, staring stupidly up into the sky.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-229","text":"Alice went timidly up to the door, and knocked.","caption":"Alice went timidly up to the door, and knocked.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-23","text":"'Come, there's no use in crying like that!' said Alice to herself,\nrather sharply; 'I advise you to leave off this minute!' She generally\ngave herself very good advice, (though she very seldom followed it),\nand sometimes she scolded herself so severely as to bring tears into\nher eyes; and once she remembered trying to box her own ears for having\ncheated herself in a game of croquet she was playing against herself,\nfor this curious child was very fond of pretending to be two people.\n'But it's no use now,' thought poor Alice, 'to pretend to be two people!\nWhy, there's hardly enough of me left to make ONE respectable person!'","caption":"'Come, there's no use in crying like that!' said Alice to herself,\nrather sharply; 'I advise you to leave off this minute!' She generally\ngave herself very good advice, (though she very seldom followed it),\nand sometimes she scolded herself so severely as to bring tears into\nher eyes; and once she remembered trying to box her own ears for having\ncheated herself in a game of croquet she was playing against herself,\nfor this curious child was very fond of pretending to be two people.\n'But it's no use now,' thought poor Alice, 'to pretend to be two people!\nWhy, there's hardly enough of me left to make ONE respectable person!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-230","text":"'There's no sort of use in knocking,' said the Footman, 'and that for\ntwo reasons. First, because I'm on the same side of the door as you\nare; secondly, because they're making such a noise inside, no one could\npossibly hear you.' And certainly there was a most extraordinary noise\ngoing on within–a constant howling and sneezing, and every now and then\na great crash, as if a dish or kettle had been broken to pieces.","caption":"'There's no sort of use in knocking,' said the Footman, 'and that for\ntwo reasons. First, because I'm on the same side of the door as you\nare; secondly, because they're making such a noise inside, no one could\npossibly hear you.' And certainly there was a most extraordinary noise\ngoing on within–a constant howling and sneezing, and every now and then\na great crash, as if a dish or kettle had been broken to pieces.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-231","text":"'Please, then,' said Alice, 'how am I to get in?'","caption":"'Please, then,' said Alice, 'how am I to get in?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-232","text":"'There might be some sense in your knocking,' the Footman went on\nwithout attending to her, 'if we had the door between us. For instance,\nif you were INSIDE, you might knock, and I could let you out, you know.'\nHe was looking up into the sky all the time he was speaking, and this\nAlice thought decidedly uncivil. 'But perhaps he can't help it,' she\nsaid to herself; 'his eyes are so VERY nearly at the top of his head.\nBut at any rate he might answer questions.–How am I to get in?' she\nrepeated, aloud.","caption":"'There might be some sense in your knocking,' the Footman went on\nwithout attending to her, 'if we had the door between us. For instance,\nif you were INSIDE, you might knock, and I could let you out, you know.'\nHe was looking up into the sky all the time he was speaking, and this\nAlice thought decidedly uncivil. 'But perhaps he can't help it,' she\nsaid to herself; 'his eyes are so VERY nearly at the top of his head.\nBut at any rate he might answer questions.–How am I to get in?' she\nrepeated, aloud.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-233","text":"'I shall sit here,' the Footman remarked, 'till tomorrow–'","caption":"'I shall sit here,' the Footman remarked, 'till tomorrow–'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-234","text":"At this moment the door of the house opened, and a large plate came\nskimming out, straight at the Footman's head: it just grazed his nose,\nand broke to pieces against one of the trees behind him.","caption":"At this moment the door of the house opened, and a large plate came\nskimming out, straight at the Footman's head: it just grazed his nose,\nand broke to pieces against one of the trees behind him.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-235","text":"'–or next day, maybe,' the Footman continued in the same tone, exactly\nas if nothing had happened.","caption":"'–or next day, maybe,' the Footman continued in the same tone, exactly\nas if nothing had happened.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-236","text":"'How am I to get in?' asked Alice again, in a louder tone.","caption":"'How am I to get in?' asked Alice again, in a louder tone.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-237","text":"'ARE you to get in at all?' said the Footman. 'That's the first\nquestion, you know.'","caption":"'ARE you to get in at all?' said the Footman. 'That's the first\nquestion, you know.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-238","text":"It was, no doubt: only Alice did not like to be told so. 'It's really\ndreadful,' she muttered to herself, 'the way all the creatures argue.\nIt's enough to drive one crazy!'","caption":"It was, no doubt: only Alice did not like to be told so. 'It's really\ndreadful,' she muttered to herself, 'the way all the creatures argue.\nIt's enough to drive one crazy!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-239","text":"The Footman seemed to think this a good opportunity for repeating his\nremark, with variations. 'I shall sit here,' he said, 'on and off, for\ndays and days.'","caption":"The Footman seemed to think this a good opportunity for repeating his\nremark, with variations. 'I shall sit here,' he said, 'on and off, for\ndays and days.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-24","text":"Soon her eye fell on a little glass box that was lying under the table:\nshe opened it, and found in it a very small cake, on which the words\n'EAT ME' were beautifully marked in currants. 'Well, I'll eat it,' said\nAlice, 'and if it makes me grow larger, I can reach the key; and if it\nmakes me grow smaller, I can creep under the door; so either way I'll\nget into the garden, and I don't care which happens!'","caption":"Soon her eye fell on a little glass box that was lying under the table:\nshe opened it, and found in it a very small cake, on which the words\n'EAT ME' were beautifully marked in currants. 'Well, I'll eat it,' said\nAlice, 'and if it makes me grow larger, I can reach the key; and if it\nmakes me grow smaller, I can creep under the door; so either way I'll\nget into the garden, and I don't care which happens!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-240","text":"'But what am I to do?' said Alice.","caption":"'But what am I to do?' said Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-241","text":"'Anything you like,' said the Footman, and began whistling.","caption":"'Anything you like,' said the Footman, and began whistling.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-242","text":"'Oh, there's no use in talking to him,' said Alice desperately: 'he's\nperfectly idiotic!' And she opened the door and went in.","caption":"'Oh, there's no use in talking to him,' said Alice desperately: 'he's\nperfectly idiotic!' And she opened the door and went in.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-243","text":"The door led right into a large kitchen, which was full of smoke from\none end to the other: the Duchess was sitting on a three-legged stool in\nthe middle, nursing a baby; the cook was leaning over the fire, stirring\na large cauldron which seemed to be full of soup.","caption":"The door led right into a large kitchen, which was full of smoke from\none end to the other: the Duchess was sitting on a three-legged stool in\nthe middle, nursing a baby; the cook was leaning over the fire, stirring\na large cauldron which seemed to be full of soup.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-244","text":"'There's certainly too much pepper in that soup!' Alice said to herself,\nas well as she could for sneezing.","caption":"'There's certainly too much pepper in that soup!' Alice said to herself,\nas well as she could for sneezing.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-245","text":"There was certainly too much of it in the air. Even the Duchess\nsneezed occasionally; and as for the baby, it was sneezing and howling\nalternately without a moment's pause. The only things in the kitchen\nthat did not sneeze, were the cook, and a large cat which was sitting on\nthe hearth and grinning from ear to ear.","caption":"There was certainly too much of it in the air. Even the Duchess\nsneezed occasionally; and as for the baby, it was sneezing and howling\nalternately without a moment's pause. The only things in the kitchen\nthat did not sneeze, were the cook, and a large cat which was sitting on\nthe hearth and grinning from ear to ear.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-246","text":"'Please would you tell me,' said Alice, a little timidly, for she was\nnot quite sure whether it was good manners for her to speak first, 'why\nyour cat grins like that?'","caption":"'Please would you tell me,' said Alice, a little timidly, for she was\nnot quite sure whether it was good manners for her to speak first, 'why\nyour cat grins like that?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-247","text":"'It's a Cheshire cat,' said the Duchess, 'and that's why. Pig!'","caption":"'It's a Cheshire cat,' said the Duchess, 'and that's why. Pig!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-248","text":"She said the last word with such sudden violence that Alice quite\njumped; but she saw in another moment that it was addressed to the baby,\nand not to her, so she took courage, and went on again:–","caption":"She said the last word with such sudden violence that Alice quite\njumped; but she saw in another moment that it was addressed to the baby,\nand not to her, so she took courage, and went on again:–","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-249","text":"'I didn't know that Cheshire cats always grinned; in fact, I didn't know\nthat cats COULD grin.'","caption":"'I didn't know that Cheshire cats always grinned; in fact, I didn't know\nthat cats COULD grin.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-25","text":"She ate a little bit, and said anxiously to herself, 'Which way? Which\nway?', holding her hand on the top of her head to feel which way it was\ngrowing, and she was quite surprised to find that she remained the same\nsize: to be sure, this generally happens when one eats cake, but Alice\nhad got so much into the way of expecting nothing but out-of-the-way\nthings to happen, that it seemed quite dull and stupid for life to go on\nin the common way.","caption":"She ate a little bit, and said anxiously to herself, 'Which way? Which\nway?', holding her hand on the top of her head to feel which way it was\ngrowing, and she was quite surprised to find that she remained the same\nsize: to be sure, this generally happens when one eats cake, but Alice\nhad got so much into the way of expecting nothing but out-of-the-way\nthings to happen, that it seemed quite dull and stupid for life to go on\nin the common way.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-250","text":"'They all can,' said the Duchess; 'and most of 'em do.'","caption":"'They all can,' said the Duchess; 'and most of 'em do.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-251","text":"'I don't know of any that do,' Alice said very politely, feeling quite\npleased to have got into a conversation.","caption":"'I don't know of any that do,' Alice said very politely, feeling quite\npleased to have got into a conversation.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-252","text":"'You don't know much,' said the Duchess; 'and that's a fact.'","caption":"'You don't know much,' said the Duchess; 'and that's a fact.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-253","text":"Alice did not at all like the tone of this remark, and thought it would\nbe as well to introduce some other subject of conversation. While she\nwas trying to fix on one, the cook took the cauldron of soup off the\nfire, and at once set to work throwing everything within her reach at\nthe Duchess and the baby–the fire-irons came first; then followed a\nshower of saucepans, plates, and dishes. The Duchess took no notice of\nthem even when they hit her; and the baby was howling so much already,\nthat it was quite impossible to say whether the blows hurt it or not.","caption":"Alice did not at all like the tone of this remark, and thought it would\nbe as well to introduce some other subject of conversation. While she\nwas trying to fix on one, the cook took the cauldron of soup off the\nfire, and at once set to work throwing everything within her reach at\nthe Duchess and the baby–the fire-irons came first; then followed a\nshower of saucepans, plates, and dishes. The Duchess took no notice of\nthem even when they hit her; and the baby was howling so much already,\nthat it was quite impossible to say whether the blows hurt it or not.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-254","text":"'Oh, PLEASE mind what you're doing!' cried Alice, jumping up and down in\nan agony of terror. 'Oh, there goes his PRECIOUS nose'; as an unusually\nlarge saucepan flew close by it, and very nearly carried it off.","caption":"'Oh, PLEASE mind what you're doing!' cried Alice, jumping up and down in\nan agony of terror. 'Oh, there goes his PRECIOUS nose'; as an unusually\nlarge saucepan flew close by it, and very nearly carried it off.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-255","text":"'If everybody minded their own business,' the Duchess said in a hoarse\ngrowl, 'the world would go round a deal faster than it does.'","caption":"'If everybody minded their own business,' the Duchess said in a hoarse\ngrowl, 'the world would go round a deal faster than it does.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-256","text":"'Which would NOT be an advantage,' said Alice, who felt very glad to get\nan opportunity of showing off a little of her knowledge. 'Just think of\nwhat work it would make with the day and night! You see the earth takes\ntwenty-four hours to turn round on its axis–'","caption":"'Which would NOT be an advantage,' said Alice, who felt very glad to get\nan opportunity of showing off a little of her knowledge. 'Just think of\nwhat work it would make with the day and night! You see the earth takes\ntwenty-four hours to turn round on its axis–'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-257","text":"'Talking of axes,' said the Duchess, 'chop off her head!'","caption":"'Talking of axes,' said the Duchess, 'chop off her head!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-258","text":"Alice glanced rather anxiously at the cook, to see if she meant to take\nthe hint; but the cook was busily stirring the soup, and seemed not to\nbe listening, so she went on again: 'Twenty-four hours, I THINK; or is\nit twelve? I–'","caption":"Alice glanced rather anxiously at the cook, to see if she meant to take\nthe hint; but the cook was busily stirring the soup, and seemed not to\nbe listening, so she went on again: 'Twenty-four hours, I THINK; or is\nit twelve? I–'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-259","text":"'Oh, don't bother ME,' said the Duchess; 'I never could abide figures!'\nAnd with that she began nursing her child again, singing a sort of\nlullaby to it as she did so, and giving it a violent shake at the end of\nevery line:","caption":"'Oh, don't bother ME,' said the Duchess; 'I never could abide figures!'\nAnd with that she began nursing her child again, singing a sort of\nlullaby to it as she did so, and giving it a violent shake at the end of\nevery line:","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-26","text":"So she set to work, and very soon finished off the cake.","caption":"So she set to work, and very soon finished off the cake.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-260","text":"'Speak roughly to your little boy,\n    And beat him when he sneezes:\n   He only does it to annoy,\n    Because he knows it teases.'","caption":"'Speak roughly to your little boy,\n    And beat him when he sneezes:\n   He only does it to annoy,\n    Because he knows it teases.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-261","text":"CHORUS.","caption":"CHORUS.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-262","text":"(In which the cook and the baby joined):–","caption":"(In which the cook and the baby joined):–","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-263","text":"'Wow! wow! wow!'","caption":"'Wow! wow! wow!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-264","text":"While the Duchess sang the second verse of the song, she kept tossing\nthe baby violently up and down, and the poor little thing howled so,\nthat Alice could hardly hear the words:–","caption":"While the Duchess sang the second verse of the song, she kept tossing\nthe baby violently up and down, and the poor little thing howled so,\nthat Alice could hardly hear the words:–","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-265","text":"'I speak severely to my boy,\n    I beat him when he sneezes;\n   For he can thoroughly enjoy\n    The pepper when he pleases!'","caption":"'I speak severely to my boy,\n    I beat him when he sneezes;\n   For he can thoroughly enjoy\n    The pepper when he pleases!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-266","text":"CHORUS.","caption":"CHORUS.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-267","text":"'Wow! wow! wow!'","caption":"'Wow! wow! wow!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-268","text":"'Here! you may nurse it a bit, if you like!' the Duchess said to Alice,\nflinging the baby at her as she spoke. 'I must go and get ready to play\ncroquet with the Queen,' and she hurried out of the room. The cook threw\na frying-pan after her as she went out, but it just missed her.","caption":"'Here! you may nurse it a bit, if you like!' the Duchess said to Alice,\nflinging the baby at her as she spoke. 'I must go and get ready to play\ncroquet with the Queen,' and she hurried out of the room. The cook threw\na frying-pan after her as she went out, but it just missed her.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-269","text":"Alice caught the baby with some difficulty, as it was a queer-shaped\nlittle creature, and held out its arms and legs in all directions, 'just\nlike a star-fish,' thought Alice. The poor little thing was snorting\nlike a steam-engine when she caught it, and kept doubling itself up and\nstraightening itself out again, so that altogether, for the first minute\nor two, it was as much as she could do to hold it.","caption":"Alice caught the baby with some difficulty, as it was a queer-shaped\nlittle creature, and held out its arms and legs in all directions, 'just\nlike a star-fish,' thought Alice. The poor little thing was snorting\nlike a steam-engine when she caught it, and kept doubling itself up and\nstraightening itself out again, so that altogether, for the first minute\nor two, it was as much as she could do to hold it.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-27","text":"\u003Cul>\u003Cli>*    *    *    *    *    *\u003C/li>\u003Cli>*    *    *    *    *\u003C/li>\u003Cli>*    *    *    *    *    *\u003C/li>\u003C/ul>","caption":"*    *    *    *    *    **    *    *    *    **    *    *    *    *    *","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-270","text":"As soon as she had made out the proper way of nursing it, (which was to\ntwist it up into a sort of knot, and then keep tight hold of its right\near and left foot, so as to prevent its undoing itself,) she carried\nit out into the open air. 'IF I don't take this child away with me,'\nthought Alice, 'they're sure to kill it in a day or two: wouldn't it be\nmurder to leave it behind?' She said the last words out loud, and the\nlittle thing grunted in reply (it had left off sneezing by this time).\n'Don't grunt,' said Alice; 'that's not at all a proper way of expressing\nyourself.'","caption":"As soon as she had made out the proper way of nursing it, (which was to\ntwist it up into a sort of knot, and then keep tight hold of its right\near and left foot, so as to prevent its undoing itself,) she carried\nit out into the open air. 'IF I don't take this child away with me,'\nthought Alice, 'they're sure to kill it in a day or two: wouldn't it be\nmurder to leave it behind?' She said the last words out loud, and the\nlittle thing grunted in reply (it had left off sneezing by this time).\n'Don't grunt,' said Alice; 'that's not at all a proper way of expressing\nyourself.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-271","text":"The baby grunted again, and Alice looked very anxiously into its face to\nsee what was the matter with it. There could be no doubt that it had\na VERY turn-up nose, much more like a snout than a real nose; also its\neyes were getting extremely small for a baby: altogether Alice did not\nlike the look of the thing at all. 'But perhaps it was only sobbing,'\nshe thought, and looked into its eyes again, to see if there were any\ntears.","caption":"The baby grunted again, and Alice looked very anxiously into its face to\nsee what was the matter with it. There could be no doubt that it had\na VERY turn-up nose, much more like a snout than a real nose; also its\neyes were getting extremely small for a baby: altogether Alice did not\nlike the look of the thing at all. 'But perhaps it was only sobbing,'\nshe thought, and looked into its eyes again, to see if there were any\ntears.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-272","text":"No, there were no tears. 'If you're going to turn into a pig, my dear,'\nsaid Alice, seriously, 'I'll have nothing more to do with you. Mind\nnow!' The poor little thing sobbed again (or grunted, it was impossible\nto say which), and they went on for some while in silence.","caption":"No, there were no tears. 'If you're going to turn into a pig, my dear,'\nsaid Alice, seriously, 'I'll have nothing more to do with you. Mind\nnow!' The poor little thing sobbed again (or grunted, it was impossible\nto say which), and they went on for some while in silence.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-273","text":"Alice was just beginning to think to herself, 'Now, what am I to do with\nthis creature when I get it home?' when it grunted again, so violently,\nthat she looked down into its face in some alarm. This time there could\nbe NO mistake about it: it was neither more nor less than a pig, and she\nfelt that it would be quite absurd for her to carry it further.","caption":"Alice was just beginning to think to herself, 'Now, what am I to do with\nthis creature when I get it home?' when it grunted again, so violently,\nthat she looked down into its face in some alarm. This time there could\nbe NO mistake about it: it was neither more nor less than a pig, and she\nfelt that it would be quite absurd for her to carry it further.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-274","text":"So she set the little creature down, and felt quite relieved to see\nit trot away quietly into the wood. 'If it had grown up,' she said\nto herself, 'it would have made a dreadfully ugly child: but it makes\nrather a handsome pig, I think.' And she began thinking over other\nchildren she knew, who might do very well as pigs, and was just saying\nto herself, 'if one only knew the right way to change them–' when she\nwas a little startled by seeing the Cheshire Cat sitting on a bough of a\ntree a few yards off.","caption":"So she set the little creature down, and felt quite relieved to see\nit trot away quietly into the wood. 'If it had grown up,' she said\nto herself, 'it would have made a dreadfully ugly child: but it makes\nrather a handsome pig, I think.' And she began thinking over other\nchildren she knew, who might do very well as pigs, and was just saying\nto herself, 'if one only knew the right way to change them–' when she\nwas a little startled by seeing the Cheshire Cat sitting on a bough of a\ntree a few yards off.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-275","text":"The Cat only grinned when it saw Alice. It looked good-natured, she\nthought: still it had VERY long claws and a great many teeth, so she\nfelt that it ought to be treated with respect.","caption":"The Cat only grinned when it saw Alice. It looked good-natured, she\nthought: still it had VERY long claws and a great many teeth, so she\nfelt that it ought to be treated with respect.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-276","text":"'Cheshire Puss,' she began, rather timidly, as she did not at all know\nwhether it would like the name: however, it only grinned a little wider.\n'Come, it's pleased so far,' thought Alice, and she went on. 'Would you\ntell me, please, which way I ought to go from here?'","caption":"'Cheshire Puss,' she began, rather timidly, as she did not at all know\nwhether it would like the name: however, it only grinned a little wider.\n'Come, it's pleased so far,' thought Alice, and she went on. 'Would you\ntell me, please, which way I ought to go from here?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-277","text":"'That depends a good deal on where you want to get to,' said the Cat.","caption":"'That depends a good deal on where you want to get to,' said the Cat.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-278","text":"'I don't much care where–' said Alice.","caption":"'I don't much care where–' said Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-279","text":"'Then it doesn't matter which way you go,' said the Cat.","caption":"'Then it doesn't matter which way you go,' said the Cat.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-28","text":"\u003Ch3>CHAPTER II. The Pool of Tears\u003C/h3>","caption":"CHAPTER II. The Pool of Tears","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-280","text":"'–so long as I get SOMEWHERE,' Alice added as an explanation.","caption":"'–so long as I get SOMEWHERE,' Alice added as an explanation.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-281","text":"'Oh, you're sure to do that,' said the Cat, 'if you only walk long\nenough.'","caption":"'Oh, you're sure to do that,' said the Cat, 'if you only walk long\nenough.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-282","text":"Alice felt that this could not be denied, so she tried another question.\n'What sort of people live about here?'","caption":"Alice felt that this could not be denied, so she tried another question.\n'What sort of people live about here?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-283","text":"'In THAT direction,' the Cat said, waving its right paw round, 'lives\na Hatter: and in THAT direction,' waving the other paw, 'lives a March\nHare. Visit either you like: they're both mad.'","caption":"'In THAT direction,' the Cat said, waving its right paw round, 'lives\na Hatter: and in THAT direction,' waving the other paw, 'lives a March\nHare. Visit either you like: they're both mad.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-284","text":"'But I don't want to go among mad people,' Alice remarked.","caption":"'But I don't want to go among mad people,' Alice remarked.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-285","text":"'Oh, you can't help that,' said the Cat: 'we're all mad here. I'm mad.\nYou're mad.'","caption":"'Oh, you can't help that,' said the Cat: 'we're all mad here. I'm mad.\nYou're mad.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-286","text":"'How do you know I'm mad?' said Alice.","caption":"'How do you know I'm mad?' said Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-287","text":"'You must be,' said the Cat, 'or you wouldn't have come here.'","caption":"'You must be,' said the Cat, 'or you wouldn't have come here.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-288","text":"Alice didn't think that proved it at all; however, she went on 'And how\ndo you know that you're mad?'","caption":"Alice didn't think that proved it at all; however, she went on 'And how\ndo you know that you're mad?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
