{"title":"Alice in Wonderland:-paragraph-289","text":"'To begin with,' said the Cat, 'a dog's not mad. You grant that?'","caption":"'To begin with,' said the Cat, 'a dog's not mad. You grant that?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-29","text":"'Curiouser and curiouser!' cried Alice (she was so much surprised, that\nfor the moment she quite forgot how to speak good English); 'now I'm\nopening out like the largest telescope that ever was! Good-bye, feet!'\n(for when she looked down at her feet, they seemed to be almost out of\nsight, they were getting so far off). 'Oh, my poor little feet, I wonder\nwho will put on your shoes and stockings for you now, dears? I'm sure\n_I_ shan't be able! I shall be a great deal too far off to trouble\nmyself about you: you must manage the best way you can;–but I must be\nkind to them,' thought Alice, 'or perhaps they won't walk the way I want\nto go! Let me see: I'll give them a new pair of boots every Christmas.'","caption":"'Curiouser and curiouser!' cried Alice (she was so much surprised, that\nfor the moment she quite forgot how to speak good English); 'now I'm\nopening out like the largest telescope that ever was! Good-bye, feet!'\n(for when she looked down at her feet, they seemed to be almost out of\nsight, they were getting so far off). 'Oh, my poor little feet, I wonder\nwho will put on your shoes and stockings for you now, dears? I'm sure\n_I_ shan't be able! I shall be a great deal too far off to trouble\nmyself about you: you must manage the best way you can;–but I must be\nkind to them,' thought Alice, 'or perhaps they won't walk the way I want\nto go! Let me see: I'll give them a new pair of boots every Christmas.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-290","text":"'I suppose so,' said Alice.","caption":"'I suppose so,' said Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-291","text":"'Well, then,' the Cat went on, 'you see, a dog growls when it's angry,\nand wags its tail when it's pleased. Now I growl when I'm pleased, and\nwag my tail when I'm angry. Therefore I'm mad.'","caption":"'Well, then,' the Cat went on, 'you see, a dog growls when it's angry,\nand wags its tail when it's pleased. Now I growl when I'm pleased, and\nwag my tail when I'm angry. Therefore I'm mad.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-292","text":"'I call it purring, not growling,' said Alice.","caption":"'I call it purring, not growling,' said Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-293","text":"'Call it what you like,' said the Cat. 'Do you play croquet with the\nQueen to-day?'","caption":"'Call it what you like,' said the Cat. 'Do you play croquet with the\nQueen to-day?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-294","text":"'I should like it very much,' said Alice, 'but I haven't been invited\nyet.'","caption":"'I should like it very much,' said Alice, 'but I haven't been invited\nyet.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-295","text":"'You'll see me there,' said the Cat, and vanished.","caption":"'You'll see me there,' said the Cat, and vanished.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-296","text":"Alice was not much surprised at this, she was getting so used to queer\nthings happening. While she was looking at the place where it had been,\nit suddenly appeared again.","caption":"Alice was not much surprised at this, she was getting so used to queer\nthings happening. While she was looking at the place where it had been,\nit suddenly appeared again.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-297","text":"'By-the-bye, what became of the baby?' said the Cat. 'I'd nearly\nforgotten to ask.'","caption":"'By-the-bye, what became of the baby?' said the Cat. 'I'd nearly\nforgotten to ask.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-298","text":"'It turned into a pig,' Alice quietly said, just as if it had come back\nin a natural way.","caption":"'It turned into a pig,' Alice quietly said, just as if it had come back\nin a natural way.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-299","text":"'I thought it would,' said the Cat, and vanished again.","caption":"'I thought it would,' said the Cat, and vanished again.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-3","text":"So she was considering in her own mind (as well as she could, for the\nhot day made her feel very sleepy and stupid), whether the pleasure\nof making a daisy-chain would be worth the trouble of getting up and\npicking the daisies, when suddenly a White Rabbit with pink eyes ran\nclose by her.","caption":"So she was considering in her own mind (as well as she could, for the\nhot day made her feel very sleepy and stupid), whether the pleasure\nof making a daisy-chain would be worth the trouble of getting up and\npicking the daisies, when suddenly a White Rabbit with pink eyes ran\nclose by her.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-30","text":"And she went on planning to herself how she would manage it. 'They must\ngo by the carrier,' she thought; 'and how funny it'll seem, sending\npresents to one's own feet! And how odd the directions will look!","caption":"And she went on planning to herself how she would manage it. 'They must\ngo by the carrier,' she thought; 'and how funny it'll seem, sending\npresents to one's own feet! And how odd the directions will look!","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-300","text":"Alice waited a little, half expecting to see it again, but it did not\nappear, and after a minute or two she walked on in the direction in\nwhich the March Hare was said to live. 'I've seen hatters before,' she\nsaid to herself; 'the March Hare will be much the most interesting, and\nperhaps as this is May it won't be raving mad–at least not so mad as\nit was in March.' As she said this, she looked up, and there was the Cat\nagain, sitting on a branch of a tree.","caption":"Alice waited a little, half expecting to see it again, but it did not\nappear, and after a minute or two she walked on in the direction in\nwhich the March Hare was said to live. 'I've seen hatters before,' she\nsaid to herself; 'the March Hare will be much the most interesting, and\nperhaps as this is May it won't be raving mad–at least not so mad as\nit was in March.' As she said this, she looked up, and there was the Cat\nagain, sitting on a branch of a tree.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-301","text":"'Did you say pig, or fig?' said the Cat.","caption":"'Did you say pig, or fig?' said the Cat.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-302","text":"'I said pig,' replied Alice; 'and I wish you wouldn't keep appearing and\nvanishing so suddenly: you make one quite giddy.'","caption":"'I said pig,' replied Alice; 'and I wish you wouldn't keep appearing and\nvanishing so suddenly: you make one quite giddy.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-303","text":"'All right,' said the Cat; and this time it vanished quite slowly,\nbeginning with the end of the tail, and ending with the grin, which\nremained some time after the rest of it had gone.","caption":"'All right,' said the Cat; and this time it vanished quite slowly,\nbeginning with the end of the tail, and ending with the grin, which\nremained some time after the rest of it had gone.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-304","text":"'Well! I've often seen a cat without a grin,' thought Alice; 'but a grin\nwithout a cat! It's the most curious thing I ever saw in my life!'","caption":"'Well! I've often seen a cat without a grin,' thought Alice; 'but a grin\nwithout a cat! It's the most curious thing I ever saw in my life!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-305","text":"She had not gone much farther before she came in sight of the house\nof the March Hare: she thought it must be the right house, because the\nchimneys were shaped like ears and the roof was thatched with fur. It\nwas so large a house, that she did not like to go nearer till she had\nnibbled some more of the lefthand bit of mushroom, and raised herself to\nabout two feet high: even then she walked up towards it rather timidly,\nsaying to herself 'Suppose it should be raving mad after all! I almost\nwish I'd gone to see the Hatter instead!'","caption":"She had not gone much farther before she came in sight of the house\nof the March Hare: she thought it must be the right house, because the\nchimneys were shaped like ears and the roof was thatched with fur. It\nwas so large a house, that she did not like to go nearer till she had\nnibbled some more of the lefthand bit of mushroom, and raised herself to\nabout two feet high: even then she walked up towards it rather timidly,\nsaying to herself 'Suppose it should be raving mad after all! I almost\nwish I'd gone to see the Hatter instead!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-306","text":"\u003Ch3>CHAPTER VII. A Mad Tea-Party\u003C/h3>","caption":"CHAPTER VII. A Mad Tea-Party","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-307","text":"There was a table set out under a tree in front of the house, and the\nMarch Hare and the Hatter were having tea at it: a Dormouse was sitting\nbetween them, fast asleep, and the other two were using it as a\ncushion, resting their elbows on it, and talking over its head. 'Very\nuncomfortable for the Dormouse,' thought Alice; 'only, as it's asleep, I\nsuppose it doesn't mind.'","caption":"There was a table set out under a tree in front of the house, and the\nMarch Hare and the Hatter were having tea at it: a Dormouse was sitting\nbetween them, fast asleep, and the other two were using it as a\ncushion, resting their elbows on it, and talking over its head. 'Very\nuncomfortable for the Dormouse,' thought Alice; 'only, as it's asleep, I\nsuppose it doesn't mind.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-308","text":"The table was a large one, but the three were all crowded together at\none corner of it: 'No room! No room!' they cried out when they saw Alice\ncoming. 'There's PLENTY of room!' said Alice indignantly, and she sat\ndown in a large arm-chair at one end of the table.","caption":"The table was a large one, but the three were all crowded together at\none corner of it: 'No room! No room!' they cried out when they saw Alice\ncoming. 'There's PLENTY of room!' said Alice indignantly, and she sat\ndown in a large arm-chair at one end of the table.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-309","text":"'Have some wine,' the March Hare said in an encouraging tone.","caption":"'Have some wine,' the March Hare said in an encouraging tone.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-31","text":"ALICE'S RIGHT FOOT, ESQ.\n       HEARTHRUG,\n         NEAR THE FENDER,\n           (WITH ALICE'S LOVE).","caption":"ALICE'S RIGHT FOOT, ESQ.\n       HEARTHRUG,\n         NEAR THE FENDER,\n           (WITH ALICE'S LOVE).","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-310","text":"Alice looked all round the table, but there was nothing on it but tea.\n'I don't see any wine,' she remarked.","caption":"Alice looked all round the table, but there was nothing on it but tea.\n'I don't see any wine,' she remarked.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-311","text":"'There isn't any,' said the March Hare.","caption":"'There isn't any,' said the March Hare.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-312","text":"'Then it wasn't very civil of you to offer it,' said Alice angrily.","caption":"'Then it wasn't very civil of you to offer it,' said Alice angrily.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-313","text":"'It wasn't very civil of you to sit down without being invited,' said\nthe March Hare.","caption":"'It wasn't very civil of you to sit down without being invited,' said\nthe March Hare.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-314","text":"'I didn't know it was YOUR table,' said Alice; 'it's laid for a great\nmany more than three.'","caption":"'I didn't know it was YOUR table,' said Alice; 'it's laid for a great\nmany more than three.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-315","text":"'Your hair wants cutting,' said the Hatter. He had been looking at Alice\nfor some time with great curiosity, and this was his first speech.","caption":"'Your hair wants cutting,' said the Hatter. He had been looking at Alice\nfor some time with great curiosity, and this was his first speech.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-316","text":"'You should learn not to make personal remarks,' Alice said with some\nseverity; 'it's very rude.'","caption":"'You should learn not to make personal remarks,' Alice said with some\nseverity; 'it's very rude.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-317","text":"The Hatter opened his eyes very wide on hearing this; but all he SAID\nwas, 'Why is a raven like a writing-desk?'","caption":"The Hatter opened his eyes very wide on hearing this; but all he SAID\nwas, 'Why is a raven like a writing-desk?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-318","text":"'Come, we shall have some fun now!' thought Alice. 'I'm glad they've\nbegun asking riddles.–I believe I can guess that,' she added aloud.","caption":"'Come, we shall have some fun now!' thought Alice. 'I'm glad they've\nbegun asking riddles.–I believe I can guess that,' she added aloud.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-319","text":"'Do you mean that you think you can find out the answer to it?' said the\nMarch Hare.","caption":"'Do you mean that you think you can find out the answer to it?' said the\nMarch Hare.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-32","text":"Oh dear, what nonsense I'm talking!'","caption":"Oh dear, what nonsense I'm talking!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-320","text":"'Exactly so,' said Alice.","caption":"'Exactly so,' said Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-321","text":"'Then you should say what you mean,' the March Hare went on.","caption":"'Then you should say what you mean,' the March Hare went on.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-322","text":"'I do,' Alice hastily replied; 'at least–at least I mean what I\nsay–that's the same thing, you know.'","caption":"'I do,' Alice hastily replied; 'at least–at least I mean what I\nsay–that's the same thing, you know.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-323","text":"'Not the same thing a bit!' said the Hatter. 'You might just as well say\nthat &quot;I see what I eat&quot; is the same thing as &quot;I eat what I see&quot;!'","caption":"'Not the same thing a bit!' said the Hatter. 'You might just as well say\nthat &quot;I see what I eat&quot; is the same thing as &quot;I eat what I see&quot;!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-324","text":"'You might just as well say,' added the March Hare, 'that &quot;I like what I\nget&quot; is the same thing as &quot;I get what I like&quot;!'","caption":"'You might just as well say,' added the March Hare, 'that &quot;I like what I\nget&quot; is the same thing as &quot;I get what I like&quot;!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-325","text":"'You might just as well say,' added the Dormouse, who seemed to be\ntalking in his sleep, 'that &quot;I breathe when I sleep&quot; is the same thing\nas &quot;I sleep when I breathe&quot;!'","caption":"'You might just as well say,' added the Dormouse, who seemed to be\ntalking in his sleep, 'that &quot;I breathe when I sleep&quot; is the same thing\nas &quot;I sleep when I breathe&quot;!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-326","text":"'It IS the same thing with you,' said the Hatter, and here the\nconversation dropped, and the party sat silent for a minute, while Alice\nthought over all she could remember about ravens and writing-desks,\nwhich wasn't much.","caption":"'It IS the same thing with you,' said the Hatter, and here the\nconversation dropped, and the party sat silent for a minute, while Alice\nthought over all she could remember about ravens and writing-desks,\nwhich wasn't much.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-327","text":"The Hatter was the first to break the silence. 'What day of the month\nis it?' he said, turning to Alice: he had taken his watch out of his\npocket, and was looking at it uneasily, shaking it every now and then,\nand holding it to his ear.","caption":"The Hatter was the first to break the silence. 'What day of the month\nis it?' he said, turning to Alice: he had taken his watch out of his\npocket, and was looking at it uneasily, shaking it every now and then,\nand holding it to his ear.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-328","text":"Alice considered a little, and then said 'The fourth.'","caption":"Alice considered a little, and then said 'The fourth.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-329","text":"'Two days wrong!' sighed the Hatter. 'I told you butter wouldn't suit\nthe works!' he added looking angrily at the March Hare.","caption":"'Two days wrong!' sighed the Hatter. 'I told you butter wouldn't suit\nthe works!' he added looking angrily at the March Hare.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-33","text":"Just then her head struck against the roof of the hall: in fact she was\nnow more than nine feet high, and she at once took up the little golden\nkey and hurried off to the garden door.","caption":"Just then her head struck against the roof of the hall: in fact she was\nnow more than nine feet high, and she at once took up the little golden\nkey and hurried off to the garden door.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-330","text":"'It was the BEST butter,' the March Hare meekly replied.","caption":"'It was the BEST butter,' the March Hare meekly replied.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-331","text":"'Yes, but some crumbs must have got in as well,' the Hatter grumbled:\n'you shouldn't have put it in with the bread-knife.'","caption":"'Yes, but some crumbs must have got in as well,' the Hatter grumbled:\n'you shouldn't have put it in with the bread-knife.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-332","text":"The March Hare took the watch and looked at it gloomily: then he dipped\nit into his cup of tea, and looked at it again: but he could think of\nnothing better to say than his first remark, 'It was the BEST butter,\nyou know.'","caption":"The March Hare took the watch and looked at it gloomily: then he dipped\nit into his cup of tea, and looked at it again: but he could think of\nnothing better to say than his first remark, 'It was the BEST butter,\nyou know.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-333","text":"Alice had been looking over his shoulder with some curiosity. 'What a\nfunny watch!' she remarked. 'It tells the day of the month, and doesn't\ntell what o'clock it is!'","caption":"Alice had been looking over his shoulder with some curiosity. 'What a\nfunny watch!' she remarked. 'It tells the day of the month, and doesn't\ntell what o'clock it is!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-334","text":"'Why should it?' muttered the Hatter. 'Does YOUR watch tell you what\nyear it is?'","caption":"'Why should it?' muttered the Hatter. 'Does YOUR watch tell you what\nyear it is?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-335","text":"'Of course not,' Alice replied very readily: 'but that's because it\nstays the same year for such a long time together.'","caption":"'Of course not,' Alice replied very readily: 'but that's because it\nstays the same year for such a long time together.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-336","text":"'Which is just the case with MINE,' said the Hatter.","caption":"'Which is just the case with MINE,' said the Hatter.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-337","text":"Alice felt dreadfully puzzled. The Hatter's remark seemed to have no\nsort of meaning in it, and yet it was certainly English. 'I don't quite\nunderstand you,' she said, as politely as she could.","caption":"Alice felt dreadfully puzzled. The Hatter's remark seemed to have no\nsort of meaning in it, and yet it was certainly English. 'I don't quite\nunderstand you,' she said, as politely as she could.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-338","text":"'The Dormouse is asleep again,' said the Hatter, and he poured a little\nhot tea upon its nose.","caption":"'The Dormouse is asleep again,' said the Hatter, and he poured a little\nhot tea upon its nose.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-339","text":"The Dormouse shook its head impatiently, and said, without opening its\neyes, 'Of course, of course; just what I was going to remark myself.'","caption":"The Dormouse shook its head impatiently, and said, without opening its\neyes, 'Of course, of course; just what I was going to remark myself.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-34","text":"Poor Alice! It was as much as she could do, lying down on one side, to\nlook through into the garden with one eye; but to get through was more\nhopeless than ever: she sat down and began to cry again.","caption":"Poor Alice! It was as much as she could do, lying down on one side, to\nlook through into the garden with one eye; but to get through was more\nhopeless than ever: she sat down and began to cry again.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-340","text":"'Have you guessed the riddle yet?' the Hatter said, turning to Alice\nagain.","caption":"'Have you guessed the riddle yet?' the Hatter said, turning to Alice\nagain.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-341","text":"'No, I give it up,' Alice replied: 'what's the answer?'","caption":"'No, I give it up,' Alice replied: 'what's the answer?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-342","text":"'I haven't the slightest idea,' said the Hatter.","caption":"'I haven't the slightest idea,' said the Hatter.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-343","text":"'Nor I,' said the March Hare.","caption":"'Nor I,' said the March Hare.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-344","text":"Alice sighed wearily. 'I think you might do something better with the\ntime,' she said, 'than waste it in asking riddles that have no answers.'","caption":"Alice sighed wearily. 'I think you might do something better with the\ntime,' she said, 'than waste it in asking riddles that have no answers.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-345","text":"'If you knew Time as well as I do,' said the Hatter, 'you wouldn't talk\nabout wasting IT. It's HIM.'","caption":"'If you knew Time as well as I do,' said the Hatter, 'you wouldn't talk\nabout wasting IT. It's HIM.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-346","text":"'I don't know what you mean,' said Alice.","caption":"'I don't know what you mean,' said Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-347","text":"'Of course you don't!' the Hatter said, tossing his head contemptuously.\n'I dare say you never even spoke to Time!'","caption":"'Of course you don't!' the Hatter said, tossing his head contemptuously.\n'I dare say you never even spoke to Time!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-348","text":"'Perhaps not,' Alice cautiously replied: 'but I know I have to beat time\nwhen I learn music.'","caption":"'Perhaps not,' Alice cautiously replied: 'but I know I have to beat time\nwhen I learn music.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-349","text":"'Ah! that accounts for it,' said the Hatter. 'He won't stand beating.\nNow, if you only kept on good terms with him, he'd do almost anything\nyou liked with the clock. For instance, suppose it were nine o'clock in\nthe morning, just time to begin lessons: you'd only have to whisper a\nhint to Time, and round goes the clock in a twinkling! Half-past one,\ntime for dinner!'","caption":"'Ah! that accounts for it,' said the Hatter. 'He won't stand beating.\nNow, if you only kept on good terms with him, he'd do almost anything\nyou liked with the clock. For instance, suppose it were nine o'clock in\nthe morning, just time to begin lessons: you'd only have to whisper a\nhint to Time, and round goes the clock in a twinkling! Half-past one,\ntime for dinner!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-35","text":"'You ought to be ashamed of yourself,' said Alice, 'a great girl like\nyou,' (she might well say this), 'to go on crying in this way! Stop this\nmoment, I tell you!' But she went on all the same, shedding gallons of\ntears, until there was a large pool all round her, about four inches\ndeep and reaching half down the hall.","caption":"'You ought to be ashamed of yourself,' said Alice, 'a great girl like\nyou,' (she might well say this), 'to go on crying in this way! Stop this\nmoment, I tell you!' But she went on all the same, shedding gallons of\ntears, until there was a large pool all round her, about four inches\ndeep and reaching half down the hall.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-350","text":"('I only wish it was,' the March Hare said to itself in a whisper.)","caption":"('I only wish it was,' the March Hare said to itself in a whisper.)","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-351","text":"'That would be grand, certainly,' said Alice thoughtfully: 'but then–I\nshouldn't be hungry for it, you know.'","caption":"'That would be grand, certainly,' said Alice thoughtfully: 'but then–I\nshouldn't be hungry for it, you know.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-352","text":"'Not at first, perhaps,' said the Hatter: 'but you could keep it to\nhalf-past one as long as you liked.'","caption":"'Not at first, perhaps,' said the Hatter: 'but you could keep it to\nhalf-past one as long as you liked.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-353","text":"'Is that the way YOU manage?' Alice asked.","caption":"'Is that the way YOU manage?' Alice asked.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-354","text":"The Hatter shook his head mournfully. 'Not I!' he replied. 'We\nquarrelled last March–just before HE went mad, you know–' (pointing\nwith his tea spoon at the March Hare,) '–it was at the great concert\ngiven by the Queen of Hearts, and I had to sing","caption":"The Hatter shook his head mournfully. 'Not I!' he replied. 'We\nquarrelled last March–just before HE went mad, you know–' (pointing\nwith his tea spoon at the March Hare,) '–it was at the great concert\ngiven by the Queen of Hearts, and I had to sing","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-355","text":"&quot;Twinkle, twinkle, little bat!\n     How I wonder what you're at!&quot;","caption":"&quot;Twinkle, twinkle, little bat!\n     How I wonder what you're at!&quot;","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-356","text":"You know the song, perhaps?'","caption":"You know the song, perhaps?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-357","text":"'I've heard something like it,' said Alice.","caption":"'I've heard something like it,' said Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-358","text":"'It goes on, you know,' the Hatter continued, 'in this way:–","caption":"'It goes on, you know,' the Hatter continued, 'in this way:–","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-359","text":"&quot;Up above the world you fly,\n     Like a tea-tray in the sky.\n         Twinkle, twinkle–&quot;'","caption":"&quot;Up above the world you fly,\n     Like a tea-tray in the sky.\n         Twinkle, twinkle–&quot;'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-36","text":"After a time she heard a little pattering of feet in the distance, and\nshe hastily dried her eyes to see what was coming. It was the White\nRabbit returning, splendidly dressed, with a pair of white kid gloves in\none hand and a large fan in the other: he came trotting along in a great\nhurry, muttering to himself as he came, 'Oh! the Duchess, the Duchess!\nOh! won't she be savage if I've kept her waiting!' Alice felt so\ndesperate that she was ready to ask help of any one; so, when the Rabbit\ncame near her, she began, in a low, timid voice, 'If you please, sir–'\nThe Rabbit started violently, dropped the white kid gloves and the fan,\nand skurried away into the darkness as hard as he could go.","caption":"After a time she heard a little pattering of feet in the distance, and\nshe hastily dried her eyes to see what was coming. It was the White\nRabbit returning, splendidly dressed, with a pair of white kid gloves in\none hand and a large fan in the other: he came trotting along in a great\nhurry, muttering to himself as he came, 'Oh! the Duchess, the Duchess!\nOh! won't she be savage if I've kept her waiting!' Alice felt so\ndesperate that she was ready to ask help of any one; so, when the Rabbit\ncame near her, she began, in a low, timid voice, 'If you please, sir–'\nThe Rabbit started violently, dropped the white kid gloves and the fan,\nand skurried away into the darkness as hard as he could go.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-360","text":"Here the Dormouse shook itself, and began singing in its sleep 'Twinkle,\ntwinkle, twinkle, twinkle–' and went on so long that they had to pinch\nit to make it stop.","caption":"Here the Dormouse shook itself, and began singing in its sleep 'Twinkle,\ntwinkle, twinkle, twinkle–' and went on so long that they had to pinch\nit to make it stop.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-361","text":"'Well, I'd hardly finished the first verse,' said the Hatter, 'when the\nQueen jumped up and bawled out, &quot;He's murdering the time! Off with his\nhead!&quot;'","caption":"'Well, I'd hardly finished the first verse,' said the Hatter, 'when the\nQueen jumped up and bawled out, &quot;He's murdering the time! Off with his\nhead!&quot;'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-362","text":"'How dreadfully savage!' exclaimed Alice.","caption":"'How dreadfully savage!' exclaimed Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-363","text":"'And ever since that,' the Hatter went on in a mournful tone, 'he won't\ndo a thing I ask! It's always six o'clock now.'","caption":"'And ever since that,' the Hatter went on in a mournful tone, 'he won't\ndo a thing I ask! It's always six o'clock now.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-364","text":"A bright idea came into Alice's head. 'Is that the reason so many\ntea-things are put out here?' she asked.","caption":"A bright idea came into Alice's head. 'Is that the reason so many\ntea-things are put out here?' she asked.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-365","text":"'Yes, that's it,' said the Hatter with a sigh: 'it's always tea-time,\nand we've no time to wash the things between whiles.'","caption":"'Yes, that's it,' said the Hatter with a sigh: 'it's always tea-time,\nand we've no time to wash the things between whiles.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-366","text":"'Then you keep moving round, I suppose?' said Alice.","caption":"'Then you keep moving round, I suppose?' said Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-367","text":"'Exactly so,' said the Hatter: 'as the things get used up.'","caption":"'Exactly so,' said the Hatter: 'as the things get used up.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-368","text":"'But what happens when you come to the beginning again?' Alice ventured\nto ask.","caption":"'But what happens when you come to the beginning again?' Alice ventured\nto ask.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-369","text":"'Suppose we change the subject,' the March Hare interrupted, yawning.\n'I'm getting tired of this. I vote the young lady tells us a story.'","caption":"'Suppose we change the subject,' the March Hare interrupted, yawning.\n'I'm getting tired of this. I vote the young lady tells us a story.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-37","text":"Alice took up the fan and gloves, and, as the hall was very hot, she\nkept fanning herself all the time she went on talking: 'Dear, dear! How\nqueer everything is to-day! And yesterday things went on just as usual.\nI wonder if I've been changed in the night? Let me think: was I the\nsame when I got up this morning? I almost think I can remember feeling a\nlittle different. But if I'm not the same, the next question is, Who\nin the world am I? Ah, THAT'S the great puzzle!' And she began thinking\nover all the children she knew that were of the same age as herself, to\nsee if she could have been changed for any of them.","caption":"Alice took up the fan and gloves, and, as the hall was very hot, she\nkept fanning herself all the time she went on talking: 'Dear, dear! How\nqueer everything is to-day! And yesterday things went on just as usual.\nI wonder if I've been changed in the night? Let me think: was I the\nsame when I got up this morning? I almost think I can remember feeling a\nlittle different. But if I'm not the same, the next question is, Who\nin the world am I? Ah, THAT'S the great puzzle!' And she began thinking\nover all the children she knew that were of the same age as herself, to\nsee if she could have been changed for any of them.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-370","text":"'I'm afraid I don't know one,' said Alice, rather alarmed at the\nproposal.","caption":"'I'm afraid I don't know one,' said Alice, rather alarmed at the\nproposal.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-371","text":"'Then the Dormouse shall!' they both cried. 'Wake up, Dormouse!' And\nthey pinched it on both sides at once.","caption":"'Then the Dormouse shall!' they both cried. 'Wake up, Dormouse!' And\nthey pinched it on both sides at once.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-372","text":"The Dormouse slowly opened his eyes. 'I wasn't asleep,' he said in a\nhoarse, feeble voice: 'I heard every word you fellows were saying.'","caption":"The Dormouse slowly opened his eyes. 'I wasn't asleep,' he said in a\nhoarse, feeble voice: 'I heard every word you fellows were saying.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-373","text":"'Tell us a story!' said the March Hare.","caption":"'Tell us a story!' said the March Hare.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-374","text":"'Yes, please do!' pleaded Alice.","caption":"'Yes, please do!' pleaded Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-375","text":"'And be quick about it,' added the Hatter, 'or you'll be asleep again\nbefore it's done.'","caption":"'And be quick about it,' added the Hatter, 'or you'll be asleep again\nbefore it's done.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-376","text":"'Once upon a time there were three little sisters,' the Dormouse began\nin a great hurry; 'and their names were Elsie, Lacie, and Tillie; and\nthey lived at the bottom of a well–'","caption":"'Once upon a time there were three little sisters,' the Dormouse began\nin a great hurry; 'and their names were Elsie, Lacie, and Tillie; and\nthey lived at the bottom of a well–'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-377","text":"'What did they live on?' said Alice, who always took a great interest in\nquestions of eating and drinking.","caption":"'What did they live on?' said Alice, who always took a great interest in\nquestions of eating and drinking.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-378","text":"'They lived on treacle,' said the Dormouse, after thinking a minute or\ntwo.","caption":"'They lived on treacle,' said the Dormouse, after thinking a minute or\ntwo.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-379","text":"'They couldn't have done that, you know,' Alice gently remarked; 'they'd\nhave been ill.'","caption":"'They couldn't have done that, you know,' Alice gently remarked; 'they'd\nhave been ill.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-38","text":"'I'm sure I'm not Ada,' she said, 'for her hair goes in such long\nringlets, and mine doesn't go in ringlets at all; and I'm sure I can't\nbe Mabel, for I know all sorts of things, and she, oh! she knows such a\nvery little! Besides, SHE'S she, and I'm I, and–oh dear, how puzzling\nit all is! I'll try if I know all the things I used to know. Let me\nsee: four times five is twelve, and four times six is thirteen, and\nfour times seven is–oh dear! I shall never get to twenty at that rate!\nHowever, the Multiplication Table doesn't signify: let's try Geography.\nLondon is the capital of Paris, and Paris is the capital of Rome, and\nRome–no, THAT'S all wrong, I'm certain! I must have been changed for\nMabel! I'll try and say &quot;How doth the little–&quot;' and she crossed her\nhands on her lap as if she were saying lessons, and began to repeat it,\nbut her voice sounded hoarse and strange, and the words did not come the\nsame as they used to do:–","caption":"'I'm sure I'm not Ada,' she said, 'for her hair goes in such long\nringlets, and mine doesn't go in ringlets at all; and I'm sure I can't\nbe Mabel, for I know all sorts of things, and she, oh! she knows such a\nvery little! Besides, SHE'S she, and I'm I, and–oh dear, how puzzling\nit all is! I'll try if I know all the things I used to know. Let me\nsee: four times five is twelve, and four times six is thirteen, and\nfour times seven is–oh dear! I shall never get to twenty at that rate!\nHowever, the Multiplication Table doesn't signify: let's try Geography.\nLondon is the capital of Paris, and Paris is the capital of Rome, and\nRome–no, THAT'S all wrong, I'm certain! I must have been changed for\nMabel! I'll try and say &quot;How doth the little–&quot;' and she crossed her\nhands on her lap as if she were saying lessons, and began to repeat it,\nbut her voice sounded hoarse and strange, and the words did not come the\nsame as they used to do:–","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-380","text":"'So they were,' said the Dormouse; 'VERY ill.'","caption":"'So they were,' said the Dormouse; 'VERY ill.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-381","text":"Alice tried to fancy to herself what such an extraordinary ways of\nliving would be like, but it puzzled her too much, so she went on: 'But\nwhy did they live at the bottom of a well?'","caption":"Alice tried to fancy to herself what such an extraordinary ways of\nliving would be like, but it puzzled her too much, so she went on: 'But\nwhy did they live at the bottom of a well?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-382","text":"'Take some more tea,' the March Hare said to Alice, very earnestly.","caption":"'Take some more tea,' the March Hare said to Alice, very earnestly.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-383","text":"'I've had nothing yet,' Alice replied in an offended tone, 'so I can't\ntake more.'","caption":"'I've had nothing yet,' Alice replied in an offended tone, 'so I can't\ntake more.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-384","text":"'You mean you can't take LESS,' said the Hatter: 'it's very easy to take\nMORE than nothing.'","caption":"'You mean you can't take LESS,' said the Hatter: 'it's very easy to take\nMORE than nothing.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-385","text":"'Nobody asked YOUR opinion,' said Alice.","caption":"'Nobody asked YOUR opinion,' said Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-386","text":"'Who's making personal remarks now?' the Hatter asked triumphantly.","caption":"'Who's making personal remarks now?' the Hatter asked triumphantly.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-387","text":"Alice did not quite know what to say to this: so she helped herself\nto some tea and bread-and-butter, and then turned to the Dormouse, and\nrepeated her question. 'Why did they live at the bottom of a well?'","caption":"Alice did not quite know what to say to this: so she helped herself\nto some tea and bread-and-butter, and then turned to the Dormouse, and\nrepeated her question. 'Why did they live at the bottom of a well?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-388","text":"The Dormouse again took a minute or two to think about it, and then\nsaid, 'It was a treacle-well.'","caption":"The Dormouse again took a minute or two to think about it, and then\nsaid, 'It was a treacle-well.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-389","text":"'There's no such thing!' Alice was beginning very angrily, but the\nHatter and the March Hare went 'Sh! sh!' and the Dormouse sulkily\nremarked, 'If you can't be civil, you'd better finish the story for\nyourself.'","caption":"'There's no such thing!' Alice was beginning very angrily, but the\nHatter and the March Hare went 'Sh! sh!' and the Dormouse sulkily\nremarked, 'If you can't be civil, you'd better finish the story for\nyourself.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-39","text":"'How doth the little crocodile\n      Improve his shining tail,\n     And pour the waters of the Nile\n      On every golden scale!","caption":"'How doth the little crocodile\n      Improve his shining tail,\n     And pour the waters of the Nile\n      On every golden scale!","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-390","text":"'No, please go on!' Alice said very humbly; 'I won't interrupt again. I\ndare say there may be ONE.'","caption":"'No, please go on!' Alice said very humbly; 'I won't interrupt again. I\ndare say there may be ONE.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-391","text":"'One, indeed!' said the Dormouse indignantly. However, he consented to\ngo on. 'And so these three little sisters–they were learning to draw,\nyou know–'","caption":"'One, indeed!' said the Dormouse indignantly. However, he consented to\ngo on. 'And so these three little sisters–they were learning to draw,\nyou know–'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-392","text":"'What did they draw?' said Alice, quite forgetting her promise.","caption":"'What did they draw?' said Alice, quite forgetting her promise.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-393","text":"'Treacle,' said the Dormouse, without considering at all this time.","caption":"'Treacle,' said the Dormouse, without considering at all this time.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-394","text":"'I want a clean cup,' interrupted the Hatter: 'let's all move one place\non.'","caption":"'I want a clean cup,' interrupted the Hatter: 'let's all move one place\non.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-395","text":"He moved on as he spoke, and the Dormouse followed him: the March Hare\nmoved into the Dormouse's place, and Alice rather unwillingly took\nthe place of the March Hare. The Hatter was the only one who got any\nadvantage from the change: and Alice was a good deal worse off than\nbefore, as the March Hare had just upset the milk-jug into his plate.","caption":"He moved on as he spoke, and the Dormouse followed him: the March Hare\nmoved into the Dormouse's place, and Alice rather unwillingly took\nthe place of the March Hare. The Hatter was the only one who got any\nadvantage from the change: and Alice was a good deal worse off than\nbefore, as the March Hare had just upset the milk-jug into his plate.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-396","text":"Alice did not wish to offend the Dormouse again, so she began very\ncautiously: 'But I don't understand. Where did they draw the treacle\nfrom?'","caption":"Alice did not wish to offend the Dormouse again, so she began very\ncautiously: 'But I don't understand. Where did they draw the treacle\nfrom?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-397","text":"'You can draw water out of a water-well,' said the Hatter; 'so I should\nthink you could draw treacle out of a treacle-well–eh, stupid?'","caption":"'You can draw water out of a water-well,' said the Hatter; 'so I should\nthink you could draw treacle out of a treacle-well–eh, stupid?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-398","text":"'But they were IN the well,' Alice said to the Dormouse, not choosing to\nnotice this last remark.","caption":"'But they were IN the well,' Alice said to the Dormouse, not choosing to\nnotice this last remark.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-399","text":"'Of course they were', said the Dormouse; '–well in.'","caption":"'Of course they were', said the Dormouse; '–well in.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-4","text":"There was nothing so VERY remarkable in that; nor did Alice think it so\nVERY much out of the way to hear the Rabbit say to itself, 'Oh dear!\nOh dear! I shall be late!' (when she thought it over afterwards, it\noccurred to her that she ought to have wondered at this, but at the time\nit all seemed quite natural); but when the Rabbit actually TOOK A WATCH\nOUT OF ITS WAISTCOAT-POCKET, and looked at it, and then hurried on,\nAlice started to her feet, for it flashed across her mind that she had\nnever before seen a rabbit with either a waistcoat-pocket, or a watch\nto take out of it, and burning with curiosity, she ran across the field\nafter it, and fortunately was just in time to see it pop down a large\nrabbit-hole under the hedge.","caption":"There was nothing so VERY remarkable in that; nor did Alice think it so\nVERY much out of the way to hear the Rabbit say to itself, 'Oh dear!\nOh dear! I shall be late!' (when she thought it over afterwards, it\noccurred to her that she ought to have wondered at this, but at the time\nit all seemed quite natural); but when the Rabbit actually TOOK A WATCH\nOUT OF ITS WAISTCOAT-POCKET, and looked at it, and then hurried on,\nAlice started to her feet, for it flashed across her mind that she had\nnever before seen a rabbit with either a waistcoat-pocket, or a watch\nto take out of it, and burning with curiosity, she ran across the field\nafter it, and fortunately was just in time to see it pop down a large\nrabbit-hole under the hedge.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-40","text":"'How cheerfully he seems to grin,\n      How neatly spread his claws,\n     And welcome little fishes in\n      With gently smiling jaws!'","caption":"'How cheerfully he seems to grin,\n      How neatly spread his claws,\n     And welcome little fishes in\n      With gently smiling jaws!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-400","text":"This answer so confused poor Alice, that she let the Dormouse go on for\nsome time without interrupting it.","caption":"This answer so confused poor Alice, that she let the Dormouse go on for\nsome time without interrupting it.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-401","text":"'They were learning to draw,' the Dormouse went on, yawning and rubbing\nits eyes, for it was getting very sleepy; 'and they drew all manner of\nthings–everything that begins with an M–'","caption":"'They were learning to draw,' the Dormouse went on, yawning and rubbing\nits eyes, for it was getting very sleepy; 'and they drew all manner of\nthings–everything that begins with an M–'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-402","text":"'Why with an M?' said Alice.","caption":"'Why with an M?' said Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-403","text":"'Why not?' said the March Hare.","caption":"'Why not?' said the March Hare.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-404","text":"Alice was silent.","caption":"Alice was silent.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-405","text":"The Dormouse had closed its eyes by this time, and was going off into\na doze; but, on being pinched by the Hatter, it woke up again with\na little shriek, and went on: '–that begins with an M, such as\nmouse-traps, and the moon, and memory, and muchness–you know you say\nthings are &quot;much of a muchness&quot;–did you ever see such a thing as a\ndrawing of a muchness?'","caption":"The Dormouse had closed its eyes by this time, and was going off into\na doze; but, on being pinched by the Hatter, it woke up again with\na little shriek, and went on: '–that begins with an M, such as\nmouse-traps, and the moon, and memory, and muchness–you know you say\nthings are &quot;much of a muchness&quot;–did you ever see such a thing as a\ndrawing of a muchness?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-406","text":"'Really, now you ask me,' said Alice, very much confused, 'I don't\nthink–'","caption":"'Really, now you ask me,' said Alice, very much confused, 'I don't\nthink–'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-407","text":"'Then you shouldn't talk,' said the Hatter.","caption":"'Then you shouldn't talk,' said the Hatter.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-408","text":"This piece of rudeness was more than Alice could bear: she got up in\ngreat disgust, and walked off; the Dormouse fell asleep instantly, and\nneither of the others took the least notice of her going, though she\nlooked back once or twice, half hoping that they would call after her:\nthe last time she saw them, they were trying to put the Dormouse into\nthe teapot.","caption":"This piece of rudeness was more than Alice could bear: she got up in\ngreat disgust, and walked off; the Dormouse fell asleep instantly, and\nneither of the others took the least notice of her going, though she\nlooked back once or twice, half hoping that they would call after her:\nthe last time she saw them, they were trying to put the Dormouse into\nthe teapot.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-409","text":"'At any rate I'll never go THERE again!' said Alice as she picked her\nway through the wood. 'It's the stupidest tea-party I ever was at in all\nmy life!'","caption":"'At any rate I'll never go THERE again!' said Alice as she picked her\nway through the wood. 'It's the stupidest tea-party I ever was at in all\nmy life!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-41","text":"'I'm sure those are not the right words,' said poor Alice, and her eyes\nfilled with tears again as she went on, 'I must be Mabel after all, and\nI shall have to go and live in that poky little house, and have next to\nno toys to play with, and oh! ever so many lessons to learn! No, I've\nmade up my mind about it; if I'm Mabel, I'll stay down here! It'll be no\nuse their putting their heads down and saying &quot;Come up again, dear!&quot; I\nshall only look up and say &quot;Who am I then? Tell me that first, and then,\nif I like being that person, I'll come up: if not, I'll stay down here\ntill I'm somebody else&quot;–but, oh dear!' cried Alice, with a sudden burst\nof tears, 'I do wish they WOULD put their heads down! I am so VERY tired\nof being all alone here!'","caption":"'I'm sure those are not the right words,' said poor Alice, and her eyes\nfilled with tears again as she went on, 'I must be Mabel after all, and\nI shall have to go and live in that poky little house, and have next to\nno toys to play with, and oh! ever so many lessons to learn! No, I've\nmade up my mind about it; if I'm Mabel, I'll stay down here! It'll be no\nuse their putting their heads down and saying &quot;Come up again, dear!&quot; I\nshall only look up and say &quot;Who am I then? Tell me that first, and then,\nif I like being that person, I'll come up: if not, I'll stay down here\ntill I'm somebody else&quot;–but, oh dear!' cried Alice, with a sudden burst\nof tears, 'I do wish they WOULD put their heads down! I am so VERY tired\nof being all alone here!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-410","text":"Just as she said this, she noticed that one of the trees had a door\nleading right into it. 'That's very curious!' she thought. 'But\neverything's curious today. I think I may as well go in at once.' And in\nshe went.","caption":"Just as she said this, she noticed that one of the trees had a door\nleading right into it. 'That's very curious!' she thought. 'But\neverything's curious today. I think I may as well go in at once.' And in\nshe went.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-411","text":"Once more she found herself in the long hall, and close to the little\nglass table. 'Now, I'll manage better this time,' she said to herself,\nand began by taking the little golden key, and unlocking the door that\nled into the garden. Then she went to work nibbling at the mushroom (she\nhad kept a piece of it in her pocket) till she was about a foot high:\nthen she walked down the little passage: and THEN–she found herself at\nlast in the beautiful garden, among the bright flower-beds and the cool\nfountains.","caption":"Once more she found herself in the long hall, and close to the little\nglass table. 'Now, I'll manage better this time,' she said to herself,\nand began by taking the little golden key, and unlocking the door that\nled into the garden. Then she went to work nibbling at the mushroom (she\nhad kept a piece of it in her pocket) till she was about a foot high:\nthen she walked down the little passage: and THEN–she found herself at\nlast in the beautiful garden, among the bright flower-beds and the cool\nfountains.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-412","text":"\u003Ch3>CHAPTER VIII. The Queen's Croquet-Ground\u003C/h3>","caption":"CHAPTER VIII. The Queen's Croquet-Ground","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-413","text":"A large rose-tree stood near the entrance of the garden: the roses\ngrowing on it were white, but there were three gardeners at it, busily\npainting them red. Alice thought this a very curious thing, and she went\nnearer to watch them, and just as she came up to them she heard one of\nthem say, 'Look out now, Five! Don't go splashing paint over me like\nthat!'","caption":"A large rose-tree stood near the entrance of the garden: the roses\ngrowing on it were white, but there were three gardeners at it, busily\npainting them red. Alice thought this a very curious thing, and she went\nnearer to watch them, and just as she came up to them she heard one of\nthem say, 'Look out now, Five! Don't go splashing paint over me like\nthat!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-414","text":"'I couldn't help it,' said Five, in a sulky tone; 'Seven jogged my\nelbow.'","caption":"'I couldn't help it,' said Five, in a sulky tone; 'Seven jogged my\nelbow.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-415","text":"On which Seven looked up and said, 'That's right, Five! Always lay the\nblame on others!'","caption":"On which Seven looked up and said, 'That's right, Five! Always lay the\nblame on others!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-416","text":"'YOU'D better not talk!' said Five. 'I heard the Queen say only\nyesterday you deserved to be beheaded!'","caption":"'YOU'D better not talk!' said Five. 'I heard the Queen say only\nyesterday you deserved to be beheaded!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-417","text":"'What for?' said the one who had spoken first.","caption":"'What for?' said the one who had spoken first.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-418","text":"'That's none of YOUR business, Two!' said Seven.","caption":"'That's none of YOUR business, Two!' said Seven.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-419","text":"'Yes, it IS his business!' said Five, 'and I'll tell him–it was for\nbringing the cook tulip-roots instead of onions.'","caption":"'Yes, it IS his business!' said Five, 'and I'll tell him–it was for\nbringing the cook tulip-roots instead of onions.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-42","text":"As she said this she looked down at her hands, and was surprised to see\nthat she had put on one of the Rabbit's little white kid gloves while\nshe was talking. 'How CAN I have done that?' she thought. 'I must\nbe growing small again.' She got up and went to the table to measure\nherself by it, and found that, as nearly as she could guess, she was now\nabout two feet high, and was going on shrinking rapidly: she soon found\nout that the cause of this was the fan she was holding, and she dropped\nit hastily, just in time to avoid shrinking away altogether.","caption":"As she said this she looked down at her hands, and was surprised to see\nthat she had put on one of the Rabbit's little white kid gloves while\nshe was talking. 'How CAN I have done that?' she thought. 'I must\nbe growing small again.' She got up and went to the table to measure\nherself by it, and found that, as nearly as she could guess, she was now\nabout two feet high, and was going on shrinking rapidly: she soon found\nout that the cause of this was the fan she was holding, and she dropped\nit hastily, just in time to avoid shrinking away altogether.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-420","text":"Seven flung down his brush, and had just begun 'Well, of all the unjust\nthings–' when his eye chanced to fall upon Alice, as she stood watching\nthem, and he checked himself suddenly: the others looked round also, and\nall of them bowed low.","caption":"Seven flung down his brush, and had just begun 'Well, of all the unjust\nthings–' when his eye chanced to fall upon Alice, as she stood watching\nthem, and he checked himself suddenly: the others looked round also, and\nall of them bowed low.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-421","text":"'Would you tell me,' said Alice, a little timidly, 'why you are painting\nthose roses?'","caption":"'Would you tell me,' said Alice, a little timidly, 'why you are painting\nthose roses?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-422","text":"Five and Seven said nothing, but looked at Two. Two began in a low\nvoice, 'Why the fact is, you see, Miss, this here ought to have been a\nRED rose-tree, and we put a white one in by mistake; and if the Queen\nwas to find it out, we should all have our heads cut off, you know.\nSo you see, Miss, we're doing our best, afore she comes, to–' At this\nmoment Five, who had been anxiously looking across the garden, called\nout 'The Queen! The Queen!' and the three gardeners instantly threw\nthemselves flat upon their faces. There was a sound of many footsteps,\nand Alice looked round, eager to see the Queen.","caption":"Five and Seven said nothing, but looked at Two. Two began in a low\nvoice, 'Why the fact is, you see, Miss, this here ought to have been a\nRED rose-tree, and we put a white one in by mistake; and if the Queen\nwas to find it out, we should all have our heads cut off, you know.\nSo you see, Miss, we're doing our best, afore she comes, to–' At this\nmoment Five, who had been anxiously looking across the garden, called\nout 'The Queen! The Queen!' and the three gardeners instantly threw\nthemselves flat upon their faces. There was a sound of many footsteps,\nand Alice looked round, eager to see the Queen.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-423","text":"First came ten soldiers carrying clubs; these were all shaped like\nthe three gardeners, oblong and flat, with their hands and feet at the\ncorners: next the ten courtiers; these were ornamented all over with\ndiamonds, and walked two and two, as the soldiers did. After these came\nthe royal children; there were ten of them, and the little dears came\njumping merrily along hand in hand, in couples: they were all ornamented\nwith hearts. Next came the guests, mostly Kings and Queens, and among\nthem Alice recognised the White Rabbit: it was talking in a hurried\nnervous manner, smiling at everything that was said, and went by without\nnoticing her. Then followed the Knave of Hearts, carrying the King's\ncrown on a crimson velvet cushion; and, last of all this grand\nprocession, came THE KING AND QUEEN OF HEARTS.","caption":"First came ten soldiers carrying clubs; these were all shaped like\nthe three gardeners, oblong and flat, with their hands and feet at the\ncorners: next the ten courtiers; these were ornamented all over with\ndiamonds, and walked two and two, as the soldiers did. After these came\nthe royal children; there were ten of them, and the little dears came\njumping merrily along hand in hand, in couples: they were all ornamented\nwith hearts. Next came the guests, mostly Kings and Queens, and among\nthem Alice recognised the White Rabbit: it was talking in a hurried\nnervous manner, smiling at everything that was said, and went by without\nnoticing her. Then followed the Knave of Hearts, carrying the King's\ncrown on a crimson velvet cushion; and, last of all this grand\nprocession, came THE KING AND QUEEN OF HEARTS.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-424","text":"Alice was rather doubtful whether she ought not to lie down on her face\nlike the three gardeners, but she could not remember ever having heard\nof such a rule at processions; 'and besides, what would be the use of\na procession,' thought she, 'if people had all to lie down upon their\nfaces, so that they couldn't see it?' So she stood still where she was,\nand waited.","caption":"Alice was rather doubtful whether she ought not to lie down on her face\nlike the three gardeners, but she could not remember ever having heard\nof such a rule at processions; 'and besides, what would be the use of\na procession,' thought she, 'if people had all to lie down upon their\nfaces, so that they couldn't see it?' So she stood still where she was,\nand waited.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-425","text":"When the procession came opposite to Alice, they all stopped and looked\nat her, and the Queen said severely 'Who is this?' She said it to the\nKnave of Hearts, who only bowed and smiled in reply.","caption":"When the procession came opposite to Alice, they all stopped and looked\nat her, and the Queen said severely 'Who is this?' She said it to the\nKnave of Hearts, who only bowed and smiled in reply.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-426","text":"'Idiot!' said the Queen, tossing her head impatiently; and, turning to\nAlice, she went on, 'What's your name, child?'","caption":"'Idiot!' said the Queen, tossing her head impatiently; and, turning to\nAlice, she went on, 'What's your name, child?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-427","text":"'My name is Alice, so please your Majesty,' said Alice very politely;\nbut she added, to herself, 'Why, they're only a pack of cards, after\nall. I needn't be afraid of them!'","caption":"'My name is Alice, so please your Majesty,' said Alice very politely;\nbut she added, to herself, 'Why, they're only a pack of cards, after\nall. I needn't be afraid of them!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-428","text":"'And who are THESE?' said the Queen, pointing to the three gardeners who\nwere lying round the rosetree; for, you see, as they were lying on their\nfaces, and the pattern on their backs was the same as the rest of the\npack, she could not tell whether they were gardeners, or soldiers, or\ncourtiers, or three of her own children.","caption":"'And who are THESE?' said the Queen, pointing to the three gardeners who\nwere lying round the rosetree; for, you see, as they were lying on their\nfaces, and the pattern on their backs was the same as the rest of the\npack, she could not tell whether they were gardeners, or soldiers, or\ncourtiers, or three of her own children.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-429","text":"'How should I know?' said Alice, surprised at her own courage. 'It's no\nbusiness of MINE.'","caption":"'How should I know?' said Alice, surprised at her own courage. 'It's no\nbusiness of MINE.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-43","text":"'That WAS a narrow escape!' said Alice, a good deal frightened at the\nsudden change, but very glad to find herself still in existence; 'and\nnow for the garden!' and she ran with all speed back to the little door:\nbut, alas! the little door was shut again, and the little golden key was\nlying on the glass table as before, 'and things are worse than ever,'\nthought the poor child, 'for I never was so small as this before, never!\nAnd I declare it's too bad, that it is!'","caption":"'That WAS a narrow escape!' said Alice, a good deal frightened at the\nsudden change, but very glad to find herself still in existence; 'and\nnow for the garden!' and she ran with all speed back to the little door:\nbut, alas! the little door was shut again, and the little golden key was\nlying on the glass table as before, 'and things are worse than ever,'\nthought the poor child, 'for I never was so small as this before, never!\nAnd I declare it's too bad, that it is!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-430","text":"The Queen turned crimson with fury, and, after glaring at her for a\nmoment like a wild beast, screamed 'Off with her head! Off–'","caption":"The Queen turned crimson with fury, and, after glaring at her for a\nmoment like a wild beast, screamed 'Off with her head! Off–'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-431","text":"'Nonsense!' said Alice, very loudly and decidedly, and the Queen was\nsilent.","caption":"'Nonsense!' said Alice, very loudly and decidedly, and the Queen was\nsilent.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-432","text":"The King laid his hand upon her arm, and timidly said 'Consider, my\ndear: she is only a child!'","caption":"The King laid his hand upon her arm, and timidly said 'Consider, my\ndear: she is only a child!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-433","text":"The Queen turned angrily away from him, and said to the Knave 'Turn them\nover!'","caption":"The Queen turned angrily away from him, and said to the Knave 'Turn them\nover!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-434","text":"The Knave did so, very carefully, with one foot.","caption":"The Knave did so, very carefully, with one foot.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-435","text":"'Get up!' said the Queen, in a shrill, loud voice, and the three\ngardeners instantly jumped up, and began bowing to the King, the Queen,\nthe royal children, and everybody else.","caption":"'Get up!' said the Queen, in a shrill, loud voice, and the three\ngardeners instantly jumped up, and began bowing to the King, the Queen,\nthe royal children, and everybody else.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
