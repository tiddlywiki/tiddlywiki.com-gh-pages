{"title":"Alice in Wonderland:-paragraph-436","text":"'Leave off that!' screamed the Queen. 'You make me giddy.' And then,\nturning to the rose-tree, she went on, 'What HAVE you been doing here?'","caption":"'Leave off that!' screamed the Queen. 'You make me giddy.' And then,\nturning to the rose-tree, she went on, 'What HAVE you been doing here?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-437","text":"'May it please your Majesty,' said Two, in a very humble tone, going\ndown on one knee as he spoke, 'we were trying–'","caption":"'May it please your Majesty,' said Two, in a very humble tone, going\ndown on one knee as he spoke, 'we were trying–'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-438","text":"'I see!' said the Queen, who had meanwhile been examining the roses.\n'Off with their heads!' and the procession moved on, three of the\nsoldiers remaining behind to execute the unfortunate gardeners, who ran\nto Alice for protection.","caption":"'I see!' said the Queen, who had meanwhile been examining the roses.\n'Off with their heads!' and the procession moved on, three of the\nsoldiers remaining behind to execute the unfortunate gardeners, who ran\nto Alice for protection.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-439","text":"'You shan't be beheaded!' said Alice, and she put them into a large\nflower-pot that stood near. The three soldiers wandered about for a\nminute or two, looking for them, and then quietly marched off after the\nothers.","caption":"'You shan't be beheaded!' said Alice, and she put them into a large\nflower-pot that stood near. The three soldiers wandered about for a\nminute or two, looking for them, and then quietly marched off after the\nothers.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-44","text":"As she said these words her foot slipped, and in another moment, splash!\nshe was up to her chin in salt water. Her first idea was that she\nhad somehow fallen into the sea, 'and in that case I can go back by\nrailway,' she said to herself. (Alice had been to the seaside once in\nher life, and had come to the general conclusion, that wherever you go\nto on the English coast you find a number of bathing machines in the\nsea, some children digging in the sand with wooden spades, then a row\nof lodging houses, and behind them a railway station.) However, she soon\nmade out that she was in the pool of tears which she had wept when she\nwas nine feet high.","caption":"As she said these words her foot slipped, and in another moment, splash!\nshe was up to her chin in salt water. Her first idea was that she\nhad somehow fallen into the sea, 'and in that case I can go back by\nrailway,' she said to herself. (Alice had been to the seaside once in\nher life, and had come to the general conclusion, that wherever you go\nto on the English coast you find a number of bathing machines in the\nsea, some children digging in the sand with wooden spades, then a row\nof lodging houses, and behind them a railway station.) However, she soon\nmade out that she was in the pool of tears which she had wept when she\nwas nine feet high.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-440","text":"'Are their heads off?' shouted the Queen.","caption":"'Are their heads off?' shouted the Queen.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-441","text":"'Their heads are gone, if it please your Majesty!' the soldiers shouted\nin reply.","caption":"'Their heads are gone, if it please your Majesty!' the soldiers shouted\nin reply.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-442","text":"'That's right!' shouted the Queen. 'Can you play croquet?'","caption":"'That's right!' shouted the Queen. 'Can you play croquet?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-443","text":"The soldiers were silent, and looked at Alice, as the question was\nevidently meant for her.","caption":"The soldiers were silent, and looked at Alice, as the question was\nevidently meant for her.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-444","text":"'Yes!' shouted Alice.","caption":"'Yes!' shouted Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-445","text":"'Come on, then!' roared the Queen, and Alice joined the procession,\nwondering very much what would happen next.","caption":"'Come on, then!' roared the Queen, and Alice joined the procession,\nwondering very much what would happen next.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-446","text":"'It's–it's a very fine day!' said a timid voice at her side. She was\nwalking by the White Rabbit, who was peeping anxiously into her face.","caption":"'It's–it's a very fine day!' said a timid voice at her side. She was\nwalking by the White Rabbit, who was peeping anxiously into her face.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-447","text":"'Very,' said Alice: '–where's the Duchess?'","caption":"'Very,' said Alice: '–where's the Duchess?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-448","text":"'Hush! Hush!' said the Rabbit in a low, hurried tone. He looked\nanxiously over his shoulder as he spoke, and then raised himself upon\ntiptoe, put his mouth close to her ear, and whispered 'She's under\nsentence of execution.'","caption":"'Hush! Hush!' said the Rabbit in a low, hurried tone. He looked\nanxiously over his shoulder as he spoke, and then raised himself upon\ntiptoe, put his mouth close to her ear, and whispered 'She's under\nsentence of execution.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-449","text":"'What for?' said Alice.","caption":"'What for?' said Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-45","text":"'I wish I hadn't cried so much!' said Alice, as she swam about, trying\nto find her way out. 'I shall be punished for it now, I suppose, by\nbeing drowned in my own tears! That WILL be a queer thing, to be sure!\nHowever, everything is queer to-day.'","caption":"'I wish I hadn't cried so much!' said Alice, as she swam about, trying\nto find her way out. 'I shall be punished for it now, I suppose, by\nbeing drowned in my own tears! That WILL be a queer thing, to be sure!\nHowever, everything is queer to-day.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-450","text":"'Did you say &quot;What a pity!&quot;?' the Rabbit asked.","caption":"'Did you say &quot;What a pity!&quot;?' the Rabbit asked.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-451","text":"'No, I didn't,' said Alice: 'I don't think it's at all a pity. I said\n&quot;What for?&quot;'","caption":"'No, I didn't,' said Alice: 'I don't think it's at all a pity. I said\n&quot;What for?&quot;'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-452","text":"'She boxed the Queen's ears–' the Rabbit began. Alice gave a little\nscream of laughter. 'Oh, hush!' the Rabbit whispered in a frightened\ntone. 'The Queen will hear you! You see, she came rather late, and the\nQueen said–'","caption":"'She boxed the Queen's ears–' the Rabbit began. Alice gave a little\nscream of laughter. 'Oh, hush!' the Rabbit whispered in a frightened\ntone. 'The Queen will hear you! You see, she came rather late, and the\nQueen said–'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-453","text":"'Get to your places!' shouted the Queen in a voice of thunder, and\npeople began running about in all directions, tumbling up against each\nother; however, they got settled down in a minute or two, and the game\nbegan. Alice thought she had never seen such a curious croquet-ground in\nher life; it was all ridges and furrows; the balls were live hedgehogs,\nthe mallets live flamingoes, and the soldiers had to double themselves\nup and to stand on their hands and feet, to make the arches.","caption":"'Get to your places!' shouted the Queen in a voice of thunder, and\npeople began running about in all directions, tumbling up against each\nother; however, they got settled down in a minute or two, and the game\nbegan. Alice thought she had never seen such a curious croquet-ground in\nher life; it was all ridges and furrows; the balls were live hedgehogs,\nthe mallets live flamingoes, and the soldiers had to double themselves\nup and to stand on their hands and feet, to make the arches.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-454","text":"The chief difficulty Alice found at first was in managing her flamingo:\nshe succeeded in getting its body tucked away, comfortably enough, under\nher arm, with its legs hanging down, but generally, just as she had got\nits neck nicely straightened out, and was going to give the hedgehog a\nblow with its head, it WOULD twist itself round and look up in her face,\nwith such a puzzled expression that she could not help bursting out\nlaughing: and when she had got its head down, and was going to begin\nagain, it was very provoking to find that the hedgehog had unrolled\nitself, and was in the act of crawling away: besides all this, there was\ngenerally a ridge or furrow in the way wherever she wanted to send the\nhedgehog to, and, as the doubled-up soldiers were always getting up\nand walking off to other parts of the ground, Alice soon came to the\nconclusion that it was a very difficult game indeed.","caption":"The chief difficulty Alice found at first was in managing her flamingo:\nshe succeeded in getting its body tucked away, comfortably enough, under\nher arm, with its legs hanging down, but generally, just as she had got\nits neck nicely straightened out, and was going to give the hedgehog a\nblow with its head, it WOULD twist itself round and look up in her face,\nwith such a puzzled expression that she could not help bursting out\nlaughing: and when she had got its head down, and was going to begin\nagain, it was very provoking to find that the hedgehog had unrolled\nitself, and was in the act of crawling away: besides all this, there was\ngenerally a ridge or furrow in the way wherever she wanted to send the\nhedgehog to, and, as the doubled-up soldiers were always getting up\nand walking off to other parts of the ground, Alice soon came to the\nconclusion that it was a very difficult game indeed.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-455","text":"The players all played at once without waiting for turns, quarrelling\nall the while, and fighting for the hedgehogs; and in a very short\ntime the Queen was in a furious passion, and went stamping about, and\nshouting 'Off with his head!' or 'Off with her head!' about once in a\nminute.","caption":"The players all played at once without waiting for turns, quarrelling\nall the while, and fighting for the hedgehogs; and in a very short\ntime the Queen was in a furious passion, and went stamping about, and\nshouting 'Off with his head!' or 'Off with her head!' about once in a\nminute.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-456","text":"Alice began to feel very uneasy: to be sure, she had not as yet had any\ndispute with the Queen, but she knew that it might happen any minute,\n'and then,' thought she, 'what would become of me? They're dreadfully\nfond of beheading people here; the great wonder is, that there's any one\nleft alive!'","caption":"Alice began to feel very uneasy: to be sure, she had not as yet had any\ndispute with the Queen, but she knew that it might happen any minute,\n'and then,' thought she, 'what would become of me? They're dreadfully\nfond of beheading people here; the great wonder is, that there's any one\nleft alive!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-457","text":"She was looking about for some way of escape, and wondering whether she\ncould get away without being seen, when she noticed a curious appearance\nin the air: it puzzled her very much at first, but, after watching it\na minute or two, she made it out to be a grin, and she said to herself\n'It's the Cheshire Cat: now I shall have somebody to talk to.'","caption":"She was looking about for some way of escape, and wondering whether she\ncould get away without being seen, when she noticed a curious appearance\nin the air: it puzzled her very much at first, but, after watching it\na minute or two, she made it out to be a grin, and she said to herself\n'It's the Cheshire Cat: now I shall have somebody to talk to.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-458","text":"'How are you getting on?' said the Cat, as soon as there was mouth\nenough for it to speak with.","caption":"'How are you getting on?' said the Cat, as soon as there was mouth\nenough for it to speak with.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-459","text":"Alice waited till the eyes appeared, and then nodded. 'It's no use\nspeaking to it,' she thought, 'till its ears have come, or at least one\nof them.' In another minute the whole head appeared, and then Alice put\ndown her flamingo, and began an account of the game, feeling very glad\nshe had someone to listen to her. The Cat seemed to think that there was\nenough of it now in sight, and no more of it appeared.","caption":"Alice waited till the eyes appeared, and then nodded. 'It's no use\nspeaking to it,' she thought, 'till its ears have come, or at least one\nof them.' In another minute the whole head appeared, and then Alice put\ndown her flamingo, and began an account of the game, feeling very glad\nshe had someone to listen to her. The Cat seemed to think that there was\nenough of it now in sight, and no more of it appeared.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-46","text":"Just then she heard something splashing about in the pool a little way\noff, and she swam nearer to make out what it was: at first she thought\nit must be a walrus or hippopotamus, but then she remembered how small\nshe was now, and she soon made out that it was only a mouse that had\nslipped in like herself.","caption":"Just then she heard something splashing about in the pool a little way\noff, and she swam nearer to make out what it was: at first she thought\nit must be a walrus or hippopotamus, but then she remembered how small\nshe was now, and she soon made out that it was only a mouse that had\nslipped in like herself.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-460","text":"'I don't think they play at all fairly,' Alice began, in rather a\ncomplaining tone, 'and they all quarrel so dreadfully one can't hear\noneself speak–and they don't seem to have any rules in particular;\nat least, if there are, nobody attends to them–and you've no idea how\nconfusing it is all the things being alive; for instance, there's the\narch I've got to go through next walking about at the other end of the\nground–and I should have croqueted the Queen's hedgehog just now, only\nit ran away when it saw mine coming!'","caption":"'I don't think they play at all fairly,' Alice began, in rather a\ncomplaining tone, 'and they all quarrel so dreadfully one can't hear\noneself speak–and they don't seem to have any rules in particular;\nat least, if there are, nobody attends to them–and you've no idea how\nconfusing it is all the things being alive; for instance, there's the\narch I've got to go through next walking about at the other end of the\nground–and I should have croqueted the Queen's hedgehog just now, only\nit ran away when it saw mine coming!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-461","text":"'How do you like the Queen?' said the Cat in a low voice.","caption":"'How do you like the Queen?' said the Cat in a low voice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-462","text":"'Not at all,' said Alice: 'she's so extremely–' Just then she noticed\nthat the Queen was close behind her, listening: so she went on,\n'–likely to win, that it's hardly worth while finishing the game.'","caption":"'Not at all,' said Alice: 'she's so extremely–' Just then she noticed\nthat the Queen was close behind her, listening: so she went on,\n'–likely to win, that it's hardly worth while finishing the game.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-463","text":"The Queen smiled and passed on.","caption":"The Queen smiled and passed on.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-464","text":"'Who ARE you talking to?' said the King, going up to Alice, and looking\nat the Cat's head with great curiosity.","caption":"'Who ARE you talking to?' said the King, going up to Alice, and looking\nat the Cat's head with great curiosity.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-465","text":"'It's a friend of mine–a Cheshire Cat,' said Alice: 'allow me to\nintroduce it.'","caption":"'It's a friend of mine–a Cheshire Cat,' said Alice: 'allow me to\nintroduce it.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-466","text":"'I don't like the look of it at all,' said the King: 'however, it may\nkiss my hand if it likes.'","caption":"'I don't like the look of it at all,' said the King: 'however, it may\nkiss my hand if it likes.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-467","text":"'I'd rather not,' the Cat remarked.","caption":"'I'd rather not,' the Cat remarked.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-468","text":"'Don't be impertinent,' said the King, 'and don't look at me like that!'\nHe got behind Alice as he spoke.","caption":"'Don't be impertinent,' said the King, 'and don't look at me like that!'\nHe got behind Alice as he spoke.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-469","text":"'A cat may look at a king,' said Alice. 'I've read that in some book,\nbut I don't remember where.'","caption":"'A cat may look at a king,' said Alice. 'I've read that in some book,\nbut I don't remember where.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-47","text":"'Would it be of any use, now,' thought Alice, 'to speak to this mouse?\nEverything is so out-of-the-way down here, that I should think very\nlikely it can talk: at any rate, there's no harm in trying.' So she\nbegan: 'O Mouse, do you know the way out of this pool? I am very tired\nof swimming about here, O Mouse!' (Alice thought this must be the right\nway of speaking to a mouse: she had never done such a thing before, but\nshe remembered having seen in her brother's Latin Grammar, 'A mouse–of\na mouse–to a mouse–a mouse–O mouse!') The Mouse looked at her rather\ninquisitively, and seemed to her to wink with one of its little eyes,\nbut it said nothing.","caption":"'Would it be of any use, now,' thought Alice, 'to speak to this mouse?\nEverything is so out-of-the-way down here, that I should think very\nlikely it can talk: at any rate, there's no harm in trying.' So she\nbegan: 'O Mouse, do you know the way out of this pool? I am very tired\nof swimming about here, O Mouse!' (Alice thought this must be the right\nway of speaking to a mouse: she had never done such a thing before, but\nshe remembered having seen in her brother's Latin Grammar, 'A mouse–of\na mouse–to a mouse–a mouse–O mouse!') The Mouse looked at her rather\ninquisitively, and seemed to her to wink with one of its little eyes,\nbut it said nothing.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-470","text":"'Well, it must be removed,' said the King very decidedly, and he called\nthe Queen, who was passing at the moment, 'My dear! I wish you would\nhave this cat removed!'","caption":"'Well, it must be removed,' said the King very decidedly, and he called\nthe Queen, who was passing at the moment, 'My dear! I wish you would\nhave this cat removed!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-471","text":"The Queen had only one way of settling all difficulties, great or small.\n'Off with his head!' she said, without even looking round.","caption":"The Queen had only one way of settling all difficulties, great or small.\n'Off with his head!' she said, without even looking round.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-472","text":"'I'll fetch the executioner myself,' said the King eagerly, and he\nhurried off.","caption":"'I'll fetch the executioner myself,' said the King eagerly, and he\nhurried off.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-473","text":"Alice thought she might as well go back, and see how the game was going\non, as she heard the Queen's voice in the distance, screaming with\npassion. She had already heard her sentence three of the players to be\nexecuted for having missed their turns, and she did not like the look\nof things at all, as the game was in such confusion that she never knew\nwhether it was her turn or not. So she went in search of her hedgehog.","caption":"Alice thought she might as well go back, and see how the game was going\non, as she heard the Queen's voice in the distance, screaming with\npassion. She had already heard her sentence three of the players to be\nexecuted for having missed their turns, and she did not like the look\nof things at all, as the game was in such confusion that she never knew\nwhether it was her turn or not. So she went in search of her hedgehog.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-474","text":"The hedgehog was engaged in a fight with another hedgehog, which seemed\nto Alice an excellent opportunity for croqueting one of them with the\nother: the only difficulty was, that her flamingo was gone across to the\nother side of the garden, where Alice could see it trying in a helpless\nsort of way to fly up into a tree.","caption":"The hedgehog was engaged in a fight with another hedgehog, which seemed\nto Alice an excellent opportunity for croqueting one of them with the\nother: the only difficulty was, that her flamingo was gone across to the\nother side of the garden, where Alice could see it trying in a helpless\nsort of way to fly up into a tree.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-475","text":"By the time she had caught the flamingo and brought it back, the fight\nwas over, and both the hedgehogs were out of sight: 'but it doesn't\nmatter much,' thought Alice, 'as all the arches are gone from this side\nof the ground.' So she tucked it away under her arm, that it might not\nescape again, and went back for a little more conversation with her\nfriend.","caption":"By the time she had caught the flamingo and brought it back, the fight\nwas over, and both the hedgehogs were out of sight: 'but it doesn't\nmatter much,' thought Alice, 'as all the arches are gone from this side\nof the ground.' So she tucked it away under her arm, that it might not\nescape again, and went back for a little more conversation with her\nfriend.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-476","text":"When she got back to the Cheshire Cat, she was surprised to find quite a\nlarge crowd collected round it: there was a dispute going on between\nthe executioner, the King, and the Queen, who were all talking at once,\nwhile all the rest were quite silent, and looked very uncomfortable.","caption":"When she got back to the Cheshire Cat, she was surprised to find quite a\nlarge crowd collected round it: there was a dispute going on between\nthe executioner, the King, and the Queen, who were all talking at once,\nwhile all the rest were quite silent, and looked very uncomfortable.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-477","text":"The moment Alice appeared, she was appealed to by all three to settle\nthe question, and they repeated their arguments to her, though, as they\nall spoke at once, she found it very hard indeed to make out exactly\nwhat they said.","caption":"The moment Alice appeared, she was appealed to by all three to settle\nthe question, and they repeated their arguments to her, though, as they\nall spoke at once, she found it very hard indeed to make out exactly\nwhat they said.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-478","text":"The executioner's argument was, that you couldn't cut off a head unless\nthere was a body to cut it off from: that he had never had to do such a\nthing before, and he wasn't going to begin at HIS time of life.","caption":"The executioner's argument was, that you couldn't cut off a head unless\nthere was a body to cut it off from: that he had never had to do such a\nthing before, and he wasn't going to begin at HIS time of life.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-479","text":"The King's argument was, that anything that had a head could be\nbeheaded, and that you weren't to talk nonsense.","caption":"The King's argument was, that anything that had a head could be\nbeheaded, and that you weren't to talk nonsense.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-48","text":"'Perhaps it doesn't understand English,' thought Alice; 'I daresay it's\na French mouse, come over with William the Conqueror.' (For, with all\nher knowledge of history, Alice had no very clear notion how long ago\nanything had happened.) So she began again: 'Ou est ma chatte?' which\nwas the first sentence in her French lesson-book. The Mouse gave a\nsudden leap out of the water, and seemed to quiver all over with fright.\n'Oh, I beg your pardon!' cried Alice hastily, afraid that she had hurt\nthe poor animal's feelings. 'I quite forgot you didn't like cats.'","caption":"'Perhaps it doesn't understand English,' thought Alice; 'I daresay it's\na French mouse, come over with William the Conqueror.' (For, with all\nher knowledge of history, Alice had no very clear notion how long ago\nanything had happened.) So she began again: 'Ou est ma chatte?' which\nwas the first sentence in her French lesson-book. The Mouse gave a\nsudden leap out of the water, and seemed to quiver all over with fright.\n'Oh, I beg your pardon!' cried Alice hastily, afraid that she had hurt\nthe poor animal's feelings. 'I quite forgot you didn't like cats.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-480","text":"The Queen's argument was, that if something wasn't done about it in less\nthan no time she'd have everybody executed, all round. (It was this last\nremark that had made the whole party look so grave and anxious.)","caption":"The Queen's argument was, that if something wasn't done about it in less\nthan no time she'd have everybody executed, all round. (It was this last\nremark that had made the whole party look so grave and anxious.)","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-481","text":"Alice could think of nothing else to say but 'It belongs to the Duchess:\nyou'd better ask HER about it.'","caption":"Alice could think of nothing else to say but 'It belongs to the Duchess:\nyou'd better ask HER about it.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-482","text":"'She's in prison,' the Queen said to the executioner: 'fetch her here.'\nAnd the executioner went off like an arrow.","caption":"'She's in prison,' the Queen said to the executioner: 'fetch her here.'\nAnd the executioner went off like an arrow.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-483","text":"The Cat's head began fading away the moment he was gone, and,\nby the time he had come back with the Duchess, it had entirely\ndisappeared; so the King and the executioner ran wildly up and down\nlooking for it, while the rest of the party went back to the game.","caption":"The Cat's head began fading away the moment he was gone, and,\nby the time he had come back with the Duchess, it had entirely\ndisappeared; so the King and the executioner ran wildly up and down\nlooking for it, while the rest of the party went back to the game.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-484","text":"\u003Ch3>CHAPTER IX. The Mock Turtle's Story\u003C/h3>","caption":"CHAPTER IX. The Mock Turtle's Story","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-485","text":"'You can't think how glad I am to see you again, you dear old thing!'\nsaid the Duchess, as she tucked her arm affectionately into Alice's, and\nthey walked off together.","caption":"'You can't think how glad I am to see you again, you dear old thing!'\nsaid the Duchess, as she tucked her arm affectionately into Alice's, and\nthey walked off together.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-486","text":"Alice was very glad to find her in such a pleasant temper, and thought\nto herself that perhaps it was only the pepper that had made her so\nsavage when they met in the kitchen.","caption":"Alice was very glad to find her in such a pleasant temper, and thought\nto herself that perhaps it was only the pepper that had made her so\nsavage when they met in the kitchen.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-487","text":"'When I'M a Duchess,' she said to herself, (not in a very hopeful tone\nthough), 'I won't have any pepper in my kitchen AT ALL. Soup does very\nwell without–Maybe it's always pepper that makes people hot-tempered,'\nshe went on, very much pleased at having found out a new kind of\nrule, 'and vinegar that makes them sour–and camomile that makes\nthem bitter–and–and barley-sugar and such things that make children\nsweet-tempered. I only wish people knew that: then they wouldn't be so\nstingy about it, you know–'","caption":"'When I'M a Duchess,' she said to herself, (not in a very hopeful tone\nthough), 'I won't have any pepper in my kitchen AT ALL. Soup does very\nwell without–Maybe it's always pepper that makes people hot-tempered,'\nshe went on, very much pleased at having found out a new kind of\nrule, 'and vinegar that makes them sour–and camomile that makes\nthem bitter–and–and barley-sugar and such things that make children\nsweet-tempered. I only wish people knew that: then they wouldn't be so\nstingy about it, you know–'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-488","text":"She had quite forgotten the Duchess by this time, and was a little\nstartled when she heard her voice close to her ear. 'You're thinking\nabout something, my dear, and that makes you forget to talk. I can't\ntell you just now what the moral of that is, but I shall remember it in\na bit.'","caption":"She had quite forgotten the Duchess by this time, and was a little\nstartled when she heard her voice close to her ear. 'You're thinking\nabout something, my dear, and that makes you forget to talk. I can't\ntell you just now what the moral of that is, but I shall remember it in\na bit.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-489","text":"'Perhaps it hasn't one,' Alice ventured to remark.","caption":"'Perhaps it hasn't one,' Alice ventured to remark.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-49","text":"'Not like cats!' cried the Mouse, in a shrill, passionate voice. 'Would\nYOU like cats if you were me?'","caption":"'Not like cats!' cried the Mouse, in a shrill, passionate voice. 'Would\nYOU like cats if you were me?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-490","text":"'Tut, tut, child!' said the Duchess. 'Everything's got a moral, if only\nyou can find it.' And she squeezed herself up closer to Alice's side as\nshe spoke.","caption":"'Tut, tut, child!' said the Duchess. 'Everything's got a moral, if only\nyou can find it.' And she squeezed herself up closer to Alice's side as\nshe spoke.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-491","text":"Alice did not much like keeping so close to her: first, because the\nDuchess was VERY ugly; and secondly, because she was exactly the\nright height to rest her chin upon Alice's shoulder, and it was an\nuncomfortably sharp chin. However, she did not like to be rude, so she\nbore it as well as she could.","caption":"Alice did not much like keeping so close to her: first, because the\nDuchess was VERY ugly; and secondly, because she was exactly the\nright height to rest her chin upon Alice's shoulder, and it was an\nuncomfortably sharp chin. However, she did not like to be rude, so she\nbore it as well as she could.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-492","text":"'The game's going on rather better now,' she said, by way of keeping up\nthe conversation a little.","caption":"'The game's going on rather better now,' she said, by way of keeping up\nthe conversation a little.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-493","text":"' 'Tis so,' said the Duchess: 'and the moral of that is–&quot;Oh, 'tis love,\n'tis love, that makes the world go round!&quot;'","caption":"' 'Tis so,' said the Duchess: 'and the moral of that is–&quot;Oh, 'tis love,\n'tis love, that makes the world go round!&quot;'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-494","text":"'Somebody said,' Alice whispered, 'that it's done by everybody minding\ntheir own business!'","caption":"'Somebody said,' Alice whispered, 'that it's done by everybody minding\ntheir own business!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-495","text":"'Ah, well! It means much the same thing,' said the Duchess, digging her\nsharp little chin into Alice's shoulder as she added, 'and the moral\nof THAT is–&quot;Take care of the sense, and the sounds will take care of\nthemselves.&quot;'","caption":"'Ah, well! It means much the same thing,' said the Duchess, digging her\nsharp little chin into Alice's shoulder as she added, 'and the moral\nof THAT is–&quot;Take care of the sense, and the sounds will take care of\nthemselves.&quot;'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-496","text":"'How fond she is of finding morals in things!' Alice thought to herself.","caption":"'How fond she is of finding morals in things!' Alice thought to herself.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-497","text":"'I dare say you're wondering why I don't put my arm round your waist,'\nthe Duchess said after a pause: 'the reason is, that I'm doubtful about\nthe temper of your flamingo. Shall I try the experiment?'","caption":"'I dare say you're wondering why I don't put my arm round your waist,'\nthe Duchess said after a pause: 'the reason is, that I'm doubtful about\nthe temper of your flamingo. Shall I try the experiment?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-498","text":"'HE might bite,' Alice cautiously replied, not feeling at all anxious to\nhave the experiment tried.","caption":"'HE might bite,' Alice cautiously replied, not feeling at all anxious to\nhave the experiment tried.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-499","text":"'Very true,' said the Duchess: 'flamingoes and mustard both bite. And\nthe moral of that is–&quot;Birds of a feather flock together.&quot;'","caption":"'Very true,' said the Duchess: 'flamingoes and mustard both bite. And\nthe moral of that is–&quot;Birds of a feather flock together.&quot;'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-5","text":"In another moment down went Alice after it, never once considering how\nin the world she was to get out again.","caption":"In another moment down went Alice after it, never once considering how\nin the world she was to get out again.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-50","text":"'Well, perhaps not,' said Alice in a soothing tone: 'don't be angry\nabout it. And yet I wish I could show you our cat Dinah: I think you'd\ntake a fancy to cats if you could only see her. She is such a dear quiet\nthing,' Alice went on, half to herself, as she swam lazily about in the\npool, 'and she sits purring so nicely by the fire, licking her paws and\nwashing her face–and she is such a nice soft thing to nurse–and she's\nsuch a capital one for catching mice–oh, I beg your pardon!' cried\nAlice again, for this time the Mouse was bristling all over, and she\nfelt certain it must be really offended. 'We won't talk about her any\nmore if you'd rather not.'","caption":"'Well, perhaps not,' said Alice in a soothing tone: 'don't be angry\nabout it. And yet I wish I could show you our cat Dinah: I think you'd\ntake a fancy to cats if you could only see her. She is such a dear quiet\nthing,' Alice went on, half to herself, as she swam lazily about in the\npool, 'and she sits purring so nicely by the fire, licking her paws and\nwashing her face–and she is such a nice soft thing to nurse–and she's\nsuch a capital one for catching mice–oh, I beg your pardon!' cried\nAlice again, for this time the Mouse was bristling all over, and she\nfelt certain it must be really offended. 'We won't talk about her any\nmore if you'd rather not.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-500","text":"'Only mustard isn't a bird,' Alice remarked.","caption":"'Only mustard isn't a bird,' Alice remarked.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-501","text":"'Right, as usual,' said the Duchess: 'what a clear way you have of\nputting things!'","caption":"'Right, as usual,' said the Duchess: 'what a clear way you have of\nputting things!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-502","text":"'It's a mineral, I THINK,' said Alice.","caption":"'It's a mineral, I THINK,' said Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-503","text":"'Of course it is,' said the Duchess, who seemed ready to agree to\neverything that Alice said; 'there's a large mustard-mine near here. And\nthe moral of that is–&quot;The more there is of mine, the less there is of\nyours.&quot;'","caption":"'Of course it is,' said the Duchess, who seemed ready to agree to\neverything that Alice said; 'there's a large mustard-mine near here. And\nthe moral of that is–&quot;The more there is of mine, the less there is of\nyours.&quot;'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-504","text":"'Oh, I know!' exclaimed Alice, who had not attended to this last remark,\n'it's a vegetable. It doesn't look like one, but it is.'","caption":"'Oh, I know!' exclaimed Alice, who had not attended to this last remark,\n'it's a vegetable. It doesn't look like one, but it is.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-505","text":"'I quite agree with you,' said the Duchess; 'and the moral of that\nis–&quot;Be what you would seem to be&quot;–or if you'd like it put more\nsimply–&quot;Never imagine yourself not to be otherwise than what it might\nappear to others that what you were or might have been was not otherwise\nthan what you had been would have appeared to them to be otherwise.&quot;'","caption":"'I quite agree with you,' said the Duchess; 'and the moral of that\nis–&quot;Be what you would seem to be&quot;–or if you'd like it put more\nsimply–&quot;Never imagine yourself not to be otherwise than what it might\nappear to others that what you were or might have been was not otherwise\nthan what you had been would have appeared to them to be otherwise.&quot;'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-506","text":"'I think I should understand that better,' Alice said very politely, 'if\nI had it written down: but I can't quite follow it as you say it.'","caption":"'I think I should understand that better,' Alice said very politely, 'if\nI had it written down: but I can't quite follow it as you say it.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-507","text":"'That's nothing to what I could say if I chose,' the Duchess replied, in\na pleased tone.","caption":"'That's nothing to what I could say if I chose,' the Duchess replied, in\na pleased tone.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-508","text":"'Pray don't trouble yourself to say it any longer than that,' said\nAlice.","caption":"'Pray don't trouble yourself to say it any longer than that,' said\nAlice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-509","text":"'Oh, don't talk about trouble!' said the Duchess. 'I make you a present\nof everything I've said as yet.'","caption":"'Oh, don't talk about trouble!' said the Duchess. 'I make you a present\nof everything I've said as yet.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-51","text":"'We indeed!' cried the Mouse, who was trembling down to the end of his\ntail. 'As if I would talk on such a subject! Our family always HATED\ncats: nasty, low, vulgar things! Don't let me hear the name again!'","caption":"'We indeed!' cried the Mouse, who was trembling down to the end of his\ntail. 'As if I would talk on such a subject! Our family always HATED\ncats: nasty, low, vulgar things! Don't let me hear the name again!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-510","text":"'A cheap sort of present!' thought Alice. 'I'm glad they don't give\nbirthday presents like that!' But she did not venture to say it out\nloud.","caption":"'A cheap sort of present!' thought Alice. 'I'm glad they don't give\nbirthday presents like that!' But she did not venture to say it out\nloud.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-511","text":"'Thinking again?' the Duchess asked, with another dig of her sharp\nlittle chin.","caption":"'Thinking again?' the Duchess asked, with another dig of her sharp\nlittle chin.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-512","text":"'I've a right to think,' said Alice sharply, for she was beginning to\nfeel a little worried.","caption":"'I've a right to think,' said Alice sharply, for she was beginning to\nfeel a little worried.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-513","text":"'Just about as much right,' said the Duchess, 'as pigs have to fly; and\nthe m–'","caption":"'Just about as much right,' said the Duchess, 'as pigs have to fly; and\nthe m–'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-514","text":"But here, to Alice's great surprise, the Duchess's voice died away, even\nin the middle of her favourite word 'moral,' and the arm that was linked\ninto hers began to tremble. Alice looked up, and there stood the Queen\nin front of them, with her arms folded, frowning like a thunderstorm.","caption":"But here, to Alice's great surprise, the Duchess's voice died away, even\nin the middle of her favourite word 'moral,' and the arm that was linked\ninto hers began to tremble. Alice looked up, and there stood the Queen\nin front of them, with her arms folded, frowning like a thunderstorm.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-515","text":"'A fine day, your Majesty!' the Duchess began in a low, weak voice.","caption":"'A fine day, your Majesty!' the Duchess began in a low, weak voice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-516","text":"'Now, I give you fair warning,' shouted the Queen, stamping on the\nground as she spoke; 'either you or your head must be off, and that in\nabout half no time! Take your choice!'","caption":"'Now, I give you fair warning,' shouted the Queen, stamping on the\nground as she spoke; 'either you or your head must be off, and that in\nabout half no time! Take your choice!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-517","text":"The Duchess took her choice, and was gone in a moment.","caption":"The Duchess took her choice, and was gone in a moment.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-518","text":"'Let's go on with the game,' the Queen said to Alice; and Alice was\ntoo much frightened to say a word, but slowly followed her back to the\ncroquet-ground.","caption":"'Let's go on with the game,' the Queen said to Alice; and Alice was\ntoo much frightened to say a word, but slowly followed her back to the\ncroquet-ground.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-519","text":"The other guests had taken advantage of the Queen's absence, and were\nresting in the shade: however, the moment they saw her, they hurried\nback to the game, the Queen merely remarking that a moment's delay would\ncost them their lives.","caption":"The other guests had taken advantage of the Queen's absence, and were\nresting in the shade: however, the moment they saw her, they hurried\nback to the game, the Queen merely remarking that a moment's delay would\ncost them their lives.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-52","text":"'I won't indeed!' said Alice, in a great hurry to change the subject of\nconversation. 'Are you–are you fond–of–of dogs?' The Mouse did not\nanswer, so Alice went on eagerly: 'There is such a nice little dog near\nour house I should like to show you! A little bright-eyed terrier, you\nknow, with oh, such long curly brown hair! And it'll fetch things when\nyou throw them, and it'll sit up and beg for its dinner, and all sorts\nof things–I can't remember half of them–and it belongs to a farmer,\nyou know, and he says it's so useful, it's worth a hundred pounds! He\nsays it kills all the rats and–oh dear!' cried Alice in a sorrowful\ntone, 'I'm afraid I've offended it again!' For the Mouse was swimming\naway from her as hard as it could go, and making quite a commotion in\nthe pool as it went.","caption":"'I won't indeed!' said Alice, in a great hurry to change the subject of\nconversation. 'Are you–are you fond–of–of dogs?' The Mouse did not\nanswer, so Alice went on eagerly: 'There is such a nice little dog near\nour house I should like to show you! A little bright-eyed terrier, you\nknow, with oh, such long curly brown hair! And it'll fetch things when\nyou throw them, and it'll sit up and beg for its dinner, and all sorts\nof things–I can't remember half of them–and it belongs to a farmer,\nyou know, and he says it's so useful, it's worth a hundred pounds! He\nsays it kills all the rats and–oh dear!' cried Alice in a sorrowful\ntone, 'I'm afraid I've offended it again!' For the Mouse was swimming\naway from her as hard as it could go, and making quite a commotion in\nthe pool as it went.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-520","text":"All the time they were playing the Queen never left off quarrelling with\nthe other players, and shouting 'Off with his head!' or 'Off with her\nhead!' Those whom she sentenced were taken into custody by the soldiers,\nwho of course had to leave off being arches to do this, so that by\nthe end of half an hour or so there were no arches left, and all the\nplayers, except the King, the Queen, and Alice, were in custody and\nunder sentence of execution.","caption":"All the time they were playing the Queen never left off quarrelling with\nthe other players, and shouting 'Off with his head!' or 'Off with her\nhead!' Those whom she sentenced were taken into custody by the soldiers,\nwho of course had to leave off being arches to do this, so that by\nthe end of half an hour or so there were no arches left, and all the\nplayers, except the King, the Queen, and Alice, were in custody and\nunder sentence of execution.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-521","text":"Then the Queen left off, quite out of breath, and said to Alice, 'Have\nyou seen the Mock Turtle yet?'","caption":"Then the Queen left off, quite out of breath, and said to Alice, 'Have\nyou seen the Mock Turtle yet?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-522","text":"'No,' said Alice. 'I don't even know what a Mock Turtle is.'","caption":"'No,' said Alice. 'I don't even know what a Mock Turtle is.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-523","text":"'It's the thing Mock Turtle Soup is made from,' said the Queen.","caption":"'It's the thing Mock Turtle Soup is made from,' said the Queen.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-524","text":"'I never saw one, or heard of one,' said Alice.","caption":"'I never saw one, or heard of one,' said Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-525","text":"'Come on, then,' said the Queen, 'and he shall tell you his history,'","caption":"'Come on, then,' said the Queen, 'and he shall tell you his history,'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-526","text":"As they walked off together, Alice heard the King say in a low voice,\nto the company generally, 'You are all pardoned.' 'Come, THAT'S a good\nthing!' she said to herself, for she had felt quite unhappy at the\nnumber of executions the Queen had ordered.","caption":"As they walked off together, Alice heard the King say in a low voice,\nto the company generally, 'You are all pardoned.' 'Come, THAT'S a good\nthing!' she said to herself, for she had felt quite unhappy at the\nnumber of executions the Queen had ordered.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-527","text":"They very soon came upon a Gryphon, lying fast asleep in the sun.\n(IF you don't know what a Gryphon is, look at the picture.) 'Up, lazy\nthing!' said the Queen, 'and take this young lady to see the Mock\nTurtle, and to hear his history. I must go back and see after some\nexecutions I have ordered'; and she walked off, leaving Alice alone with\nthe Gryphon. Alice did not quite like the look of the creature, but on\nthe whole she thought it would be quite as safe to stay with it as to go\nafter that savage Queen: so she waited.","caption":"They very soon came upon a Gryphon, lying fast asleep in the sun.\n(IF you don't know what a Gryphon is, look at the picture.) 'Up, lazy\nthing!' said the Queen, 'and take this young lady to see the Mock\nTurtle, and to hear his history. I must go back and see after some\nexecutions I have ordered'; and she walked off, leaving Alice alone with\nthe Gryphon. Alice did not quite like the look of the creature, but on\nthe whole she thought it would be quite as safe to stay with it as to go\nafter that savage Queen: so she waited.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-528","text":"The Gryphon sat up and rubbed its eyes: then it watched the Queen till\nshe was out of sight: then it chuckled. 'What fun!' said the Gryphon,\nhalf to itself, half to Alice.","caption":"The Gryphon sat up and rubbed its eyes: then it watched the Queen till\nshe was out of sight: then it chuckled. 'What fun!' said the Gryphon,\nhalf to itself, half to Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-529","text":"'What IS the fun?' said Alice.","caption":"'What IS the fun?' said Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-53","text":"So she called softly after it, 'Mouse dear! Do come back again, and we\nwon't talk about cats or dogs either, if you don't like them!' When the\nMouse heard this, it turned round and swam slowly back to her: its\nface was quite pale (with passion, Alice thought), and it said in a low\ntrembling voice, 'Let us get to the shore, and then I'll tell you my\nhistory, and you'll understand why it is I hate cats and dogs.'","caption":"So she called softly after it, 'Mouse dear! Do come back again, and we\nwon't talk about cats or dogs either, if you don't like them!' When the\nMouse heard this, it turned round and swam slowly back to her: its\nface was quite pale (with passion, Alice thought), and it said in a low\ntrembling voice, 'Let us get to the shore, and then I'll tell you my\nhistory, and you'll understand why it is I hate cats and dogs.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-530","text":"'Why, SHE,' said the Gryphon. 'It's all her fancy, that: they never\nexecutes nobody, you know. Come on!'","caption":"'Why, SHE,' said the Gryphon. 'It's all her fancy, that: they never\nexecutes nobody, you know. Come on!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-531","text":"'Everybody says &quot;come on!&quot; here,' thought Alice, as she went slowly\nafter it: 'I never was so ordered about in all my life, never!'","caption":"'Everybody says &quot;come on!&quot; here,' thought Alice, as she went slowly\nafter it: 'I never was so ordered about in all my life, never!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-532","text":"They had not gone far before they saw the Mock Turtle in the distance,\nsitting sad and lonely on a little ledge of rock, and, as they came\nnearer, Alice could hear him sighing as if his heart would break. She\npitied him deeply. 'What is his sorrow?' she asked the Gryphon, and the\nGryphon answered, very nearly in the same words as before, 'It's all his\nfancy, that: he hasn't got no sorrow, you know. Come on!'","caption":"They had not gone far before they saw the Mock Turtle in the distance,\nsitting sad and lonely on a little ledge of rock, and, as they came\nnearer, Alice could hear him sighing as if his heart would break. She\npitied him deeply. 'What is his sorrow?' she asked the Gryphon, and the\nGryphon answered, very nearly in the same words as before, 'It's all his\nfancy, that: he hasn't got no sorrow, you know. Come on!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-533","text":"So they went up to the Mock Turtle, who looked at them with large eyes\nfull of tears, but said nothing.","caption":"So they went up to the Mock Turtle, who looked at them with large eyes\nfull of tears, but said nothing.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-534","text":"'This here young lady,' said the Gryphon, 'she wants for to know your\nhistory, she do.'","caption":"'This here young lady,' said the Gryphon, 'she wants for to know your\nhistory, she do.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-535","text":"'I'll tell it her,' said the Mock Turtle in a deep, hollow tone: 'sit\ndown, both of you, and don't speak a word till I've finished.'","caption":"'I'll tell it her,' said the Mock Turtle in a deep, hollow tone: 'sit\ndown, both of you, and don't speak a word till I've finished.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-536","text":"So they sat down, and nobody spoke for some minutes. Alice thought to\nherself, 'I don't see how he can EVEN finish, if he doesn't begin.' But\nshe waited patiently.","caption":"So they sat down, and nobody spoke for some minutes. Alice thought to\nherself, 'I don't see how he can EVEN finish, if he doesn't begin.' But\nshe waited patiently.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-537","text":"'Once,' said the Mock Turtle at last, with a deep sigh, 'I was a real\nTurtle.'","caption":"'Once,' said the Mock Turtle at last, with a deep sigh, 'I was a real\nTurtle.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-538","text":"These words were followed by a very long silence, broken only by an\noccasional exclamation of 'Hjckrrh!' from the Gryphon, and the constant\nheavy sobbing of the Mock Turtle. Alice was very nearly getting up and\nsaying, 'Thank you, sir, for your interesting story,' but she could\nnot help thinking there MUST be more to come, so she sat still and said\nnothing.","caption":"These words were followed by a very long silence, broken only by an\noccasional exclamation of 'Hjckrrh!' from the Gryphon, and the constant\nheavy sobbing of the Mock Turtle. Alice was very nearly getting up and\nsaying, 'Thank you, sir, for your interesting story,' but she could\nnot help thinking there MUST be more to come, so she sat still and said\nnothing.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-539","text":"'When we were little,' the Mock Turtle went on at last, more calmly,\nthough still sobbing a little now and then, 'we went to school in the\nsea. The master was an old Turtle–we used to call him Tortoise–'","caption":"'When we were little,' the Mock Turtle went on at last, more calmly,\nthough still sobbing a little now and then, 'we went to school in the\nsea. The master was an old Turtle–we used to call him Tortoise–'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-54","text":"It was high time to go, for the pool was getting quite crowded with the\nbirds and animals that had fallen into it: there were a Duck and a Dodo,\na Lory and an Eaglet, and several other curious creatures. Alice led the\nway, and the whole party swam to the shore.","caption":"It was high time to go, for the pool was getting quite crowded with the\nbirds and animals that had fallen into it: there were a Duck and a Dodo,\na Lory and an Eaglet, and several other curious creatures. Alice led the\nway, and the whole party swam to the shore.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-540","text":"'Why did you call him Tortoise, if he wasn't one?' Alice asked.","caption":"'Why did you call him Tortoise, if he wasn't one?' Alice asked.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-541","text":"'We called him Tortoise because he taught us,' said the Mock Turtle\nangrily: 'really you are very dull!'","caption":"'We called him Tortoise because he taught us,' said the Mock Turtle\nangrily: 'really you are very dull!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-542","text":"'You ought to be ashamed of yourself for asking such a simple question,'\nadded the Gryphon; and then they both sat silent and looked at poor\nAlice, who felt ready to sink into the earth. At last the Gryphon said\nto the Mock Turtle, 'Drive on, old fellow! Don't be all day about it!'\nand he went on in these words:","caption":"'You ought to be ashamed of yourself for asking such a simple question,'\nadded the Gryphon; and then they both sat silent and looked at poor\nAlice, who felt ready to sink into the earth. At last the Gryphon said\nto the Mock Turtle, 'Drive on, old fellow! Don't be all day about it!'\nand he went on in these words:","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-543","text":"'Yes, we went to school in the sea, though you mayn't believe it–'","caption":"'Yes, we went to school in the sea, though you mayn't believe it–'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-544","text":"'I never said I didn't!' interrupted Alice.","caption":"'I never said I didn't!' interrupted Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-545","text":"'You did,' said the Mock Turtle.","caption":"'You did,' said the Mock Turtle.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-546","text":"'Hold your tongue!' added the Gryphon, before Alice could speak again.\nThe Mock Turtle went on.","caption":"'Hold your tongue!' added the Gryphon, before Alice could speak again.\nThe Mock Turtle went on.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-547","text":"'We had the best of educations–in fact, we went to school every day–'","caption":"'We had the best of educations–in fact, we went to school every day–'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-548","text":"'I'VE been to a day-school, too,' said Alice; 'you needn't be so proud\nas all that.'","caption":"'I'VE been to a day-school, too,' said Alice; 'you needn't be so proud\nas all that.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-549","text":"'With extras?' asked the Mock Turtle a little anxiously.","caption":"'With extras?' asked the Mock Turtle a little anxiously.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-55","text":"\u003Ch3>CHAPTER III. A Caucus-Race and a Long Tale\u003C/h3>","caption":"CHAPTER III. A Caucus-Race and a Long Tale","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-550","text":"'Yes,' said Alice, 'we learned French and music.'","caption":"'Yes,' said Alice, 'we learned French and music.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-551","text":"'And washing?' said the Mock Turtle.","caption":"'And washing?' said the Mock Turtle.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-552","text":"'Certainly not!' said Alice indignantly.","caption":"'Certainly not!' said Alice indignantly.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-553","text":"'Ah! then yours wasn't a really good school,' said the Mock Turtle in\na tone of great relief. 'Now at OURS they had at the end of the bill,\n&quot;French, music, AND WASHING–extra.&quot;'","caption":"'Ah! then yours wasn't a really good school,' said the Mock Turtle in\na tone of great relief. 'Now at OURS they had at the end of the bill,\n&quot;French, music, AND WASHING–extra.&quot;'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-554","text":"'You couldn't have wanted it much,' said Alice; 'living at the bottom of\nthe sea.'","caption":"'You couldn't have wanted it much,' said Alice; 'living at the bottom of\nthe sea.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-555","text":"'I couldn't afford to learn it.' said the Mock Turtle with a sigh. 'I\nonly took the regular course.'","caption":"'I couldn't afford to learn it.' said the Mock Turtle with a sigh. 'I\nonly took the regular course.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-556","text":"'What was that?' inquired Alice.","caption":"'What was that?' inquired Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-557","text":"'Reeling and Writhing, of course, to begin with,' the Mock Turtle\nreplied; 'and then the different branches of Arithmetic–Ambition,\nDistraction, Uglification, and Derision.'","caption":"'Reeling and Writhing, of course, to begin with,' the Mock Turtle\nreplied; 'and then the different branches of Arithmetic–Ambition,\nDistraction, Uglification, and Derision.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-558","text":"'I never heard of &quot;Uglification,&quot;' Alice ventured to say. 'What is it?'","caption":"'I never heard of &quot;Uglification,&quot;' Alice ventured to say. 'What is it?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-559","text":"The Gryphon lifted up both its paws in surprise. 'What! Never heard of\nuglifying!' it exclaimed. 'You know what to beautify is, I suppose?'","caption":"The Gryphon lifted up both its paws in surprise. 'What! Never heard of\nuglifying!' it exclaimed. 'You know what to beautify is, I suppose?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-56","text":"They were indeed a queer-looking party that assembled on the bank–the\nbirds with draggled feathers, the animals with their fur clinging close\nto them, and all dripping wet, cross, and uncomfortable.","caption":"They were indeed a queer-looking party that assembled on the bank–the\nbirds with draggled feathers, the animals with their fur clinging close\nto them, and all dripping wet, cross, and uncomfortable.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-560","text":"'Yes,' said Alice doubtfully: 'it means–to–make–anything–prettier.'","caption":"'Yes,' said Alice doubtfully: 'it means–to–make–anything–prettier.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-561","text":"'Well, then,' the Gryphon went on, 'if you don't know what to uglify is,\nyou ARE a simpleton.'","caption":"'Well, then,' the Gryphon went on, 'if you don't know what to uglify is,\nyou ARE a simpleton.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-562","text":"Alice did not feel encouraged to ask any more questions about it, so she\nturned to the Mock Turtle, and said 'What else had you to learn?'","caption":"Alice did not feel encouraged to ask any more questions about it, so she\nturned to the Mock Turtle, and said 'What else had you to learn?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-563","text":"'Well, there was Mystery,' the Mock Turtle replied, counting off\nthe subjects on his flappers, '–Mystery, ancient and modern, with\nSeaography: then Drawling–the Drawling-master was an old conger-eel,\nthat used to come once a week: HE taught us Drawling, Stretching, and\nFainting in Coils.'","caption":"'Well, there was Mystery,' the Mock Turtle replied, counting off\nthe subjects on his flappers, '–Mystery, ancient and modern, with\nSeaography: then Drawling–the Drawling-master was an old conger-eel,\nthat used to come once a week: HE taught us Drawling, Stretching, and\nFainting in Coils.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-564","text":"'What was THAT like?' said Alice.","caption":"'What was THAT like?' said Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-565","text":"'Well, I can't show it you myself,' the Mock Turtle said: 'I'm too\nstiff. And the Gryphon never learnt it.'","caption":"'Well, I can't show it you myself,' the Mock Turtle said: 'I'm too\nstiff. And the Gryphon never learnt it.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-566","text":"'Hadn't time,' said the Gryphon: 'I went to the Classics master, though.\nHe was an old crab, HE was.'","caption":"'Hadn't time,' said the Gryphon: 'I went to the Classics master, though.\nHe was an old crab, HE was.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-567","text":"'I never went to him,' the Mock Turtle said with a sigh: 'he taught\nLaughing and Grief, they used to say.'","caption":"'I never went to him,' the Mock Turtle said with a sigh: 'he taught\nLaughing and Grief, they used to say.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-568","text":"'So he did, so he did,' said the Gryphon, sighing in his turn; and both\ncreatures hid their faces in their paws.","caption":"'So he did, so he did,' said the Gryphon, sighing in his turn; and both\ncreatures hid their faces in their paws.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-569","text":"'And how many hours a day did you do lessons?' said Alice, in a hurry to\nchange the subject.","caption":"'And how many hours a day did you do lessons?' said Alice, in a hurry to\nchange the subject.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-57","text":"The first question of course was, how to get dry again: they had a\nconsultation about this, and after a few minutes it seemed quite natural\nto Alice to find herself talking familiarly with them, as if she had\nknown them all her life. Indeed, she had quite a long argument with the\nLory, who at last turned sulky, and would only say, 'I am older than\nyou, and must know better'; and this Alice would not allow without\nknowing how old it was, and, as the Lory positively refused to tell its\nage, there was no more to be said.","caption":"The first question of course was, how to get dry again: they had a\nconsultation about this, and after a few minutes it seemed quite natural\nto Alice to find herself talking familiarly with them, as if she had\nknown them all her life. Indeed, she had quite a long argument with the\nLory, who at last turned sulky, and would only say, 'I am older than\nyou, and must know better'; and this Alice would not allow without\nknowing how old it was, and, as the Lory positively refused to tell its\nage, there was no more to be said.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-570","text":"'Ten hours the first day,' said the Mock Turtle: 'nine the next, and so\non.'","caption":"'Ten hours the first day,' said the Mock Turtle: 'nine the next, and so\non.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-571","text":"'What a curious plan!' exclaimed Alice.","caption":"'What a curious plan!' exclaimed Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-572","text":"'That's the reason they're called lessons,' the Gryphon remarked:\n'because they lessen from day to day.'","caption":"'That's the reason they're called lessons,' the Gryphon remarked:\n'because they lessen from day to day.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-573","text":"This was quite a new idea to Alice, and she thought it over a little\nbefore she made her next remark. 'Then the eleventh day must have been a\nholiday?'","caption":"This was quite a new idea to Alice, and she thought it over a little\nbefore she made her next remark. 'Then the eleventh day must have been a\nholiday?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-574","text":"'Of course it was,' said the Mock Turtle.","caption":"'Of course it was,' said the Mock Turtle.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-575","text":"'And how did you manage on the twelfth?' Alice went on eagerly.","caption":"'And how did you manage on the twelfth?' Alice went on eagerly.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-576","text":"'That's enough about lessons,' the Gryphon interrupted in a very decided\ntone: 'tell her something about the games now.'","caption":"'That's enough about lessons,' the Gryphon interrupted in a very decided\ntone: 'tell her something about the games now.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
