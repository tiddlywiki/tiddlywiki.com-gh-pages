{"title":"Alice in Wonderland:-paragraph-739","text":"'Here!' cried Alice, quite forgetting in the flurry of the moment how\nlarge she had grown in the last few minutes, and she jumped up in such\na hurry that she tipped over the jury-box with the edge of her skirt,\nupsetting all the jurymen on to the heads of the crowd below, and there\nthey lay sprawling about, reminding her very much of a globe of goldfish\nshe had accidentally upset the week before.","caption":"'Here!' cried Alice, quite forgetting in the flurry of the moment how\nlarge she had grown in the last few minutes, and she jumped up in such\na hurry that she tipped over the jury-box with the edge of her skirt,\nupsetting all the jurymen on to the heads of the crowd below, and there\nthey lay sprawling about, reminding her very much of a globe of goldfish\nshe had accidentally upset the week before.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-74","text":"First it marked out a race-course, in a sort of circle, ('the exact\nshape doesn't matter,' it said,) and then all the party were placed\nalong the course, here and there. There was no 'One, two, three, and\naway,' but they began running when they liked, and left off when they\nliked, so that it was not easy to know when the race was over. However,\nwhen they had been running half an hour or so, and were quite dry again,\nthe Dodo suddenly called out 'The race is over!' and they all crowded\nround it, panting, and asking, 'But who has won?'","caption":"First it marked out a race-course, in a sort of circle, ('the exact\nshape doesn't matter,' it said,) and then all the party were placed\nalong the course, here and there. There was no 'One, two, three, and\naway,' but they began running when they liked, and left off when they\nliked, so that it was not easy to know when the race was over. However,\nwhen they had been running half an hour or so, and were quite dry again,\nthe Dodo suddenly called out 'The race is over!' and they all crowded\nround it, panting, and asking, 'But who has won?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-740","text":"'Oh, I BEG your pardon!' she exclaimed in a tone of great dismay, and\nbegan picking them up again as quickly as she could, for the accident of\nthe goldfish kept running in her head, and she had a vague sort of idea\nthat they must be collected at once and put back into the jury-box, or\nthey would die.","caption":"'Oh, I BEG your pardon!' she exclaimed in a tone of great dismay, and\nbegan picking them up again as quickly as she could, for the accident of\nthe goldfish kept running in her head, and she had a vague sort of idea\nthat they must be collected at once and put back into the jury-box, or\nthey would die.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-741","text":"'The trial cannot proceed,' said the King in a very grave voice, 'until\nall the jurymen are back in their proper places–ALL,' he repeated with\ngreat emphasis, looking hard at Alice as he said do.","caption":"'The trial cannot proceed,' said the King in a very grave voice, 'until\nall the jurymen are back in their proper places–ALL,' he repeated with\ngreat emphasis, looking hard at Alice as he said do.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-742","text":"Alice looked at the jury-box, and saw that, in her haste, she had put\nthe Lizard in head downwards, and the poor little thing was waving its\ntail about in a melancholy way, being quite unable to move. She soon got\nit out again, and put it right; 'not that it signifies much,' she said\nto herself; 'I should think it would be QUITE as much use in the trial\none way up as the other.'","caption":"Alice looked at the jury-box, and saw that, in her haste, she had put\nthe Lizard in head downwards, and the poor little thing was waving its\ntail about in a melancholy way, being quite unable to move. She soon got\nit out again, and put it right; 'not that it signifies much,' she said\nto herself; 'I should think it would be QUITE as much use in the trial\none way up as the other.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-743","text":"As soon as the jury had a little recovered from the shock of being\nupset, and their slates and pencils had been found and handed back to\nthem, they set to work very diligently to write out a history of the\naccident, all except the Lizard, who seemed too much overcome to do\nanything but sit with its mouth open, gazing up into the roof of the\ncourt.","caption":"As soon as the jury had a little recovered from the shock of being\nupset, and their slates and pencils had been found and handed back to\nthem, they set to work very diligently to write out a history of the\naccident, all except the Lizard, who seemed too much overcome to do\nanything but sit with its mouth open, gazing up into the roof of the\ncourt.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-744","text":"'What do you know about this business?' the King said to Alice.","caption":"'What do you know about this business?' the King said to Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-745","text":"'Nothing,' said Alice.","caption":"'Nothing,' said Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-746","text":"'Nothing WHATEVER?' persisted the King.","caption":"'Nothing WHATEVER?' persisted the King.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-747","text":"'Nothing whatever,' said Alice.","caption":"'Nothing whatever,' said Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-748","text":"'That's very important,' the King said, turning to the jury. They were\njust beginning to write this down on their slates, when the White Rabbit\ninterrupted: 'UNimportant, your Majesty means, of course,' he said in a\nvery respectful tone, but frowning and making faces at him as he spoke.","caption":"'That's very important,' the King said, turning to the jury. They were\njust beginning to write this down on their slates, when the White Rabbit\ninterrupted: 'UNimportant, your Majesty means, of course,' he said in a\nvery respectful tone, but frowning and making faces at him as he spoke.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-749","text":"'UNimportant, of course, I meant,' the King hastily said, and went on\nto himself in an undertone,","caption":"'UNimportant, of course, I meant,' the King hastily said, and went on\nto himself in an undertone,","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-75","text":"This question the Dodo could not answer without a great deal of thought,\nand it sat for a long time with one finger pressed upon its forehead\n(the position in which you usually see Shakespeare, in the pictures\nof him), while the rest waited in silence. At last the Dodo said,\n'EVERYBODY has won, and all must have prizes.'","caption":"This question the Dodo could not answer without a great deal of thought,\nand it sat for a long time with one finger pressed upon its forehead\n(the position in which you usually see Shakespeare, in the pictures\nof him), while the rest waited in silence. At last the Dodo said,\n'EVERYBODY has won, and all must have prizes.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-750","text":"'important–unimportant–unimportant–important–' as if he were trying\nwhich word sounded best.","caption":"'important–unimportant–unimportant–important–' as if he were trying\nwhich word sounded best.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-751","text":"Some of the jury wrote it down 'important,' and some 'unimportant.'\nAlice could see this, as she was near enough to look over their slates;\n'but it doesn't matter a bit,' she thought to herself.","caption":"Some of the jury wrote it down 'important,' and some 'unimportant.'\nAlice could see this, as she was near enough to look over their slates;\n'but it doesn't matter a bit,' she thought to herself.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-752","text":"At this moment the King, who had been for some time busily writing in\nhis note-book, cackled out 'Silence!' and read out from his book, 'Rule\nForty-two. ALL PERSONS MORE THAN A MILE HIGH TO LEAVE THE COURT.'","caption":"At this moment the King, who had been for some time busily writing in\nhis note-book, cackled out 'Silence!' and read out from his book, 'Rule\nForty-two. ALL PERSONS MORE THAN A MILE HIGH TO LEAVE THE COURT.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-753","text":"Everybody looked at Alice.","caption":"Everybody looked at Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-754","text":"'I'M not a mile high,' said Alice.","caption":"'I'M not a mile high,' said Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-755","text":"'You are,' said the King.","caption":"'You are,' said the King.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-756","text":"'Nearly two miles high,' added the Queen.","caption":"'Nearly two miles high,' added the Queen.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-757","text":"'Well, I shan't go, at any rate,' said Alice: 'besides, that's not a\nregular rule: you invented it just now.'","caption":"'Well, I shan't go, at any rate,' said Alice: 'besides, that's not a\nregular rule: you invented it just now.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-758","text":"'It's the oldest rule in the book,' said the King.","caption":"'It's the oldest rule in the book,' said the King.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-759","text":"'Then it ought to be Number One,' said Alice.","caption":"'Then it ought to be Number One,' said Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-76","text":"'But who is to give the prizes?' quite a chorus of voices asked.","caption":"'But who is to give the prizes?' quite a chorus of voices asked.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-760","text":"The King turned pale, and shut his note-book hastily. 'Consider your\nverdict,' he said to the jury, in a low, trembling voice.","caption":"The King turned pale, and shut his note-book hastily. 'Consider your\nverdict,' he said to the jury, in a low, trembling voice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-761","text":"'There's more evidence to come yet, please your Majesty,' said the White\nRabbit, jumping up in a great hurry; 'this paper has just been picked\nup.'","caption":"'There's more evidence to come yet, please your Majesty,' said the White\nRabbit, jumping up in a great hurry; 'this paper has just been picked\nup.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-762","text":"'What's in it?' said the Queen.","caption":"'What's in it?' said the Queen.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-763","text":"'I haven't opened it yet,' said the White Rabbit, 'but it seems to be a\nletter, written by the prisoner to–to somebody.'","caption":"'I haven't opened it yet,' said the White Rabbit, 'but it seems to be a\nletter, written by the prisoner to–to somebody.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-764","text":"'It must have been that,' said the King, 'unless it was written to\nnobody, which isn't usual, you know.'","caption":"'It must have been that,' said the King, 'unless it was written to\nnobody, which isn't usual, you know.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-765","text":"'Who is it directed to?' said one of the jurymen.","caption":"'Who is it directed to?' said one of the jurymen.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-766","text":"'It isn't directed at all,' said the White Rabbit; 'in fact, there's\nnothing written on the OUTSIDE.' He unfolded the paper as he spoke, and\nadded 'It isn't a letter, after all: it's a set of verses.'","caption":"'It isn't directed at all,' said the White Rabbit; 'in fact, there's\nnothing written on the OUTSIDE.' He unfolded the paper as he spoke, and\nadded 'It isn't a letter, after all: it's a set of verses.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-767","text":"'Are they in the prisoner's handwriting?' asked another of the jurymen.","caption":"'Are they in the prisoner's handwriting?' asked another of the jurymen.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-768","text":"'No, they're not,' said the White Rabbit, 'and that's the queerest thing\nabout it.' (The jury all looked puzzled.)","caption":"'No, they're not,' said the White Rabbit, 'and that's the queerest thing\nabout it.' (The jury all looked puzzled.)","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-769","text":"'He must have imitated somebody else's hand,' said the King. (The jury\nall brightened up again.)","caption":"'He must have imitated somebody else's hand,' said the King. (The jury\nall brightened up again.)","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-77","text":"'Why, SHE, of course,' said the Dodo, pointing to Alice with one finger;\nand the whole party at once crowded round her, calling out in a confused\nway, 'Prizes! Prizes!'","caption":"'Why, SHE, of course,' said the Dodo, pointing to Alice with one finger;\nand the whole party at once crowded round her, calling out in a confused\nway, 'Prizes! Prizes!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-770","text":"'Please your Majesty,' said the Knave, 'I didn't write it, and they\ncan't prove I did: there's no name signed at the end.'","caption":"'Please your Majesty,' said the Knave, 'I didn't write it, and they\ncan't prove I did: there's no name signed at the end.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-771","text":"'If you didn't sign it,' said the King, 'that only makes the matter\nworse. You MUST have meant some mischief, or else you'd have signed your\nname like an honest man.'","caption":"'If you didn't sign it,' said the King, 'that only makes the matter\nworse. You MUST have meant some mischief, or else you'd have signed your\nname like an honest man.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-772","text":"There was a general clapping of hands at this: it was the first really\nclever thing the King had said that day.","caption":"There was a general clapping of hands at this: it was the first really\nclever thing the King had said that day.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-773","text":"'That PROVES his guilt,' said the Queen.","caption":"'That PROVES his guilt,' said the Queen.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-774","text":"'It proves nothing of the sort!' said Alice. 'Why, you don't even know\nwhat they're about!'","caption":"'It proves nothing of the sort!' said Alice. 'Why, you don't even know\nwhat they're about!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-775","text":"'Read them,' said the King.","caption":"'Read them,' said the King.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-776","text":"The White Rabbit put on his spectacles. 'Where shall I begin, please\nyour Majesty?' he asked.","caption":"The White Rabbit put on his spectacles. 'Where shall I begin, please\nyour Majesty?' he asked.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-777","text":"'Begin at the beginning,' the King said gravely, 'and go on till you\ncome to the end: then stop.'","caption":"'Begin at the beginning,' the King said gravely, 'and go on till you\ncome to the end: then stop.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-778","text":"These were the verses the White Rabbit read:–","caption":"These were the verses the White Rabbit read:–","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-779","text":"'They told me you had been to her,\n    And mentioned me to him:\n   She gave me a good character,\n    But said I could not swim.","caption":"'They told me you had been to her,\n    And mentioned me to him:\n   She gave me a good character,\n    But said I could not swim.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-78","text":"Alice had no idea what to do, and in despair she put her hand in her\npocket, and pulled out a box of comfits, (luckily the salt water had\nnot got into it), and handed them round as prizes. There was exactly one\na-piece all round.","caption":"Alice had no idea what to do, and in despair she put her hand in her\npocket, and pulled out a box of comfits, (luckily the salt water had\nnot got into it), and handed them round as prizes. There was exactly one\na-piece all round.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-780","text":"He sent them word I had not gone\n    (We know it to be true):\n   If she should push the matter on,\n    What would become of you?","caption":"He sent them word I had not gone\n    (We know it to be true):\n   If she should push the matter on,\n    What would become of you?","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-781","text":"I gave her one, they gave him two,\n    You gave us three or more;\n   They all returned from him to you,\n    Though they were mine before.","caption":"I gave her one, they gave him two,\n    You gave us three or more;\n   They all returned from him to you,\n    Though they were mine before.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-782","text":"If I or she should chance to be\n    Involved in this affair,\n   He trusts to you to set them free,\n    Exactly as we were.","caption":"If I or she should chance to be\n    Involved in this affair,\n   He trusts to you to set them free,\n    Exactly as we were.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-783","text":"My notion was that you had been\n    (Before she had this fit)\n   An obstacle that came between\n    Him, and ourselves, and it.","caption":"My notion was that you had been\n    (Before she had this fit)\n   An obstacle that came between\n    Him, and ourselves, and it.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-784","text":"Don't let him know she liked them best,\n    For this must ever be\n   A secret, kept from all the rest,\n    Between yourself and me.'","caption":"Don't let him know she liked them best,\n    For this must ever be\n   A secret, kept from all the rest,\n    Between yourself and me.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-785","text":"'That's the most important piece of evidence we've heard yet,' said the\nKing, rubbing his hands; 'so now let the jury–'","caption":"'That's the most important piece of evidence we've heard yet,' said the\nKing, rubbing his hands; 'so now let the jury–'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-786","text":"'If any one of them can explain it,' said Alice, (she had grown so large\nin the last few minutes that she wasn't a bit afraid of interrupting\nhim,) 'I'll give him sixpence. _I_ don't believe there's an atom of\nmeaning in it.'","caption":"'If any one of them can explain it,' said Alice, (she had grown so large\nin the last few minutes that she wasn't a bit afraid of interrupting\nhim,) 'I'll give him sixpence. _I_ don't believe there's an atom of\nmeaning in it.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-787","text":"The jury all wrote down on their slates, 'SHE doesn't believe there's an\natom of meaning in it,' but none of them attempted to explain the paper.","caption":"The jury all wrote down on their slates, 'SHE doesn't believe there's an\natom of meaning in it,' but none of them attempted to explain the paper.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-788","text":"'If there's no meaning in it,' said the King, 'that saves a world of\ntrouble, you know, as we needn't try to find any. And yet I don't know,'\nhe went on, spreading out the verses on his knee, and looking at them\nwith one eye; 'I seem to see some meaning in them, after all. &quot;–SAID\nI COULD NOT SWIM–&quot; you can't swim, can you?' he added, turning to the\nKnave.","caption":"'If there's no meaning in it,' said the King, 'that saves a world of\ntrouble, you know, as we needn't try to find any. And yet I don't know,'\nhe went on, spreading out the verses on his knee, and looking at them\nwith one eye; 'I seem to see some meaning in them, after all. &quot;–SAID\nI COULD NOT SWIM–&quot; you can't swim, can you?' he added, turning to the\nKnave.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-789","text":"The Knave shook his head sadly. 'Do I look like it?' he said. (Which he\ncertainly did NOT, being made entirely of cardboard.)","caption":"The Knave shook his head sadly. 'Do I look like it?' he said. (Which he\ncertainly did NOT, being made entirely of cardboard.)","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-79","text":"'But she must have a prize herself, you know,' said the Mouse.","caption":"'But she must have a prize herself, you know,' said the Mouse.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-790","text":"'All right, so far,' said the King, and he went on muttering over\nthe verses to himself: '&quot;WE KNOW IT TO BE TRUE–&quot; that's the jury, of\ncourse–&quot;I GAVE HER ONE, THEY GAVE HIM TWO–&quot; why, that must be what he\ndid with the tarts, you know–'","caption":"'All right, so far,' said the King, and he went on muttering over\nthe verses to himself: '&quot;WE KNOW IT TO BE TRUE–&quot; that's the jury, of\ncourse–&quot;I GAVE HER ONE, THEY GAVE HIM TWO–&quot; why, that must be what he\ndid with the tarts, you know–'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-791","text":"'But, it goes on &quot;THEY ALL RETURNED FROM HIM TO YOU,&quot;' said Alice.","caption":"'But, it goes on &quot;THEY ALL RETURNED FROM HIM TO YOU,&quot;' said Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-792","text":"'Why, there they are!' said the King triumphantly, pointing to the tarts\non the table. 'Nothing can be clearer than THAT. Then again–&quot;BEFORE SHE\nHAD THIS FIT–&quot; you never had fits, my dear, I think?' he said to the\nQueen.","caption":"'Why, there they are!' said the King triumphantly, pointing to the tarts\non the table. 'Nothing can be clearer than THAT. Then again–&quot;BEFORE SHE\nHAD THIS FIT–&quot; you never had fits, my dear, I think?' he said to the\nQueen.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-793","text":"'Never!' said the Queen furiously, throwing an inkstand at the Lizard\nas she spoke. (The unfortunate little Bill had left off writing on his\nslate with one finger, as he found it made no mark; but he now hastily\nbegan again, using the ink, that was trickling down his face, as long as\nit lasted.)","caption":"'Never!' said the Queen furiously, throwing an inkstand at the Lizard\nas she spoke. (The unfortunate little Bill had left off writing on his\nslate with one finger, as he found it made no mark; but he now hastily\nbegan again, using the ink, that was trickling down his face, as long as\nit lasted.)","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-794","text":"'Then the words don't FIT you,' said the King, looking round the court\nwith a smile. There was a dead silence.","caption":"'Then the words don't FIT you,' said the King, looking round the court\nwith a smile. There was a dead silence.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-795","text":"'It's a pun!' the King added in an offended tone, and everybody laughed,\n'Let the jury consider their verdict,' the King said, for about the\ntwentieth time that day.","caption":"'It's a pun!' the King added in an offended tone, and everybody laughed,\n'Let the jury consider their verdict,' the King said, for about the\ntwentieth time that day.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-796","text":"'No, no!' said the Queen. 'Sentence first–verdict afterwards.'","caption":"'No, no!' said the Queen. 'Sentence first–verdict afterwards.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-797","text":"'Stuff and nonsense!' said Alice loudly. 'The idea of having the\nsentence first!'","caption":"'Stuff and nonsense!' said Alice loudly. 'The idea of having the\nsentence first!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-798","text":"'Hold your tongue!' said the Queen, turning purple.","caption":"'Hold your tongue!' said the Queen, turning purple.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-799","text":"'I won't!' said Alice.","caption":"'I won't!' said Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-8","text":"'Well!' thought Alice to herself, 'after such a fall as this, I shall\nthink nothing of tumbling down stairs! How brave they'll all think me at\nhome! Why, I wouldn't say anything about it, even if I fell off the top\nof the house!' (Which was very likely true.)","caption":"'Well!' thought Alice to herself, 'after such a fall as this, I shall\nthink nothing of tumbling down stairs! How brave they'll all think me at\nhome! Why, I wouldn't say anything about it, even if I fell off the top\nof the house!' (Which was very likely true.)","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-80","text":"'Of course,' the Dodo replied very gravely. 'What else have you got in\nyour pocket?' he went on, turning to Alice.","caption":"'Of course,' the Dodo replied very gravely. 'What else have you got in\nyour pocket?' he went on, turning to Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-800","text":"'Off with her head!' the Queen shouted at the top of her voice. Nobody\nmoved.","caption":"'Off with her head!' the Queen shouted at the top of her voice. Nobody\nmoved.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-801","text":"'Who cares for you?' said Alice, (she had grown to her full size by this\ntime.) 'You're nothing but a pack of cards!'","caption":"'Who cares for you?' said Alice, (she had grown to her full size by this\ntime.) 'You're nothing but a pack of cards!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-802","text":"At this the whole pack rose up into the air, and came flying down upon\nher: she gave a little scream, half of fright and half of anger, and\ntried to beat them off, and found herself lying on the bank, with her\nhead in the lap of her sister, who was gently brushing away some dead\nleaves that had fluttered down from the trees upon her face.","caption":"At this the whole pack rose up into the air, and came flying down upon\nher: she gave a little scream, half of fright and half of anger, and\ntried to beat them off, and found herself lying on the bank, with her\nhead in the lap of her sister, who was gently brushing away some dead\nleaves that had fluttered down from the trees upon her face.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-803","text":"'Wake up, Alice dear!' said her sister; 'Why, what a long sleep you've\nhad!'","caption":"'Wake up, Alice dear!' said her sister; 'Why, what a long sleep you've\nhad!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-804","text":"'Oh, I've had such a curious dream!' said Alice, and she told her\nsister, as well as she could remember them, all these strange Adventures\nof hers that you have just been reading about; and when she had\nfinished, her sister kissed her, and said, 'It WAS a curious dream,\ndear, certainly: but now run in to your tea; it's getting late.' So\nAlice got up and ran off, thinking while she ran, as well she might,\nwhat a wonderful dream it had been.","caption":"'Oh, I've had such a curious dream!' said Alice, and she told her\nsister, as well as she could remember them, all these strange Adventures\nof hers that you have just been reading about; and when she had\nfinished, her sister kissed her, and said, 'It WAS a curious dream,\ndear, certainly: but now run in to your tea; it's getting late.' So\nAlice got up and ran off, thinking while she ran, as well she might,\nwhat a wonderful dream it had been.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-805","text":"But her sister sat still just as she left her, leaning her head on her\nhand, watching the setting sun, and thinking of little Alice and all her\nwonderful Adventures, till she too began dreaming after a fashion, and\nthis was her dream:–","caption":"But her sister sat still just as she left her, leaning her head on her\nhand, watching the setting sun, and thinking of little Alice and all her\nwonderful Adventures, till she too began dreaming after a fashion, and\nthis was her dream:–","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-806","text":"First, she dreamed of little Alice herself, and once again the tiny\nhands were clasped upon her knee, and the bright eager eyes were looking\nup into hers–she could hear the very tones of her voice, and see that\nqueer little toss of her head to keep back the wandering hair that\nWOULD always get into her eyes–and still as she listened, or seemed to\nlisten, the whole place around her became alive with the strange creatures\nof her little sister's dream.","caption":"First, she dreamed of little Alice herself, and once again the tiny\nhands were clasped upon her knee, and the bright eager eyes were looking\nup into hers–she could hear the very tones of her voice, and see that\nqueer little toss of her head to keep back the wandering hair that\nWOULD always get into her eyes–and still as she listened, or seemed to\nlisten, the whole place around her became alive with the strange creatures\nof her little sister's dream.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-807","text":"The long grass rustled at her feet as the White Rabbit hurried by–the\nfrightened Mouse splashed his way through the neighbouring pool–she\ncould hear the rattle of the teacups as the March Hare and his friends\nshared their never-ending meal, and the shrill voice of the Queen\nordering off her unfortunate guests to execution–once more the pig-baby\nwas sneezing on the Duchess's knee, while plates and dishes crashed\naround it–once more the shriek of the Gryphon, the squeaking of the\nLizard's slate-pencil, and the choking of the suppressed guinea-pigs,\nfilled the air, mixed up with the distant sobs of the miserable Mock\nTurtle.","caption":"The long grass rustled at her feet as the White Rabbit hurried by–the\nfrightened Mouse splashed his way through the neighbouring pool–she\ncould hear the rattle of the teacups as the March Hare and his friends\nshared their never-ending meal, and the shrill voice of the Queen\nordering off her unfortunate guests to execution–once more the pig-baby\nwas sneezing on the Duchess's knee, while plates and dishes crashed\naround it–once more the shriek of the Gryphon, the squeaking of the\nLizard's slate-pencil, and the choking of the suppressed guinea-pigs,\nfilled the air, mixed up with the distant sobs of the miserable Mock\nTurtle.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-808","text":"So she sat on, with closed eyes, and half believed herself in\nWonderland, though she knew she had but to open them again, and all\nwould change to dull reality–the grass would be only rustling in the\nwind, and the pool rippling to the waving of the reeds–the rattling\nteacups would change to tinkling sheep-bells, and the Queen's shrill\ncries to the voice of the shepherd boy–and the sneeze of the baby, the\nshriek of the Gryphon, and all the other queer noises, would change (she\nknew) to the confused clamour of the busy farm-yard–while the lowing\nof the cattle in the distance would take the place of the Mock Turtle's\nheavy sobs.","caption":"So she sat on, with closed eyes, and half believed herself in\nWonderland, though she knew she had but to open them again, and all\nwould change to dull reality–the grass would be only rustling in the\nwind, and the pool rippling to the waving of the reeds–the rattling\nteacups would change to tinkling sheep-bells, and the Queen's shrill\ncries to the voice of the shepherd boy–and the sneeze of the baby, the\nshriek of the Gryphon, and all the other queer noises, would change (she\nknew) to the confused clamour of the busy farm-yard–while the lowing\nof the cattle in the distance would take the place of the Mock Turtle's\nheavy sobs.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-809","text":"Lastly, she pictured to herself how this same little sister of hers\nwould, in the after-time, be herself a grown woman; and how she would\nkeep, through all her riper years, the simple and loving heart of her\nchildhood: and how she would gather about her other little children, and\nmake THEIR eyes bright and eager with many a strange tale, perhaps even\nwith the dream of Wonderland of long ago: and how she would feel with\nall their simple sorrows, and find a pleasure in all their simple joys,\nremembering her own child-life, and the happy summer days.","caption":"Lastly, she pictured to herself how this same little sister of hers\nwould, in the after-time, be herself a grown woman; and how she would\nkeep, through all her riper years, the simple and loving heart of her\nchildhood: and how she would gather about her other little children, and\nmake THEIR eyes bright and eager with many a strange tale, perhaps even\nwith the dream of Wonderland of long ago: and how she would feel with\nall their simple sorrows, and find a pleasure in all their simple joys,\nremembering her own child-life, and the happy summer days.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-81","text":"'Only a thimble,' said Alice sadly.","caption":"'Only a thimble,' said Alice sadly.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-810","text":"THE END\n","caption":"THE END\n","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-82","text":"'Hand it over here,' said the Dodo.","caption":"'Hand it over here,' said the Dodo.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-83","text":"Then they all crowded round her once more, while the Dodo solemnly\npresented the thimble, saying 'We beg your acceptance of this elegant\nthimble'; and, when it had finished this short speech, they all cheered.","caption":"Then they all crowded round her once more, while the Dodo solemnly\npresented the thimble, saying 'We beg your acceptance of this elegant\nthimble'; and, when it had finished this short speech, they all cheered.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-84","text":"Alice thought the whole thing very absurd, but they all looked so grave\nthat she did not dare to laugh; and, as she could not think of anything\nto say, she simply bowed, and took the thimble, looking as solemn as she\ncould.","caption":"Alice thought the whole thing very absurd, but they all looked so grave\nthat she did not dare to laugh; and, as she could not think of anything\nto say, she simply bowed, and took the thimble, looking as solemn as she\ncould.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-85","text":"The next thing was to eat the comfits: this caused some noise and\nconfusion, as the large birds complained that they could not taste\ntheirs, and the small ones choked and had to be patted on the back.\nHowever, it was over at last, and they sat down again in a ring, and\nbegged the Mouse to tell them something more.","caption":"The next thing was to eat the comfits: this caused some noise and\nconfusion, as the large birds complained that they could not taste\ntheirs, and the small ones choked and had to be patted on the back.\nHowever, it was over at last, and they sat down again in a ring, and\nbegged the Mouse to tell them something more.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-86","text":"'You promised to tell me your history, you know,' said Alice, 'and why\nit is you hate–C and D,' she added in a whisper, half afraid that it\nwould be offended again.","caption":"'You promised to tell me your history, you know,' said Alice, 'and why\nit is you hate–C and D,' she added in a whisper, half afraid that it\nwould be offended again.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-87","text":"'Mine is a long and a sad tale!' said the Mouse, turning to Alice, and\nsighing.","caption":"'Mine is a long and a sad tale!' said the Mouse, turning to Alice, and\nsighing.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-88","text":"'It IS a long tail, certainly,' said Alice, looking down with wonder at\nthe Mouse's tail; 'but why do you call it sad?' And she kept on puzzling\nabout it while the Mouse was speaking, so that her idea of the tale was\nsomething like this:–","caption":"'It IS a long tail, certainly,' said Alice, looking down with wonder at\nthe Mouse's tail; 'but why do you call it sad?' And she kept on puzzling\nabout it while the Mouse was speaking, so that her idea of the tale was\nsomething like this:–","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-89","text":"'Fury said to a\n         mouse, That he\n        met in the\n       house,\n     &quot;Let us\n      both go to\n       law: I will\n        prosecute\n         YOU.–Come,\n           I'll take no\n           denial; We\n          must have a\n        trial: For\n      really this\n     morning I've\n    nothing\n    to do.&quot;\n     Said the\n      mouse to the\n       cur, &quot;Such\n        a trial,\n         dear Sir,\n            With\n          no jury\n        or judge,\n       would be\n      wasting\n      our\n      breath.&quot;\n       &quot;I'll be\n        judge, I'll\n         be jury,&quot;\n            Said\n         cunning\n          old Fury:\n          &quot;I'll\n          try the\n            whole\n            cause,\n              and\n           condemn\n           you\n          to\n           death.&quot;'","caption":"'Fury said to a\n         mouse, That he\n        met in the\n       house,\n     &quot;Let us\n      both go to\n       law: I will\n        prosecute\n         YOU.–Come,\n           I'll take no\n           denial; We\n          must have a\n        trial: For\n      really this\n     morning I've\n    nothing\n    to do.&quot;\n     Said the\n      mouse to the\n       cur, &quot;Such\n        a trial,\n         dear Sir,\n            With\n          no jury\n        or judge,\n       would be\n      wasting\n      our\n      breath.&quot;\n       &quot;I'll be\n        judge, I'll\n         be jury,&quot;\n            Said\n         cunning\n          old Fury:\n          &quot;I'll\n          try the\n            whole\n            cause,\n              and\n           condemn\n           you\n          to\n           death.&quot;'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-9","text":"Down, down, down. Would the fall NEVER come to an end! 'I wonder how\nmany miles I've fallen by this time?' she said aloud. 'I must be getting\nsomewhere near the centre of the earth. Let me see: that would be four\nthousand miles down, I think–' (for, you see, Alice had learnt several\nthings of this sort in her lessons in the schoolroom, and though this\nwas not a VERY good opportunity for showing off her knowledge, as there\nwas no one to listen to her, still it was good practice to say it over)\n'–yes, that's about the right distance–but then I wonder what Latitude\nor Longitude I've got to?' (Alice had no idea what Latitude was, or\nLongitude either, but thought they were nice grand words to say.)","caption":"Down, down, down. Would the fall NEVER come to an end! 'I wonder how\nmany miles I've fallen by this time?' she said aloud. 'I must be getting\nsomewhere near the centre of the earth. Let me see: that would be four\nthousand miles down, I think–' (for, you see, Alice had learnt several\nthings of this sort in her lessons in the schoolroom, and though this\nwas not a VERY good opportunity for showing off her knowledge, as there\nwas no one to listen to her, still it was good practice to say it over)\n'–yes, that's about the right distance–but then I wonder what Latitude\nor Longitude I've got to?' (Alice had no idea what Latitude was, or\nLongitude either, but thought they were nice grand words to say.)","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-90","text":"'You are not attending!' said the Mouse to Alice severely. 'What are you\nthinking of?'","caption":"'You are not attending!' said the Mouse to Alice severely. 'What are you\nthinking of?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-91","text":"'I beg your pardon,' said Alice very humbly: 'you had got to the fifth\nbend, I think?'","caption":"'I beg your pardon,' said Alice very humbly: 'you had got to the fifth\nbend, I think?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-92","text":"'I had NOT!' cried the Mouse, sharply and very angrily.","caption":"'I had NOT!' cried the Mouse, sharply and very angrily.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-93","text":"'A knot!' said Alice, always ready to make herself useful, and looking\nanxiously about her. 'Oh, do let me help to undo it!'","caption":"'A knot!' said Alice, always ready to make herself useful, and looking\nanxiously about her. 'Oh, do let me help to undo it!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-94","text":"'I shall do nothing of the sort,' said the Mouse, getting up and walking\naway. 'You insult me by talking such nonsense!'","caption":"'I shall do nothing of the sort,' said the Mouse, getting up and walking\naway. 'You insult me by talking such nonsense!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-95","text":"'I didn't mean it!' pleaded poor Alice. 'But you're so easily offended,\nyou know!'","caption":"'I didn't mean it!' pleaded poor Alice. 'But you're so easily offended,\nyou know!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-96","text":"The Mouse only growled in reply.","caption":"The Mouse only growled in reply.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-97","text":"'Please come back and finish your story!' Alice called after it; and the\nothers all joined in chorus, 'Yes, please do!' but the Mouse only shook\nits head impatiently, and walked a little quicker.","caption":"'Please come back and finish your story!' Alice called after it; and the\nothers all joined in chorus, 'Yes, please do!' but the Mouse only shook\nits head impatiently, and walked a little quicker.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-98","text":"'What a pity it wouldn't stay!' sighed the Lory, as soon as it was quite\nout of sight; and an old Crab took the opportunity of saying to her\ndaughter 'Ah, my dear! Let this be a lesson to you never to lose\nYOUR temper!' 'Hold your tongue, Ma!' said the young Crab, a little\nsnappishly. 'You're enough to try the patience of an oyster!'","caption":"'What a pity it wouldn't stay!' sighed the Lory, as soon as it was quite\nout of sight; and an old Crab took the opportunity of saying to her\ndaughter 'Ah, my dear! Let this be a lesson to you never to lose\nYOUR temper!' 'Hold your tongue, Ma!' said the young Crab, a little\nsnappishly. 'You're enough to try the patience of an oyster!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-99","text":"'I wish I had our Dinah here, I know I do!' said Alice aloud, addressing\nnobody in particular. 'She'd soon fetch it back!'","caption":"'I wish I had our Dinah here, I know I do!' said Alice aloud, addressing\nnobody in particular. 'She'd soon fetch it back!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
