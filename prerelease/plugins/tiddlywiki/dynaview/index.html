{"title":"Alice in Wonderland:-paragraph-577","text":"\u003Ch3>CHAPTER X. The Lobster Quadrille\u003C/h3>","caption":"CHAPTER X. The Lobster Quadrille","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-578","text":"The Mock Turtle sighed deeply, and drew the back of one flapper across\nhis eyes. He looked at Alice, and tried to speak, but for a minute or\ntwo sobs choked his voice. 'Same as if he had a bone in his throat,'\nsaid the Gryphon: and it set to work shaking him and punching him in\nthe back. At last the Mock Turtle recovered his voice, and, with tears\nrunning down his cheeks, he went on again:–","caption":"The Mock Turtle sighed deeply, and drew the back of one flapper across\nhis eyes. He looked at Alice, and tried to speak, but for a minute or\ntwo sobs choked his voice. 'Same as if he had a bone in his throat,'\nsaid the Gryphon: and it set to work shaking him and punching him in\nthe back. At last the Mock Turtle recovered his voice, and, with tears\nrunning down his cheeks, he went on again:–","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-579","text":"'You may not have lived much under the sea–' ('I haven't,' said\nAlice)–'and perhaps you were never even introduced to a lobster–'\n(Alice began to say 'I once tasted–' but checked herself hastily, and\nsaid 'No, never') '–so you can have no idea what a delightful thing a\nLobster Quadrille is!'","caption":"'You may not have lived much under the sea–' ('I haven't,' said\nAlice)–'and perhaps you were never even introduced to a lobster–'\n(Alice began to say 'I once tasted–' but checked herself hastily, and\nsaid 'No, never') '–so you can have no idea what a delightful thing a\nLobster Quadrille is!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-58","text":"At last the Mouse, who seemed to be a person of authority among them,\ncalled out, 'Sit down, all of you, and listen to me! I'LL soon make you\ndry enough!' They all sat down at once, in a large ring, with the Mouse\nin the middle. Alice kept her eyes anxiously fixed on it, for she felt\nsure she would catch a bad cold if she did not get dry very soon.","caption":"At last the Mouse, who seemed to be a person of authority among them,\ncalled out, 'Sit down, all of you, and listen to me! I'LL soon make you\ndry enough!' They all sat down at once, in a large ring, with the Mouse\nin the middle. Alice kept her eyes anxiously fixed on it, for she felt\nsure she would catch a bad cold if she did not get dry very soon.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-580","text":"'No, indeed,' said Alice. 'What sort of a dance is it?'","caption":"'No, indeed,' said Alice. 'What sort of a dance is it?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-581","text":"'Why,' said the Gryphon, 'you first form into a line along the\nsea-shore–'","caption":"'Why,' said the Gryphon, 'you first form into a line along the\nsea-shore–'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-582","text":"'Two lines!' cried the Mock Turtle. 'Seals, turtles, salmon, and so on;\nthen, when you've cleared all the jelly-fish out of the way–'","caption":"'Two lines!' cried the Mock Turtle. 'Seals, turtles, salmon, and so on;\nthen, when you've cleared all the jelly-fish out of the way–'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-583","text":"'THAT generally takes some time,' interrupted the Gryphon.","caption":"'THAT generally takes some time,' interrupted the Gryphon.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-584","text":"'–you advance twice–'","caption":"'–you advance twice–'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-585","text":"'Each with a lobster as a partner!' cried the Gryphon.","caption":"'Each with a lobster as a partner!' cried the Gryphon.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-586","text":"'Of course,' the Mock Turtle said: 'advance twice, set to partners–'","caption":"'Of course,' the Mock Turtle said: 'advance twice, set to partners–'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-587","text":"'–change lobsters, and retire in same order,' continued the Gryphon.","caption":"'–change lobsters, and retire in same order,' continued the Gryphon.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-588","text":"'Then, you know,' the Mock Turtle went on, 'you throw the–'","caption":"'Then, you know,' the Mock Turtle went on, 'you throw the–'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-589","text":"'The lobsters!' shouted the Gryphon, with a bound into the air.","caption":"'The lobsters!' shouted the Gryphon, with a bound into the air.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-59","text":"'Ahem!' said the Mouse with an important air, 'are you all ready? This\nis the driest thing I know. Silence all round, if you please! &quot;William\nthe Conqueror, whose cause was favoured by the pope, was soon submitted\nto by the English, who wanted leaders, and had been of late much\naccustomed to usurpation and conquest. Edwin and Morcar, the earls of\nMercia and Northumbria–&quot;'","caption":"'Ahem!' said the Mouse with an important air, 'are you all ready? This\nis the driest thing I know. Silence all round, if you please! &quot;William\nthe Conqueror, whose cause was favoured by the pope, was soon submitted\nto by the English, who wanted leaders, and had been of late much\naccustomed to usurpation and conquest. Edwin and Morcar, the earls of\nMercia and Northumbria–&quot;'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-590","text":"'–as far out to sea as you can–'","caption":"'–as far out to sea as you can–'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-591","text":"'Swim after them!' screamed the Gryphon.","caption":"'Swim after them!' screamed the Gryphon.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-592","text":"'Turn a somersault in the sea!' cried the Mock Turtle, capering wildly\nabout.","caption":"'Turn a somersault in the sea!' cried the Mock Turtle, capering wildly\nabout.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-593","text":"'Change lobsters again!' yelled the Gryphon at the top of its voice.","caption":"'Change lobsters again!' yelled the Gryphon at the top of its voice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-594","text":"'Back to land again, and that's all the first figure,' said the Mock\nTurtle, suddenly dropping his voice; and the two creatures, who had been\njumping about like mad things all this time, sat down again very sadly\nand quietly, and looked at Alice.","caption":"'Back to land again, and that's all the first figure,' said the Mock\nTurtle, suddenly dropping his voice; and the two creatures, who had been\njumping about like mad things all this time, sat down again very sadly\nand quietly, and looked at Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-595","text":"'It must be a very pretty dance,' said Alice timidly.","caption":"'It must be a very pretty dance,' said Alice timidly.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-596","text":"'Would you like to see a little of it?' said the Mock Turtle.","caption":"'Would you like to see a little of it?' said the Mock Turtle.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-597","text":"'Very much indeed,' said Alice.","caption":"'Very much indeed,' said Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-598","text":"'Come, let's try the first figure!' said the Mock Turtle to the Gryphon.\n'We can do without lobsters, you know. Which shall sing?'","caption":"'Come, let's try the first figure!' said the Mock Turtle to the Gryphon.\n'We can do without lobsters, you know. Which shall sing?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-599","text":"'Oh, YOU sing,' said the Gryphon. 'I've forgotten the words.'","caption":"'Oh, YOU sing,' said the Gryphon. 'I've forgotten the words.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-6","text":"The rabbit-hole went straight on like a tunnel for some way, and then\ndipped suddenly down, so suddenly that Alice had not a moment to think\nabout stopping herself before she found herself falling down a very deep\nwell.","caption":"The rabbit-hole went straight on like a tunnel for some way, and then\ndipped suddenly down, so suddenly that Alice had not a moment to think\nabout stopping herself before she found herself falling down a very deep\nwell.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-60","text":"'Ugh!' said the Lory, with a shiver.","caption":"'Ugh!' said the Lory, with a shiver.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-600","text":"So they began solemnly dancing round and round Alice, every now and\nthen treading on her toes when they passed too close, and waving their\nforepaws to mark the time, while the Mock Turtle sang this, very slowly\nand sadly:–","caption":"So they began solemnly dancing round and round Alice, every now and\nthen treading on her toes when they passed too close, and waving their\nforepaws to mark the time, while the Mock Turtle sang this, very slowly\nand sadly:–","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-601","text":"'&quot;Will you walk a little faster?&quot; said a whiting to a snail.\n &quot;There's a porpoise close behind us, and he's treading on my tail.","caption":"'&quot;Will you walk a little faster?&quot; said a whiting to a snail.\n &quot;There's a porpoise close behind us, and he's treading on my tail.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-602","text":"See how eagerly the lobsters and the turtles all advance!\n They are waiting on the shingle–will you come and join the dance?","caption":"See how eagerly the lobsters and the turtles all advance!\n They are waiting on the shingle–will you come and join the dance?","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-603","text":"Will you, won't you, will you, won't you, will you join the dance?\n Will you, won't you, will you, won't you, won't you join the dance?","caption":"Will you, won't you, will you, won't you, will you join the dance?\n Will you, won't you, will you, won't you, won't you join the dance?","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-604","text":"&quot;You can really have no notion how delightful it will be\n When they take us up and throw us, with the lobsters, out to sea!&quot;\n But the snail replied &quot;Too far, too far!&quot; and gave a look askance–\n Said he thanked the whiting kindly, but he would not join the dance.","caption":"&quot;You can really have no notion how delightful it will be\n When they take us up and throw us, with the lobsters, out to sea!&quot;\n But the snail replied &quot;Too far, too far!&quot; and gave a look askance–\n Said he thanked the whiting kindly, but he would not join the dance.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-605","text":"Would not, could not, would not, could not, would not join the dance.\n Would not, could not, would not, could not, could not join the dance.","caption":"Would not, could not, would not, could not, would not join the dance.\n Would not, could not, would not, could not, could not join the dance.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-606","text":"'&quot;What matters it how far we go?&quot; his scaly friend replied.\n &quot;There is another shore, you know, upon the other side.\n The further off from England the nearer is to France–\n Then turn not pale, beloved snail, but come and join the dance.","caption":"'&quot;What matters it how far we go?&quot; his scaly friend replied.\n &quot;There is another shore, you know, upon the other side.\n The further off from England the nearer is to France–\n Then turn not pale, beloved snail, but come and join the dance.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-607","text":"Will you, won't you, will you, won't you, will you join the dance?\n Will you, won't you, will you, won't you, won't you join the dance?&quot;'","caption":"Will you, won't you, will you, won't you, will you join the dance?\n Will you, won't you, will you, won't you, won't you join the dance?&quot;'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-608","text":"'Thank you, it's a very interesting dance to watch,' said Alice, feeling\nvery glad that it was over at last: 'and I do so like that curious song\nabout the whiting!'","caption":"'Thank you, it's a very interesting dance to watch,' said Alice, feeling\nvery glad that it was over at last: 'and I do so like that curious song\nabout the whiting!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-609","text":"'Oh, as to the whiting,' said the Mock Turtle, 'they–you've seen them,\nof course?'","caption":"'Oh, as to the whiting,' said the Mock Turtle, 'they–you've seen them,\nof course?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-61","text":"'I beg your pardon!' said the Mouse, frowning, but very politely: 'Did\nyou speak?'","caption":"'I beg your pardon!' said the Mouse, frowning, but very politely: 'Did\nyou speak?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-610","text":"'Yes,' said Alice, 'I've often seen them at dinn–' she checked herself\nhastily.","caption":"'Yes,' said Alice, 'I've often seen them at dinn–' she checked herself\nhastily.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-611","text":"'I don't know where Dinn may be,' said the Mock Turtle, 'but if you've\nseen them so often, of course you know what they're like.'","caption":"'I don't know where Dinn may be,' said the Mock Turtle, 'but if you've\nseen them so often, of course you know what they're like.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-612","text":"'I believe so,' Alice replied thoughtfully. 'They have their tails in\ntheir mouths–and they're all over crumbs.'","caption":"'I believe so,' Alice replied thoughtfully. 'They have their tails in\ntheir mouths–and they're all over crumbs.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-613","text":"'You're wrong about the crumbs,' said the Mock Turtle: 'crumbs would all\nwash off in the sea. But they HAVE their tails in their mouths; and the\nreason is–' here the Mock Turtle yawned and shut his eyes.–'Tell her\nabout the reason and all that,' he said to the Gryphon.","caption":"'You're wrong about the crumbs,' said the Mock Turtle: 'crumbs would all\nwash off in the sea. But they HAVE their tails in their mouths; and the\nreason is–' here the Mock Turtle yawned and shut his eyes.–'Tell her\nabout the reason and all that,' he said to the Gryphon.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-614","text":"'The reason is,' said the Gryphon, 'that they WOULD go with the lobsters\nto the dance. So they got thrown out to sea. So they had to fall a long\nway. So they got their tails fast in their mouths. So they couldn't get\nthem out again. That's all.'","caption":"'The reason is,' said the Gryphon, 'that they WOULD go with the lobsters\nto the dance. So they got thrown out to sea. So they had to fall a long\nway. So they got their tails fast in their mouths. So they couldn't get\nthem out again. That's all.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-615","text":"'Thank you,' said Alice, 'it's very interesting. I never knew so much\nabout a whiting before.'","caption":"'Thank you,' said Alice, 'it's very interesting. I never knew so much\nabout a whiting before.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-616","text":"'I can tell you more than that, if you like,' said the Gryphon. 'Do you\nknow why it's called a whiting?'","caption":"'I can tell you more than that, if you like,' said the Gryphon. 'Do you\nknow why it's called a whiting?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-617","text":"'I never thought about it,' said Alice. 'Why?'","caption":"'I never thought about it,' said Alice. 'Why?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-618","text":"'IT DOES THE BOOTS AND SHOES.' the Gryphon replied very solemnly.","caption":"'IT DOES THE BOOTS AND SHOES.' the Gryphon replied very solemnly.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-619","text":"Alice was thoroughly puzzled. 'Does the boots and shoes!' she repeated\nin a wondering tone.","caption":"Alice was thoroughly puzzled. 'Does the boots and shoes!' she repeated\nin a wondering tone.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-62","text":"'Not I!' said the Lory hastily.","caption":"'Not I!' said the Lory hastily.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-620","text":"'Why, what are YOUR shoes done with?' said the Gryphon. 'I mean, what\nmakes them so shiny?'","caption":"'Why, what are YOUR shoes done with?' said the Gryphon. 'I mean, what\nmakes them so shiny?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-621","text":"Alice looked down at them, and considered a little before she gave her\nanswer. 'They're done with blacking, I believe.'","caption":"Alice looked down at them, and considered a little before she gave her\nanswer. 'They're done with blacking, I believe.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-622","text":"'Boots and shoes under the sea,' the Gryphon went on in a deep voice,\n'are done with a whiting. Now you know.'","caption":"'Boots and shoes under the sea,' the Gryphon went on in a deep voice,\n'are done with a whiting. Now you know.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-623","text":"'And what are they made of?' Alice asked in a tone of great curiosity.","caption":"'And what are they made of?' Alice asked in a tone of great curiosity.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-624","text":"'Soles and eels, of course,' the Gryphon replied rather impatiently:\n'any shrimp could have told you that.'","caption":"'Soles and eels, of course,' the Gryphon replied rather impatiently:\n'any shrimp could have told you that.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-625","text":"'If I'd been the whiting,' said Alice, whose thoughts were still running\non the song, 'I'd have said to the porpoise, &quot;Keep back, please: we\ndon't want YOU with us!&quot;'","caption":"'If I'd been the whiting,' said Alice, whose thoughts were still running\non the song, 'I'd have said to the porpoise, &quot;Keep back, please: we\ndon't want YOU with us!&quot;'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-626","text":"'They were obliged to have him with them,' the Mock Turtle said: 'no\nwise fish would go anywhere without a porpoise.'","caption":"'They were obliged to have him with them,' the Mock Turtle said: 'no\nwise fish would go anywhere without a porpoise.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-627","text":"'Wouldn't it really?' said Alice in a tone of great surprise.","caption":"'Wouldn't it really?' said Alice in a tone of great surprise.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-628","text":"'Of course not,' said the Mock Turtle: 'why, if a fish came to ME, and\ntold me he was going a journey, I should say &quot;With what porpoise?&quot;'","caption":"'Of course not,' said the Mock Turtle: 'why, if a fish came to ME, and\ntold me he was going a journey, I should say &quot;With what porpoise?&quot;'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-629","text":"'Don't you mean &quot;purpose&quot;?' said Alice.","caption":"'Don't you mean &quot;purpose&quot;?' said Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-63","text":"'I thought you did,' said the Mouse. '–I proceed. &quot;Edwin and Morcar,\nthe earls of Mercia and Northumbria, declared for him: and even Stigand,\nthe patriotic archbishop of Canterbury, found it advisable–&quot;'","caption":"'I thought you did,' said the Mouse. '–I proceed. &quot;Edwin and Morcar,\nthe earls of Mercia and Northumbria, declared for him: and even Stigand,\nthe patriotic archbishop of Canterbury, found it advisable–&quot;'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-630","text":"'I mean what I say,' the Mock Turtle replied in an offended tone. And\nthe Gryphon added 'Come, let's hear some of YOUR adventures.'","caption":"'I mean what I say,' the Mock Turtle replied in an offended tone. And\nthe Gryphon added 'Come, let's hear some of YOUR adventures.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-631","text":"'I could tell you my adventures–beginning from this morning,' said\nAlice a little timidly: 'but it's no use going back to yesterday,\nbecause I was a different person then.'","caption":"'I could tell you my adventures–beginning from this morning,' said\nAlice a little timidly: 'but it's no use going back to yesterday,\nbecause I was a different person then.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-632","text":"'Explain all that,' said the Mock Turtle.","caption":"'Explain all that,' said the Mock Turtle.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-633","text":"'No, no! The adventures first,' said the Gryphon in an impatient tone:\n'explanations take such a dreadful time.'","caption":"'No, no! The adventures first,' said the Gryphon in an impatient tone:\n'explanations take such a dreadful time.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-634","text":"So Alice began telling them her adventures from the time when she first\nsaw the White Rabbit. She was a little nervous about it just at first,\nthe two creatures got so close to her, one on each side, and opened\ntheir eyes and mouths so VERY wide, but she gained courage as she went\non. Her listeners were perfectly quiet till she got to the part about\nher repeating 'YOU ARE OLD, FATHER WILLIAM,' to the Caterpillar, and the\nwords all coming different, and then the Mock Turtle drew a long breath,\nand said 'That's very curious.'","caption":"So Alice began telling them her adventures from the time when she first\nsaw the White Rabbit. She was a little nervous about it just at first,\nthe two creatures got so close to her, one on each side, and opened\ntheir eyes and mouths so VERY wide, but she gained courage as she went\non. Her listeners were perfectly quiet till she got to the part about\nher repeating 'YOU ARE OLD, FATHER WILLIAM,' to the Caterpillar, and the\nwords all coming different, and then the Mock Turtle drew a long breath,\nand said 'That's very curious.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-635","text":"'It's all about as curious as it can be,' said the Gryphon.","caption":"'It's all about as curious as it can be,' said the Gryphon.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-636","text":"'It all came different!' the Mock Turtle repeated thoughtfully. 'I\nshould like to hear her try and repeat something now. Tell her to\nbegin.' He looked at the Gryphon as if he thought it had some kind of\nauthority over Alice.","caption":"'It all came different!' the Mock Turtle repeated thoughtfully. 'I\nshould like to hear her try and repeat something now. Tell her to\nbegin.' He looked at the Gryphon as if he thought it had some kind of\nauthority over Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-637","text":"'Stand up and repeat &quot;'TIS THE VOICE OF THE SLUGGARD,&quot;' said the\nGryphon.","caption":"'Stand up and repeat &quot;'TIS THE VOICE OF THE SLUGGARD,&quot;' said the\nGryphon.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-638","text":"'How the creatures order one about, and make one repeat lessons!'\nthought Alice; 'I might as well be at school at once.' However, she\ngot up, and began to repeat it, but her head was so full of the Lobster\nQuadrille, that she hardly knew what she was saying, and the words came\nvery queer indeed:–","caption":"'How the creatures order one about, and make one repeat lessons!'\nthought Alice; 'I might as well be at school at once.' However, she\ngot up, and began to repeat it, but her head was so full of the Lobster\nQuadrille, that she hardly knew what she was saying, and the words came\nvery queer indeed:–","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-639","text":"' 'Tis the voice of the Lobster; I heard him declare,\n  &quot;You have baked me too brown, I must sugar my hair.&quot;\n  As a duck with its eyelids, so he with his nose\n  Trims his belt and his buttons, and turns out his toes.'","caption":"' 'Tis the voice of the Lobster; I heard him declare,\n  &quot;You have baked me too brown, I must sugar my hair.&quot;\n  As a duck with its eyelids, so he with his nose\n  Trims his belt and his buttons, and turns out his toes.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-64","text":"'Found WHAT?' said the Duck.","caption":"'Found WHAT?' said the Duck.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-640","text":"[later editions continued as follows\n  When the sands are all dry, he is gay as a lark,\n  And will talk in contemptuous tones of the Shark,\n  But, when the tide rises and sharks are around,\n  His voice has a timid and tremulous sound.]","caption":"[later editions continued as follows\n  When the sands are all dry, he is gay as a lark,\n  And will talk in contemptuous tones of the Shark,\n  But, when the tide rises and sharks are around,\n  His voice has a timid and tremulous sound.]","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-641","text":"'That's different from what I used to say when I was a child,' said the\nGryphon.","caption":"'That's different from what I used to say when I was a child,' said the\nGryphon.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-642","text":"'Well, I never heard it before,' said the Mock Turtle; 'but it sounds\nuncommon nonsense.'","caption":"'Well, I never heard it before,' said the Mock Turtle; 'but it sounds\nuncommon nonsense.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-643","text":"Alice said nothing; she had sat down with her face in her hands,\nwondering if anything would EVER happen in a natural way again.","caption":"Alice said nothing; she had sat down with her face in her hands,\nwondering if anything would EVER happen in a natural way again.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-644","text":"'I should like to have it explained,' said the Mock Turtle.","caption":"'I should like to have it explained,' said the Mock Turtle.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-645","text":"'She can't explain it,' said the Gryphon hastily. 'Go on with the next\nverse.'","caption":"'She can't explain it,' said the Gryphon hastily. 'Go on with the next\nverse.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-646","text":"'But about his toes?' the Mock Turtle persisted. 'How COULD he turn them\nout with his nose, you know?'","caption":"'But about his toes?' the Mock Turtle persisted. 'How COULD he turn them\nout with his nose, you know?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-647","text":"'It's the first position in dancing.' Alice said; but was dreadfully\npuzzled by the whole thing, and longed to change the subject.","caption":"'It's the first position in dancing.' Alice said; but was dreadfully\npuzzled by the whole thing, and longed to change the subject.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-648","text":"'Go on with the next verse,' the Gryphon repeated impatiently: 'it\nbegins &quot;I passed by his garden.&quot;'","caption":"'Go on with the next verse,' the Gryphon repeated impatiently: 'it\nbegins &quot;I passed by his garden.&quot;'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-649","text":"Alice did not dare to disobey, though she felt sure it would all come\nwrong, and she went on in a trembling voice:–","caption":"Alice did not dare to disobey, though she felt sure it would all come\nwrong, and she went on in a trembling voice:–","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-65","text":"'Found IT,' the Mouse replied rather crossly: 'of course you know what\n&quot;it&quot; means.'","caption":"'Found IT,' the Mouse replied rather crossly: 'of course you know what\n&quot;it&quot; means.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-650","text":"'I passed by his garden, and marked, with one eye,\n  How the Owl and the Panther were sharing a pie–'","caption":"'I passed by his garden, and marked, with one eye,\n  How the Owl and the Panther were sharing a pie–'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-651","text":"[later editions continued as follows\n  The Panther took pie-crust, and gravy, and meat,\n  While the Owl had the dish as its share of the treat.\n  When the pie was all finished, the Owl, as a boon,\n  Was kindly permitted to pocket the spoon:\n  While the Panther received knife and fork with a growl,\n  And concluded the banquet–]","caption":"[later editions continued as follows\n  The Panther took pie-crust, and gravy, and meat,\n  While the Owl had the dish as its share of the treat.\n  When the pie was all finished, the Owl, as a boon,\n  Was kindly permitted to pocket the spoon:\n  While the Panther received knife and fork with a growl,\n  And concluded the banquet–]","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-652","text":"'What IS the use of repeating all that stuff,' the Mock Turtle\ninterrupted, 'if you don't explain it as you go on? It's by far the most\nconfusing thing I ever heard!'","caption":"'What IS the use of repeating all that stuff,' the Mock Turtle\ninterrupted, 'if you don't explain it as you go on? It's by far the most\nconfusing thing I ever heard!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-653","text":"'Yes, I think you'd better leave off,' said the Gryphon: and Alice was\nonly too glad to do so.","caption":"'Yes, I think you'd better leave off,' said the Gryphon: and Alice was\nonly too glad to do so.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-654","text":"'Shall we try another figure of the Lobster Quadrille?' the Gryphon went\non. 'Or would you like the Mock Turtle to sing you a song?'","caption":"'Shall we try another figure of the Lobster Quadrille?' the Gryphon went\non. 'Or would you like the Mock Turtle to sing you a song?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-655","text":"'Oh, a song, please, if the Mock Turtle would be so kind,' Alice\nreplied, so eagerly that the Gryphon said, in a rather offended tone,\n'Hm! No accounting for tastes! Sing her &quot;Turtle Soup,&quot; will you, old\nfellow?'","caption":"'Oh, a song, please, if the Mock Turtle would be so kind,' Alice\nreplied, so eagerly that the Gryphon said, in a rather offended tone,\n'Hm! No accounting for tastes! Sing her &quot;Turtle Soup,&quot; will you, old\nfellow?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-656","text":"The Mock Turtle sighed deeply, and began, in a voice sometimes choked\nwith sobs, to sing this:–","caption":"The Mock Turtle sighed deeply, and began, in a voice sometimes choked\nwith sobs, to sing this:–","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-657","text":"'Beautiful Soup, so rich and green,\n   Waiting in a hot tureen!\n   Who for such dainties would not stoop?\n   Soup of the evening, beautiful Soup!\n   Soup of the evening, beautiful Soup!\n     Beau–ootiful Soo–oop!\n     Beau–ootiful Soo–oop!\n   Soo–oop of the e–e–evening,\n     Beautiful, beautiful Soup!","caption":"'Beautiful Soup, so rich and green,\n   Waiting in a hot tureen!\n   Who for such dainties would not stoop?\n   Soup of the evening, beautiful Soup!\n   Soup of the evening, beautiful Soup!\n     Beau–ootiful Soo–oop!\n     Beau–ootiful Soo–oop!\n   Soo–oop of the e–e–evening,\n     Beautiful, beautiful Soup!","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-658","text":"'Beautiful Soup! Who cares for fish,\n   Game, or any other dish?\n   Who would not give all else for two\n   Pennyworth only of beautiful Soup?\n   Pennyworth only of beautiful Soup?\n     Beau–ootiful Soo–oop!\n     Beau–ootiful Soo–oop!\n   Soo–oop of the e–e–evening,\n     Beautiful, beauti–FUL SOUP!'","caption":"'Beautiful Soup! Who cares for fish,\n   Game, or any other dish?\n   Who would not give all else for two\n   Pennyworth only of beautiful Soup?\n   Pennyworth only of beautiful Soup?\n     Beau–ootiful Soo–oop!\n     Beau–ootiful Soo–oop!\n   Soo–oop of the e–e–evening,\n     Beautiful, beauti–FUL SOUP!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-659","text":"'Chorus again!' cried the Gryphon, and the Mock Turtle had just begun\nto repeat it, when a cry of 'The trial's beginning!' was heard in the\ndistance.","caption":"'Chorus again!' cried the Gryphon, and the Mock Turtle had just begun\nto repeat it, when a cry of 'The trial's beginning!' was heard in the\ndistance.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-66","text":"'I know what &quot;it&quot; means well enough, when I find a thing,' said the\nDuck: 'it's generally a frog or a worm. The question is, what did the\narchbishop find?'","caption":"'I know what &quot;it&quot; means well enough, when I find a thing,' said the\nDuck: 'it's generally a frog or a worm. The question is, what did the\narchbishop find?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-660","text":"'Come on!' cried the Gryphon, and, taking Alice by the hand, it hurried\noff, without waiting for the end of the song.","caption":"'Come on!' cried the Gryphon, and, taking Alice by the hand, it hurried\noff, without waiting for the end of the song.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-661","text":"'What trial is it?' Alice panted as she ran; but the Gryphon only\nanswered 'Come on!' and ran the faster, while more and more faintly\ncame, carried on the breeze that followed them, the melancholy words:–","caption":"'What trial is it?' Alice panted as she ran; but the Gryphon only\nanswered 'Come on!' and ran the faster, while more and more faintly\ncame, carried on the breeze that followed them, the melancholy words:–","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-662","text":"'Soo–oop of the e–e–evening,\n     Beautiful, beautiful Soup!'","caption":"'Soo–oop of the e–e–evening,\n     Beautiful, beautiful Soup!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-663","text":"\u003Ch3>CHAPTER XI. Who Stole the Tarts?\u003C/h3>","caption":"CHAPTER XI. Who Stole the Tarts?","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-664","text":"The King and Queen of Hearts were seated on their throne when they\narrived, with a great crowd assembled about them–all sorts of little\nbirds and beasts, as well as the whole pack of cards: the Knave was\nstanding before them, in chains, with a soldier on each side to guard\nhim; and near the King was the White Rabbit, with a trumpet in one hand,\nand a scroll of parchment in the other. In the very middle of the court\nwas a table, with a large dish of tarts upon it: they looked so good,\nthat it made Alice quite hungry to look at them–'I wish they'd get the\ntrial done,' she thought, 'and hand round the refreshments!' But there\nseemed to be no chance of this, so she began looking at everything about\nher, to pass away the time.","caption":"The King and Queen of Hearts were seated on their throne when they\narrived, with a great crowd assembled about them–all sorts of little\nbirds and beasts, as well as the whole pack of cards: the Knave was\nstanding before them, in chains, with a soldier on each side to guard\nhim; and near the King was the White Rabbit, with a trumpet in one hand,\nand a scroll of parchment in the other. In the very middle of the court\nwas a table, with a large dish of tarts upon it: they looked so good,\nthat it made Alice quite hungry to look at them–'I wish they'd get the\ntrial done,' she thought, 'and hand round the refreshments!' But there\nseemed to be no chance of this, so she began looking at everything about\nher, to pass away the time.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-665","text":"Alice had never been in a court of justice before, but she had read\nabout them in books, and she was quite pleased to find that she knew\nthe name of nearly everything there. 'That's the judge,' she said to\nherself, 'because of his great wig.'","caption":"Alice had never been in a court of justice before, but she had read\nabout them in books, and she was quite pleased to find that she knew\nthe name of nearly everything there. 'That's the judge,' she said to\nherself, 'because of his great wig.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-666","text":"The judge, by the way, was the King; and as he wore his crown over the\nwig, (look at the frontispiece if you want to see how he did it,) he did\nnot look at all comfortable, and it was certainly not becoming.","caption":"The judge, by the way, was the King; and as he wore his crown over the\nwig, (look at the frontispiece if you want to see how he did it,) he did\nnot look at all comfortable, and it was certainly not becoming.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-667","text":"'And that's the jury-box,' thought Alice, 'and those twelve creatures,'\n(she was obliged to say 'creatures,' you see, because some of them were\nanimals, and some were birds,) 'I suppose they are the jurors.' She said\nthis last word two or three times over to herself, being rather proud of\nit: for she thought, and rightly too, that very few little girls of her\nage knew the meaning of it at all. However, 'jury-men' would have done\njust as well.","caption":"'And that's the jury-box,' thought Alice, 'and those twelve creatures,'\n(she was obliged to say 'creatures,' you see, because some of them were\nanimals, and some were birds,) 'I suppose they are the jurors.' She said\nthis last word two or three times over to herself, being rather proud of\nit: for she thought, and rightly too, that very few little girls of her\nage knew the meaning of it at all. However, 'jury-men' would have done\njust as well.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-668","text":"The twelve jurors were all writing very busily on slates. 'What are they\ndoing?' Alice whispered to the Gryphon. 'They can't have anything to put\ndown yet, before the trial's begun.'","caption":"The twelve jurors were all writing very busily on slates. 'What are they\ndoing?' Alice whispered to the Gryphon. 'They can't have anything to put\ndown yet, before the trial's begun.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-669","text":"'They're putting down their names,' the Gryphon whispered in reply, 'for\nfear they should forget them before the end of the trial.'","caption":"'They're putting down their names,' the Gryphon whispered in reply, 'for\nfear they should forget them before the end of the trial.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-67","text":"The Mouse did not notice this question, but hurriedly went on, '&quot;–found\nit advisable to go with Edgar Atheling to meet William and offer him the\ncrown. William's conduct at first was moderate. But the insolence of his\nNormans–&quot; How are you getting on now, my dear?' it continued, turning\nto Alice as it spoke.","caption":"The Mouse did not notice this question, but hurriedly went on, '&quot;–found\nit advisable to go with Edgar Atheling to meet William and offer him the\ncrown. William's conduct at first was moderate. But the insolence of his\nNormans–&quot; How are you getting on now, my dear?' it continued, turning\nto Alice as it spoke.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-670","text":"'Stupid things!' Alice began in a loud, indignant voice, but she stopped\nhastily, for the White Rabbit cried out, 'Silence in the court!' and the\nKing put on his spectacles and looked anxiously round, to make out who\nwas talking.","caption":"'Stupid things!' Alice began in a loud, indignant voice, but she stopped\nhastily, for the White Rabbit cried out, 'Silence in the court!' and the\nKing put on his spectacles and looked anxiously round, to make out who\nwas talking.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-671","text":"Alice could see, as well as if she were looking over their shoulders,\nthat all the jurors were writing down 'stupid things!' on their slates,\nand she could even make out that one of them didn't know how to spell\n'stupid,' and that he had to ask his neighbour to tell him. 'A nice\nmuddle their slates'll be in before the trial's over!' thought Alice.","caption":"Alice could see, as well as if she were looking over their shoulders,\nthat all the jurors were writing down 'stupid things!' on their slates,\nand she could even make out that one of them didn't know how to spell\n'stupid,' and that he had to ask his neighbour to tell him. 'A nice\nmuddle their slates'll be in before the trial's over!' thought Alice.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-672","text":"One of the jurors had a pencil that squeaked. This of course, Alice\ncould not stand, and she went round the court and got behind him, and\nvery soon found an opportunity of taking it away. She did it so quickly\nthat the poor little juror (it was Bill, the Lizard) could not make out\nat all what had become of it; so, after hunting all about for it, he was\nobliged to write with one finger for the rest of the day; and this was\nof very little use, as it left no mark on the slate.","caption":"One of the jurors had a pencil that squeaked. This of course, Alice\ncould not stand, and she went round the court and got behind him, and\nvery soon found an opportunity of taking it away. She did it so quickly\nthat the poor little juror (it was Bill, the Lizard) could not make out\nat all what had become of it; so, after hunting all about for it, he was\nobliged to write with one finger for the rest of the day; and this was\nof very little use, as it left no mark on the slate.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-673","text":"'Herald, read the accusation!' said the King.","caption":"'Herald, read the accusation!' said the King.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-674","text":"On this the White Rabbit blew three blasts on the trumpet, and then\nunrolled the parchment scroll, and read as follows:–","caption":"On this the White Rabbit blew three blasts on the trumpet, and then\nunrolled the parchment scroll, and read as follows:–","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-675","text":"'The Queen of Hearts, she made some tarts,\n      All on a summer day:\n    The Knave of Hearts, he stole those tarts,\n      And took them quite away!'","caption":"'The Queen of Hearts, she made some tarts,\n      All on a summer day:\n    The Knave of Hearts, he stole those tarts,\n      And took them quite away!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-676","text":"'Consider your verdict,' the King said to the jury.","caption":"'Consider your verdict,' the King said to the jury.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-677","text":"'Not yet, not yet!' the Rabbit hastily interrupted. 'There's a great\ndeal to come before that!'","caption":"'Not yet, not yet!' the Rabbit hastily interrupted. 'There's a great\ndeal to come before that!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-678","text":"'Call the first witness,' said the King; and the White Rabbit blew three\nblasts on the trumpet, and called out, 'First witness!'","caption":"'Call the first witness,' said the King; and the White Rabbit blew three\nblasts on the trumpet, and called out, 'First witness!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-679","text":"The first witness was the Hatter. He came in with a teacup in one\nhand and a piece of bread-and-butter in the other. 'I beg pardon, your\nMajesty,' he began, 'for bringing these in: but I hadn't quite finished\nmy tea when I was sent for.'","caption":"The first witness was the Hatter. He came in with a teacup in one\nhand and a piece of bread-and-butter in the other. 'I beg pardon, your\nMajesty,' he began, 'for bringing these in: but I hadn't quite finished\nmy tea when I was sent for.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-68","text":"'As wet as ever,' said Alice in a melancholy tone: 'it doesn't seem to\ndry me at all.'","caption":"'As wet as ever,' said Alice in a melancholy tone: 'it doesn't seem to\ndry me at all.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-680","text":"'You ought to have finished,' said the King. 'When did you begin?'","caption":"'You ought to have finished,' said the King. 'When did you begin?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-681","text":"The Hatter looked at the March Hare, who had followed him into the\ncourt, arm-in-arm with the Dormouse. 'Fourteenth of March, I think it\nwas,' he said.","caption":"The Hatter looked at the March Hare, who had followed him into the\ncourt, arm-in-arm with the Dormouse. 'Fourteenth of March, I think it\nwas,' he said.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-682","text":"'Fifteenth,' said the March Hare.","caption":"'Fifteenth,' said the March Hare.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-683","text":"'Sixteenth,' added the Dormouse.","caption":"'Sixteenth,' added the Dormouse.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-684","text":"'Write that down,' the King said to the jury, and the jury eagerly\nwrote down all three dates on their slates, and then added them up, and\nreduced the answer to shillings and pence.","caption":"'Write that down,' the King said to the jury, and the jury eagerly\nwrote down all three dates on their slates, and then added them up, and\nreduced the answer to shillings and pence.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-685","text":"'Take off your hat,' the King said to the Hatter.","caption":"'Take off your hat,' the King said to the Hatter.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-686","text":"'It isn't mine,' said the Hatter.","caption":"'It isn't mine,' said the Hatter.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-687","text":"'Stolen!' the King exclaimed, turning to the jury, who instantly made a\nmemorandum of the fact.","caption":"'Stolen!' the King exclaimed, turning to the jury, who instantly made a\nmemorandum of the fact.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-688","text":"'I keep them to sell,' the Hatter added as an explanation; 'I've none of\nmy own. I'm a hatter.'","caption":"'I keep them to sell,' the Hatter added as an explanation; 'I've none of\nmy own. I'm a hatter.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-689","text":"Here the Queen put on her spectacles, and began staring at the Hatter,\nwho turned pale and fidgeted.","caption":"Here the Queen put on her spectacles, and began staring at the Hatter,\nwho turned pale and fidgeted.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-69","text":"'In that case,' said the Dodo solemnly, rising to its feet, 'I move\nthat the meeting adjourn, for the immediate adoption of more energetic\nremedies–'","caption":"'In that case,' said the Dodo solemnly, rising to its feet, 'I move\nthat the meeting adjourn, for the immediate adoption of more energetic\nremedies–'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-690","text":"'Give your evidence,' said the King; 'and don't be nervous, or I'll have\nyou executed on the spot.'","caption":"'Give your evidence,' said the King; 'and don't be nervous, or I'll have\nyou executed on the spot.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-691","text":"This did not seem to encourage the witness at all: he kept shifting\nfrom one foot to the other, looking uneasily at the Queen, and in\nhis confusion he bit a large piece out of his teacup instead of the\nbread-and-butter.","caption":"This did not seem to encourage the witness at all: he kept shifting\nfrom one foot to the other, looking uneasily at the Queen, and in\nhis confusion he bit a large piece out of his teacup instead of the\nbread-and-butter.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-692","text":"Just at this moment Alice felt a very curious sensation, which puzzled\nher a good deal until she made out what it was: she was beginning to\ngrow larger again, and she thought at first she would get up and leave\nthe court; but on second thoughts she decided to remain where she was as\nlong as there was room for her.","caption":"Just at this moment Alice felt a very curious sensation, which puzzled\nher a good deal until she made out what it was: she was beginning to\ngrow larger again, and she thought at first she would get up and leave\nthe court; but on second thoughts she decided to remain where she was as\nlong as there was room for her.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-693","text":"'I wish you wouldn't squeeze so.' said the Dormouse, who was sitting\nnext to her. 'I can hardly breathe.'","caption":"'I wish you wouldn't squeeze so.' said the Dormouse, who was sitting\nnext to her. 'I can hardly breathe.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-694","text":"'I can't help it,' said Alice very meekly: 'I'm growing.'","caption":"'I can't help it,' said Alice very meekly: 'I'm growing.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-695","text":"'You've no right to grow here,' said the Dormouse.","caption":"'You've no right to grow here,' said the Dormouse.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-696","text":"'Don't talk nonsense,' said Alice more boldly: 'you know you're growing\ntoo.'","caption":"'Don't talk nonsense,' said Alice more boldly: 'you know you're growing\ntoo.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-697","text":"'Yes, but I grow at a reasonable pace,' said the Dormouse: 'not in that\nridiculous fashion.' And he got up very sulkily and crossed over to the\nother side of the court.","caption":"'Yes, but I grow at a reasonable pace,' said the Dormouse: 'not in that\nridiculous fashion.' And he got up very sulkily and crossed over to the\nother side of the court.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-698","text":"All this time the Queen had never left off staring at the Hatter, and,\njust as the Dormouse crossed the court, she said to one of the officers\nof the court, 'Bring me the list of the singers in the last concert!' on\nwhich the wretched Hatter trembled so, that he shook both his shoes off.","caption":"All this time the Queen had never left off staring at the Hatter, and,\njust as the Dormouse crossed the court, she said to one of the officers\nof the court, 'Bring me the list of the singers in the last concert!' on\nwhich the wretched Hatter trembled so, that he shook both his shoes off.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-699","text":"'Give your evidence,' the King repeated angrily, 'or I'll have you\nexecuted, whether you're nervous or not.'","caption":"'Give your evidence,' the King repeated angrily, 'or I'll have you\nexecuted, whether you're nervous or not.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-7","text":"Either the well was very deep, or she fell very slowly, for she had\nplenty of time as she went down to look about her and to wonder what was\ngoing to happen next. First, she tried to look down and make out what\nshe was coming to, but it was too dark to see anything; then she\nlooked at the sides of the well, and noticed that they were filled with\ncupboards and book-shelves; here and there she saw maps and pictures\nhung upon pegs. She took down a jar from one of the shelves as\nshe passed; it was labelled 'ORANGE MARMALADE', but to her great\ndisappointment it was empty: she did not like to drop the jar for fear\nof killing somebody, so managed to put it into one of the cupboards as\nshe fell past it.","caption":"Either the well was very deep, or she fell very slowly, for she had\nplenty of time as she went down to look about her and to wonder what was\ngoing to happen next. First, she tried to look down and make out what\nshe was coming to, but it was too dark to see anything; then she\nlooked at the sides of the well, and noticed that they were filled with\ncupboards and book-shelves; here and there she saw maps and pictures\nhung upon pegs. She took down a jar from one of the shelves as\nshe passed; it was labelled 'ORANGE MARMALADE', but to her great\ndisappointment it was empty: she did not like to drop the jar for fear\nof killing somebody, so managed to put it into one of the cupboards as\nshe fell past it.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-70","text":"'Speak English!' said the Eaglet. 'I don't know the meaning of half\nthose long words, and, what's more, I don't believe you do either!' And\nthe Eaglet bent down its head to hide a smile: some of the other birds\ntittered audibly.","caption":"'Speak English!' said the Eaglet. 'I don't know the meaning of half\nthose long words, and, what's more, I don't believe you do either!' And\nthe Eaglet bent down its head to hide a smile: some of the other birds\ntittered audibly.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-700","text":"'I'm a poor man, your Majesty,' the Hatter began, in a trembling voice,\n'–and I hadn't begun my tea–not above a week or so–and what with the\nbread-and-butter getting so thin–and the twinkling of the tea–'","caption":"'I'm a poor man, your Majesty,' the Hatter began, in a trembling voice,\n'–and I hadn't begun my tea–not above a week or so–and what with the\nbread-and-butter getting so thin–and the twinkling of the tea–'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-701","text":"'The twinkling of the what?' said the King.","caption":"'The twinkling of the what?' said the King.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-702","text":"'It began with the tea,' the Hatter replied.","caption":"'It began with the tea,' the Hatter replied.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-703","text":"'Of course twinkling begins with a T!' said the King sharply. 'Do you\ntake me for a dunce? Go on!'","caption":"'Of course twinkling begins with a T!' said the King sharply. 'Do you\ntake me for a dunce? Go on!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-704","text":"'I'm a poor man,' the Hatter went on, 'and most things twinkled after\nthat–only the March Hare said–'","caption":"'I'm a poor man,' the Hatter went on, 'and most things twinkled after\nthat–only the March Hare said–'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-705","text":"'I didn't!' the March Hare interrupted in a great hurry.","caption":"'I didn't!' the March Hare interrupted in a great hurry.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-706","text":"'You did!' said the Hatter.","caption":"'You did!' said the Hatter.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-707","text":"'I deny it!' said the March Hare.","caption":"'I deny it!' said the March Hare.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-708","text":"'He denies it,' said the King: 'leave out that part.'","caption":"'He denies it,' said the King: 'leave out that part.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-709","text":"'Well, at any rate, the Dormouse said–' the Hatter went on, looking\nanxiously round to see if he would deny it too: but the Dormouse denied\nnothing, being fast asleep.","caption":"'Well, at any rate, the Dormouse said–' the Hatter went on, looking\nanxiously round to see if he would deny it too: but the Dormouse denied\nnothing, being fast asleep.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-71","text":"'What I was going to say,' said the Dodo in an offended tone, 'was, that\nthe best thing to get us dry would be a Caucus-race.'","caption":"'What I was going to say,' said the Dodo in an offended tone, 'was, that\nthe best thing to get us dry would be a Caucus-race.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-710","text":"'After that,' continued the Hatter, 'I cut some more bread-and-butter–'","caption":"'After that,' continued the Hatter, 'I cut some more bread-and-butter–'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-711","text":"'But what did the Dormouse say?' one of the jury asked.","caption":"'But what did the Dormouse say?' one of the jury asked.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-712","text":"'That I can't remember,' said the Hatter.","caption":"'That I can't remember,' said the Hatter.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-713","text":"'You MUST remember,' remarked the King, 'or I'll have you executed.'","caption":"'You MUST remember,' remarked the King, 'or I'll have you executed.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-714","text":"The miserable Hatter dropped his teacup and bread-and-butter, and went\ndown on one knee. 'I'm a poor man, your Majesty,' he began.","caption":"The miserable Hatter dropped his teacup and bread-and-butter, and went\ndown on one knee. 'I'm a poor man, your Majesty,' he began.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-715","text":"'You're a very poor speaker,' said the King.","caption":"'You're a very poor speaker,' said the King.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-716","text":"Here one of the guinea-pigs cheered, and was immediately suppressed by\nthe officers of the court. (As that is rather a hard word, I will just\nexplain to you how it was done. They had a large canvas bag, which tied\nup at the mouth with strings: into this they slipped the guinea-pig,\nhead first, and then sat upon it.)","caption":"Here one of the guinea-pigs cheered, and was immediately suppressed by\nthe officers of the court. (As that is rather a hard word, I will just\nexplain to you how it was done. They had a large canvas bag, which tied\nup at the mouth with strings: into this they slipped the guinea-pig,\nhead first, and then sat upon it.)","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-717","text":"'I'm glad I've seen that done,' thought Alice. 'I've so often read\nin the newspapers, at the end of trials, &quot;There was some attempts\nat applause, which was immediately suppressed by the officers of the\ncourt,&quot; and I never understood what it meant till now.'","caption":"'I'm glad I've seen that done,' thought Alice. 'I've so often read\nin the newspapers, at the end of trials, &quot;There was some attempts\nat applause, which was immediately suppressed by the officers of the\ncourt,&quot; and I never understood what it meant till now.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-718","text":"'If that's all you know about it, you may stand down,' continued the\nKing.","caption":"'If that's all you know about it, you may stand down,' continued the\nKing.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-719","text":"'I can't go no lower,' said the Hatter: 'I'm on the floor, as it is.'","caption":"'I can't go no lower,' said the Hatter: 'I'm on the floor, as it is.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-72","text":"'What IS a Caucus-race?' said Alice; not that she wanted much to know,\nbut the Dodo had paused as if it thought that SOMEBODY ought to speak,\nand no one else seemed inclined to say anything.","caption":"'What IS a Caucus-race?' said Alice; not that she wanted much to know,\nbut the Dodo had paused as if it thought that SOMEBODY ought to speak,\nand no one else seemed inclined to say anything.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-720","text":"'Then you may SIT down,' the King replied.","caption":"'Then you may SIT down,' the King replied.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-721","text":"Here the other guinea-pig cheered, and was suppressed.","caption":"Here the other guinea-pig cheered, and was suppressed.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-722","text":"'Come, that finished the guinea-pigs!' thought Alice. 'Now we shall get\non better.'","caption":"'Come, that finished the guinea-pigs!' thought Alice. 'Now we shall get\non better.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-723","text":"'I'd rather finish my tea,' said the Hatter, with an anxious look at the\nQueen, who was reading the list of singers.","caption":"'I'd rather finish my tea,' said the Hatter, with an anxious look at the\nQueen, who was reading the list of singers.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-724","text":"'You may go,' said the King, and the Hatter hurriedly left the court,\nwithout even waiting to put his shoes on.","caption":"'You may go,' said the King, and the Hatter hurriedly left the court,\nwithout even waiting to put his shoes on.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-725","text":"'–and just take his head off outside,' the Queen added to one of the\nofficers: but the Hatter was out of sight before the officer could get\nto the door.","caption":"'–and just take his head off outside,' the Queen added to one of the\nofficers: but the Hatter was out of sight before the officer could get\nto the door.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-726","text":"'Call the next witness!' said the King.","caption":"'Call the next witness!' said the King.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-727","text":"The next witness was the Duchess's cook. She carried the pepper-box in\nher hand, and Alice guessed who it was, even before she got into the\ncourt, by the way the people near the door began sneezing all at once.","caption":"The next witness was the Duchess's cook. She carried the pepper-box in\nher hand, and Alice guessed who it was, even before she got into the\ncourt, by the way the people near the door began sneezing all at once.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-728","text":"'Give your evidence,' said the King.","caption":"'Give your evidence,' said the King.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-729","text":"'Shan't,' said the cook.","caption":"'Shan't,' said the cook.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-73","text":"'Why,' said the Dodo, 'the best way to explain it is to do it.' (And, as\nyou might like to try the thing yourself, some winter day, I will tell\nyou how the Dodo managed it.)","caption":"'Why,' said the Dodo, 'the best way to explain it is to do it.' (And, as\nyou might like to try the thing yourself, some winter day, I will tell\nyou how the Dodo managed it.)","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-730","text":"The King looked anxiously at the White Rabbit, who said in a low voice,\n'Your Majesty must cross-examine THIS witness.'","caption":"The King looked anxiously at the White Rabbit, who said in a low voice,\n'Your Majesty must cross-examine THIS witness.'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-731","text":"'Well, if I must, I must,' the King said, with a melancholy air, and,\nafter folding his arms and frowning at the cook till his eyes were\nnearly out of sight, he said in a deep voice, 'What are tarts made of?'","caption":"'Well, if I must, I must,' the King said, with a melancholy air, and,\nafter folding his arms and frowning at the cook till his eyes were\nnearly out of sight, he said in a deep voice, 'What are tarts made of?'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-732","text":"'Pepper, mostly,' said the cook.","caption":"'Pepper, mostly,' said the cook.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-733","text":"'Treacle,' said a sleepy voice behind her.","caption":"'Treacle,' said a sleepy voice behind her.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-734","text":"'Collar that Dormouse,' the Queen shrieked out. 'Behead that Dormouse!\nTurn that Dormouse out of court! Suppress him! Pinch him! Off with his\nwhiskers!'","caption":"'Collar that Dormouse,' the Queen shrieked out. 'Behead that Dormouse!\nTurn that Dormouse out of court! Suppress him! Pinch him! Off with his\nwhiskers!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-735","text":"For some minutes the whole court was in confusion, getting the Dormouse\nturned out, and, by the time they had settled down again, the cook had\ndisappeared.","caption":"For some minutes the whole court was in confusion, getting the Dormouse\nturned out, and, by the time they had settled down again, the cook had\ndisappeared.","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-736","text":"'Never mind!' said the King, with an air of great relief. 'Call the next\nwitness.' And he added in an undertone to the Queen, 'Really, my dear,\nYOU must cross-examine the next witness. It quite makes my forehead\nache!'","caption":"'Never mind!' said the King, with an air of great relief. 'Call the next\nwitness.' And he added in an undertone to the Queen, 'Really, my dear,\nYOU must cross-examine the next witness. It quite makes my forehead\nache!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-737","text":"Alice watched the White Rabbit as he fumbled over the list, feeling very\ncurious to see what the next witness would be like, '–for they haven't\ngot much evidence YET,' she said to herself. Imagine her surprise, when\nthe White Rabbit read out, at the top of his shrill little voice, the\nname 'Alice!'","caption":"Alice watched the White Rabbit as he fumbled over the list, feeling very\ncurious to see what the next witness would be like, '–for they haven't\ngot much evidence YET,' she said to herself. Imagine her surprise, when\nthe White Rabbit read out, at the top of his shrill little voice, the\nname 'Alice!'","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
{"title":"Alice in Wonderland:-paragraph-738","text":"\u003Ch3>CHAPTER XII. Alice's Evidence\u003C/h3>","caption":"CHAPTER XII. Alice's Evidence","tags":"[[Alice in Wonderland:]]","list":"","role":"sliced-html","toc-type":"paragraph"},
