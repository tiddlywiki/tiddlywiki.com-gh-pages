{"title":"$:/_Sidebar/TableOfContents","tags":"$:/tags/SideBar","caption":"Contents","text":"\\define toc-body(tag,sort:\"\",exclude,path)\n\u003Col class=\"tc-toc\">\n  \u003C$list filter=\"\"\"[all[shadows+tiddlers]tag\u003C__tag__>!has[draft.of]$sort$] -[\u003C__tag__>] -[enlist\u003C__exclude__>]\"\"\">\n    \u003C$vars item=\u003C\u003CcurrentTiddler>> path={{{ [\u003C__path__>addsuffix[/]addsuffix\u003C__tag__>] }}} excluded=\"\"\"[enlist\u003C__exclude__>] -[\u003C__tag__>]\"\"\">\n      \u003Cli>\n        \u003C$link to={{{ [enlist{!!story-tiddlers}] }}}>\n\t\t\t\t\t\u003C$list filter=\"[enlist{!!story-tiddlers}addprefix[$:/state/viewtemplate/visibility/]text[2]limit[1]]\" variable=\"listItem\" emptyMessage=\"\"\"\u003Cdiv style=\"display:inline-block;width:4px;height:1em;background-color:transparent;\">\u003C/div>\"\"\">\n\t\t\t\t\t\t\u003Cdiv style=\"display:inline-block;width:4px;height:1em;background-color:red;\">\u003C/div>\n\t\t\t\t\t\u003C/$list>\n          \u003C$view field='caption'>\n\t          \u003C$view field='title'/>\n          \u003C/$view>\n        \u003C/$link>\n        \u003C$macrocall $name=\"toc-body\" tag=\u003C\u003Citem>> sort=\u003C\u003C__sort__>> exclude=\u003C\u003Cexcluded>> path=\u003C\u003Cpath>>/>\n      \u003C/li>\n    \u003C/$vars>\n  \u003C/$list>\n\u003C/ol>\n\\end\n\n\\define toc(tag,sort:\"\")\n\u003C$macrocall $name=\"toc-body\"  tag=\u003C\u003C__tag__>> sort=\u003C\u003C__sort__>> />\n\\end\n\n\u003Cdiv class='tc-table-of-contents'>\n\n\u003C\u003Ctoc \"TableOfContents\">>\n\n\u003C/div>\n"},

{"title":"$:/core/ui/SideBar/Open","tags":"$:/tags/SideBar","caption":"{{$:/language/SideBar/Open/Caption}}","text":"\\define lingo-base() $:/language/CloseAll/\n\n\\define drop-actions()\n\u003C$action-listops $tiddler=\"$:/StoryList\" $subfilter=\"+[insertbefore\u003CactionTiddler>,\u003CcurrentTiddler>]\"/>\n\\end\n\n\u003C$list filter=\"[list[$:/StoryList]]\" history=\"$:/HistoryList\" storyview=\"pop\">\n\u003Cdiv style=\"position: relative;\">\n\u003C$droppable actions=\u003C\u003Cdrop-actions>>>\n\u003Cdiv class=\"tc-droppable-placeholder\">\n&nbsp;\n\u003C/div>\n\u003Cdiv>\n\u003C$button message=\"tm-close-tiddler\" tooltip={{$:/language/Buttons/Close/Hint}} aria-label={{$:/language/Buttons/Close/Caption}} class=\"tc-btn-invisible tc-btn-mini\">&times;\u003C/$button> \u003C$link to={{!!title}}>\u003C$view field=\"title\"/>\u003C/$link>\n\n\u003C$set name=\"state\" value={{{ [[$:/state/viewtemplate/visibility/]addsuffix\u003CcurrentTiddler>] }}}>\n\u003C$reveal type=\"match\" stateTitle=\u003C\u003Cstate>> text=\"0\">\n\u003Cspan style=\"display: inline-block; background: red; color: white; padding: 2px; border-radius: 2px;font-size: 0.5em;line-height: 1;text-shadow: none;font-weight: bold;vertical-align: middle;\">OUT OF VIEW\u003C/span>\n\u003C/$reveal>\n\u003C$reveal type=\"match\" stateTitle=\u003C\u003Cstate>> text=\"1\">\n\u003Cspan style=\"display: inline-block; background: green; color: white; padding: 2px; border-radius: 2px;font-size: 0.5em;line-height: 1;text-shadow: none;font-weight: bold;vertical-align: middle;\">NEAR\u003C/span>\n\u003C/$reveal>\n\u003C$reveal type=\"match\" stateTitle=\u003C\u003Cstate>> text=\"2\">\n\u003Cspan style=\"display: inline-block; background: purple; color: white; padding: 2px; border-radius: 2px;font-size: 0.5em;line-height: 1;text-shadow: none;font-weight: bold;vertical-align: middle;\">VISIBLE\u003C/span>\n\u003C/$reveal>\n\u003C/$set>\n\u003C/div>\n\u003C/$droppable>\n\u003C/div>\n\u003C/$list>\n\u003C$tiddler ti {"title":"$:/core/ui/ViewTemplate","text":"\\whitespace trim\n\\define folded-state()\n$:/state/folded/$(currentTiddler)$\n\\end\n\\define cancel-delete-tiddler-actions(message) \u003C$action-sendmessage $message=\"tm-$message$-tiddler\"/>\n\\import [all[shadows+tiddlers]tag[$:/tags/Macro/View]!is[draft]] [all[shadows+tiddlers]tag[$:/tags/Global/View]!is[draft]]\n\u003C$vars storyTiddler=\u003C\u003CcurrentTiddler>> tiddlerInfoState=\u003C\u003Cqualify \"$:/state/popup/tiddler-info\">>>\n\u003Cdiv data-tiddler-title=\u003C\u003CcurrentTiddler>> data-tags={{!!tags}} class={{{ tc-tiddler-frame tc-tiddler-view-frame [\u003CcurrentTiddler>is[tiddler]then[tc-tiddler-exists]] [\u003CcurrentTiddler>is[missing]!is[shadow]then[tc-tiddler-missing]] [\u003CcurrentTiddler>is[shadow]then[tc-tiddler-exists tc-tiddler-shadow]] [\u003CcurrentTiddler>is[shadow]is[tiddler]then[tc-tiddler-overridden-shadow]] [\u003CcurrentTiddler>is[system]then[tc-tiddler-system]] [{!!class}] [\u003CcurrentTiddler>tags[]encodeuricomponent[]addprefix[tc-tagged-]] +[join[ ]] }}}>\n\u003C$set name=\"state\" value={{{ [[$:/state/viewtemplate/visibility/]addsuffix\u003CcurrentTiddler>] }}}>\n\u003C$reveal stateTitle=\u003C\u003Cstate>> type=\"nomatch\" text=\"\" default=\"\" tag=\"div\">\n\u003Cdiv class=\"tc-dynaview-track-tiddler-when-visible\" data-dynaview-track-tiddler=\u003C\u003Cstate>>>\n\u003C$list filter=\"[all[shadows+tiddlers]tag[$:/tags/ViewTemplate]!has[draft.of]]\" variable=\"listItem\">\n\u003C$transclude tiddler=\u003C\u003ClistItem>>/>\n\u003C/$list>\n\u003C/div>\n\u003C/$reveal>\n\u003C$reveal stateTitle=\u003C\u003Cstate>> type=\"match\" text=\"\" default=\"\" tag=\"div\">\n\u003Cdiv class=\"tc-dynaview-track-tiddler-when-visible\" style=\"min-height: 5em;\" data-dynaview-track-tiddler=\u003C\u003Cstate>>>\n\u003C/div>\n\u003C/$reveal>\n\u003C/$set>\n\u003C/div>\n\u003C/$vars>\n"},

{"title":"$:/plugins/tiddlywiki/dynaview","name":"Dynaview","description":"Dynamic scrolling and zooming effects","list":"readme docs examples config","stability":"STABILITY_2_STABLE","version":"5.3.7-prerelease","plugin-type":"plugin","dependents":"","type":"application/json","text":"{\"tiddlers\":{\"$:/plugins/tiddlywiki/dynaview/above-story\":{\"title\":\"$:/plugins/tiddlywiki/dynaview/above-story\",\"tags\":\"$:/tags/AboveStory-disabled\",\"text\":\"\u003C!-- Remove the \\\"-disabled\\\" part of the tag to cause the currently selected example to appear at the top of the story river. Intended to make it easier to make clean screencaps -->\\n\u003Cdiv style=\\\"height:100em;\\\">\\n\u003C$transclude tiddler={{$:/state/tab--1915807570}} mode=\\\"block\\\"/>\\n\u003C/div>\\n\"},\"$:/config/DynaView/ViewportDimensions\":{\"title\":\"$:/config/DynaView/ViewportDimensions\",\"text\":\"no\"},\"$:/config/DynaView/UpdateAddressBar\":{\"title\":\"$:/config/DynaView/UpdateAddressBar\",\"text\":\"no\"},\"$:/plugins/tiddlywiki/dynaview/config\":{\"title\":\"$:/plugins/tiddlywiki/dynaview/config\",\"caption\":\"Dynaview\",\"tags\":\"$:/tags/ControlPanel/SettingsTab\",\"text\":\"\u003C$checkbox tiddler=\\\"$:/config/DynaView/ViewportDimensions\\\" field=\\\"text\\\" checked=\\\"yes\\\" unchecked=\\\"no\\\" default=\\\"no\\\"> Enable dynamic saving of the viewport [[width|$:/state/DynaView/ViewportDimensions/Width]] and [[height|$:/state/DynaView/ViewportDimensions/Height]]\u003C/$checkbox>\\n\\n\u003C$checkbox tiddler=\\\"$:/config/DynaView/UpdateAddressBar\\\" field=\\\"text\\\" checked=\\\"yes\\\" unchecked=\\\"no\\\" default=\\\"no\\\"> Update address bar while scrolling\u003C/$checkbox>\\n\\n\"},\"$:/plugins/tiddlywiki/dynaview/docs\":{\"title\":\"$:/plugins/tiddlywiki/dynaview/docs\",\"text\":\"! Documentation\\n\\nThe components of this plugin include:\\n\\n* A background task that:\\n** performs specified actions when elements are scrolled into view\\n** updates certain base classes on the `document.body` according to the current zoom level\\n** if enabled in the DynaView config panel - dynamically stores the viewport dimensions in $:/state/viewport/width and $:/state/viewport/height\\n* Pre-configured CSS classes to simplify using those base classes\\n* Usage examples\\n\\n! Scroll Features\\n\\n!! Scroll position preservation during refresh\\n\\nSome recent browsers have a feature called \\\"scroll anchoring\\\" whereby they suppress the apparent scrolling that occurs when elements are inserted or removed above the current viewport. (See https://github.com/WICG/ScrollAnchoring for more details).\\n\\n~DynaView can optionally polyfill this behaviour for older browsers by setting the configuration tiddler $:/config/DynaView/PreserveScrollPosition to `yes`.\\n\\n!! Startup scroll position restoration\\n\\nOptionally, ~DynaView can store the current scroll position in local storage and restore it upon startup. Set the configuration tiddler $:/config/DynaView/RestoreScrollPositionAtStartup to `yes`.\\n\\nNote that it is not recommended to use this setting at the same time as the \\\"UpdateAddressBar\\\" option.\\n\\n!! Visibility tracking\\n\\nThe background task detects when elements with the class `tc-dynaview-track-tiddler-when-visible` scroll in and out of view. It tracks four different states:\\n\\n* ''Blank/missing'' -- The element has not yet been scrolled into view\\n* ''0'' -- The element has been scrolled into view, but subsequently scrolled out of view\\n* ''1'' -- The element is near the viewport\\n* ''2'' -- The element is partially or wholly within the viewport\\n\\nThe processing applied to each element is as follows:\\n\\n* If the element is partially or wholly within the viewport then set the state to \\\"2\\\"\\n* If the element is near the viewport then set the state to \\\"1\\\"\\n* If the element is fully outside the viewport then only set the state to \\\"0\\\" if it is currently unset (ie blank/missing)\\n\\nAttributes on the tracked element specify the following parameters:\\n\\n* ''data-dynaview-track-tiddler'' -- specifies the tiddler in which the element tracking state will be stored\\n\\n!! Update address bar when scrolling\\n\\nIf the configuration tiddler $:/config/DynaView/UpdateAddressBar is set to `yes` the background task detects the tiddler at the top of the viewport and sets the address bar location hash to the title of that tiddler.\\n\\nNote that it is not recommended to use this setting at the same time as the \\\"RestoreScrollPositionAtStartup\\\" option.\\n\\n! Viewport Size Features\\n\\n!! Resize Tracking\\n\\nSome widgets require re-rendering or refreshing if the size of the viewport changes. This can be accomplished using \\\"resize counting\\\" in two steps:\\n\\n* Ensure that a DOM element with the class `tc-dynaview-request-refresh-on-resize` is present in the DOM to enable resize counting\\n* Have the widget check for changes to the tiddler $:/state/DynaView/ViewportDimensions/ResizeCount to detect viewport resizes\\n\\n!! Viewport Size Tracking\\n\\nThe background task can optionally dynamically update a pair of state tiddlers with the dimensions of the browser viewport.\\n\\n* Set the configuration tiddler $:/config/DynaView/ViewportDimensions to the text \\\"yes\\\" to enable this feature\\n* The viewport dimensions can be found in $:/state/DynaView/ViewportDimensions/Width and $:/state/DynaView/ViewportDimensions/Height\\n\\n! Zoom Features\\n\\n!! Document Body Zoom Classes\\n\\nThe background task sets the following classes on `document.body` according to the current zoom level.\\n\\n|!Class |!Description |\\n|`tc-dynaview-zoom-factor-1` |Set when the zoom level is less than 2.00 |\\n|`tc-dynaview-zoom-factor-2` |Set when the zoom level is greater than 2.00 and less than 3.00 |\\n|`tc-dynaview-zoom-factor-3` |Set when the zoom level is greater than 3.00 and less than 4.00 |\\n|`tc-dynaview-zoom-factor-4` |Set when the zoom level is greater than 4.00 |\\n|`tc-dynaview-zoom-factor-1-and-above` |Set when the zoom level is greater than or equal to 1.00 |\\n|`tc-dynaview-zoom-factor-1a-and-above` |Set when the zoom level is greater than or equal to 1.14 |\\n|`tc-dynaview-zoom-factor-1b-and-above` |Set when the zoom level is greater than or equal to 1.33 |\\n|`tc-dynaview-zoom-factor-1c-and-above` |Set when the zoom level is greater than or equal to 1.60 |\\n|`tc-dynaview-zoom-factor-2-and-above` |Set when the zoom level is greater than or equal to 2.00 |\\n|`tc-dynaview-zoom-factor-2a-and-above` |Set when the zoom level is greater than or equal to 2.66 |\\n|`tc-dynaview-zoom-factor-3-and-above` |Set when the zoom level is greater than or equal to 3.00 |\\n|`tc-dynaview-zoom-factor-4-and-above` |Set when the zoom level is greater than or equal to 4.00 |\\n\\n!! Pre-configured Classes\\n\\nThese classes can be used on any element to control its visibility at different zoom levels.\\n\\n|!Class |!Description |\\n|`tc-dynaview-zoom-visible-1-and-above` |Visible when the zoom level is 1.00 or more |\\n|`tc-dynaview-zoom-visible-1a-and-above` |Visible when the zoom level is 1.14 or more |\\n|`tc-dynaview-zoom-visible-1b-and-above` |Visible when the zoom level is 1.33 or more |\\n|`tc-dynaview-zoom-visible-1c-and-above` |Visible when the zoom level is 1.60 or more |\\n|`tc-dynaview-zoom-visible-2-and-above` |Visible when the zoom level is 2.00 or more |\\n|`tc-dynaview-zoom-visible-2a-and-above` |Visible when the zoom level is 2.66 or more |\\n|`tc-dynaview-zoom-visible-3-and-above` |Visible when the zoom level is 3.00 or more |\\n|`tc-dynaview-zoom-visible-4-and-above` |Visible when the zoom level is 4.00 or more |\\n|`tc-dynaview-zoom-visible-1` |Visible when the zoom level is less than 2.00 |\\n|`tc-dynaview-zoom-visible-2` |Visible when the zoom level is greater than or equal to 2.00 and less than 3.00 |\\n|`tc-dynaview-zoom-visible-3` |Visible when the zoom level is greater than or equal to 3.00 and less than 4.00 |\\n|`tc-dynaview-zoom-visible-4` |Visible when the zoom level is greater than or equal to 4.00 |\\n\"},\"$:/plugins/tiddlywiki/dynaview/dynaview.js\":{\"title\":\"$:/plugins/tiddlywiki/dynaview/dynaview.js\",\"text\":\"/*\\\\\\ntitle: $:/plugins/tiddlywiki/dynaview/dynaview.js\\ntype: application/javascript\\nmodule-type: startup\\n\\nZoom everything\\n\\n\\\\*/\\n\\n\\\"use strict\\\";\\n\\n// Export name and synchronous status\\nexports.name = \\\"dynaview\\\";\\nexports.platforms = [\\\"browser\\\"];\\nexports.before = [\\\"story\\\"];\\nexports.synchronous = true;\\n\\nvar STATE_OUT_OF_VIEW = \\\"0\\\",\\n\\tSTATE_NEAR_VIEW = \\\"1\\\",\\n\\tSTATE_IN_VIEW = \\\"2\\\";\\n\\nvar isWaitingForAnimationFrame = 0, // Bitmask:\\n\\tANIM_FRAME_CAUSED_BY_LOAD = 1, // Animation frame was requested because of page load\\n\\tANIM_FRAME_CAUSED_BY_SCROLL = 2, // Animation frame was requested because of page scroll\\n\\tANIM_FRAME_CAUSED_BY_RESIZE = 4; // Animation frame was requested because of window resize\\n\\nvar LOCAL_STORAGE_KEY_PREFIX = \\\"tw5-dynaview-scroll-position#\\\";\\n\\nvar hasRestoredScrollPosition = false;\\n\\nvar localStorageHasFailed = false;\\n\\nexports.startup = function() {\\n\\tvar topmost = null, lastScrollY;\\n\\t$tw.boot.disableStartupNavigation = true;\\n\\twindow.addEventListener(\\\"load\\\",onLoad,false);\\n\\twindow.addEventListener(\\\"scroll\\\",onScroll,false);\\n\\twindow.addEventListener(\\\"resize\\\",onResize,false);\\n\\t$tw.hooks.addHook(\\\"th-page-refreshing\\\",function() {\\n\\t\\tif(!hasRestoredScrollPosition) {\\n\\t\\t\\ttopmost = restoreScrollPosition();\\n\\t\\t} else if(shouldPreserveScrollPosition()) {\\n\\t\\t\\ttopmost = findTopmostTiddler();\\n\\t\\t}\\n\\t\\tlastScrollY = window.scrollY;\\n\\t});\\n\\t$tw.hooks.addHook(\\\"th-page-refreshed\\\",function() {\\n\\t\\tif(lastScrollY === window.scrollY) { // Don't do scroll anchoring if the scroll position got changed\\n\\t\\t\\tif(shouldPreserveScrollPosition() || !hasRestoredScrollPosition) {\\n\\t\\t\\t\\tscrollToTiddler(topmost);\\n\\t\\t\\t\\thasRestoredScrollPosition = true;\\n\\t\\t\\t}\\n\\t\\t}\\n\\t\\tupdateAddressBar();\\n\\t\\tsaveScrollPosition();\\n\\t\\tcheckVisibility();\\n\\t\\tsaveViewportDimensions();\\n\\t});\\n};\\n\\nfunction onLoad(event) {\\n\\tif(!isWaitingForAnimationFrame) {\\n\\t\\twindow.requestAnimationFrame(worker);\\n\\t}\\n\\tisWaitingForAnimationFrame |= ANIM_FRAME_CAUSED_BY_LOAD;\\n}\\n\\nfunction onScroll(event) {\\n\\tif(!isWaitingForAnimationFrame) {\\n\\t\\twindow.requestAnimationFrame(worker);\\n\\t}\\n\\tisWaitingForAnimationFrame |= ANIM_FRAME_CAUSED_BY_SCROLL;\\n}\\n\\nfunction onResize(event) {\\n\\tif(!isWaitingForAnimationFrame) {\\n\\t\\twindow.requestAnimationFrame(worker);\\n\\t}\\n\\tisWaitingForAnimationFrame |= ANIM_FRAME_CAUSED_BY_RESIZE;\\n}\\n\\nfunction worker() {\\n\\tif(isWaitingForAnimationFrame & (ANIM_FRAME_CAUSED_BY_RESIZE | ANIM_FRAME_CAUSED_BY_LOAD)) {\\n\\t\\tsaveViewportDimensions();\\n\\t}\\n\\tsetZoomClasses();\\n\\tupdateAddressBar();\\n\\tsaveScrollPosition();\\n\\tcheckVisibility();\\n\\tisWaitingForAnimationFrame = 0;\\n}\\n\\nfunction setZoomClasses() {\\n\\tvar zoomFactor = document.body.scrollWidth / window.innerWidth,\\n\\t\\tclassList = document.body.classList;\\n\\tclassList.add(\\\"tc-dynaview\\\");\\n\\tclassList.toggle(\\\"tc-dynaview-zoom-factor-1\\\",zoomFactor \u003C= 2);\\n\\tclassList.toggle(\\\"tc-dynaview-zoom-factor-1-and-above\\\",zoomFactor >= 1);\\n\\tclassList.toggle(\\\"tc-dynaview-zoom-factor-1a-and-above\\\",zoomFactor >= 1.14);\\n\\tclassList.toggle(\\\"tc-dynaview-zoom-factor-1b-and-above\\\",zoomFactor >= 1.33);\\n\\tclassList.toggle(\\\"tc-dynaview-zoom-factor-1c-and-above\\\",zoomFactor >= 1.6);\\n\\tclassList.toggle(\\\"tc-dynaview-zoom-factor-2\\\",zoomFactor >= 2 && zoomFactor \u003C= 3);\\n\\tclassList.toggle(\\\"tc-dynaview-zoom-factor-2-and-above\\\",zoomFactor >= 2);\\n\\tclassList.toggle(\\\"tc-dynaview-zoom-factor-2a-and-above\\\",zoomFactor >= 2.66);\\n\\tclassList.toggle(\\\"tc-dynaview-zoom-factor-3\\\",zoomFactor >= 3 && zoomFactor \u003C= 4);\\n\\tclassList.toggle(\\\"tc-dynaview-zoom-factor-3-and-above\\\",zoomFactor >= 3);\\n\\tclassList.toggle(\\\"tc-dynaview-zoom-factor-4\\\",zoomFactor >= 4);\\n\\tclassList.toggle(\\\"tc-dynaview-zoom-factor-4-and-above\\\",zoomFactor >= 4);\\n}\\n\\nfunction checkVisibility() {\\n\\tvar elements = document.querySelectorAll(\\\".tc-dynaview-track-tiddler-when-visible\\\");\\n\\t$tw.utils.each(elements,function(element) {\\n\\t\\t// Calculate whether the element is visible\\n\\t\\tvar elementRect = element.getBoundingClientRect(),\\n\\t\\t\\tviewportWidth = window.innerWidth || document.documentElement.clientWidth,\\n\\t\\t\\tviewportHeight = window.innerHeight || document.documentElement.clientHeight,\\n\\t\\t\\tviewportRect = {\\n\\t\\t\\t\\tleft: 0,\\n\\t\\t\\t\\tright: viewportWidth,\\n\\t\\t\\t\\ttop: 0,\\n\\t\\t\\t\\tbottom: viewportHeight\\n\\t\\t\\t},\\n\\t\\t\\ttitle = element.getAttribute(\\\"data-dynaview-track-tiddler\\\");\\n\\t\\tif(title) {\\n\\t\\t\\tvar currValue = $tw.wiki.getTiddlerText(title),\\n\\t\\t\\t\\tnewValue = currValue;\\n\\t\\t\\t// Within viewport\\n\\t\\t\\tif(!(elementRect.left > viewportRect.right || \\n\\t\\t\\t\\t\\t\\t\\t\\telementRect.right \u003C viewportRect.left || \\n\\t\\t\\t\\t\\t\\t\\t\\telementRect.top > viewportRect.bottom ||\\n\\t\\t\\t\\t\\t\\t\\t\\telementRect.bottom \u003C viewportRect.top)) {\\n\\t\\t\\t\\tnewValue = STATE_IN_VIEW;\\n\\t\\t\\t// Near viewport\\n\\t\\t\\t} else if(!(elementRect.left > (viewportRect.right + viewportWidth) || \\n\\t\\t\\t\\t\\t\\t\\t\\telementRect.right \u003C (viewportRect.left - viewportWidth) || \\n\\t\\t\\t\\t\\t\\t\\t\\telementRect.top > (viewportRect.bottom + viewportHeight) ||\\n\\t\\t\\t\\t\\t\\t\\t\\telementRect.bottom \u003C (viewportRect.top - viewportHeight))) {\\n\\t\\t\\t\\tnewValue = STATE_NEAR_VIEW;\\n\\t\\t\\t} else {\\n\\t\\t\\t\\t// Outside viewport\\n\\t\\t\\t\\tif(currValue !== undefined) {\\n\\t\\t\\t\\t\\tnewValue = STATE_OUT_OF_VIEW;\\n\\t\\t\\t\\t}\\n\\t\\t\\t}\\n\\t\\t\\tif(newValue !== currValue) {\\n\\t\\t\\t\\t$tw.wiki.addTiddler(new $tw.Tiddler({title: title, text: newValue}));\\t\\t\\t\\t\\n\\t\\t\\t}\\n\\t\\t}\\n\\t});\\n}\\n\\nfunction updateAddressBar() {\\n\\tif($tw.wiki.getTiddlerText(\\\"$:/config/DynaView/UpdateAddressBar\\\") === \\\"yes\\\") {\\n\\t\\tvar top = findTopmostTiddler();\\n\\t\\tif(top.element) {\\n\\t\\t\\tvar hash = \\\"#\\\" + encodeURIComponent(top.title) + \\\":\\\" + encodeURIComponent(\\\"[list[$:/StoryList]]\\\");\\n\\t\\t\\tif(title && $tw.locationHash !== hash) {\\n\\t\\t\\t\\t$tw.locationHash = hash;\\n\\t\\t\\t\\twindow.location.hash = hash;\\t\\t\\t\\n\\t\\t\\t}\\n\\t\\t}\\n\\t}\\n}\\n\\nfunction saveScrollPosition() {\\n\\tif(!localStorageHasFailed) {\\n\\t\\tif(hasRestoredScrollPosition && $tw.wiki.getTiddlerText(\\\"$:/config/DynaView/RestoreScrollPositionAtStartup\\\") === \\\"yes\\\") {\\n\\t\\t\\tvar top = findTopmostTiddler();\\n\\t\\t\\tif(top.element) {\\n\\t\\t\\t\\ttry {\\n\\t\\t\\t\\t\\twindow.localStorage.setItem(LOCAL_STORAGE_KEY_PREFIX + window.location.pathname,JSON.stringify({\\n\\t\\t\\t\\t\\t\\ttitle: top.title,\\n\\t\\t\\t\\t\\t\\toffset: top.offset\\n\\t\\t\\t\\t\\t}));\\n\\t\\t\\t\\t} catch(e) {\\n\\t\\t\\t\\t\\tlocalStorageHasFailed = true;\\n\\t\\t\\t\\t}\\n\\t\\t\\t}\\n\\t\\t}\\n\\t}\\n}\\n\\nfunction restoreScrollPosition() {\\n\\tvar json;\\n\\tif(!localStorageHasFailed) {\\n\\t\\ttry {\\n\\t\\t\\tjson = JSON.parse(window.localStorage.getItem(LOCAL_STORAGE_KEY_PREFIX + window.location.pathname));\\n\\t\\t} catch(e) {\\n\\t\\t\\tlocalStorageHasFailed = true;\\n\\t\\t};\\t\\t\\n\\t}\\n\\treturn json;\\n}\\n\\n/*\\ntiddlerDetails: {title: \u003Ctitle of tiddler to scroll to>, offset: \u003Coffset in pixels from the top of the tiddler>}\\n*/\\nfunction scrollToTiddler(tiddlerDetails) {\\n\\tif(!$tw.pageScroller.isScrolling() && tiddlerDetails) {\\n\\t\\tvar elements = document.querySelectorAll(\\\".tc-tiddler-frame[data-tiddler-title]\\\"),\\n\\t\\t\\ttopmostTiddlerElement = null;\\n\\t\\t$tw.utils.each(elements,function(element) {\\n\\t\\t\\tif(element.getAttribute(\\\"data-tiddler-title\\\") === tiddlerDetails.title) {\\n\\t\\t\\t\\ttopmostTiddlerElement = element;\\n\\t\\t\\t}\\n\\t\\t});\\n\\t\\tif(topmostTiddlerElement) {\\n\\t\\t\\tvar rect = topmostTiddlerElement.getBoundingClientRect(),\\n\\t\\t\\t\\tscrollY = Math.round(window.scrollY + rect.top + tiddlerDetails.offset);\\n\\t\\t\\tif(scrollY !== window.scrollY) {\\n\\t\\t\\t\\twindow.scrollTo(window.scrollX,scrollY);\\t\\t\\t\\t\\t\\n\\t\\t\\t}\\n\\t\\t}\\n\\t}\\n}\\n\\nfunction shouldPreserveScrollPosition() {\\n\\treturn $tw.wiki.getTiddlerText(\\\"$:/config/DynaView/PreserveScrollPosition\\\") === \\\"yes\\\";\\n}\\n\\nfunction findTopmostTiddler() {\\n\\tvar elements = document.querySelectorAll(\\\".tc-tiddler-frame[data-tiddler-title]\\\"),\\n\\t\\ttopmostElement = null,\\n\\t\\ttopmostElementTop = 1 * 1000 * 1000;\\n\\t$tw.utils.each(elements,function(element) {\\n\\t\\t// Check if the element is visible\\n\\t\\tvar elementRect = element.getBoundingClientRect();\\n\\t\\tif((elementRect.top \u003C topmostElementTop) && (elementRect.bottom > 0)) {\\n\\t\\t\\ttopmostElement = element;\\n\\t\\t\\ttopmostElementTop = elementRect.top;\\n\\t\\t}\\n\\t});\\n\\treturn {\\n\\t\\telement: topmostElement,\\n\\t\\toffset: -topmostElementTop,\\n\\t\\ttitle: topmostElement ? topmostElement.getAttribute(\\\"data-tiddler-title\\\") : null\\n\\t};\\n}\\n\\nvar previousViewportWidth, previousViewportHeight;\\n\\nfunction saveViewportDimensions() {\\n\\tvar viewportWidth = window.innerWidth || document.documentElement.clientWidth,\\n\\t\\tviewportHeight = window.innerHeight || document.documentElement.clientHeight;\\n\\tif(document.querySelector(\\\".tc-dynaview-request-refresh-on-resize\\\")) {\\n\\t\\tif(previousViewportWidth !== viewportWidth || previousViewportHeight !== viewportHeight) {\\n\\t\\t\\tvar count = parseInt($tw.wiki.getTiddlerText(\\\"$:/state/DynaView/ViewportDimensions/ResizeCount\\\",\\\"0\\\"),10) || 0;\\n\\t\\t\\t$tw.wiki.addTiddler(new $tw.Tiddler({title: \\\"$:/state/DynaView/ViewportDimensions/ResizeCount\\\", text: (count + 1) + \\\"\\\"}));\\n\\t\\t\\tpreviousViewportWidth = viewportWidth;\\n\\t\\t\\tpreviousViewportHeight = viewportHeight;\\n\\t\\t}\\n\\t}\\n\\tif($tw.wiki.getTiddlerText(\\\"$:/config/DynaView/ViewportDimensions\\\") === \\\"yes\\\") {\\n\\t\\tif($tw.wiki.getTiddlerText(\\\"$:/state/DynaView/ViewportDimensions/Width\\\") !== viewportWidth.toString()) {\\n\\t\\t\\t$tw.wiki.setText(\\\"$:/state/DynaView/ViewportDimensions/Width\\\",undefined,undefined,viewportWidth.toString(),undefined);\\n\\t\\t}\\n\\t\\tif($tw.wiki.getTiddlerText(\\\"$:/state/DynaView/ViewportDimensions/Height\\\") !== viewportHeight.toString()) {\\n\\t\\t\\t$tw.wiki.setText(\\\"$:/state/DynaView/ViewportDimensions/Height\\\",undefined,undefined,viewportHeight.toString(),undefined);\\n\\t\\t}\\n\\t}\\n}\\n\",\"type\":\"application/javascript\",\"module-type\":\"startup\"},\"$:/plugins/tiddlywiki/dynaview/examples/progressive-text\":{\"title\":\"$:/plugins/tiddlywiki/dynaview/examples/progressive-text\",\"tags\":\"$:/tags/dynaviewExamples\",\"caption\":\"Progressive Text\",\"text\":\"//Zoom into the space below to see a poem//\\n\\n''N.B. This example only works in Safari at the moment''\\n\\n\u003Cpre>\u003Cdiv class=\\\"tc-dynaview-zoom-visible-1-and-above\\\" style=\\\"font-size: 0.7em;line-height:1.5;\\\">\\n         'Fury said to a\\n         mouse, That he\\n        met in the\\n       house,\u003C/div>\u003Cdiv class=\\\"tc-dynaview-zoom-visible-1a-and-above\\\" style=\\\"font-size: 0.6em;line-height:1.5;\\\">     \\\"Let us\\n      both go to\\n       law: I will\\n        prosecute\\n         YOU.--Come,\u003C/div>\u003Cdiv class=\\\"tc-dynaview-zoom-visible-1b-and-above\\\" style=\\\"font-size: 0.5em;line-height:1.5;\\\">           I'll take no\\n           denial; We\\n          must have a\\n        trial: For\u003C/div>\u003Cdiv class=\\\"tc-dynaview-zoom-visible-1c-and-above\\\" style=\\\"font-size: 0.4em;line-height:1.5;\\\">      really this\\n     morning I've\\n    nothing\\n    to do.\\\"\u003C/div>\u003Cdiv class=\\\"tc-dynaview-zoom-visible-2-and-above\\\" style=\\\"font-size: 0.3em;line-height:1.5;\\\">     Said the\\n      mouse to the\\n       cur, \\\"Such\\n        a trial,\\n         dear Sir,\u003C/div>\u003Cdiv class=\\\"tc-dynaview-zoom-visible-2a-and-above\\\" style=\\\"font-size: 0.25em;line-height:1.5;\\\">            With\\n          no jury\\n        or judge,\\n       would be\\n      wasting\\n      our\\n      breath.\\\"\u003C/div>\u003Cdiv class=\\\"tc-dynaview-zoom-visible-3-and-above\\\" style=\\\"font-size: 0.2em;line-height:1.5;\\\">       \\\"I'll be\\n        judge, I'll\\n         be jury,\\\"\\n            Said\\n         cunning\\n          old Fury:\\n          \\\"I'll\\n          try the\\n            whole\\n            cause,\u003C/div>\u003Cdiv class=\\\"tc-dynaview-zoom-visible-4-and-above\\\" style=\\\"font-size: 0.15em;line-height:1.5;\\\">              and\\n           condemn\\n           you\\n          to\\n           death.\\\"'\\n\u003C/div>\u003C/pre>\\n\"},\"$:/plugins/tiddlywiki/dynaview/examples/reveal-on-scroll\":{\"title\":\"$:/plugins/tiddlywiki/dynaview/examples/reveal-on-scroll\",\"tags\":\"$:/tags/dynaviewExamples\",\"caption\":\"Reveal on Scroll\",\"text\":\"\\\\define indicator(index)\\n\u003C$reveal state=\\\"$:/state/unreveal-on-scroll/example$index$\\\" type=\\\"nomatch\\\" text=\\\"\\\">\\n$index$\\n\u003C/$reveal>\\n\\\\end\\n\\n\\\\define lorem-ipsum(index)\\n\u003Cdiv class=\\\"tc-dynaview-track-tiddler-when-visible\\\" style=\\\"min-height: 75px;\\\" data-dynaview-track-tiddler=\\\"$:/state/unreveal-on-scroll/example$index$\\\">\\n\u003Ch1>Heading $index$\u003C/h1>\\n\u003C unt in culpa qui officia deserunt mollit anim id est laborum.\\n\\\\end\\n\\n\\\\define zoomable-diagram(tag,level:\\\"1 2 3 4 5 6 7\\\")\\n\u003Cdiv class={{{ $level$ +[addprefix[zoomable-diagram-level-]addprefix[zoomable-diagram-list ]] }}}>\\n\\t\u003C$list filter=\\\"[all[shadows+tiddlers]tag[$tag$]]\\\">\\n\\t\\t\u003Cdiv class=\\\"zoomable-diagram-item\\\">\\n\\t\\t\\t\u003Cdiv class=\\\"zoomable-diagram-title\\\">\\n\\t\\t\\t\\t\u003C$transclude field=\\\"caption\\\" mode=\\\"inline\\\"/>\\n\\t\\t\\t\u003C/div>\\n\\t\\t\\t\u003Cdiv class=\\\"zoomable-diagram-body\\\">\\n\\t\\t\\t\\t\u003Cdiv class=\\\"zoomable-diagram-text\\\">\\n\\t\\t\\t\\t\\t\u003C$transclude field=\\\"text\\\" mode=\\\"block\\\"/>\\n\\t\\t\\t\\t\u003C/div>\\n\\t\\t\\t\\t\u003Cdiv class=\\\"zoomable-diagram-children\\\">\\n\\t\\t\\t\\t\\t\u003C$set name=\\\"new-level\\\" filter=\\\"\\\"\\\" $level$ +[butfirst[]] \\\"\\\"\\\">\\n\\t\\t\\t\\t\\t\\t\u003C$macrocall $name=\\\"zoomable-diagram\\\" tag=\u003C\u003CcurrentTiddler>> level=\u003C\u003Cnew-level>>/>\\n\\t\\t\\t\\t\\t\u003C/$set>\\n\\t\\t\\t\\t\u003C/div>\\n\\t\\t\\t\u003C/div>\\n\\t\\t\u003C/div>\\n\\t\u003C/$list>\\n\u003C/div>\\n\\\\end\\n\\n//Zoom into the diagram below to find out more//\\n\\n''N.B. This example only works in Safari at the moment''\\n\\n\u003Cstyle>\\n.zoomable-diagram-wrapper {\\n\\tmin-height: 300px;\\n}\\n\\n.zoomable-diagram-list {\\n\\tdisplay: flex;\\n\\tflex-direction: row;\\n\\tline-height: 1.5;\\n}\\n\\n.zoomable-diagram-level-1 {font-size: 1em;}\\n.zoomable-diagram-level-2 {font-size: 0.8em;}\\n.zoomable-diagram-level-3 {font-size: 0.6em;}\\n.zoomable-diagram-level-4 {font-size: 0.4em;}\\n\\n.zoomable-diagram-level-1,\\n.zoomable-diagram-level-2,\\n.zoomable-diagram-level-3,\\n.zoomable-diagram-level-4,\\n.zoomable-diagram-text {\\n\\ttransition: opacity 150ms ease-in-out;\\n}\\n\\nbody.tc-dynaview.tc-dynaview-zoom-factor-1 .zoomable-diagram-level-1 {opacity: 1;}\\nbody.tc-dynaview.tc-dynaview-zoom-factor-1 .zoomable-diagram-level-2 {opacity: 0;}\\nbody.tc-dynaview.tc-dynaview-zoom-factor-1 .zoomable-diagram-level-3 {opacity: 0;}\\nbody.tc-dynaview.tc-dynaview-zoom-factor-1 .zoomable-diagram-level-4 {opacity: 0;}\\n\\nbody.tc-dynaview.tc-dynaview-zoom-factor-2 .zoomable-diagram-level-1 {opacity: 1;}\\nbody.tc-dynaview.tc-dynaview-zoom-factor-2 .zoomable-diagram-level-1 > .zoomable-diagram-item > .zoomable-diagram-body > .zoomable-diagram-text {opacity: 0;}\\nbody.tc-dynaview.tc-dynaview-zoom-factor-2 .zoomable-diagram-level-2 {opacity: 1;}\\nbody.tc-dynaview.tc-dynaview-zoom-factor-2 .zoomable-diagram-level-3 {opacity: 0;}\\nbody.tc-dynaview.tc-dynaview-zoom-factor-2 .zoomable-diagram-level-4 {opacity: 0;}\\n\\nbody.tc-dynaview.tc-dynaview-zoom-factor-3 .zoomable-diagram-level-1 {opacity: 1;}\\nbody.tc-dynaview.tc-dynaview-zoom-factor-3 .zoomable-diagram-level-1 > .zoomable-diagram-item > .zoomable-diagram-body > .zoomable-diagram-text {opacity: 0;}\\nbody.tc-dynaview.tc-dynaview-zoom-factor-3 .zoomable-diagram-level-2 {opacity: 1;}\\nbody.tc-dynaview.tc-dynaview-zoom-factor-3 .zoomable-diagram-level-2 > .zoomable-diagram-item > .zoomable-diagram-body > .zoomable-diagram-text {opacity: 0;}\\nbody.tc-dynaview.tc-dynaview-zoom-factor-3 .zoomable-diagram-level-3 {opacity: 1;}\\nbody.tc-dynaview.tc-dynaview-zoom-factor-3 .zoomable-diagram-level-4 {opacity: 0;}\\n\\nbody.tc-dynaview.tc-dynaview-zoom-factor-4 .zoomable-diagram-level-1 {opacity: 1;}\\nbody.tc-dynaview.tc-dynaview-zoom-factor-4 .zoomable-diagram-level-1 > .zoomable-diagram-item > .zoomable-diagram-body > .zoomable-diagram-text {opacity: 0;}\\nbody.tc-dynaview.tc-dynaview-zoom-factor-4 .zoomable-diagram-level-2 {opacity: 1;}\\nbody.tc-dynaview.tc-dynaview-zoom-factor-4 .zoomable-diagram-level-2 > .zoomable-diagram-item > .zoomable-diagram-body > .zoomable-diagram-text {opacity: 0;}\\nbody.tc-dynaview.tc-dynaview-zoom-factor-4 .zoomable-diagram-level-3 {opacity: 1;}\\nbody.tc-dynaview.tc-dynaview-zoom-factor-4 .zoomable-diagram-level-3 > .zoomable-diagram-item > .zoomable-diagram-body > .zoomable-diagram-text {opacity: 0;}\\nbody.tc-dynaview.tc-dynaview-zoom-factor-4 .zoomable-diagram-level-4 {opacity: 1;}\\n\\n.zoomable-diagram-item {\\n\\tmargin: 0.5em;\\n\\tflex: 1 1 0;\\n}\\n\\n.zoomable-diagram-title {\\n\\tfont-weight: bold;\\n}\\n\\n.zoomable-diagram-body {\\n\\tdisplay: flex;\\n\\tflex-direction: column;\\n\\tposition: relative;\\n}\\n\\n.zoomable-diagram-text {\\n\\tposition: absolute;\\n}\\n\\n.zoomable-diagram-children {\\n}\\n\\n\u003C/style>\\n\\n\u003Cdiv class=\\\"zoomable-diagram-wrapper\\\">\\n\u003C\u003Czoomable-diagram \\\"$:/tags:/ZoomableDiagram\\\">>\\n\u003C/div>\\n\"},\"$:/plugins/tiddlywiki/dynaview/examples/zoomable-tooltips\":{\"title\":\"$:/plugins/tiddlywiki/dynaview/examples/zoomable-tooltips\",\"tags\":\"$:/tags/dynaviewExamples\",\"caption\":\"Zoomable Tooltips\",\"text\":\"//Zoom into the images below to see their titles//\\n\\n''N.B. This example only works in Safari at the moment''\\n\\n\u003Cstyle>\\n.zoomable-tooltip-demo-container {\\n\\tdisplay: flex;\\n\\tflex-wrap: wrap;\\n}\\n\\n.zoomable-tooltip-demo-item {\\n\\tdisplay: flex;\\n\\tflex-direction: column;\\n\\tflex: 0 0 auto;\\n\\tpadding: 4px;\\n\\twidth: 5em;\\n\\theight: 7em;\\n}\\n\\n.zoomable-tooltip-demo-item-image {\\n\\tflex: 0 0 auto;\\n}\\n\\n.zoomable-tooltip-demo-item-image svg {\\n\\twidth: 4em;\\n\\theight: 4em;\\n}\\n\\n.zoomable-tooltip-demo-item-text {\\n\\tfont-size:0.3em;\\n\\tflex: 0 0 auto;\\n\\tline-height: 1.1;\\n\\ttext-align: center;\\n    text-align: center;\\n    background: #f7f747;\\n    border: 1px solid #c2c235;\\n    padding: 2px;\\n    border-radius: 2px;\\n}\\n\u003C/style>\\n\u003Cdiv class=\\\"zoomable-tooltip-demo-container\\\">\\n\u003C$list filter=\\\"[all[tiddlers+shadows]tag[$:/tags/Image]]\\\">\\n\u003Cdiv class=\\\"zoomable-tooltip-demo-item\\\">\\n\u003Cspan class=\\\"zoomable-tooltip-demo-item-image\\\">\\n\u003C$transclude/>\\n\u003C/span>\\n\u003Cspan class=\\\"zoomable-tooltip-demo-item-text tc-dynaview-zoom-visible-2-and-above\\\">\\n\u003C$text text=\u003C\u003CcurrentTiddler>>/>\\n\u003C/span>\\n\u003C/div>\\n\u003C/$list>\\n\u003C/div>\\n\"},\"$:/plugins/tiddlywiki/dynaview/examples\":{\"title\":\"$:/plugins/tiddlywiki/dynaview/examples\",\"text\":\"\u003C\u003Ctabs \\\"[all[tiddlers+shadows]tag[$:/tags/dynaviewExamples]!has[draft.of]]\\\" \\\"$:/plugins/tiddlywiki/dynaview/examples/progressive-text\\\">>\\n\"},\"$:/plugins/tiddlywiki/dynaview/macros\":{\"title\":\"$:/plugins/tiddlywiki/dynaview/macros\",\"tags\":\"$:/tags/Macro\",\"text\":\"\\\\define transclude-when-visible(tiddler,mode:\\\"block\\\",state,minHeight:\\\"1em\\\",loadingText:\\\"&hellip;\\\")\\n\u003C$reveal state=\u003C\u003C__state__>> type=\\\"nomatch\\\" text=\\\"0\\\" tag=\\\"div\\\">\\n\u003Cdiv class=\\\"tc-dynaview-track-tiddler-when-visible\\\" data-dynaview-track-tiddler=\u003C\u003C__state__>> data-dynaview-set-value=\\\"visible\\\">\\n\u003C$transclude tiddler=\u003C\u003C__tiddler__>> mode=\u003C\u003C__mode__>>/>\\n\u003C/div>\\n\u003C/$reveal>\\n\u003C$reveal state=\u003C\u003C__state__>> type=\\\"match\\\" text=\\\"0\\\" tag=\\\"div\\\">\\n\u003Cdiv class=\\\"tc-dynaview-track-tiddler-when-visible\\\" style=\\\"min-height: $minHeight$;\\\" data-dynaview-track-tiddler=\u003C\u003C__state__>> data-dynaview-set-value=\\\"visible\\\">\\n$loadingText$\\n\u003C/div>\\n\u003C/$reveal>\\n\\\\end\\n\"},\"$:/plugins/tiddlywiki/dynaview/readme\":{\"title\":\"$:/plugins/tiddlywiki/dynaview/readme\",\"text\":\"! Dynaview\\n\\nThis plugin makes it possible to build user interfaces that dynamically respond to changes in the browser viewport via scrolling or zooming:\\n\\n* CSS classes that allow rendering to be deferred until the output is scrolled into view\\n* CSS classes that allow the opacity of DOM elements to vary according to the current zoom level\\n* A daemon that can dynamically update a pair of state tiddlers with the current dimensions of the browser viewport\\n* A daemon that can dynamically update the address bar with the title of the tiddler at the top of the viewport\\n\\nSome points to note about the zoom features:\\n\\n\u003C\u003C\u003C\\n\\n* The zoom level currently only works on Safari, both on Mac OS and on the iPhone/iPad\\n* The zoom level tracked by the plugin is the pinch-zoom level, and not the text-zoom level\\n* Rather than being progressively rendered as needed, hidden item are rendered with zero opacity. Which means that they can still be interacted with\\n\\nThis is really just a proof of concept to allow the user experience to be evaluated. A production version would need to work in all browsers, which would mean adopting a polyfill such as [[Hammer.js|http://hammerjs.github.io/]] to give us manual pan and zoom support. It would also allow deeper levels of zoom.\\n\\n\u003C\u003C\u003C\\n\"},\"$:/plugins/tiddlywiki/dynaview/styles\":{\"title\":\"$:/plugins/tiddlywiki/dynaview/styles\",\"tags\":\"$:/tags/Stylesheet\",\"text\":\"\\\\define if-tiddler-is(title,value,text)\\n\u003C$reveal stateTitle=\u003C\u003C__title__>> text=\u003C\u003C__value__>> type=\\\"match\\\">\\n\u003C$text text=\u003C\u003C__text__>>/>\\n\u003C/$reveal>\\n\\\\end\\n\\\\rules only filteredtranscludeinline transcludeinline macrodef macrocallinline\\n\\n\u003C\u003Cif-tiddler-is title:\\\"$:/config/DynaView/PreserveScrollPosition\\\" value:\\\"yes\\\" text:\\\"\\\"\\\"\\nbody {\\n\\toverflow-anchor: none; /* Turn off browser scroll anchoring */\\n}\\n\\\"\\\"\\\">>\\n\\nbody.tc-dynaview .tc-dynaview-zoom-visible-1-and-above,\\nbody.tc-dynaview .tc-dynaview-zoom-visible-1a-and-above,\\nbody.tc-dynaview .tc-dynaview-zoom-visible-1b-and-above,\\nbody.tc-dynaview .tc-dynaview-zoom-visible-1c-and-above,\\nbody.tc-dynaview .tc-dynaview-zoom-visible-2-and-above,\\nbody.tc-dynaview .tc-dynaview-zoom-visible-2a-and-above,\\nbody.tc-dynaview .tc-dynaview-zoom-visible-3-and-above,\\nbody.tc-dynaview .tc-dynaview-zoom-visible-4-and-above,\\nbody.tc-dynaview .tc-dynaview-zoom-visible-1,\\nbody.tc-dynaview .tc-dynaview-zoom-visible-2,\\nbody.tc-dynaview .tc-dynaview-zoom-visible-3,\\nbody.tc-dynaview .tc-dynaview-zoom-visible-4 {\\n\\ttransition: opacity 150ms ease-in-out;\\n\\topacity: 0;\\n}\\n\\nbody.tc-dynaview .tc-dynaview-zoom-visible-1-and-above {opacity: 1;}\\nbody.tc-dynaview.tc-dynaview-zoom-factor-1a-and-above .tc-dynaview-zoom-visible-1a-and-above {opacity: 1;}\\nbody.tc-dynaview.tc-dynaview-zoom-factor-1b-and-above .tc-dynaview-zoom-visible-1b-and-above {opacity: 1;}\\nbody.tc-dynaview.tc-dynaview-zoom-factor-1c-and-above .tc-dynaview-zoom-visible-1c-and-above {opacity: 1;}\\nbody.tc-dynaview.tc-dynaview-zoom-factor-2-and-above .tc-dynaview-zoom-visible-2-and-above {opacity: 1;}\\nbody.tc-dynaview.tc-dynaview-zoom-factor-2a-and-above .tc-dynaview-zoom-visible-2a-and-above {opacity: 1;}\\nbody.tc-dynaview.tc-dynaview-zoom-factor-3-and-above .tc-dynaview-zoom-visible-3-and-above {opacity: 1;}\\nbody.tc-dynaview.tc-dynaview-zoom-factor-4-and-above .tc-dynaview-zoom-visible-4-and-above {opacity: 1;}\\n\\nbody.tc-dynaview.tc-dynaview-zoom-factor-1 .tc-dynaview-zoom-visible-1 {opacity: 1;}\\nbody.tc-dynaview.tc-dynaview-zoom-factor-2 .tc-dynaview-zoom-visible-2 {opacity: 1;}\\nbody.tc-dynaview.tc-dynaview-zoom-factor-3 .tc-dynaview-zoom-visible-3 {opacity: 1;}\\nbody.tc-dynaview.tc-dynaview-zoom-factor-4 .tc-dynaview-zoom-visible-4 {opacity: 1;}\\n\"}}}"},

the line height in all browsers. */\\n\\t-webkit-text-size-adjust: 100%; /* 2. Prevent adjustments of font size after orientation changes in iOS. */\\n\\t-moz-tab-size: 4; /* 3. Use a more readable tab size (opinionated). */\\n\\ttab-size: 4; /* 3 */\\n}\\n\\n/*\\nSections\\n========\\n*/\\n\\nbody {\\n\\tmargin: 0; /* Remove the margin in all browsers. */\\n}\\n\\n/*\\nGrouping content\\n================\\n*/\\n\\n/**\\n1. Add the correct height in Firefox.\\n2. Correct the inheritance of border color in Firefox. (https://bugzilla.mozilla.org/show_bug.cgi?id=190655)\\n*/\\n\\nhr {\\n\\theight: 0; /* 1 */\\n\\tcolor: inherit; /* 2 */\\n}\\n\\n/*\\nText-level semantics\\n====================\\n*/\\n\\n/**\\nAdd the correct text decoration in Chrome, Edge, and Safari.\\n*/\\n\\nabbr[title] {\\n\\ttext-decoration: underline dotted;\\n}\\n\\n/**\\nAdd the correct font weight in Edge and Safari.\\n*/\\n\\nb,\\nstrong {\\n\\tfont-weight: bolder;\\n}\\n\\n/**\\n1. Improve consistency of default fonts in all browsers. (https://github.com/sindresorhus/modern-normalize/issues/3)\\n2. Correct the odd 'em' font sizing in all browsers.\\n*/\\n\\ncode,\\nkbd,\\nsamp,\\npre {\\n\\tfont-family:\\n\\t\\tui-monospace,\\n\\t\\tSFMono-Regular,\\n\\t\\tConsolas,\\n\\t\\t'Liberation Mono',\\n\\t\\tMenlo,\\n\\t\\tmonospace; /* 1 */\\n\\tfont-size: 1em; /* 2 */\\n}\\n\\n/**\\nAdd the correct font size in all browsers.\\n*/\\n\\nsmall {\\n\\tfont-size: 80%;\\n}\\n\\n/**\\nPrevent 'sub' and 'sup' elements from affecting the line height in all browsers.\\n*/\\n\\nsub,\\nsup {\\n\\tfont-size: 75%;\\n\\tline-height: 0;\\n\\tposition: relative;\\n\\tvertical-align: baseline;\\n}\\n\\nsub {\\n\\tbottom: -0.25em;\\n}\\n\\nsup {\\n\\ttop: -0.5em;\\n}\\n\\n/*\\nTabular data\\n============\\n*/\\n\\n/**\\n1. Remove text indentation from table contents in Chrome and Safari. (https://bugs.chromium.org/p/chromium/issues/detail?id=999088, https://bugs.webkit.org/show_bug.cgi?id=201297)\\n2. Correct table border color inheritance in Chrome and Safari. (https://bugs.chromium.org/p/chromium/issues/detail?id=935729, https://bugs.webkit.org/show_bug.cgi?id=195016)\\n*/\\n\\ntable {\\n\\ttext-indent: 0; /* 1 */\\n\\tborder-color: inherit; /* 2 */\\n}\\n\\n/*\\nForms\\n=====\\n*/\\n\\n/**\\n1. Change the font styles in all browsers.\\n2. Remove the margin in Firefox and Safari.\\n*/\\n\\nbutton,\\ninput,\\noptgroup,\\nselect,\\ntextarea {\\n\\tfont-family: inherit; /* 1 */\\n\\tfont-size: 100%; /* 1 */\\n\\tline-height: 1.15; /* 1 */\\n\\tmargin: 0; /* 2 */\\n}\\n\\n/**\\nRemove the inheritance of text transform in Edge and Firefox.\\n*/\\n\\nbutton,\\nselect {\\n\\ttext-transform: none;\\n}\\n\\n/**\\nCorrect the inability to style clickable types in iOS and Safari.\\n*/\\n\\nbutton,\\n[type='button'],\\n[type='reset'],\\n[type='submit'] {\\n\\t-webkit-appearance: button;\\n}\\n\\n/**\\nRemove the inner border and padding in Firefox.\\n*/\\n\\n::-moz-focus-inner {\\n\\tborder-style: none;\\n\\tpadding: 0;\\n}\\n\\n/**\\nRestore the focus styles unset by the previous rule.\\n*/\\n\\n:-moz-focusring {\\n\\toutline: 1px dotted ButtonText;\\n}\\n\\n/**\\nRemove the additional ':invalid' styles in Firefox.\\nSee: https://github.com/mozilla/gecko-dev/blob/2f9eacd9d3d995c937b4251a5557d95d494c9be1/layout/style/res/forms.css#L728-L737\\n*/\\n\\n:-moz-ui-invalid {\\n\\tbox-shadow: none;\\n}\\n\\n/**\\nRemove the padding so developers are not caught out when they zero out 'fieldset' elements in all browsers.\\n*/\\n\\nlegend {\\n\\tpadding: 0;\\n}\\n\\n/**\\nAdd the correct vertical alignment in Chrome and Firefox.\\n*/\\n\\nprogress {\\n\\tvertical-align: baseline;\\n}\\n\\n/**\\nCorrect the cursor style of increment and decrement buttons in Safari.\\n*/\\n\\n::-webkit-inner-spin-button,\\n::-webkit-outer-spin-button {\\n\\theight: auto;\\n}\\n\\n/**\\n1. Correct the odd appearance in Chrome and Safari.\\n2. Correct the outline style in Safari.\\n*/\\n\\n[type='search'] {\\n\\t-we {"title":"Alice in Wonderland","text":"# ALICE'S ADVENTURES IN WONDERLAND\n\n## Lewis Carroll\n\nTHE MILLENNIUM FULCRUM EDITION 3.0\n\n!!! CHAPTER I. Down the Rabbit-Hole\n\nAlice was beginning to get very tired of sitting by her sister on the\nbank, and of having nothing to do: once or twice she had peeped into the\nbook her sister was reading, but it had no pictures or conversations in\nit, 'and what is the use of a book,' thought Alice 'without pictures or\nconversations?'\n\nSo she was considering in her own mind (as well as she could, for the\nhot day made her feel very sleepy and stupid), whether the pleasure\nof making a daisy-chain would be worth the trouble of getting up and\npicking the daisies, when suddenly a White Rabbit with pink eyes ran\nclose by her.\n\nThere was nothing so VERY remarkable in that; nor did Alice think it so\nVERY much out of the way to hear the Rabbit say to itself, 'Oh dear!\nOh dear! I shall be late!' (when she thought it over afterwards, it\noccurred to her that she ought to have wondered at this, but at the time\nit all seemed quite natural); but when the Rabbit actually TOOK A WATCH\nOUT OF ITS WAISTCOAT-POCKET, and looked at it, and then hurried on,\nAlice started to her feet, for it flashed across her mind that she had\nnever before seen a rabbit with either a waistcoat-pocket, or a watch\nto take out of it, and burning with curiosity, she ran across the field\nafter it, and fortunately was just in time to see it pop down a large\nrabbit-hole under the hedge.\n\nIn another moment down went Alice after it, never once considering how\nin the world she was to get out again.\n\nThe rabbit-hole went straight on like a tunnel for some way, and then\ndipped suddenly down, so suddenly that Alice had not a moment to think\nabout stopping herself before she found herself falling down a very deep\nwell.\n\nEither the well was very deep, or she fell very slowly, for she had\nplenty of time as she went down to look about her and to wonder what was\ngoing to happen next. First, she tried to look down and make out what\nshe was coming to, but it was too dark to see anything; then she\nlooked at the sides of the well, and noticed that they were filled with\ncupboards and book-shelves; here and there she saw maps and pictures\nhung upon pegs. She took down a jar from one of the shelves as\nshe passed; it was labelled 'ORANGE MARMALADE', but to her great\ndisappointment it was empty: she did not like to drop the jar for fear\nof killing somebody, so managed to put it into one of the cupboards as\nshe fell past it.\n\n'Well!' thought Alice to herself, 'after such a fall as this, I shall\nthink nothing of tumbling down stairs! How brave they'll all think me at\nhome! Why, I wouldn't say anything about it, even if I fell off the top\nof the house!' (Which was very likely true.)\n\nDown, down, down. Would the fall NEVER come to an end! 'I wonder how\nmany miles I've fallen by this time?' she said aloud. 'I must be getting\nsomewhere near the centre of the earth. Let me see: that would be four\nthousand miles down, I think--' (for, you see, Alice had learnt several\nthings of this sort in her lessons in the schoolroom, and though this\nwas not a VERY good opportunity for showing off her knowledge, as there\nwas no one to listen to her, still it was good practice to say it over)\n'--yes, that's about the right distance--but then I wonder what Latitude\nor Longitude I've got to?' (Alice had no idea what Latitude was, or\nLongitude either, but thought they were nice grand words to say.)\n\nPresently she began again. 'I wonder if I shall fall right THROUGH the\nearth! How funny it'll seem to come out among the people that walk with\ntheir heads downward! The Antipathies, I think--' (she was rather glad\nthere WAS no one listening, this time, as it didn't sound at all the\nright word) '--but I shall have to ask them what the name of the country\nis, you know. Please, Ma'am, is this New Zealand or Australia?' (and\nshe tried to curtsey as she spoke--fancy CURTSEYING as you're falling\nthrough the air! Do you think you could manage it?) 'And what an\nignorant little girl she'll think me for asking! No, it'll never do to\nask: perhaps I shall see it written up somewhere.'\n\nDown, down, down. There was nothing else to do, so Alice soon began\ntalking again. 'Dinah'll miss me very much to-night, I should think!'\n(Dinah was the cat.) 'I hope they'll remember her saucer of milk at\ntea-time. Dinah my dear! I wish you were down here with me! There are no\nmice in the air, I'm afraid, but you might catch a bat, and that's very\nlike a mouse, you know. But do cats eat bats, I wonder?' And here Alice\nbegan to get rather sleepy, and went on saying to herself, in a dreamy\nsort of way, 'Do cats eat bats? Do cats eat bats?' and sometimes, 'Do\nbats eat cats?' for, you see, as she couldn't answer either question,\nit didn't much matter which way she put it. She felt that she was dozing\noff, and had just begun to dream that she was walking hand in hand with\nDinah, and saying to her very earnestly, 'Now, Dinah, tell me the truth:\ndid you ever eat a bat?' when suddenly, thump! thump! down she came upon\na heap of sticks and dry leaves, and the fall was over.\n\nAlice was not a bit hurt, and she jumped up on to her feet in a moment:\nshe looked up, but it was all dark overhead; before her was another\nlong passage, and the White Rabbit was still in sight, hurrying down it.\nThere was not a moment to be lost: away went Alice like the wind, and\nwas just in time to hear it say, as it turned a corner, 'Oh my ears\nand whiskers, how late it's getting!' She was close behind it when she\nturned the corner, but the Rabbit was no longer to be seen: she found\nherself in a long, low hall, which was lit up by a row of lamps hanging\nfrom the roof.\n\nThere were doors all round the hall, but they were all locked; and when\nAlice had been all the way down one side and up the other, trying every\ndoor, she walked sadly down the middle, wondering how she was ever to\nget out again.\n\nSuddenly she came upon a little three-legged table, all made of solid\nglass; there was nothing on it except a tiny golden key, and Alice's\nfirst thought was that it might belong to one of the doors of the hall;\nbut, alas! either the locks were too large, or the key was too small,\nbut at any rate it would not open any of them. However, on the second\ntime round, she came upon a low curtain she had not noticed before, and\nbehind it was a little door about fifteen inches high: she tried the\nlittle golden key in the lock, and to her great delight it fitted!\n\nAlice opened the door and found that it led into a small passage, not\nmuch larger than a rat-hole: she knelt down and looked along the passage\ninto the loveliest garden you ever saw. How she longed to get out of\nthat dark hall, and wander about among those beds of bright flowers and\nthose cool fountains, but she could not even get her head through the\ndoorway; 'and even if my head would go through,' thought poor Alice, 'it\nwould be of very little use without my shoulders. Oh, how I wish I could\nshut up like a telescope! I think I could, if I only knew how to begin.'\nFor, you see, so many out-of-the-way things had happened lately,\nthat Alice had begun to think that very few things indeed were really\nimpossible.\n\nThere seemed to be no use in waiting by the little door, so she went\nback to the table, half hoping she might find another key on it, or at\nany rate a book of rules for shutting people up like telescopes: this\ntime she found a little bottle on it, ('which certainly was not here\nbefore,' said Alice,) and round the neck of the bottle was a paper\nlabel, with the words 'DRINK ME' beautifully printed on it in large\nletters.\n\nIt was all very well to say 'Drink me,' but the wise little Alice was\nnot going to do THAT in a hurry. 'No, I'll look first,' she said, 'and\nsee whether it's marked \"poison\" or not'; for she had read several nice\nlittle histories about children who had got burnt, and eaten up by wild\nbeasts and other unpleasant things, all because they WOULD not remember\nthe simple rules their friends had taught them: such as, that a red-hot\npoker will burn you if you hold it too long; and that if you cut your\nfinger VERY deeply with a knife, it usually bleeds; and she had never\nforgotten that, if you drink much from a bottle marked 'poison,' it is\nalmost certain to disagree with you, sooner or later.\n\nHowever, this bottle was NOT marked 'poison,' so Alice ventured to taste\nit, and finding it very nice, (it had, in fact, a sort of mixed flavour\nof cherry-tart, custard, pine-apple, roast turkey, toffee, and hot\nbuttered toast,) she very soon finished it off.\n\n  *    *    *    *    *    *    *\n\n    *    *    *    *    *    *\n\n  *    *    *    *    *    *    *\n\n'What a curious feeling!' said Alice; 'I must be shutting up like a\ntelescope.'\n\nAnd so it was indeed: she was now only ten inches high, and her face\nbrightened up at the thought that she was now the right size for going\nthrough the little door into that lovely garden. First, however, she\nwaited for a few minutes to see if she was going to shrink any further:\nshe felt a little nervous about this; 'for it might end, you know,' said\nAlice to herself, 'in my going out altogether, like a candle. I wonder\nwhat I should be like then?' And she tried to fancy what the flame of a\ncandle is like after the candle is blown out, for she could not remember\never having seen such a thing.\n\nAfter a while, finding that nothing more happened, she decided on going\ninto the garden at once; but, alas for poor Alice! when she got to the\ndoor, she found she had forgotten the little golden key, and when she\nwent back to the table for it, she found she could not possibly reach\nit: she could see it quite plainly through the glass, and she tried her\nbest to climb up one of the legs of the table, but it was too slippery;\nand when she had tired herself out with trying, the poor little thing\nsat down and cried.\n\n'Come, there's no use in crying like that!' said Alice to herself,\nrather sharply; 'I advise you to leave off this minute!' She generally\ngave herself very good advice, (though she very seldom followed it),\nand sometimes she scolded herself so severely as to bring tears into\nher eyes; and once she remembered trying to box her own ears for having\ncheated herself in a game of croquet she was playing against herself,\nfor this curious child was very fond of pretending to be two people.\n'But it's no use now,' thought poor Alice, 'to pretend to be two people!\nWhy, there's hardly enough of me left to make ONE respectable person!'\n\nSoon her eye fell on a little glass box that was lying under the table:\nshe opened it, and found in it a very small cake, on which the words\n'EAT ME' were beautifully marked in currants. 'Well, I'll eat it,' said\nAlice, 'and if it makes me grow larger, I can reach the key; and if it\nmakes me grow smaller, I can creep under the door; so either way I'll\nget into the garden, and I don't care which happens!'\n\nShe ate a little bit, and said anxiously to herself, 'Which way? Which\nway?', holding her hand on the top of her head to feel which way it was\ngrowing, and she was quite surprised to find that she remained the same\nsize: to be sure, this generally happens when one eats cake, but Alice\nhad got so much into the way of expecting nothing but out-of-the-way\nthings to happen, that it seemed quite dull and stupid for life to go on\nin the common way.\n\nSo she set to work, and very soon finished off the cake.\n\n  *    *    *    *    *    *    *\n\n    *    *    *    *    *    *\n\n  *    *    *    *    *    *    *\n\n\n\n\n!!! CHAPTER II. The Pool of Tears\n\n'Curiouser and curiouser!' cried Alice (she was so much surprised, that\nfor the moment she quite forgot how to speak good English); 'now I'm\nopening out like the largest telescope that ever was! Good-bye, feet!'\n(for when she looked down at her feet, they seemed to be almost out of\nsight, they were getting so far off). 'Oh, my poor little feet, I wonder\nwho will put on your shoes and stockings for you now, dears? I'm sure\n_I_ shan't be able! I shall be a great deal too far off to trouble\nmyself about you: you must manage the best way you can;--but I must be\nkind to them,' thought Alice, 'or perhaps they won't walk the way I want\nto go! Let me see: I'll give them a new pair of boots every Christmas.'\n\nAnd she went on planning to herself how she would manage it. 'They must\ngo by the carrier,' she thought; 'and how funny it'll seem, sending\npresents to one's own feet! And how odd the directions will look!\n\n     ALICE'S RIGHT FOOT, ESQ.\n       HEARTHRUG,\n         NEAR THE FENDER,\n           (WITH ALICE'S LOVE).\n\nOh dear, what nonsense I'm talking!'\n\nJust then her head struck against the roof of the hall: in fact she was\nnow more than nine feet high, and she at once took up the little golden\nkey and hurried off to the garden door.\n\nPoor Alice! It was as much as she could do, lying down on one side, to\nlook through into the garden with one eye; but to get through was more\nhopeless than ever: she sat down and began to cry again.\n\n'You ought to be ashamed of yourself,' said Alice, 'a great girl like\nyou,' (she might well say this), 'to go on crying in this way! Stop this\nmoment, I tell you!' But she went on all the same, shedding gallons of\ntears, until there was a large pool all round her, about four inches\ndeep and reaching half down the hall.\n\nAfter a time she heard a little pattering of feet in the distance, and\nshe hastily dried her eyes to see what was coming. It was the White\nRabbit returning, splendidly dressed, with a pair of white kid gloves in\none hand and a large fan in the other: he came trotting along in a great\nhurry, muttering to himself as he came, 'Oh! the Duchess, the Duchess!\nOh! won't she be savage if I've kept her waiting!' Alice felt so\ndesperate that she was ready to ask help of any one; so, when the Rabbit\ncame near her, she began, in a low, timid voice, 'If you please, sir--'\nThe Rabbit started violently, dropped the white kid gloves and the fan,\nand skurried away into the darkness as hard as he could go.\n\nAlice took up the fan and gloves, and, as the hall was very hot, she\nkept fanning herself all the time she went on talking: 'Dear, dear! How\nqueer everything is to-day! And yesterday things went on just as usual.\nI wonder if I've been changed in the night? Let me think: was I the\nsame when I got up this morning? I almost think I can remember feeling a\nlittle different. But if I'm not the same, the next question is, Who\nin the world am I? Ah, THAT'S the great puzzle!' And she began thinking\nover all the children she knew that were of the same age as herself, to\nsee if she could have been changed for any of them.\n\n'I'm sure I'm not Ada,' she said, 'for her hair goes in such long\nringlets, and mine doesn't go in ringlets at all; and I'm sure I can't\nbe Mabel, for I know all sorts of things, and she, oh! she knows such a\nvery little! Besides, SHE'S she, and I'm I, and--oh dear, how puzzling\nit all is! I'll try if I know all the things I used to know. Let me\nsee: four times five is twelve, and four times six is thirteen, and\nfour times seven is--oh dear! I shall never get to twenty at that rate!\nHowever, the Multiplication Table doesn't signify: let's try Geography.\nLondon is the capital of Paris, and Paris is the capital of Rome, and\nRome--no, THAT'S all wrong, I'm certain! I must have been changed for\nMabel! I'll try and say \"How doth the little--\"' and she crossed her\nhands on her lap as if she were saying lessons, and began to repeat it,\nbut her voice sounded hoarse and strange, and the words did not come the\nsame as they used to do:--\n\n     'How doth the little crocodile\n      Improve his shining tail,\n     And pour the waters of the Nile\n      On every golden scale!\n\n     'How cheerfully he seems to grin,\n      How neatly spread his claws,\n     And welcome little fishes in\n      With gently smiling jaws!'\n\n'I'm sure those are not the right words,' said poor Alice, and her eyes\nfilled with tears again as she went on, 'I must be Mabel after all, and\nI shall have to go and live in that poky little house, and have next to\nno toys to play with, and oh! ever so many lessons to learn! No, I've\nmade up my mind about it; if I'm Mabel, I'll stay down here! It'll be no\nuse their putting their heads down and saying \"Come up again, dear!\" I\nshall only look up and say \"Who am I then? Tell me that first, and then,\nif I like being that person, I'll come up: if not, I'll stay down here\ntill I'm somebody else\"--but, oh dear!' cried Alice, with a sudden burst\nof tears, 'I do wish they WOULD put their heads down! I am so VERY tired\nof being all alone here!'\n\nAs she said this she looked down at her hands, and was surprised to see\nthat she had put on one of the Rabbit's little white kid gloves while\nshe was talking. 'How CAN I have done that?' she thought. 'I must\nbe growing small again.' She got up and went to the table to measure\nherself by it, and found that, as nearly as she could guess, she was now\nabout two feet high, and was going on shrinking rapidly: she soon found\nout that the cause of this was the fan she was holding, and she dropped\nit hastily, just in time to avoid shrinking away altogether.\n\n'That WAS a narrow escape!' said Alice, a good deal frightened at the\nsudden change, but very glad to find herself still in existence; 'and\nnow for the garden!' and she ran with all speed back to the little door:\nbut, alas! the little door was shut again, and the little golden key was\nlying on the glass table as before, 'and things are worse than ever,'\nthought the poor child, 'for I never was so small as this before, never!\nAnd I declare it's too bad, that it is!'\n\nAs she said these words her foot slipped, and in another moment, splash!\nshe was up to her chin in salt water. Her first idea was that she\nhad somehow fallen into the sea, 'and in that case I can go back by\nrailway,' she said to herself. (Alice had been to the seaside once in\nher life, and had come to the general conclusion, that wherever you go\nto on the English coast you find a number of bathing machines in the\nsea, some children digging in the sand with wooden spades, then a row\nof lodging houses, and behind them a railway station.) However, she soon\nmade out that she was in the pool of tears which she had wept when she\nwas nine feet high.\n\n'I wish I hadn't cried so much!' said Alice, as she swam about, trying\nto find her way out. 'I shall be punished for it now, I suppose, by\nbeing drowned in my own tears! That WILL be a queer thing, to be sure!\nHowever, everything is queer to-day.'\n\nJust then she heard something splashing about in the pool a little way\noff, and she swam nearer to make out what it was: at first she thought\nit must be a walrus or hippopotamus, but then she remembered how small\nshe was now, and she soon made out that it was only a mouse that had\nslipped in like herself.\n\n'Would it be of any use, now,' thought Alice, 'to speak to this mouse?\nEverything is so out-of-the-way down here, that I should think very\nlikely it can talk: at any rate, there's no harm in trying.' So she\nbegan: 'O Mouse, do you know the way out of this pool? I am very tired\nof swimming about here, O Mouse!' (Alice thought this must be the right\nway of speaking to a mouse: she had never done such a thing before, but\nshe remembered having seen in her brother's Latin Grammar, 'A mouse--of\na mouse--to a mouse--a mouse--O mouse!') The Mouse looked at her rather\ninquisitively, and seemed to her to wink with one of its little eyes,\nbut it said nothing.\n\n'Perhaps it doesn't understand English,' thought Alice; 'I daresay it's\na French mouse, come over with William the Conqueror.' (For, with all\nher knowledge of history, Alice had no very clear notion how long ago\nanything had happened.) So she began again: 'Ou est ma chatte?' which\nwas the first sentence in her French lesson-book. The Mouse gave a\nsudden leap out of the water, and seemed to quiver all over with fright.\n'Oh, I beg your pardon!' cried Alice hastily, afraid that she had hurt\nthe poor animal's feelings. 'I quite forgot you didn't like cats.'\n\n'Not like cats!' cried the Mouse, in a shrill, passionate voice. 'Would\nYOU like cats if you were me?'\n\n'Well, perhaps not,' said Alice in a soothing tone: 'don't be angry\nabout it. And yet I wish I could show you our cat Dinah: I think you'd\ntake a fancy to cats if you could only see her. She is such a dear quiet\nthing,' Alice went on, half to herself, as she swam lazily about in the\npool, 'and she sits purring so nicely by the fire, licking her paws and\nwashing her face--and she is such a nice soft thing to nurse--and she's\nsuch a capital one for catching mice--oh, I beg your pardon!' cried\nAlice again, for this time the Mouse was bristling all over, and she\nfelt certain it must be really offended. 'We won't talk about her any\nmore if you'd rather not.'\n\n'We indeed!' cried the Mouse, who was trembling down to the end of his\ntail. 'As if I would talk on such a subject! Our family always HATED\ncats: nasty, low, vulgar things! Don't let me hear the name again!'\n\n'I won't indeed!' said Alice, in a great hurry to change the subject of\nconversation. 'Are you--are you fond--of--of dogs?' The Mouse did not\nanswer, so Alice went on eagerly: 'There is such a nice little dog near\nour house I should like to show you! A little bright-eyed terrier, you\nknow, with oh, such long curly brown hair! And it'll fetch things when\nyou throw them, and it'll sit up and beg for its dinner, and all sorts\nof things--I can't remember half of them--and it belongs to a farmer,\nyou know, and he says it's so useful, it's worth a hundred pounds! He\nsays it kills all the rats and--oh dear!' cried Alice in a sorrowful\ntone, 'I'm afraid I've offended it again!' For the Mouse was swimming\naway from her as hard as it could go, and making quite a commotion in\nthe pool as it went.\n\nSo she called softly after it, 'Mouse dear! Do come back again, and we\nwon't talk about cats or dogs either, if you don't like them!' When the\nMouse heard this, it turned round and swam slowly back to her: its\nface was quite pale (with passion, Alice thought), and it said in a low\ntrembling voice, 'Let us get to the shore, and then I'll tell you my\nhistory, and you'll understand why it is I hate cats and dogs.'\n\nIt was high time to go, for the pool was getting quite crowded with the\nbirds and animals that had fallen into it: there were a Duck and a Dodo,\na Lory and an Eaglet, and several other curious creatures. Alice led the\nway, and the whole party swam to the shore.\n\n\n\n\n!!! CHAPTER III. A Caucus-Race and a Long Tale\n\nThey were indeed a queer-looking party that assembled on the bank--the\nbirds with draggled feathers, the animals with their fur clinging close\nto them, and all dripping wet, cross, and uncomfortable.\n\nThe first question of course was, how to get dry again: they had a\nconsultation about this, and after a few minutes it seemed quite natural\nto Alice to find herself talking familiarly with them, as if she had\nknown them all her life. Indeed, she had quite a long argument with the\nLory, who at last turned sulky, and would only say, 'I am older than\nyou, and must know better'; and this Alice would not allow without\nknowing how old it was, and, as the Lory positively refused to tell its\nage, there was no more to be said.\n\nAt last the Mouse, who seemed to be a person of authority among them,\ncalled out, 'Sit down, all of you, and listen to me! I'LL soon make you\ndry enough!' They all sat down at once, in a large ring, with the Mouse\nin the middle. Alice kept her eyes anxiously fixed on it, for she felt\nsure she would catch a bad cold if she did not get dry very soon.\n\n'Ahem!' said the Mouse with an important air, 'are you all ready? This\nis the driest thing I know. Silence all round, if you please! \"William\nthe Conqueror, whose cause was favoured by the pope, was soon submitted\nto by the English, who wanted leaders, and had been of late much\naccustomed to usurpation and conquest. Edwin and Morcar, the earls of\nMercia and Northumbria--\"'\n\n'Ugh!' said the Lory, with a shiver.\n\n'I beg your pardon!' said the Mouse, frowning, but very politely: 'Did\nyou speak?'\n\n'Not I!' said the Lory hastily.\n\n'I thought you did,' said the Mouse. '--I proceed. \"Edwin and Morcar,\nthe earls of Mercia and Northumbria, declared for him: and even Stigand,\nthe patriotic archbishop of Canterbury, found it advisable--\"'\n\n'Found WHAT?' said the Duck.\n\n'Found IT,' the Mouse replied rather crossly: 'of course you know what\n\"it\" means.'\n\n'I know what \"it\" means well enough, when I find a thing,' said the\nDuck: 'it's generally a frog or a worm. The question is, what did the\narchbishop find?'\n\nThe Mouse did not notice this question, but hurriedly went on, '\"--found\nit advisable to go with Edgar Atheling to meet William and offer him the\ncrown. William's conduct at first was moderate. But the insolence of his\nNormans--\" How are you getting on now, my dear?' it continued, turning\nto Alice as it spoke.\n\n'As wet as ever,' said Alice in a melancholy tone: 'it doesn't seem to\ndry me at all.'\n\n'In that case,' said the Dodo solemnly, rising to its feet, 'I move\nthat the meeting adjourn, for the immediate adoption of more energetic\nremedies--'\n\n'Speak English!' said the Eaglet. 'I don't know the meaning of half\nthose long words, and, what's more, I don't believe you do either!' And\nthe Eaglet bent down its head to hide a smile: some of the other birds\ntittered audibly.\n\n'What I was going to say,' said the Dodo in an offended tone, 'was, that\nthe best thing to get us dry would be a Caucus-race.'\n\n'What IS a Caucus-race?' said Alice; not that she wanted much to know,\nbut the Dodo had paused as if it thought that SOMEBODY ought to speak,\nand no one else seemed inclined to say anything.\n\n'Why,' said the Dodo, 'the best way to explain it is to do it.' (And, as\nyou might like to try the thing yourself, some winter day, I will tell\nyou how the Dodo managed it.)\n\nFirst it marked out a race-course, in a sort of circle, ('the exact\nshape doesn't matter,' it said,) and then all the party were placed\nalong the course, here and there. There was no 'One, two, three, and\naway,' but they began running when they liked, and left off when they\nliked, so that it was not easy to know when the race was over. However,\nwhen they had been running half an hour or so, and were quite dry again,\nthe Dodo suddenly called out 'The race is over!' and they all crowded\nround it, panting, and asking, 'But who has won?'\n\nThis question the Dodo could not answer without a great deal of thought,\nand it sat for a long time with one finger pressed upon its forehead\n(the position in which you usually see Shakespeare, in the pictures\nof him), while the rest waited in silence. At last the Dodo said,\n'EVERYBODY has won, and all must have prizes.'\n\n'But who is to give the prizes?' quite a chorus of voices asked.\n\n'Why, SHE, of course,' said the Dodo, pointing to Alice with one finger;\nand the whole party at once crowded round her, calling out in a confused\nway, 'Prizes! Prizes!'\n\nAlice had no idea what to do, and in despair she put her hand in her\npocket, and pulled out a box of comfits, (luckily the salt water had\nnot got into it), and handed them round as prizes. There was exactly one\na-piece all round.\n\n'But she must have a prize herself, you know,' said the Mouse.\n\n'Of course,' the Dodo replied very gravely. 'What else have you got in\nyour pocket?' he went on, turning to Alice.\n\n'Only a thimble,' said Alice sadly.\n\n'Hand it over here,' said the Dodo.\n\nThen they all crowded round her once more, while the Dodo solemnly\npresented the thimble, saying 'We beg your acceptance of this elegant\nthimble'; and, when it had finished this short speech, they all cheered.\n\nAlice thought the whole thing very absurd, but they all looked so grave\nthat she did not dare to laugh; and, as she could not think of anything\nto say, she simply bowed, and took the thimble, looking as solemn as she\ncould.\n\nThe next thing was to eat the comfits: this caused some noise and\nconfusion, as the large birds complained that they could not taste\ntheirs, and the small ones choked and had to be patted on the back.\nHowever, it was over at last, and they sat down again in a ring, and\nbegged the Mouse to tell them something more.\n\n'You promised to tell me your history, you know,' said Alice, 'and why\nit is you hate--C and D,' she added in a whisper, half afraid that it\nwould be offended again.\n\n'Mine is a long and a sad tale!' said the Mouse, turning to Alice, and\nsighing.\n\n'It IS a long tail, certainly,' said Alice, looking down with wonder at\nthe Mouse's tail; 'but why do you call it sad?' And she kept on puzzling\nabout it while the Mouse was speaking, so that her idea of the tale was\nsomething like this:--\n\n         'Fury said to a\n         mouse, That he\n        met in the\n       house,\n     \"Let us\n      both go to\n       law: I will\n        prosecute\n         YOU.--Come,\n           I'll take no\n           denial; We\n          must have a\n        trial: For\n      really this\n     morning I've\n    nothing\n    to do.\"\n     Said the\n      mouse to the\n       cur, \"Such\n        a trial,\n         dear Sir,\n            With\n          no jury\n        or judge,\n       would be\n      wasting\n      our\n      breath.\"\n       \"I'll be\n        judge, I'll\n         be jury,\"\n            Said\n         cunning\n          old Fury:\n          \"I'll\n          try the\n            whole\n            cause,\n              and\n           condemn\n           you\n          to\n           death.\"'\n\n\n'You are not attending!' said the Mouse to Alice severely. 'What are you\nthinking of?'\n\n'I beg your pardon,' said Alice very humbly: 'you had got to the fifth\nbend, I think?'\n\n'I had NOT!' cried the Mouse, sharply and very angrily.\n\n'A knot!' said Alice, always ready to make herself useful, and looking\nanxiously about her. 'Oh, do let me help to undo it!'\n\n'I shall do nothing of the sort,' said the Mouse, getting up and walking\naway. 'You insult me by talking such nonsense!'\n\n'I didn't mean it!' pleaded poor Alice. 'But you're so easily offended,\nyou know!'\n\nThe Mouse only growled in reply.\n\n'Please come back and finish your story!' Alice called after it; and the\nothers all joined in chorus, 'Yes, please do!' but the Mouse only shook\nits head impatiently, and walked a little quicker.\n\n'What a pity it wouldn't stay!' sighed the Lory, as soon as it was quite\nout of sight; and an old Crab took the opportunity of saying to her\ndaughter 'Ah, my dear! Let this be a lesson to you never to lose\nYOUR temper!' 'Hold your tongue, Ma!' said the young Crab, a little\nsnappishly. 'You're enough to try the patience of an oyster!'\n\n'I wish I had our Dinah here, I know I do!' said Alice aloud, addressing\nnobody in particular. 'She'd soon fetch it back!'\n\n'And who is Dinah, if I might venture to ask the question?' said the\nLory.\n\nAlice replied eagerly, for she was always ready to talk about her pet:\n'Dinah's our cat. And she's such a capital one for catching mice you\ncan't think! And oh, I wish you could see her after the birds! Why,\nshe'll eat a little bird as soon as look at it!'\n\nThis speech caused a remarkable sensation among the party. Some of the\nbirds hurried off at once: one old Magpie began wrapping itself up very\ncarefully, remarking, 'I really must be getting home; the night-air\ndoesn't suit my throat!' and a Canary called out in a trembling voice to\nits children, 'Come away, my dears! It's high time you were all in bed!'\nOn various pretexts they all moved off, and Alice was soon left alone.\n\n'I wish I hadn't mentioned Dinah!' she said to herself in a melancholy\ntone. 'Nobody seems to like her, down here, and I'm sure she's the best\ncat in the world! Oh, my dear Dinah! I wonder if I shall ever see you\nany more!' And here poor Alice began to cry again, for she felt very\nlonely and low-spirited. In a little while, however, she again heard\na little pattering of footsteps in the distance, and she looked up\neagerly, half hoping that the Mouse had changed his mind, and was coming\nback to finish his story.\n\n\n\n\n!!! CHAPTER IV. The Rabbit Sends in a Little Bill\n\nIt was the White Rabbit, trotting slowly back again, and looking\nanxiously about as it went, as if it had lost something; and she heard\nit muttering to itself 'The Duchess! The Duchess! Oh my dear paws! Oh\nmy fur and whiskers! She'll get me executed, as sure as ferrets are\nferrets! Where CAN I have dropped them, I wonder?' Alice guessed in a\nmoment that it was looking for the fan and the pair of white kid gloves,\nand she very good-naturedly began hunting about for them, but they were\nnowhere to be seen--everything seemed to have changed since her swim in\nthe pool, and the great hall, with the glass table and the little door,\nhad vanished completely.\n\nVery soon the Rabbit noticed Alice, as she went hunting about, and\ncalled out to her in an angry tone, 'Why, Mary Ann, what ARE you doing\nout here? Run home this moment, and fetch me a pair of gloves and a fan!\nQuick, now!' And Alice was so much frightened that she ran off at once\nin the direction it pointed to, without trying to explain the mistake it\nhad made.\n\n'He took me for his housemaid,' she said to herself as she ran. 'How\nsurprised he'll be when he finds out who I am! But I'd better take him\nhis fan and gloves--that is, if I can find them.' As she said this, she\ncame upon a neat little house, on the door of which was a bright brass\nplate with the name 'W. RABBIT' engraved upon it. She went in without\nknocking, and hurried upstairs, in great fear lest she should meet the\nreal Mary Ann, and be turned out of the house before she had found the\nfan and gloves.\n\n'How queer it seems,' Alice said to herself, 'to be going messages for\na rabbit! I suppose Dinah'll be sending me on messages next!' And she\nbegan fancying the sort of thing that would happen: '\"Miss Alice! Come\nhere directly, and get ready for your walk!\" \"Coming in a minute,\nnurse! But I've got to see that the mouse doesn't get out.\" Only I don't\nthink,' Alice went on, 'that they'd let Dinah stop in the house if it\nbegan ordering people about like that!'\n\nBy this time she had found her way into a tidy little room with a table\nin the window, and on it (as she had hoped) a fan and two or three pairs\nof tiny white kid gloves: she took up the fan and a pair of the gloves,\nand was just going to leave the room, when her eye fell upon a little\nbottle that stood near the looking-glass. There was no label this time\nwith the words 'DRINK ME,' but nevertheless she uncorked it and put it\nto her lips. 'I know SOMETHING interesting is sure to happen,' she said\nto herself, 'whenever I eat or drink anything; so I'll just see what\nthis bottle does. I do hope it'll make me grow large again, for really\nI'm quite tired of being such a tiny little thing!'\n\nIt did so indeed, and much sooner than she had expected: before she had\ndrunk half the bottle, she found her head pressing against the ceiling,\nand had to stoop to save her neck from being broken. She hastily put\ndown the bottle, saying to herself 'That's quite enough--I hope I shan't\ngrow any more--As it is, I can't get out at the door--I do wish I had
