{"title":"$:/plugins/tiddlywiki/tw2parser","name":"TW2 Parser","description":"TiddlyWiki Classic parser","author":"Jeffrey Wilkinson","list":"readme","stability":"STABILITY_2_STABLE","version":"5.4.0-prerelease","plugin-type":"plugin","dependents":"","type":"application/json","text":"{\"tiddlers\":{\"$:/core/ui/ViewTemplate/classic\":{\"title\":\"$:/core/ui/ViewTemplate/classic\",\"tags\":\"$:/tags/ViewTemplate $:/tags/EditTemplate\",\"type\":\"text/vnd.tiddlywiki\",\"text\":\"\\n\\n\"},\"$:/core/modules/widgets/classictransclude.js\":{\"title\":\"$:/core/modules/widgets/classictransclude.js\",\"text\":\"/*\\\\\\ntitle: $:/core/modules/widgets/classictransclude.js\\ntype: application/javascript\\nmodule-type: widget\\n\\nTransclude widget\\n\\n\\\\*/\\n\\n\\\"use strict\\\";\\nvar sliceSeparator = \\\"::\\\";\\nvar sectionSeparator = \\\"##\\\";\\n\\nfunction getsectionname(title) {\\n\\tif(!title)\\n\\t\\treturn \\\"\\\";\\n\\tvar pos = title.indexOf(sectionSeparator);\\n\\tif(pos != -1) {\\n\\t\\treturn title.substr(pos + sectionSeparator.length);\\n\\t}\\n\\treturn \\\"\\\";\\n}\\nfunction getslicename(title) { \\n\\tif(!title)\\n\\t\\treturn \\\"\\\";\\n\\tvar pos = title.indexOf(sliceSeparator);\\n\\tif(pos != -1) {\\n\\t\\treturn title.substr(pos + sliceSeparator.length);\\n\\t}\\n\\treturn \\\"\\\";\\n};\\nfunction gettiddlername(title) {\\n\\tif(!title)\\n\\t\\treturn \\\"\\\";\\n\\tvar pos = title.indexOf(sectionSeparator);\\n\\n\\tif(pos != -1) {\\n\\t\\treturn title.substr(0,pos);\\n\\t}\\n\\tpos = title.indexOf(sliceSeparator);\\n\\tif(pos != -1) {\\n\\t\\treturn title.substr(0,pos);\\n\\t}\\n\\treturn title;\\n}\\nvar Widget = require(\\\"$:/core/modules/widgets/widget.js\\\").widget;\\n\\nvar TranscludeWidget = function(parseTreeNode,options) {\\n\\tthis.initialise(parseTreeNode,options);\\n};\\n\\n/*\\nInherit from the base widget class\\n*/\\nTranscludeWidget.prototype = new Widget();\\n\\n/*\\nRender this widget into the DOM\\n*/\\nTranscludeWidget.prototype.render = function(parent,nextSibling) {\\n\\tthis.parentDomNode = parent;\\n\\tthis.computeAttributes();\\n\\tthis.execute();\\n\\tthis.renderChildren(parent,nextSibling);\\n};\\n\\n/*\\nCompute the internal state of the widget\\n*/\\nTranscludeWidget.prototype.execute = function() {\\n\\t// Get our parameters\\n\\tthis.rawTitle = this.getAttribute(\\\"tiddler\\\",this.getVariable(\\\"currentTiddler\\\"));\\n\\tthis.transcludeTitle = gettiddlername(this.rawTitle);\\n\\tthis.section = getsectionname(this.rawTitle);\\n\\tthis.slice = getslicename(this.rawTitle);\\n\\t// Check for recursion\\n\\tvar recursionMarker = this.makeRecursionMarker();\\n\\tif(this.parentWidget && this.parentWidget.hasVariable(\\\"transclusion\\\",recursionMarker)) {\\n\\t\\tthis.makeChildWidgets([{type: \\\"text\\\", text: $tw.language.getString(\\\"Error/RecursiveTransclusion\\\")}]);\\n\\t\\treturn;\\n\\t}\\n\\t// Check for correct type\\n\\tvar existingTiddler = this.wiki.getTiddler(this.transcludeTitle);\\n\\t// Check if we're dealing with a classic tiddler\\n\\tif(existingTiddler && existingTiddler.hasField(\\\"type\\\") && existingTiddler.fields.type !== \\\"text/x-tiddlywiki\\\") {\\n\\t\\tthis.makeChildWidgets([{type: \\\"text\\\", text: \\\"Tiddler not of type 'text/x-tiddlywiki'\\\"}]);\\n\\t\\treturn;\\n\\t}\\n\\tif(existingTiddler && !existingTiddler.hasField(\\\"type\\\")) {\\n\\t\\tthis.makeChildWidgets([{type: \\\"text\\\", text: \\\"Tiddler not of type 'text/x-tiddlywiki'\\\"}]);\\n\\t\\treturn;\\n\\t}\\t\\t\\n\\t// Set context variables for recursion detection\\n\\tthis.setVariable(\\\"transclusion\\\",recursionMarker);\\n\\t// Parse \\n\\tvar text = this.wiki.getTiddlerText(this.transcludeTitle);\\n\\tif (!!this.section||!!this.slice) {\\n\\t\\ttext =this.refineTiddlerText(text, this.section, this.slice);\\n\\t}\\n\\n\\tthis.options  ={};\\n\\tthis.options.parseAsInline = false;\\n\\tvar parser = this.wiki.parseText(\\\"text/x-tiddlywiki\\\",text,{});\\n\\tvar\\tparseTreeNodes = parser ? parser.tree : this.parseTreeNode.children;\\n\\t// Construct the child widgets\\n\\tthis.makeChildWidgets(parseTreeNodes);\\n};\\n/*\\nCompose a string comprising the title, field and/or index to identify this transclusion for recursion detection\\n*/\\nTranscludeWidget.prototype.makeRecursionMarker = function() {\\n\\tvar output = [];\\n\\toutput.push(\\\"{\\\");\\n\\toutput.push(this.getVariable(\\\"currentTiddler\\\",{defaultValue: \\\"\\\"}));\\n\\toutput.push(\\\"|\\\");\\n\\toutput.push(this.transcludeTitle || \\\"\\\");\\n\\toutput.push(\\\"|\\\");\\n\\toutput.push(this.transcludeField || \\\"\\\");\\n\\toutput.push(\\\"|\\\");\\n\\toutput.push(this.transcludeIndex || \\\"\\\");\\n\\toutput.push(\\\"|\\\");\\n\\toutput.push(this.section || \\\"\\\");\\n\\toutput.push(\\\"|\\\");\\n\\toutput.push(this.slice || \\\"\\\");\\n\\toutput.push(\\\"}\\\");\\n\\treturn output.join(\\\"\\\");\\n};\\n\\nTranscludeWidget.prototype.slicesRE = /(?:^([\\\\'\\\\/]{0,2})~?([\\\\.\\\\w]+)\\\\:\\\\1[\\\\t\\\\x20]*([^\\\\n]*)[\\\\t\\\\x20]*$)|(?:^\\\\|([\\\\'\\\\/]{0,2})~?([\\\\.\\\\w]+)\\\\:?\\\\4\\\\|[\\\\t\\\\x20]*([^\\\\|\\\\n]*)[\\\\t\\\\x20]*\\\\|$)/gm;\\n\\nTranscludeWidget.prototype.calcAllSlices = function(text)\\n{\\n\\tvar slices = {};\\n\\tthis.slicesRE.lastIndex = 0;\\n\\tvar m = this.slicesRE.exec(text);\\n\\twhile(m) {\\n\\t\\tif(m[2])\\n\\t\\t\\tslices[m[2]] = m[3];\\n\\t\\telse\\n\\t\\t\\tslices[m[5]] = m[6];\\n\\t\\tm = this.slicesRE.exec(text);\\n\\t}\\n\\treturn slices;\\n};\\n\\n// Returns the slice of text of the given name\\nTranscludeWidget.prototype.getTextSlice = function(text,sliceName)\\n{\\n\\treturn (this.calcAllSlices(text))[sliceName];\\n};\\n\\nTranscludeWidget.prototype.refineTiddlerText = function(text,section,slice)\\n{\\n\\tvar textsection = null;\\n\\tif (slice) {\\n\\t\\tvar textslice = this.getTextSlice(text,slice);\\n\\t\\tif(textslice)\\n\\t\\t\\treturn textslice;\\n\\t}\\n\\tif(!section)\\n\\t\\treturn text;\\n\\tvar re = new RegExp(\\\"(^!{1,6}[ \\\\t]*\\\" + $tw.utils.escapeRegExp(section) + \\\"[ \\\\t]*\\\\n)\\\",\\\"mg\\\");\\n\\tre.lastIndex = 0;\\n\\tvar match = re.exec(text);\\n\\tif(match) {\\n\\t\\tvar t = text.substr(match.index+match[1].length);\\n\\t\\tvar re2 = /^!/mg;\\n\\t\\tre2.lastIndex = 0;\\n\\t\\tmatch = re2.exec(t); //# search for the next heading\\n\\t\\tif(match)\\n\\t\\t\\tt = t.substr(0,match.index-1);//# don't include final \\\\n\\n\\t\\treturn t;\\n\\t}\\n\\treturn \\\"\\\";\\n}\\n\\n/*\\nSelectively refreshes the widget if needed. Returns true if the widget or any of its children needed re-rendering\\n*/\\nTranscludeWidget.prototype.refresh = function(changedTiddlers) {\\n\\tvar changedAttributes = this.computeAttributes();\\n\\tif(changedAttributes.tiddler ||changedTiddlers[this.transcludeTitle]) {\\n\\t\\tthis.refreshSelf();\\n\\t\\treturn true;\\n\\t} else {\\n\\t\\treturn this.refreshChildren(changedTiddlers);\\t\\t\\n\\t}\\n};\\n\\nexports.classictransclude = TranscludeWidget;\\n\",\"type\":\"application/javascript\",\"module-type\":\"widget\"},\"$:/macros/tiddlywiki/entry.js\":{\"title\":\"$:/macros/tiddlywiki/entry.js\",\"text\":\"/*\\\\\\ntitle: $:/macros/tiddlywiki/entry.js\\ntype: application/javascript\\nmodule-type: macro\\n\\\\*/\\n\\\"use strict\\\";\\n/*\\nInformation about this macro\\nreturns value of key in a data json tiddler\\nnote that macros are not connected with the refresh mechanism -use with caution.\\n*/\\nexports.name = \\\"entryof\\\";\\n\\nexports.params = [\\n\\t{ name: \\\"key\\\" }, { name: \\\"map\\\" }\\n];\\n/*\\nRun the macro\\n*/\\nexports.run = function(key,map) {\\n\\ttry {\\n\\t\\treturn  JSON.parse(map)[key];\\n\\t} catch(e) {\\n\\t\\treturn \\\"\\\";\\n\\t}\\n}\\n\",\"type\":\"application/javascript\",\"module-type\":\"macro\"},\"$:/plugins/tiddlywiki/tw2parser/image-css\":{\"title\":\"$:/plugins/tiddlywiki/tw2parser/image-css\",\"tags\":\"$:/tags/Stylesheet\",\"type\":\"text/plain\",\"text\":\".classic-image-left{\\n     float: left;\\n}\\n\\n.classic-image-right{\\n     float: right;\\n}\\n\"},\"$:/plugins/tiddlywiki/tw2parser/macrodefs\":{\"title\":\"$:/plugins/tiddlywiki/tw2parser/macrodefs\",\"text\":\"\\\\define tiddler(tiddler)\\n\u003C$classictransclude tiddler = \\\"$tiddler$\\\"/>\\n\\\\end\\n\\n\\\\define slider(chkUniqueCookieName tiddler label tooltip)\\n\u003Cspan title=$tooltip$>\u003C$button popup=\\\"$chkUniqueCookieName$\\\" class=\\\"tc-btn-invisible tc-slider\\\">$label$\u003C/$button>\\n\u003C$reveal type=\\\"nomatch\\\" text=\\\"\\\" default=\\\"\\\" state=\\\"$chkUniqueCookieName$\\\" animate=\\\"yes\\\">\\n\u003C$classictransclude tiddler = \\\"$tiddler$\\\"/>\\n\u003C/$reveal>\u003C/span>\\n\\\\end\\n\\n\\\\define __system_tabinstance(state, currentTab, prompts, labels)\\n\\t\\t\u003Cspan title=\u003C\u003Centryof \\\"$currentTab$\\\" \\\"\\\"\\\"$prompts$\\\"\\\"\\\">> >\u003C$button set=\u003C\u003Cqualify \\\"$state$\\\">> setTo=\\\"$currentTab$\\\" selectedClass=\\\"tc-tab-selected\\\">\\n\\t\\t\u003C\u003Centryof \\\"$currentTab$\\\" \\\"\\\"\\\"$labels$\\\"\\\"\\\" >>\\n\\t\\t\u003C/$button>\u003C/span>\\n\\\\end\\n\\n\\\\define __system_tabs(tabsList,prompts,labels,state:\\\"$:/state/tab\\\")\\n\u003Cdiv class=\\\"tc-tab-buttons\\\">\\n\\t\u003C$list filter=\\\"$tabsList$\\\" variable=\\\"currentTab\\\">\\n\\t\\t\u003C$macrocall $name=\\\"__system_tabinstance\\\" state=\\\"$state$\\\" prompts=\\\"\\\"\\\"$prompts$\\\"\\\"\\\" labels=\\\"\\\"\\\"$labels$\\\"\\\"\\\" currentTab=\u003C\u003CcurrentTab>>/>\\n\\t\u003C/$list>\\n\u003C/div>\\n\u003Cdiv class=\\\"tc-tab-divider\\\"/>\\n\u003Cdiv class=\\\"tc-tab-content\\\">\\n\\t\u003C$list filter=\\\"$tabsList$\\\" variable=\\\"currentTab\\\">\\n\\t\\t\u003C$reveal type=\\\"match\\\" state=\u003C\u003Cqualify \\\"$state$\\\">> text=\u003C\u003CcurrentTab>> default=\\\"$default$\\\">\\n\\t\\t\\t\u003C$classictransclude tiddler=\u003C\u003CcurrentTab>> />\\n\\t\\t\u003C/$reveal>\\n\\t\u003C/$list>\\n\u003C/div>\\n\\\\end\\n\"},\"$:/macros/classic/macroadapter.js\":{\"title\":\"$:/macros/classic/macroadapter.js\",\"text\":\"/*\\\\\\ntitle: $:/macros/classic/macroadapter.js\\ntype: application/javascript\\nmodule-type: module\\n\\\\*/\\n\\n\\\"use strict\\\";\\n/*\\nInformation about this module:\\nrename macros and\\nre-jig macro params from tw2 to tw5 style\\nnew macros created as a result of adapting tw2 should be \\nprepended \\\"__system\\\" to distinguish them from the actual used name\\n*/\\nvar sliceSeparator = \\\"::\\\";\\nvar sectionSeparator = \\\"##\\\";\\n\\nfunction getsectionname(title) {\\n\\tif(!title)\\n\\t\\treturn \\\"\\\";\\n\\tvar pos = title.indexOf(sectionSeparator);\\n\\tif(pos != -1) {\\n\\t\\treturn title.substr(pos + sectionSeparator.length);\\n\\t}\\n\\treturn \\\"\\\";\\n}\\nfunction getslicename(title) { \\n\\tif(!title)\\n\\t\\treturn \\\"\\\";\\n\\tvar pos = title.indexOf(sliceSeparator);\\n\\tif(pos != -1) {\\n\\t\\treturn title.substr(pos + sliceSeparator.length);\\n\\t}\\n\\treturn \\\"\\\";\\n};\\nfunction gettiddlername(title) {\\n\\tif(!title)\\n\\t\\treturn \\\"\\\";\\n\\tvar pos = title.indexOf(sectionSeparator);\\n\\n\\tif(pos != -1) {\\n\\t\\treturn title.substr(0,pos);\\n\\t}\\n\\tpos = title.indexOf(sliceSeparator);\\n\\tif(pos != -1) {\\n\\t\\treturn title.substr(0,pos);\\n\\t}\\n\\treturn title;\\n}\\n\\nvar parserparams = function(paramString) {\\n\\tvar params = [],\\n\\t\\treParam = /\\\\s*(?:([A-Za-z0-9\\\\-_]+)\\\\s*:)?(?:\\\\s*(?:\\\"\\\"\\\"([\\\\s\\\\S]*?)\\\"\\\"\\\"|\\\"([^\\\"]*)\\\"|'([^']*)'|\\\\[\\\\[([^\\\\]]*)\\\\]\\\\]|([^\\\"'\\\\s]+)))/mg,\\n\\t\\tparamMatch = reParam.exec(paramString);\\n\\twhile(paramMatch) {\\n\\t\\t// Process this parameter\\n\\t\\tvar paramInfo = {\\n\\t\\t\\tvalue: paramMatch[2] || paramMatch[3] || paramMatch[4] || paramMatch[5] || paramMatch[6]\\n\\t\\t};\\n\\t\\tif(paramMatch[1]) {\\n\\t\\t\\tparamInfo.name = paramMatch[1];\\n\\t\\t}\\n\\t\\tparams.push(paramInfo);\\n\\t\\t// Find the next match\\n\\t\\tparamMatch = reParam.exec(paramString);\\n\\t}\\n\\treturn params;\\n}\\nvar tabshandler = function(paramstring) {\\n\\tvar params = parserparams(paramstring);\\n\\tvar cookie = params[0].value;\\n\\tvar numTabs = (params.length-1)/3;\\n\\tvar t;\\n\\tvar tabslist = \\\"\\\";\\n\\tvar labelarray = {};\\n    var promptarray = {};\\n\\tfor(t=0; t\u003CnumTabs; t++) {\\n\\t\\tvar contentName = params[t*3+3].value;\\n\\t\\ttabslist = tabslist+\\\" \\\" + contentName;\\n\\t\\tlabelarray[contentName] = params[t*3+1].value;\\n\\t\\tpromptarray[contentName] = params[t*3+2].value;\\n\\t} \\n\\t//Create a list of names (tiddlers, tiddler/sections, tiddler/slices), and create maps from name -> label and name -> prompt\\n\\t//Use json to implement maps \\n\\treturn '\\\"\\\"\\\"'+tabslist +'\\\"\\\"\\\" \\\"\\\"\\\"'+JSON.stringify(promptarray)+'\\\"\\\"\\\" \\\"\\\"\\\"'+JSON.stringify(labelarray)+'\\\"\\\"\\\" \\\"\\\"\\\"'+cookie+'\\\"\\\"\\\"';\\n};\\nvar namedapter = {tabs:'__system_tabs'};\\nvar paramadapter = {\\n\\ttabs: tabshandler\\n}\\nexports.name = 'macroadapter';\\nexports.namedapter = namedapter;\\nexports.paramadapter = paramadapter;\\n\",\"type\":\"application/javascript\",\"module-type\":\"module\"},\"$:/plugins/tiddlywiki/tw2parser/readme\":{\"title\":\"$:/plugins/tiddlywiki/tw2parser/readme\",\"text\":\"This experimental plugin provides support for parsing and rendering tiddlers written in TiddlyWiki Classic format (`text/x-tiddlywiki`).\\n\\n[[Source code|https://github.com/TiddlyWiki/TiddlyWiki5/blob/master/plugins/tiddlywiki/tw2parser]]\\n\"},\"$:/plugins/tiddlywiki/tw2parser/wikitextparser.js\":{\"title\":\"$:/plugins/tiddlywiki/tw2parser/wikitextparser.js\",\"text\":\"/*\\\\\\ntitle: $:/plugins/tiddlywiki/tw2parser/wikitextparser.js\\ntype: application/javascript\\nmodule-type: parser\\n\\nParses a block of tiddlywiki-format wiki text into a parse tree object. This is a transliterated version of the old TiddlyWiki code. The plan is to replace it with a new, mostly backwards compatible parser built in PEGJS.\\n\\nA wikitext parse tree is an array of objects with a `type` field that can be `text`,`macro` or the name of an HTML element.\\n\\nText nodes are represented as `{type: \\\"text\\\", value: \\\"A string of text\\\"}`.\\n\\nMacro nodes look like this:\\n`\\n{type: \\\"macro\\\", name: \\\"view\\\", params: {\\n\\tone: {type: \\\"eval\\\", value: \\\"2+2\\\"},\\n\\ttwo: {type: \\\"string\\\", value: \\\"twenty two\\\"}\\n}}\\n`\\nHTML nodes look like this:\\n`\\n{type: \\\"div\\\", attributes: {\\n\\tsrc: \\\"one\\\"\\n\\tstyles: {\\n\\t\\t\\\"background-color\\\": \\\"#fff\\\",\\n\\t\\t\\\"color\\\": \\\"#000\\\"\\n\\t}\\n}}\\n`\\n\\n\\\\*/\\n\\n\\\"use strict\\\";\\n\\n/*\\nCreates a new instance of the wiki text parser with the specified options. The\\noptions are a hashmap of mandatory members as follows:\\n\\n\\twiki: The wiki object to use to parse any cascaded content (eg transclusion)\\n\\nPlanned:\\n\\n\\tenableRules: An array of names of wiki text rules to enable. If not specified, all rules are available\\n\\textraRules: An array of additional rule handlers to add\\n\\tenableMacros: An array of names of macros to enable. If not specified, all macros are available\\n\\textraMacros: An array of additional macro handlers to add\\n*/\\n\\nvar WikiTextParser = function(type,text,options) {\\n\\tthis.wiki = options.wiki;\\n\\tthis.autoLinkWikiWords = true;\\n\\tthis.installRules();\\n\\ttext = text || \\\"no text\\\";\\n\\tthis.source = text;\\n\\tthis.nextMatch = 0;\\n\\tthis.children = [];\\n\\tthis.tree =[];\\n\\tthis.output = null;\\n\\tthis.subWikify(this.children);\\n\\t// prepend tw2 macros locally to the content\\n\\tvar parser = this.wiki.parseTiddler(\\\"$:/plugins/tiddlywiki/tw2parser/macrodefs\\\",{parseAsInline:false});\\n\\tthis.tree = [{\\n\\t\\ttype: \\\"element\\\",\\n\\t\\ttag: \\\"div\\\",\\n\\t\\tchildren:this.children\\n\\t}];\\n\\t// clone the output of parser \\n\\tvar root = JSON.parse(JSON.stringify(parser.tree));\\n\\t// macros are defined in a linear tree; walk down the tree and append the source's parsed content \\n\\tvar baseroot = root;\\n\\twhile(root[0] && root[0].children && root[0].children.length !== 0 ){ \\n\\t\\troot = root[0].children;\\n\\t}\\n\\troot[0].children[0] = this.tree[0];\\n\\tthis.tree = baseroot;\\n};\\n\\n\\nWikiTextParser.prototype.installRules = function() {\\n\\tvar rules = require(\\\"./wikitextrules.js\\\").rules,\\n\\t\\tpattern = [];\\n\\tfor(var n=0; n\u003Crules.length; n++) {\\n\\t\\tpattern.push(\\\"(\\\" + rules[n].match + \\\")\\\");\\n\\t}\\n\\tthis.rules = rules;\\n\\tthis.rulesRegExp = new RegExp(pattern.join(\\\"|\\\"),\\\"mg\\\");\\n};\\n\\n\\nWikiTextParser.prototype.outputText = function(place,startPos,endPos) {\\n\\tif(startPos \u003C endPos) {\\n\\t\\tplace.push({type: \\\"text\\\",text:this.source.substring(startPos,endPos)});\\n\\t}\\n};\\n\\nWikiTextParser.prototype.subWikify = function(output,terminator) {\\n\\t// Handle the terminated and unterminated cases separately, this speeds up wikifikation by about 30%\\n\\tif(terminator)\\n\\t\\tthis.subWikifyTerm(output,new RegExp(\\\"(\\\" + terminator + \\\")\\\",\\\"mg\\\"));\\n\\telse\\n\\t\\tthis.subWikifyUnterm(output);\\n};\\n\\nWikiTextParser.prototype.subWikifyUnterm = function(output) {\\n\\t// subWikify can be indirectly recursive, so we need to save the old output pointer\\n\\tvar oldOutput = this.output;\\n\\tthis.output = output;\\n\\t// Get the first match\\n\\tthis.rulesRegExp.lastIndex = this.nextMatch;\\n\\tvar ruleMatch = this.rulesRegExp.exec(this.source);\\n\\twhile(ruleMatch) {\\n\\t\\t// Output any text before the match\\n\\t\\tif(ruleMatch.index > this.nextMatch)\\n\\t\\t\\tthis.outputText(this.output,this.nextMatch,ruleMatch.index);\\n\\t\\t// Set the match parameters for the handler\\n\\t\\tthis.matchStart = ruleMatch.index;\\n\\t\\tthis.matchLength = ruleMatch[0].length;\\n\\t\\tthis.matchText = ruleMatch[0];\\n\\t\\tthis.nextMatch = this.rulesRegExp.lastIndex;\\n\\t\\t// Figure out which rule matched and call its handler\\n\\t\\tvar t;\\n\\t\\tfor(t=1; t\u003CruleMatch.length; t++) {\\n\\t\\t\\tif(ruleMatch[t]) {\\n\\t\\t\\t\\tthis.rules[t-1].handler(this);\\n\\t\\t\\t\\tthis.rulesRegExp.lastIndex = this.nextMatch;\\n\\t\\t\\t\\tbreak;\\n\\t\\t\\t}\\n\\t\\t}\\n\\t\\t// Get the next match\\n\\t\\truleMatch = this.rulesRegExp.exec(this.source);\\n\\t}\\n\\t// Output any text after the last match\\n\\tif(this.nextMatch \u003C this.source.length) {\\n\\t\\tthis.outputText(this.output,this.nextMatch,this.source.length);\\n\\t\\tthis.nextMatch = this.source.length;\\n\\t}\\n\\t// Restore the output pointer\\n\\tthis.output = oldOutput;\\n};\\n\\nWikiTextParser.prototype.subWikifyTerm = function(output,terminatorRegExp) {\\n\\t// subWikify can be indirectly recursive, so we need to save the old output pointer\\n\\tvar oldOutput = this.output;\\n\\tthis.output = output;\\n\\t// Get the first matches for the rule and terminator RegExps\\n\\tterminatorRegExp.lastIndex = this.nextMatch;\\n\\tvar terminatorMatch = terminatorRegExp.exec(this.source);\\n\\tthis.rulesRegExp.lastIndex = this.nextMatch;\\n\\tvar ruleMatch = this.rulesRegExp.exec(terminatorMatch ? this.source.substr(0,terminatorMatch.index) : this.source);\\n\\twhile(terminatorMatch || ruleMatch) {\\n\\t\\t// Check for a terminator match before the next rule match\\n\\t\\tif(terminatorMatch && (!ruleMatch || terminatorMatch.index \u003C= ruleMatch.index)) {\\n\\t\\t\\t// Output any text before the match\\n\\t\\t\\tif(terminatorMatch.index > this.nextMatch)\\n\\t\\t\\t\\tthis.outputText(this.output,this.nextMatch,terminatorMatch.index);\\n\\t\\t\\t// Set the match parameters\\n\\t\\t\\tthis.matchText = terminatorMatch[1];\\n\\t\\t\\tthis.matchLength = terminatorMatch[1].length;\\n\\t\\t\\tthis.matchStart = terminatorMatch.index;\\n\\t\\t\\tthis.nextMatch = this.matchStart + this.matchLength;\\n\\t\\t\\t// Restore the output pointer\\n\\t\\t\\tthis.output = oldOutput;\\n\\t\\t\\treturn;\\n\\t\\t}\\n\\t\\t// It must be a rule match; output any text before the match\\n\\t\\tif(ruleMatch.index > this.nextMatch)\\n\\t\\t\\tthis.outputText(this.output,this.nextMatch,ruleMatch.index);\\n\\t\\t// Set the match parameters\\n\\t\\tthis.matchStart = ruleMatch.index;\\n\\t\\tthis.matchLength = ruleMatch[0].length;\\n\\t\\tthis.matchText = ruleMatch[0];\\n\\t\\tthis.nextMatch = this.rulesRegExp.lastIndex;\\n\\t\\t// Figure out which rule matched and call its handler\\n\\t\\tvar t;\\n\\t\\tfor(t=1; t\u003CruleMatch.length; t++) {\\n\\t\\t\\tif(ruleMatch[t]) {\\n\\t\\t\\t\\tthis.rules[t-1].handler(this);\\n\\t\\t\\t\\tthis.rulesRegExp.lastIndex = this.nextMatch;\\n\\t\\t\\t\\tbreak;\\n\\t\\t\\t}\\n\\t\\t}\\n\\t\\t// Get the next match\\n\\t\\tterminatorRegExp.lastIndex = this.nextMatch;\\n\\t\\tterminatorMatch = terminatorRegExp.exec(this.source);\\n\\t\\truleMatch = this.rulesRegExp.exec(terminatorMatch ? this.source.substr(0,terminatorMatch.index) : this.source);\\n\\t}\\n\\t// Output any text after the last match\\n\\tif(this.nextMatch \u003C this.source.length) {\\n\\t\\tthis.outputText(this.output,this.nextMatch,this.source.length);\\n\\t\\tthis.nextMatch = this.source.length;\\n\\t}\\n\\t// Restore the output pointer\\n\\tthis.output = oldOutput;\\n};\\n\\nexports[\\\"text/x-tiddlywiki\\\"] = WikiTextParser;\\n\",\"type\":\"application/javascript\",\"module-type\":\"parser\"},\"$:/plugins/tiddlywiki/tw2parser/wikitextrules.js\":{\"title\":\"$:/plugins/tiddlywiki/tw2parser/wikitextrules.js\",\"text\":\"/*\\\\\\ntitle: $:/plugins/tiddlywiki/tw2parser/wikitextrules.js\\ntype: application/javascript\\nmodule-type: module\\n\\nRule modules for the wikitext parser\\n\\n\\\\*/\\n\\n\\\"use strict\\\";\\nvar macroadapter = require(\\\"$:/macros/classic/macroadapter.js\\\");\\nvar textPrimitives = {\\n\\tupperLetter: \\\"[A-Z\\\\u00c0-\\\\u00de\\\\u0150\\\\u0170]\\\",\\n\\tlowerLetter: \\\"[a-z0-9_\\\\\\\\-\\\\u00df-\\\\u00ff\\\\u0151\\\\u0171]\\\",\\n\\tanyLetter:   \\\"[A-Za-z0-9_\\\\\\\\-\\\\u00c0-\\\\u00de\\\\u00df-\\\\u00ff\\\\u0150\\\\u0170\\\\u0151\\\\u0171]\\\",\\n\\tanyLetterStrict: \\\"[A-Za-z0-9\\\\u00c0-\\\\u00de\\\\u00df-\\\\u00ff\\\\u0150\\\\u0170\\\\u0151\\\\u0171]\\\",\\n\\tsliceSeparator: \\\"::\\\",\\n\\tsectionSeparator: \\\"##\\\",\\n\\turlPattern: \\\"(?:file|http|https|mailto|ftp|irc|news|data):[^\\\\\\\\s'\\\\\\\"]+(?:/|\\\\\\\\b)\\\",\\n\\tunWikiLink: \\\"~\\\",\\n\\tbrackettedLink: \\\"\\\\\\\\[\\\\\\\\[([^\\\\\\\\]]+)\\\\\\\\]\\\\\\\\]\\\",\\n\\ttitledBrackettedLink: \\\"\\\\\\\\[\\\\\\\\[([^\\\\\\\\[\\\\\\\\]\\\\\\\\|]+)\\\\\\\\|([^\\\\\\\\[\\\\\\\\]\\\\\\\\|]+)\\\\\\\\]\\\\\\\\]\\\"\\n};\\n\\ntextPrimitives.wikiLink = \\\"(?:(?:\\\" + textPrimitives.upperLetter + \\\"+\\\" +\\n\\t\\t\\t\\t\\t\\t\\ttextPrimitives.lowerLetter + \\\"+\\\" +\\n\\t\\t\\t\\t\\t\\t\\ttextPrimitives.upperLetter +\\n\\t\\t\\t\\t\\t\\t\\ttextPrimitives.anyLetter + \\\"*)|(?:\\\" +\\n\\t\\t\\t\\t\\t\\t\\ttextPrimitives.upperLetter + \\\"{2,}\\\" +\\n\\t\\t\\t\\t\\t\\t\\ttextPrimitives.lowerLetter + \\\"+))\\\";\\n\\ntextPrimitives.cssLookahead = \\\"(?:(\\\" + textPrimitives.anyLetter +\\n\\t\\\"+)\\\\\\\\(([^\\\\\\\\)\\\\\\\\|\\\\\\\\n]+)(?:\\\\\\\\):))|(?:(\\\" + textPrimitives.anyLetter + \\\"+):([^;\\\\\\\\|\\\\\\\\n]+);)\\\";\\n\\ntextPrimitives.cssLookaheadRegExp = new RegExp(textPrimitives.cssLookahead,\\\"mg\\\");\\n\\ntextPrimitives.tiddlerForcedLinkRegExp = new RegExp(\\\"(?:\\\" + textPrimitives.titledBrackettedLink + \\\")|(?:\\\" +\\n\\ttextPrimitives.brackettedLink + \\\")|(?:\\\" +\\n\\ttextPrimitives.urlPattern + \\\")\\\",\\\"mg\\\");\\n\\ntextPrimitives.tiddlerAnyLinkRegExp = new RegExp(\\\"(\\\"+ textPrimitives.wikiLink + \\\")|(?:\\\" +\\n\\ttextPrimitives.titledBrackettedLink + \\\")|(?:\\\" +\\n\\ttextPrimitives.brackettedLink + \\\")|(?:\\\" +\\n\\ttextPrimitives.urlPattern + \\\")\\\",\\\"mg\\\");\\n\\n// Helper to add an attribute to an HTML node\\nvar setAttr = function(node,attr,value) {\\n\\tif(!node.attributes) {\\n\\t\\tnode.attributes = {};\\n\\t}\\n\\tnode.attributes[attr] ={type: \\\"string\\\", value:value} ;\\n};\\n\\nvar inlineCssHelper = function(w) {\\n\\tvar styles = [];\\n\\ttextPrimitives.cssLookaheadRegExp.lastIndex = w.nextMatch;\\n\\tvar lookaheadMatch = textPrimitives.cssLookaheadRegExp.exec(w.source);\\n\\twhile(lookaheadMatch && lookaheadMatch.index == w.nextMatch) {\\n\\t\\tvar s,v;\\n\\t\\tif(lookaheadMatch[1]) {\\n\\t\\t\\ts = lookaheadMatch[1];\\n\\t\\t\\tv = lookaheadMatch[2];\\n\\t\\t} else {\\n\\t\\t\\ts = lookaheadMatch[3];\\n\\t\\t\\tv = lookaheadMatch[4];\\n\\t\\t}\\n\\t\\tif(s==\\\"bgcolor\\\")\\n\\t\\t\\ts = \\\"backgroundColor\\\";\\n\\t\\tif(s==\\\"float\\\")\\n\\t\\t\\ts = \\\"cssFloat\\\";\\n\\t\\tstyles.push({style: s, value: v});\\n\\t\\tw.nextMatch = lookaheadMatch.index + lookaheadMatch[0].length;\\n\\t\\ttextPrimitives.cssLookaheadRegExp.lastIndex = w.nextMatch;\\n\\t\\tlookaheadMatch = textPrimitives.cssLookaheadRegExp.exec(w.source);\\n\\t}\\n\\treturn styles;\\n};\\n\\nvar applyCssHelper = function(e,styles) {\\n\\n\\tif(styles.length > 0) {\\n\\n\\t\\tfor(var t=0; t\u003C styles.length; t++) {\\n\\t\\t\\t$tw.utils.addStyleToParseTreeNode(e,$tw.utils.roundTripPropertyName(styles[t].style),styles[t].value);\\n\\t\\t}\\n\\t}\\n\\t\\n};\\n\\nvar enclosedTextHelper = function(w) {\\n\\tthis.lookaheadRegExp.lastIndex = w.matchStart;\\n\\tvar lookaheadMatch = this.lookaheadRegExp.exec(w.source);\\n\\tif(lookaheadMatch && lookaheadMatch.index == w.matchStart) {\\n\\t\\tvar text = lookaheadMatch[1];\\n\\t\\tw.output.push({type:\\\"element\\\",tag:this.element,\\n\\t\\t\\tchildren:[{type: \\\"text\\\",text: lookaheadMatch[1]}]});\\n\\t\\tw.nextMatch = lookaheadMatch.index + lookaheadMatch[0].length;\\n\\t}\\n};\\n\\nvar insertMacroCall = function(w,output,macroName,paramString) {\\n\\tvar params = [],\\n\\t\\treParam = /\\\\s*(? 03Ccolour foreground>>;\\n\\tbackground-color: \u003C\u003Ccolour muted-foreground>>;\\n\\tborder-radius: 3px;\\n}\\n\\n.tc-global-tiddler-body-heading {\\n\\tmargin: 0 0 0.25em 0;\\n\\tfont-weight: normal;\\n}\\n\\n.tc-global-tiddler-body-type {\\n\\tmargin: 0 0 0.25em 0;\\n\\tborder-bottom: 1px solid \u003C\u003Ccolour foreground>>;\\n}\\n\\n.tc-global-tiddler-body-details {\\n\\tbackground-color: \u003C\u003Ccolour background>>;\\n}\\n\\n.tc-global-tiddler-body pre {\\n\\tmargin: 0;\\n\\tborder: 1px solid \u003C\u003Ccolour foreground>>;\\n}\\n\\n/*\\n** Utility classes for SVG icons\\n*/\\n\\n.tc-fill-background {\\n\\tfill: \u003C\u003Ccolour background>>;\\n}\\n\\n.tc-network-activity-background {\\n\\tfill: \u003C\u003Ccolour network-activity-foreground>>;\\n}\\n\\n/*\\n** Test Cases\\n*/\\n\\n.tc-test-case-wrapper {\\n\\tborder: 1px solid \u003C\u003Ccolour foreground>>;\\n\\tbackground-color: \u003C\u003Ccolour muted-foreground>>;\\n\\tborder-radius: 6px;\\n}\\n\\n.tc-test-case-wrapper {\\n\\tbackground-color: \u003C\u003Ccolour testcase-accent-level-1>>;\\n}\\n\\n.tc-test-case-wrapper .tc-test-case-wrapper {\\n\\tbackground-color: \u003C\u003Ccolour testcase-accent-level-2>>;\\n}\\n\\n.tc-test-case-wrapper .tc-test-case-wrapper .tc-test-case-wrapper {\\n\\tbackground-color: \u003C\u003Ccolour testcase-accent-level-3>>;\\n}\\n\\n.tc-test-case-header {\\n\\tfont-weight: normal;\\n\\tmargin: 0.5em 0;\\n\\tpadding: 0 0.5em;\\n}\\n\\n.tc-test-case-divider {\\n\\tx-background-color: \u003C\u003Ccolour muted-foreground>>;\\n}\\n\\n.tc-test-case-result-icon {\\n\\tfill: #fff;\\n\\tpadding: 0.25em;\\n\\tdisplay: inline-block;\\n\\tline-height: 0;\\n\\tborder-radius: 1em;\\n\\tvertical-align: text-bottom;\\n\\tmargin-right: 0.25em;\\n}\\n\\n.tc-test-case-result-icon-pass {\\n\\tbackground-color: green;\\n}\\n\\n.tc-test-case-result-icon-fail {\\n\\tbackground-color: red;\\n}\\n\\n.tc-test-case-result-icon svg {\\n\\twidth: 0.5em;\\n\\theight: 0.5em;\\n}\\n\\n.tc-test-case-header > h2 {\\n\\tbackground: \u003C\u003Ccolour background>>;\\n\\tborder-radius: 4px;\\n\\tpadding: 0.25em;\\n}\\n\\n.tc-test-case-header > h2,\\n.tc-test-case-source > pre {\\n\\tmargin: 0;\\n}\\n\\n.tc-test-case-header > h2 a.tc-tiddlylink-missing {\\n\\tfont-style: normal;\\n}\\n\\n.tc-test-case-toolbar {\\n\\tfloat: right;\\n}\\n\\n.tc-test-case-toolbar svg {\\n\\tfill: \u003C\u003Ccolour tiddler-controls-foreground>>;\\n}\\n\\n.tc-test-case-toolbar .tc-drop-down {\\n\\tfont-size: 0.8em;\\n}\\n\\n.tc-test-case-result-fail {\\n\\tborder: 1px solid \u003C\u003Ccolour foreground>>;\\n\\tbackground-color: \u003C\u003Ccolour background>>;\\n\\tborder-radius: 4px;\\n\\tmargin: 0 0.5em;\\n\\tpadding: 0;\\n}\\n\\n.tc-test-case-result-fail-header {\\n\\tbackground: \u003C\u003Ccolour diff-delete-background>>;\\n\\tcolor: \u003C\u003Ccolour diff-delete-foreground>>;\\n\\tborder-top-left-radius: 4px;\\n\\tborder-top-right-radius: 4px;\\n\\tpadding: 4px;\\n}\\n\\n.tc-test-case-result-fail-body {\\n\\tpadding: 4px;\\n}\\n\\n.tc-test-case-source > pre {\\n\\theight: 100%;\\n}\\n\\n.tc-test-case-narrative {\\n\\tpadding: 0.5em;\\n}\\n\\n.tc-test-case-panes {\\n\\tdisplay: flex;\\n\\talign-items: stretch;\\n\\tflex-wrap: wrap;\\n\\tpadding: 0.5em;\\n\\tborder-bottom-left-radius: 6px;\\n\\tborder-bottom-right-radius: 6px;\\n}\\n\\n.tc-test-case-source {\\n\\tflex: 1 0 49%;\\n\\tmin-width: 250px;\\n}\\n\\n.tc-test-case-source .tc-tab-content {\\n\\tbackground: inherit;\\n\\tmargin: 0;\\n}\\n\\n.tc-test-case-source .tc-tab-content .tc-field-table {\\n\\tbackground: \u003C\u003Ccolour background>>;\\n}\\n\\n.tc-test-case-source .tc-field-table {\\n\\twidth: 100%;\\n}\\n\\n.tc-test-case-source table.tc-field-table {\\n\\tmargin: 0;\\n}\\n\\n.tc-test-case-source .tc-tiddler-frame .tc-edit-texteditor {\\n\\tmargin: 0;\\n}\\n\\n.tc-test-case-divider {\\n\\tflex: 0 0 1.5%;\\n}\\n\\n.tc-test-case-source .tc-tab-buttons {\\n\\tpadding-top: 0;\\n}\\n\\n.tc-test-case-footer-toolbar {\\n\\tdisplay: flex;\\n\\tjustify-content: flex-end;\\n}\\n\\n.tc-test-case-output {\\n\\tbox-shadow: inset 2px 2px 10px 0px \u003C\u003Ccolour muted-foreground>>;\\n\\tbackground: \u003C\u003Ccolour background>>;\\n\\tborder-radius: 4px;\\n\\tborder: 1px solid \u003C\u003Ccolour muted-foreground>>;\\n\\tflex: 1 0 49%;\\n\\tmin-width: 250px;\\n\\tpadding: 0.25em 1em;\\n}\\n\\n/*\\n** Flexbox utility classes\\n*/\\n\\n.tc-flex {\\n\\tdisplay: -webkit-flex;\\n\\tdisplay: flex;\\n}\\n\\n.tc-flex-column {\\n\\tflex-direction: column;\\n}\\n\\n.tc-flex-row {\\n\\tflex-direction: row;\\n}\\n\\n.tc-flex-grow-1 {\\n\\tflex-grow: 1;\\n}\\n\\n.tc-flex-grow-2 {\\n\\tflex-grow: 2;\\n}\\n\\n/*\\n** Other utility classes\\n*/\\n\\n/* Horizontal gaps */\\n\\n.tc-tiny-gap {\\n\\tmargin-left: .25em;\\n\\tmargin-right: .25em;\\n}\\n\\n.tc-tiny-gap-left {\\n\\tmargin-left: .25em;\\n}\\n\\n.tc-tiny-gap-right {\\n\\tmargin-right: .25em;\\n}\\n\\n.tc-small-gap {\\n\\tmargin-left: .5em;\\n\\tmargin-right: .5em;\\n}\\n\\n.tc-small-gap-left {\\n\\tmargin-left: .5em;\\n}\\n\\n.tc-small-gap-right {\\n\\tmargin-right: .5em;\\n}\\n\\n.tc-big-gap {\\n\\tmargin-left: 1em;\\n\\tmargin-right: 1em;\\n}\\n\\n.tc-big-gap-left {\\n\\tmargin-left: 1em;\\n}\\n\\n.tc-big-gap-right {\\n\\tmargin-right: 1em;\\n}\\n\\n.tc-word-break {\\n\\tword-break: break-all;\\n}\\n\\n/* Vertical gaps */\\n\\n.tc-tiny-v-gap-bottom {\\n\\tmargin-bottom: 3px;\\n}\\n\\n\"},\"$:/themes/tiddlywiki/vanilla/metrics/bodyfontsize\":{\"title\":\"$:/themes/tiddlywiki/vanilla/metrics/bodyfontsize\",\"text\":\"15px\"},\"$:/themes/tiddlywiki/vanilla/metrics/bodylineheight\":{\"title\":\"$:/themes/tiddlywiki/vanilla/metrics/bodylineheight\",\"text\":\"22px\"},\"$:/themes/tiddlywiki/vanilla/metrics/fontsize\":{\"title\":\"$:/themes/tiddlywiki/vanilla/metrics/fontsize\",\"text\":\"14px\"},\"$:/themes/tiddlywiki/vanilla/metrics/lineheight\":{\"title\":\"$:/themes/tiddlywiki/vanilla/metrics/lineheight\",\"text\":\"20px\"},\"$:/themes/tiddlywiki/vanilla/metrics/storyleft\":{\"title\":\"$:/themes/tiddlywiki/vanilla/metrics/storyleft\",\"text\":\"0px\"},\"$:/themes/tiddlywiki/vanilla/metrics/storytop\":{\"title\":\"$:/themes/tiddlywiki/vanilla/metrics/storytop\",\"text\":\"0px\"},\"$:/themes/tiddlywiki/vanilla/metrics/storyright\":{\"title\":\"$:/themes/tiddlywiki/vanilla/metrics/storyright\",\"text\":\"770px\"},\"$:/themes/tiddlywiki/vanilla/metrics/storywidth\":{\"title\":\"$:/themes/tiddlywiki/vanilla/metrics/storywidth\",\"text\":\"770px\"},\"$:/themes/tiddlywiki/vanilla/metrics/tiddlerwidth\":{\"title\":\"$:/themes/tiddlywiki/vanilla/metrics/tiddlerwidth\",\"text\":\"686px\"},\"$:/themes/tiddlywiki/vanilla/metrics/sidebarbreakpoint\":{\"title\":\"$:/themes/tiddlywiki/vanilla/metrics/sidebarbreakpoint\",\"text\":\"960px\"},\"$:/themes/tiddlywiki/vanilla/metrics/sidebarwidth\":{\"title\":\"$:/themes/tiddlywiki/vanilla/metrics/sidebarwidth\",\"text\":\"350px\"},\"$:/themes/tiddlywiki/vanilla/options/stickytitles\":{\"title\":\"$:/themes/tiddlywiki/vanilla/options/stickytitles\",\"text\":\"no\"},\"$:/themes/tiddlywiki/vanilla/options/sidebarlayout\":{\"title\":\"$:/themes/tiddlywiki/vanilla/options/sidebarlayout\",\"text\":\"fixed-fluid\"},\"$:/themes/tiddlywiki/vanilla/options/codewrapping\":{\"title\":\"$:/themes/tiddlywiki/vanilla/options/codewrapping\",\"text\":\"pre-wrap\"},\"$:/themes/tiddlywiki/vanilla/reset\":{\"title\":\"$:/themes/tiddlywiki/vanilla/reset\",\"type\":\"text/css\",\"text\":\"/*! modern-normalize v2.0.0 | MIT License | https://github.com/sindresorhus/modern-normalize */\\n\\n/*\\nDocument\\n========\\n*/\\n\\n/**\\nUse a better box model (opinionated).\\n*/\\n\\n*,\\n::before,\\n::after {\\n\\tbox-sizing: border-box;\\n}\\n\\nhtml {\\n\\t/* Improve consistency of default fonts in all browsers. (https://github.com/sindresorhus/modern-normalize/issues/3) */\\n\\tfont-family:\\n\\t\\tsystem-ui,\\n\\t\\t'Segoe UI',\\n\\t\\tRoboto,\\n\\t\\tHelvetica,\\n\\t\\tArial,\\n\\t\\tsans-serif,\\n\\t\\t'Apple Color Emoji',\\n\\t\\t'Segoe UI Emoji';\\n\\tline-height: 1.15; /* 1. Correct the line height in all browsers. */\\n\\t-webkit-text-size-adjust: 100%; /* 2. Prevent adjustments of font size after orientation changes in iOS. */\\n\\t-moz-tab-size: 4; /* 3. Use a more readable tab size (opinionated). */\\n\\ttab-size: 4; /* 3 */\\n}\\n\\n/*\\nSections\\n========\\n*/\\n\\nbody {\\n\\tmargin: 0; /* Remove the margin in all browsers. */\\n}\\n\\n/*\\nGrouping content\\n================\\n*/\\n\\n/**\\n1. Add the correct height in Firefox.\\n2. Correct the inheritance of border color in Firefox. (https://bugzilla.mozilla.org/show_bug.cgi?id=190655)\\n*/\\n\\nhr {\\n\\theight: 0; /* 1 */\\n\\tcolor: inherit; /* 2 */\\n}\\n\\n/*\\nText-level semantics\\n====================\\n*/\\n\\n/**\\nAdd the correct text decoration in Chrome, Edge, and Safari.\\n*/\\n\\nabbr[title] {\\n\\ttext-decoration: underline dotted;\\n}\\n\\n/**\\nAdd the correct font weight in Edge and Safari.\\n*/\\n\\nb,\\nstrong {\\n\\tfont-weight: bolder;\\n}\\n\\n/**\\n1. Improve consistency of default fonts in all browsers. (https://github.com/sindresorhus/modern-normalize/issues/3)\\n2. Correct the odd 'em' font sizing in all browsers.\\n*/\\n\\ncode,\\nkbd,\\nsamp,\\npre {\\n\\tfont-family:\\n\\t\\tui-monospace,\\n\\t\\tSFMono-Regular,\\n\\t\\tConsolas,\\n\\t\\t'Liberation Mono',\\n\\t\\tMenlo,\\n\\t\\tmonospace; /* 1 */\\n\\tfont-size: 1em; /* 2 */\\n}\\n\\n/**\\nAdd the correct font size in all browsers.\\n*/\\n\\nsmall {\\n\\tfont-size: 80%;\\n}\\n\\n/**\\nPrevent 'sub' and 'sup' elements from affecting the line height in all browsers.\\n*/\\n\\nsub,\\nsup {\\n\\tfont-size: 75%;\\n\\tline-height: 0;\\n\\tposition: relative;\\n\\tvertical-align: baseline;\\n}\\n\\nsub {\\n\\tbottom: -0.25em;\\n}\\n\\nsup {\\n\\ttop: -0.5em;\\n}\\n\\n/*\\nTabular data\\n============\\n*/\\n\\n/**\\n1. Remove text indentation from table contents in Chrome and Safari. (https://bugs.chromium.org/p/chromium/issues/detail?id=999088, https://bugs.webkit.org/show_bug.cgi?id=201297)\\n2. Correct table border color inheritance in Chrome and Safari. (https://bugs.chromium.org/p/chromium/issues/detail?id=935729, https://bugs.webkit.org/show_bug.cgi?id=195016)\\n*/\\n\\ntable {\\n\\ttext-indent: 0; /* 1 */\\n\\tborder-color: inherit; /* 2 */\\n}\\n\\n/*\\nForms\\n=====\\n*/\\n\\n/**\\n1. Change the font styles in all browsers.\\n2. Remove the margin in Firefox and Safari.\\n*/\\n\\nbutton,\\ninput,\\noptgroup,\\nselect,\\ntextarea {\\n\\tfont-family: inherit; /* 1 */\\n\\tfont-size: 100%; /* 1 */\\n\\tline-height: 1.15; /* 1 */\\n\\tmargin: 0; /* 2 */\\n}\\n\\n/**\\nRemove the inheritance of text transform in Edge and Firefox.\\n*/\\n\\nbutton,\\nselect {\\n\\ttext-transform: none;\\n}\\n\\n/**\\nCorrect the inability to style clickable types in iOS and Safari.\\n*/\\n\\nbutton,\\n[type='button'],\\n[type='reset'],\\n[type='submit'] {\\n\\t-webkit-appearance: button;\\n}\\n\\n/**\\nRemove the inner border and padding in Firefox.\\n*/\\n\\n::-moz-focus-inner {\\n\\tborder-style: none;\\n\\tpadding: 0;\\n}\\n\\n/**\\nRestore the focus styles unset by the previous rule.\\n*/\\n\\n:-moz-focusring {\\n\\toutline: 1px dotted ButtonText;\\n}\\n\\n/**\\nRemove the additional ':invalid' styles in Firefox.\\nSee: https://github.com/mozilla/gecko-dev/blob/2f9eacd9d3d995c937b4251a5557d95d494c9be1/layout/style/res/forms.css#L728-L737\\n*/\\n\\n:-moz-ui-invalid {\\n\\tbox-shadow: none;\\n}\\n\\n/**\\nRemove the padding so developers are not caught out when they zero out 'fieldset' elements in all browsers.\\n*/\\n\\nlegend {\\n\\tpadding: 0;\\n}\\n\\n/**\\nAdd the correct vertical alignment in Chrome and Firefox.\\n*/\\n\\nprogress {\\n\\tvertical-align: baseline;\\n}\\n\\n/**\\nCorrect the cursor style of increment and decrement buttons in Safari.\\n*/\\n\\n::-webkit-inner-spin-button,\\n::-webkit-outer-spin-button {\\n\\theight: auto;\\n}\\n\\n/**\\n1. Correct the odd appearance in Chrome and Safari.\\n2. Correct the outline style in Safari.\\n*/\\n\\n[type='search'] {\\n\\t-webkit-appearance: textfield; /* 1 */\\n\\toutline-offset: -2px; /* 2 */\\n}\\n\\n/**\\nRemove the inner padding in Chrome and Safari on macOS.\\n*/\\n\\n::-webkit-search-decoration {\\n\\t-webkit-appearance: none;\\n}\\n\\n/**\\n1. Correct the inability to style clickable types in iOS and Safari.\\n2. Change font properties to 'inherit' in Safari.\\n*/\\n\\n::-webkit-file-upload-button {\\n\\t-webkit-appearance: button; /* 1 */\\n\\tfont: inherit; /* 2 */\\n}\\n\\n/*\\nInteractive\\n===========\\n*/\\n\\n/*\\nAdd the correct display in Chrome and Safari.\\n*/\\n\\nsummary {\\n\\tdisplay: list-item;\\n}\\n\"},\"$:/themes/tiddlywiki/vanilla/settings/fontfamily\":{\"title\":\"$:/themes/tiddlywiki/vanilla/settings/fontfamily\",\"text\":\"-apple-system, BlinkMacSystemFont, \\\"Segoe UI\\\", \\\"Noto Sans\\\", sans-serif, Helvetica, Arial, \\\"Apple Color Emoji\\\", \\\"Segoe UI Emoji\\\"\"},\"$:/themes/tiddlywiki/vanilla/settings/codefontfamily\":{\"title\":\"$:/themes/tiddlywiki/vanilla/settings/codefontfamily\",\"text\":\"ui-monospace, \\\"SFMono-Regular\\\", \\\"SF Mono\\\", Menlo, Consolas, \\\"Liberation Mono\\\", monospace\"},\"$:/themes/tiddlywiki/vanilla/settings/backgroundimageattachment\":{\"title\":\"$:/themes/tiddlywiki/vanilla/settings/backgroundimageattachment\",\"text\":\"fixed\"},\"$:/themes/tiddlywiki/vanilla/settings/backgroundimagesize\":{\"title\":\"$:/themes/tiddlywiki/vanilla/settings/backgroundimagesize\",\"text\":\"auto\"},\"$:/themes/tiddlywiki/vanilla/sticky\":{\"title\":\"$:/themes/tiddlywiki/vanilla/sticky\",\"code-body\":\"yes\",\"text\":\"\u003C$reveal state=\\\"$:/themes/tiddlywiki/vanilla/options/stickytitles\\\" type=\\\"match\\\" text=\\\"yes\\\">\\n``\\n.tc-tiddler-title {\\n\\tposition: -webkit-sticky;\\n\\tposition: -moz-sticky;\\n\\tposition: -o-sticky;\\n\\tposition: -ms-sticky;\\n\\tposition: sticky;\\n\\ttop: 0px;\\n\\tbackground: ``\u003C\u003Ccolour tiddler-background>>``;\\n\\tz-index: 500;\\n}\\n\\n``\\n\u003C$list filter=\\\"[range[100]]\\\">\\n`.tc-story-river .tc-tiddler-frame:nth-child(100n+`\u003C$text text=\u003C\u003CcurrentTiddler>>/>`) {\\nz-index: `\u003C$text text={{{ [[200]subtract\u003CcurrentTiddler>] }}}/>`;\\n}\\n`\\n\u003C/$list>\\n\u003C/$reveal>\\n\"}}}"},
{"title":"Basic Formatting","created":"20121217004633000","creator":"keithb","modified":"20140415164633773","modifier":"andrewstern","tags":"Formatting","type":"text/x-tiddlywiki","text":"\n!Summary\n//''Emphasizing''// @@text@@ __is easy__!\n!Markup\n| !Style | !Markup |h\n|\u003Chtml>\u003Cb>\u003Ci>bold\u003C/i>\u003C/b>\u003C/html>|{{{''bold''}}} -- two single-quotes|\n|//italics//|{{{//italics//}}}|\n|\u003Chtml>\u003Cb>\u003Ci>bold italics\u003C/i>\u003C/b>\u003C/html>|{{{''//bold italics//''}}}|\n|__underline__|{{{__underline__}}}|\n|--strikethrough--|{{{--Strikethrough--}}}|\n|super^^script^^|{{{super^^script^^}}}|\n|sub~~script~~|{{{sub~~script~~}}}|\n|@@Highlight@@|{{{@@Highlight@@}}}|\n|{{{plain text}}}|\u003Chtml>\u003Ccode>{{{PlainText No ''Formatting''}}}\u003C/code>\u003C/html>|\n|/%this text will be invisible%/hidden text|{{{/%this text will be invisible%/}}}|\n|foo -- bar|{{{use two dashes -- between two words to create an Em dash}}}|\n"},
{"title":"Blockquotes","created":"20110215174227000","creator":"pmario","modified":"20140415164659711","modifier":"andrewstern","tags":"Formatting","type":"text/x-tiddlywiki","text":"!Summary\nUse quotations to cite other sources or simply indent content.\n!!Blockquotes\nText can be displayed as quotations using three less-than signs:\n{{{\n\u003C\u003C\u003C\nSteve Jobs: \"computers are like a bicycle for our minds\"\n\u003C\u003C\u003C\n}}}\n\u003C\u003C\u003C\nSteve Jobs: \"computers are like a bicycle for our minds\"\n\u003C\u003C\u003C\n!Nested Blockquotes \nQuotes can be displayed with multi-levels:\n{{{\n> blockquote, level 1\n>> blockquote, level 2\n>>> blockquote, level 3\n}}}\n> blockquote, level 1\n>> blockquote, level 2\n>>> blockquote, level 3\n!!Mixed Blockquotes\n{{{\n\u003C\u003C\u003C\nSteve Jobs: \"computers are like a bicycle for our minds\"\n> blockquote, level 1\nSome more text.\n\u003C\u003C\u003C\n}}}\n\u003C\u003C\u003C\nSteve Jobs: \"computers are like a bicycle for our minds\"\n> blockquote, level 1\nSome more text.\n\u003C\u003C\u003C\n"},
{"title":"Classic Parser Plugin Demo","created":"20140416201128370","modified":"20140901082657977","type":"text/x-tiddlywiki","text":"This is a demo of the Tiddlywiki Classic parser for Tiddlywiki5 (the tw2parser plugin).  \nBelow is a  [[Test card|Markup]] from [[http://tiddlywiki.org]] showing examples of all Classic markup.\n\nTiddlers that are given the type 'text/x-tiddlywiki' will be interpreted as containing Classic Tiddlywiki markup. In addition Classic Tiddlywiki markup can be embedded in a tiddlywiki5 tiddler by the use of a type block - see [[text/x-tiddlywiki typeblock]] below.\n!!Support for Classic macros\nAt present there is limited support for Classic macros. See below for examples of the [[slider|Classic Slider Demo]], [[tabs|ClassicTabsDemo]] and [[tiddler|Classic Transclusion]] macros.\n!!Status\nSee here for \u003C\u003Cslider $:/temp/1 Issues \"Issues»\" \"more\" >>\n!!See also [[Developers Notes]]\n! Installation\nTo add this plugin to your own TiddlyWiki5, just drag this link to your tiddlywiki's browser window:\n\n[[$:/plugins/tiddlywiki/tw2parser]]\n\n"},
{"title":"Classic Slider Demo","created":"20140831105412236","modified":"20140901072049425","type":"text/x-tiddlywiki","text":"!!Demo text:\n{{{\n\u003C\u003Cslider $:/temp/xxx slidertest \"click me»\" \"more\" >>\n}}}\n!!Demo results:\n\n\u003C\u003Cslider $:/temp/xxx slidertest \"click me»\" \"more\" >>\n "},
{"title":"Classic Transclusion","created":"20140831105630157","modified":"20140901082725277","type":"text/x-tiddlywiki","text":"!!Demo text:\n{{{\n\u003C\u003Ctiddler [[Classic Parser Plugin Demo##Support for Classic macros]]>>\n}}}\n!!Demo results:\n\n\u003C\u003Ctiddler [[Classic Parser Plugin Demo##Support for Classic macros]]>>\n"},
{"title":"ClassicTabsDemo","created":"20140603181004793","modified":"20140901071957024","type":"text/x-tiddlywiki","text":"!!Demo text:\n{{{\n\u003C\u003Ctabs  $:/state/tabtxtdemo\n\"show a section\" \"sec 1\" ClassicTabsDemo##Do1\n\"section 2\" \"Priority 2\" ClassicTabsDemo##Do2\n\"and a slice\" \"a slice\" [[ClassicTabsDemo::slice]]\n>>\n\n/% \n!Do1\nfirst section: this is a hidden section below\n!Do2\nanother hidden section of this tiddler\n!end\n|~slice| a hidden slice of this tiddler|\n!end\n%/\n}}}\n!!Demo results:\n\u003C\u003Ctabs  $:/state/tabtxtdemo\n\"show a section\" \"sec 1\" ClassicTabsDemo##Do1\n\"section 2\" \"Priority 2\" ClassicTabsDemo##Do2\n\"and a slice\" \"a slice\" [[ClassicTabsDemo::slice]]\n>>\n\n/% \n!Do1\nfirst section: this is a hidden section below\n!Do2\nanother hidden section of this tiddler\n!end\n|~slice| a hidden slice of this tiddler|\n!end\n%/\n"},
{"title":"Code","created":"20130211142734000","creator":"tobibeer","modified":"20140901061201603","modifier":"andrewstern","tags":"Formatting","type":"text/x-tiddlywiki","text":"!Summary\nYou can render text monospaced text, e.g. using the font //Courier//, while preserving line breaks and not applying WikiText formating or turning WikiWords into links.\n!!\"\"\"Monospaced Text Block\"\"\"\n\u003Chtml>\u003Cpre>\n{{{\nSome plain text including WikiLinks\n}}}\n\u003C/pre>\u003C/html>''Displays as:'' a HTML \u003Cpre> element\n{{{\nSome plain text including WikiLinks\n}}}\n\u003C\u003C\u003C\n''Note:'' Code blocks are displayed using a white-space 'as-is', fixed-width font without no word-wrapping -- displayed in a box.\n\u003C\u003C\u003C\n!!\"\"\"Monospaced Inline Text\"\"\"\nAlternatively, you can also display monospaced text __inline__ by wrapping the text in three braces \u003Chtml>\u003Ccode>{{{...}}}\u003C/code>\u003C/html>:\n\u003Chtml>\u003Cpre>{{{inline //code//}}}\u003C/pre>\u003C/html>''Displays as:''  a HTML \u003Ccode> element\n{{{inline //code//}}}\n\u003C\u003C\u003C\n''Note:'' Inline code uses a white-space 'collapsed', word-wrapped, fixed-width font.\n\n\n"},
{"title":"Comment Formatting","created":"20130213001758000","creator":"tobibeer","modified":"20140901061006864","modifier":"andrewstern","tags":"Formatting","type":"text/x-tiddlywiki","text":"!Summary\nOccasionally you want to add notes to your tiddler markup yet don't want it displayed when the tiddler is rendered. To achieve this, wrap the text using {{{/% hidden %/}}}.\n!Example\n{{{\ntext before .../%\n!HIDDEN SECTION\nThis is content of a hidden section.\n!END%/ text after\n}}}\n''Display as:''\n\u003C\u003C\u003C\ntext before /%\n!HIDDEN SECTION\nThis is content of a hidden section.\n!END%/... text after\n\u003C\u003C\u003C\n!Also see...\n;[[Suppressing Formatting]]\n:» when you just don't want that text to be TiddlyWiki markup\n:» when you want to prevent WikiWords\n:» when you copy & paste from other sources\n"},
{"title":"CSS Formatting","created":"20130211145116000","creator":"tobibeer","modified":"20140415164516606","modifier":"andrewstern","tags":"Formatting","type":"text/x-tiddlywiki","text":"\n!Summary\nYou can directly apply CSS rules inline or use custom classes.\n!Markup\n!!!Inline Styles\nEnclose text using two double @ signs and let the first two follow by your CSS rules.\n{{{\n@@color:#4bbbbb;Some random text@@\n}}}\n''Displays as:''\n@@color:red;Some random text@@\n\n!!!CSS Classes\nCSS classes can be applied to text blocks.\n\nTo wrap your text inline in a HTML {{{\u003Cspan>}}} element use...\n{{{\nbefore » {{customClassName{inline content}}} « after\n}}}\n''Displays as:''\nbefore » {{customClassName{inline content}}} « after\n\nTo wrap your text as a block level element -- a HTML {{{\u003Cdiv>}}} -- use line-breaks...\n\u003Chtml>\u003Cpre>\nbefore » {{customClassName{\nbox content\n}}} « after\n\u003C/pre>\u003C/html>''Displays as:''\nbefore » {{customClassName{\nbox content\n}}} « after\n"},
{"title":"Developers Notes","created":"20140831112438405","modified":"20140901080739956","type":"text/x-tiddlywiki","text":"The Tw2parser plugin includes handling of namespace conflicts between Classic and Tw5 macros.\n\nOne of the goals of the Tw2parser plugin is to hide the Classic macros from tiddlers of types other than text/x-tiddlywiki. This is achieved by having the parser prepend the macro definitions to the 'local' parse tree (see around line 60 wikitextparser.js), making them only visible in text/x-tiddlywiki tiddlers and typed-blocks. At present all text based Classic macros are in the same file.\n\nAs all global Tw5 macros are visible in all tiddlers (including text/x-tiddlywiki tiddlers), there is a name-space conflict between Classic and tw5 macros. For macros that are defined using tiddlytext (ie /define() /end blocks) the local defined Classic definition will override the global Tw5 macros (which is what we want).\n\nFor cases where simple overriding is not sufficient, the tw2parser plugin also has a 'macro name adapter' module (macroadapter.js) to move the Classic macros names to a new names -\n(in wikitextrules.js around line 490)\n\n{{{tw2on5-name=macroadapter.namedapter[tw2name];}}}\n\nThis is invisible to the user.\n\nAn example is the {{{tabs()}}} macro which is mapped to {{{__system_tabs()}}}\nso the user still types {{{tabs()}}} but this is mapped to {{{__system_tabs()}}} in the parser which is what appears in the file macrodefs.tids\n\nThere is also the facility to manipulate the parameters via {{{params=macroadapter.paramadaptername}}}\nThis is used in the 'tabs' macro where there is a variable number of parameters that must be mapped into fixed number of tw5 macro parameters.\n\nThe implementation of the tabs macro is rather sophisticated, the parameters are put into maps from tab-tiddername to tab-property (properties are cookies, prompts and labels) implemented as jsons.\n\n"},
{"title":"Headings","created":"20130211150503000","creator":"tobibeer","modified":"20140831113805090","modifier":"andrewstern","tags":"Formatting","type":"text/x-tiddlywiki","text":"!Summary\n\nStart a line using exclamation marks to create headings.\n!Markup\n{{{\n!Heading Level 1\n!!Heading Level 2\n!!!Heading Level 3\n!!!!Heading Level 4\n!!!!!Heading Level 5\n!!!!!!Heading Level 6\n}}}\n!Heading Level 1\n!!Heading Level 2\n!!!Heading Level 3\n!!!!Heading Level 4\n!!!!!Heading Level 5\n!!!!!!Heading Level 6\n"},
{"title":"Horizontal Rules","created":"20130211150739000","creator":"tobibeer","modified":"20140415164242103","modifier":"andrewstern","tags":"Formatting","type":"text/x-tiddlywiki","text":"!Summary\nUse four dashes on a line or the HTML tag {{{\u003Chr>}}} to produce a horizontal rule.\n!Markup\n{{{\nbefore\n----\nafter\n}}}\nor\n{{{\nbefore\u003Chr>after\n}}}\n''Displays as:''\n\nbefore\n----\nafter\n"},
{"title":"HTML Entities","created":"20130204165019000","creator":"tobibeer","modified":"20140415164150742","modifier":"andrewstern","tags":"Formatting","type":"text/x-tiddlywiki","text":"!Summary\nUse HTML entities to enter characters that can't easily be typed on an ordinary keyboard. They take the form of an ampersand ({{{&}}}), an identifying string, and a terminating semi-colon ({{{;}}}), e.g. {{{&amp;}}}.\n!Markup\n{{{\nThe value of Tiddlers&trade; cannot even be expressed in &pound;, &euro; or &dollar;.\n}}}\n''Displays as:''\nThe value of Tiddlers&trade; cannot even be expressed in &pound;, &euro; or &dollar;.\n\n!\"\"\"Entity References\"\"\"\nComprehensive lists of html entities can be found at...\n* [[w3schools.com|http://www.w3schools.com/tags/ref_entities.asp]]\n* [[htmlhelp.com|http://www.htmlhelp.com/reference/html40/entities]]\n\n!\"\"\"Examples Of Common And Eseful Entities\"\"\"\n|>|>|>|>|>|>| !HTML Entities |\n| &amp;nbsp; | &nbsp; | no-break space | &nbsp;&nbsp; | &amp;apos; | &apos; | single quote, apostrophe |\n| &amp;ndash; | &ndash; | en dash |~| &amp;quot; | \" | quotation mark |\n| &amp;mdash; | &mdash; | em dash |~| &amp;prime; | &prime; | prime; minutes; feet |\n| &amp;hellip; | &hellip; |\thorizontal ellipsis |~| &amp;Prime; | &Prime; | double prime; seconds; inches |\n| &amp;copy; | &copy; | Copyright symbol |~| &amp;lsquo; | &lsquo; | left single quote |\n| &amp;reg; | &reg; | Registered symbol |~| &amp;rsquo; | &rsquo; | right  single quote |\n| &amp;trade; | &trade; | Trademark symbol |~| &amp;ldquo; | &ldquo; | left double quote |\n| &amp;dagger; | &dagger; | dagger |~| &amp;rdquo; | &rdquo; | right double quote |\n| &amp;Dagger; | &Dagger; | double dagger |~| &amp;laquo; | &laquo; | left angle quote |\n| &amp;para; | &para; | paragraph sign |~| &amp;raquo; | &raquo; | right angle quote |\n| &amp;sect; | &sect; | section sign |~| &amp;times; | &times; | multiplication symbol |\n| &amp;uarr; | &uarr; | up arrow |~| &amp;darr; | &darr; | down arrow |\n| &amp;larr; | &larr; | left arrow |~| &amp;rarr; | &rarr; | right arrow |\n| &amp;lArr; | &lArr; | double left arrow |~| &amp;rArr; | &rArr; | double right arrow |\n| &amp;harr; | &harr; | left right arrow |~| &amp;hArr; | &hArr; | double left right arrow |\n!\"\"\"Accented Characters\"\"\"\nThe table below shows how accented characters can be built up by subsituting the underscore (_) into the corresponding character:\n|>|>|>|>|>|>|>|>|>|>|>|>|>|>|>|>|>| !Accented Characters |\n| grave accent | &amp;_grave; | &Agrave; | &agrave; | &Egrave; | &egrave; | &Igrave; | &igrave; | &Ograve; | &ograve; | &Ugrave; | &ugrave; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &nbsp; |\n| acute accent | &amp;_acute; | &Aacute; | &aacute; | &Eacute; | &eacute; | &Iacute; | &iacute; | &Oacute; | &oacute; | &Uacute; | &uacute; | &nbsp; | &nbsp; | &Yacute; | &yacute; | &nbsp; | &nbsp; |\n| circumflex accent | &amp;_circ; | &Acirc; | &acirc; | &Ecirc; | &ecirc; | &Icirc; | &icirc; | &Ocirc; | &ocirc; | &Ucirc; | &ucirc; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &nbsp; |\n| umlaut mark | &amp;_uml; | &Auml; | &auml; |  &Euml; | &euml; | &Iuml; | &iuml; | &Ouml; | &ouml; | &Uuml; | &uuml; | &nbsp; | &nbsp; | &Yuml; | &yuml; | &nbsp; | &nbsp; |\n| tilde | &amp;_tilde; | &Atilde; | &atilde; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &Otilde; | &otilde; | &nbsp; | &nbsp; | &Ntilde; | &ntilde; | &nbsp; | &nbsp; | &nbsp; | &nbsp; |\n| ring | &amp;_ring; | &Aring; | &aring; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &nbsp; |\n| slash | &amp;_slash; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &Oslash; | &oslash; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &nbsp; |\n| cedilla | &amp;_cedil; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &nbsp; | &Ccedil; | &ccedil; |\n"},
{"title":"HTML Formatting","created":"20130212225913000","creator":"tobibeer","modified":"20140415163847476","modifier":"andrewstern","tags":"Formatting","type":"text/x-tiddlywiki","text":"!Summary\nTiddlyWiki provides support for rendering pure HTML markup. To do this, simply wrap your HTML code in {{{\u003Chtml>your html markup goes here\u003C/html>}}}. This way you are able to use embed code using iFrames often suggested by popular media sites like ~YouTube.\n!!\"\"\"Embedded HTML\"\"\"\n{{{\n\u003Chtml>\n\u003Cspan style=\"padding-right:30px;font-size:2em;\">any\u003C/span>\u003Cbr />\n\u003Cb>valid\u003C/b> \u003Cem>xhtml\u003C/em>\n\u003C/html>\n}}}\n\u003Chtml>\u003Cspan style=\"padding-right:30px;font-size:2em;\">any\u003C/span>\u003Cbr />\u003Cb>valid\u003C/b> \u003Cem>xhtml\u003C/em>\u003C/html>\n!!\"\"\"Embedded iFrame\"\"\"\n{{{\n\u003Chtml>\n\u003Ciframe src=\"https://www.youtube.com/embed/Cj6ho1-G6tw\"\n  width=\"450\" height=\"315\" frameborder=\"0\" allowfullscreen/>\n\u003C/html>\n}}}\n\u003Chtml>\n\u003Ciframe src=\"https://www.youtube.com/embed/Cj6ho1-G6tw?vq=hd720&iv_load_policy=3\"\n  width=\"450\" height=\"315\" frameborder=\"0\" allowfullscreen/>\n\u003C/html>\n"},
{"title":"Images","created":"20130211151808000","creator":"tobibeer","modified":"20140901062342853","modifier":"andrewstern","tags":"Formatting","type":"text/x-tiddlywiki","text":"!Summary\nGenerally, images are external to TiddlyWiki. You have different means to layout the image flow.\n!Markup\n!!Simple Images\n{{{\n[img[http://wikitext.tiddlyspace.com/fractalveg.jpg]]\n}}}\n[img[http://wikitext.tiddlyspace.com/fractalveg.jpg]]\n!!Images Titles\n{{{\n[img[tooltip|http://wikitext.tiddlyspace.com/fractalveg.jpg]]\n}}}\n[img[tooltip|http://wikitext.tiddlyspace.com/fractalveg.jpg]]\n!!Image Links\n{{{\n[img[http://wikitext.tiddlyspace.com/fractalveg.jpg][http://www.flickr.com/photos/jermy/10134618/]]\n}}}\n[img[http://wikitext.tiddlyspace.com/fractalveg.jpg][http://www.flickr.com/photos/jermy/10134618/]]\n\n!!Floating Images\nTo clear a float, append...\n{{{\n@@clear:both;display:block; @@\n}}}\n\n!!Floating Left...\n{{{\n[\u003Cimg[http://wikitext.tiddlyspace.com/fractalveg.jpg]]\n@@clear:both;display:block; all clear@@\n}}}\n[\u003Cimg[http://wikitext.tiddlyspace.com/fractalveg.jpg]]\n@@clear:both;display:block; all clear@@\n!!Floating Right\n{{{\n[>img[http://wikitext.tiddlyspace.com/fractalveg.jpg]]\n@@float:right;clear:both;display:block; all clear@@\n@@clear:both;display:block; @@\n}}}\n[>img[http://wikitext.tiddlyspace.com/fractalveg.jpg]]\n@@float:right;clear:both;display:block; all clear@@\n@@clear:both;display:block; @@\n"},
{"title":"Issues","created":"20140416202554189","modified":"20140831091025876","type":"text/x-tiddlywiki","text":"*There is problem with table colspan with > to the right of a text filled cell.\n*tiddler macro incomplete\n*not all classic core macros supported\n\n"},
{"title":"Line Breaks","created":"20130211153646000","creator":"tobibeer","modified":"20140415164315536","modifier":"andrewstern","tags":"Formatting","type":"text/x-tiddlywiki","text":"!Summary\nLine breaks can be forced explicitly using a {{{\u003Cbr>}}} -- useful in lists or tables.\n!Markup\n{{{\n|A cell\u003Cbr> with a line break|\n}}}\n|A cell\u003Cbr> with a line break|\n!!Avoiding Linebreaks\nSometimes you want to avoid superflous linebreaks and increase readability of your wiki text, e.g. when using @@highlights@@ or the tiddler macro. To achieve that, end the current line by starting a hidden comment and ending it on the next line, e.g.:\n{{{\n@@highlight@@/%\n%/\u003C\u003Ctiddler foo>>\n}}}\nThis will prevent from adding a superflous linebreak between the highlight and the transcluded content that follows.\n!!Also see\n* [[Table Formatting\n"},
{"title":"Links","created":"20130211154140000","creator":"tobibeer","modified":"20140831095524601","modifier":"tobibeer","tags":"Formatting","type":"text/x-tiddlywiki","text":"!Summary\nTiddlyWiki allows different kinds of links, e.g. WikiWords, [[TiddlyLinks|TiddlyLink]], external Links or TiddlySpace links.\n!!WikiWords\nAny words or phrases that are CamelCase or [[Compound-Words|CamelCase]] - in which the elements are joined without spaces - will result in them becoming wiki links to tiddlers with that name. \n{{{\nWikiWord\n}}}\nWikiWord\n\nTo prevent this, append a tilde {{{~}}}...\n{{{\n~WikiWord\n}}}\n~WikiWord\n\n!![[TiddlyLinks|TiddlyLink]]\nA tiddler can also be linked using square brackets encompassing the tiddler title:\n{{{\n[[Core Macros]]\n}}}\n[[Core Macros]]\n\n!![[Pretty TiddlyLinks|TiddlyLink]]\nOptionally, a custom title can be used, separated by a pipe character (|)\n{{{\n[[standard macros|Core Macros]]\n}}}\n[[standard macros|Core Macros]]\n\n!![[External Links|External Link]]\nA valid URL directly results in a link to that external site:\n{{{\nhttp://tiddlywiki.org\n}}}\nhttp://tiddlywiki.org\n\n!![[Pretty External Links|External Link]]\nSimilar to TiddlyLinks, external links can have a different title as well:\n{{{\n[[visit TiddlyWiki.org|http://tiddlywiki.org]]\n}}}\n[[visit TiddlyWiki.org|http://tiddlywiki.org]]\n\n"},
{"title":"Lists","created":"20120131235950000","creator":"sandman619","modified":"20140415164107038","modifier":"tobibeer","tags":"Formatting","type":"text/x-tiddlywiki","text":"!Summary\nIn TiddlyWiki you can make user of different list types, such as unordered lists, ordered or numbered lists, as well as definition lists.\n!!Ordered Lists\nLists can be ordered using numbers and letters by starting a line with a hash {{{#}}}...\n{{{\n#List item one\n##List item two\n###List item three\n}}}\n#List item one\n##List item two\n###List item three\n!!Unordered Lists\nCreate unordered lists by starting a line using an asterisk {{{*}}}...\n{{{\n*Unordered List Level 1\n**Unordered List Level 2\n***Unordered List Level 3\n}}}\n*Unordered List Level 1\n**Unordered List Level 2\n***Unordered List Level 3\n!!Definition Lists\nCreate definition lists by starting a line using a semi-colon {{{;}}} for the term followed by a line starting with a colon {{{:}}} for the definition...\n{{{\n;Term 1\n:Definition for Term 1\n;Term 2\n:Definition for Term 2\n}}}\n;Term 1\n:Definition for Term 1\n;Term 2\n:Definition for Term 2\n"},
{"title":"Markup","created":"20130205062501000","creator":"tobibeer","modified":"20140831153103538","modifier":"tobibeer","type":"text/x-tiddlywiki","text":"TiddlyWiki markup is a dedicated markup syntax to \u003C\u003Ctag Formatting \"format your content\">> using WikiText... \n|noLinkify|k\n|width:250px; !Example | !Example Markup |h\n| how the example markup renders | what to enter as tiddler text |\n|>| ![[Basic Text Formatting|Basic Formatting]] |\n|''bold''|{{{''bold''}}} (two __single__-quotes) |\n|//italics//|{{{//italics//}}} |\n|''//bold italics//''|{{{''//bold italics//''}}} |\n|__underline__|{{{__underline__}}} |\n|--strikethrough--|{{{--strikethrough--}}} |\n|super^^script^^|{{{super^^script^^}}} |\n|sub~~script~~|{{{sub~~script~~}}} |\n|@@highlight@@|{{{@@highlight@@}}} |\n|foo -- bar|{{{foo -- bar}}} -- two dashes create an Em dash|\n|>| ![[Avoiding Wikification|Suppressing Formatting]] |\n|to output text as-is (escaping), enclose it in three double quotes or use the {{{\u003Cnowiki>}}} markup|>|\n|\"\"\"plain//text\"\"\" |{{{\"\"\"plain//text\"\"\"}}}|\n|\u003Cnowiki>not__wikified\u003C/nowiki>|{{{\u003Cnowiki>not__wikified\u003C/nowiki>}}}|\n|>| ![[Headings]] |\n|start a new line with one or more question marks to create headings |>|\n|\u003Chtml>\u003Ch1>Heading 1\u003C/h1>\u003Ch2>Heading 2\u003C/h2>\u003Ch3>Heading 3\u003C/h3>\u003Ch4>Heading 4\u003C/h4>\u003Ch5>Heading 5\u003C/h5>\u003C/html>|{{{!Heading 1}}}\u003Cbr />{{{!!Heading 2}}}\u003Cbr />{{{!!!Heading 3}}}\u003Cbr />{{{!!!!Heading 4}}}\u003Cbr />{{{!!!!!Heading 5}}}|\n|>|![[Lists]]|\n|>| [[Ordered Lists|Lists]] |\n|\u003Chtml>\u003Col>\u003Cli>item one\u003C/li>\u003Cli>item two\u003Col>\u003Cli>level two\u003Col>\u003Cli>level three\u003C/li>\u003C/ol>\u003C/li>\u003C/ol>\u003C/li>\u003C/ol>\u003C/li>\u003C/ol>\u003C/html>|{{{#item one}}}\u003Cbr/>{{{#item  two}}}\u003Cbr/>{{{##level two}}}\u003Cbr/>{{{###level three}}}|\n|>| [[Unordered Lists|Lists]] |\n|\u003Chtml>\u003Cul>\u003Cli>item one\u003C/li>\u003Cli>item two\u003Cul>\u003Cli>level two\u003Cul>\u003Cli>level three\u003C/li>\u003C/ul>\u003C/li>\u003C/ul>\u003C/li>\u003C/ul>\u003C/html>|{{{*item one}}}\u003Cbr/>{{{*item two}}}\u003Cbr/>{{{**level two}}}\u003Cbr/>{{{***level three}}}|\n|>| [[Definition List|Lists]] |\n|\u003Chtml>\u003Cdl>\u003Cdt>term\u003C/dt>\u003Cdd>definition\u003C/dd>\u003C/dl>\u003C/html>|{{{;term}}}\u003Cbr />{{{:definition}}}|\n|>| [[Mixed Lists|Lists]] |\n|\u003Chtml>\u003Col>\u003Cli>ordered\u003Cul>\u003Cli>unordered\u003Cdl>\u003Cdt>term\u003C/dt>\u003Cdd>definition\u003C/dd>\u003C/dl>\u003C/li>\u003C/ul>\u003C/li>\u003C/ol>\u003C/html>|{{{# ordered}}}\u003Cbr />{{{#* unordered}}}\u003Cbr />{{{#*;term}}}\u003Cbr />{{{#*:definition}}}|\n| ![[Blockquotes]] |>|\n| [[Nested Blockquotes|Blockquotes]] |>|\n|\u003Chtml>\u003Cblockquote>blockquote\u003Cblockquote>level two\u003Cblockquote>level three\u003C/blockquote>\u003C/blockquote>\u003C/blockquote>\u003C/html>|{{{>blockquote}}}\u003Cbr />{{{>>level two}}}\u003Cbr />{{{>>>level three}}}|\n|>| [[Multi-line Blockquotes|Blockquotes]] |\n|\u003Chtml>\u003Cblockquote>multi-line\u003Cbr/>blockquote\u003C/blockquote>\u003C/html>|{{{\u003C\u003C\u003C}}}\u003Cbr />{{{multi-line}}}\u003Cbr />{{{blockquote}}}\u003Cbr />{{{\u003C\u003C\u003C}}}|\n|>| [[Mixed Blockquotes|Blockquotes]] |\n|\u003Chtml>\u003Cblockquote>foo\u003Cbr>\u003Cblockquote>inner foo, level 1\u003Cbr>\u003Cblockquote>inner foo, level 2\u003Cbr>\u003C/blockquote>\u003C/blockquote>more foo\u003Cbr>\u003C/blockquote>\u003C/html>|{{{\u003C\u003C\u003C}}}\u003Cbr />{{{foo}}}\u003Cbr />{{{> inner foo, level 1}}}\u003Cbr />{{{>> inner foo, level 2}}}\u003Cbr />{{{more foo}}}\u003Cbr />{{{\u003C\u003C\u003C}}}|\n|>| ![[Code  / Monospaced Text|Code]] |\n|>| [[Inline Code|Code]] |\n|{{{monospaced text}}}|\u003Chtml>\u003Ccode>{{{mono space text}}}\u003C/code>\u003C/html>|\n|>| [[Code Block|Code]] |\n|\u003Chtml>\u003Cpre>{{{\u003Cbr/>multi-line\u003Cbr/>code block\u003Cbr/>}}}\u003C/pre>\u003C/html>|\u003Chtml>\u003Ccode>{{{\u003C/code>\u003C/html>\u003Cbr/>{{{multi-line}}}\u003Cbr/>{{{code block}}}\u003Cbr/>\u003Chtml>\u003Ccode>}}}\u003C/code>\u003C/html>|\n| ![[Links]] |>|\n|>| [[Internal Links|TiddlyLink]] |\n|[[WikiWord]]|{{{WikiWord}}}|\n|~NoLink|{{{~NoLink}}} -- a tilde {{{~}}} prevents automatic ~WikiWord links|\n|[[Plain Link]]|{{{[[Plain Link]]}}}|\n|[[Pretty Link|Tiddler Name]]|{{{[[Pretty Link|Tiddler Name]]}}}|\n|>| [[External Links|External Link]] |\n|A valid URL is automatically rendered as an external link.|>|\n|https://www.tiddlywiki.com|{{{https://www.tiddlywiki.com}}}|\n|[[Pretty External Link|https://www.tiddlywiki.com]]|{{{[[Pretty External Link|https://www.tiddlywiki.com]]}}}|\n|>| ![[Filesystem Links|Links]] |\n|You can, of course, use file system links both as plain or pretty links.|>|\n|''Windows Network Path''|{{{[[file://///server/share]]}}}|\n|''Windows Local''|{{{[[file:///c:/folder/file]]}}}|\n|''Linux/Unix Local''|{{{[[file:///folder/file]]}}}|\n|''Relative Path (Subfolder)''|{{{[[folder/file]]}}}|\n|>| ![[Images]] |\n|In general, image files are external to a TiddlyWiki.|>|\n|[img[https://www.tiddlywiki.com/favicon.ico]]|{{{[img[path/image.jpg]]}}}|\n| aligned right&nbsp;&nbsp;[>img[https://www.tiddlywiki.com/favicon.ico]]|{{{[>img[path/image.jpg]]}}}|\n|[\u003Cimg[https://www.tiddlywiki.com/favicon.ico]]&nbsp;&nbsp;aligned left|{{{[\u003Cimg[path/image.jpg]]}}}|\n|w/ internal link [>img[https://www.tiddlywiki.com/favicon.ico][TiddlyWiki]]|{{{[img[path/image.jpg][TiddlerName]]}}}|\n|w/ external link [>img[https://www.tiddlywiki.com/favicon.ico][https://www.tiddlywiki.com]]|{{{[img[path/image.jpg][TiddlyWiki|https://www.tiddlywiki.com]]}}}|\n|>| ![[Gradients|gradient]] |\n|\u003C\u003Cgradient horiz #faa #afa #aaf>>&nbsp;&nbsp;__vert__ical or __horiz__ontal\u003Cbr>&nbsp;&nbsp;see [[gradient macro|http://tiddlywiki.org/#%5B%5Bgradient%20(macro)%5D%5D]]>>|{{{\u003C\u003Cgradient horiz #faa #afa #aaf>>wiki text>>}}}|\n|>| ![[Tables]] |\n|\u003C\u003Ctiddler HTML_TABLE>>|\u003C\u003Ctiddler HTML_TABLE_MARKUP>>|\n|>|\u003C\u003Ctiddler HTML_TABLE_RULES>>|\n|>| ![[Custom Styles|CSS Formatting]] |\n|>|a {{{@@highlight@@}}} element can accept CSS syntax to directly style text.|>|\n|@@color:green;green coloured@@|{{{@@color:green;green coloured@@}}}|\n|>| ![[Custom CSS Class Wrapper|CSS Formatting]] |\n|>|You can define a custom css class wrapper, like {{{.button}}} below. By default, the inner text is placed inline into a {{{\u003Cspan>}}} of said class(s). If you start and end the inner text with a newline, the content is placed in a {{{\u003Cdiv>}}}. Use the StyleSheet to define the css styles applied to the class.|\n|\u003Cbr>{{button title{Click!}}}|\u003Chtml>\u003Cpre>{{button title{Click!}}}\u003C/pre>\u003C/html>|\n|>| ![[Embedded HTML|HTML Formatting]] |\n|\u003Chtml>\u003Cspan style=\"padding-right:30px;font-size:2em;\">any\u003C/span>\u003Cbr />\u003Cb>valid\u003C/b> \u003Cem>xhtml\u003C/em>\u003C/html>|\u003Chtml>\u003Ccode style=\"font-weight:bold\">&lt;html&gt;\u003C/code>\u003C/html>{{{\u003Cspan style=\"padding-right:30px;font-size:2em;\">any\u003C/span>\u003Cbr />\u003Cb>valid\u003C/b> \u003Cem>xhtml\u003C/em>}}}\u003Chtml>\u003Ccode style=\"font-weight:bold\">&lt;/html&gt;\u003C/code>\u003C/html>|\n|>| [[Embedded \u003Ciframe>|HTML Formatting]] |\n|\u003Chtml>\u003Ciframe height=\"200px\" width=\"300px\" src=\"https://www.youtube.com/embed/Cj6ho1-G6tw?vq=hd720\" frameborder=\"0\" allowfullscreen/>\u003C/html>|\u003Chtml>\u003Ccode style=\"font-weight:bold\">&lt;html&gt;\u003C/code>\u003C/html>{{{\u003Ciframe src=\"http://the.url\"/>}}}\u003Chtml>\u003Ccode style=\"font-weight:bold\">&lt;/html&gt;\u003C/code>\u003C/html>|\n|>| ![[Line Break|Line Breaks]] |\n|handy for entering multi-line content into table cells or lists|>|\n|a\u003Cbr>b|{{{a\u003Cbr>b}}} or {{{a\u003Cbr/>a}}} or {{{a\u003Cbr />a}}}|\n|>| ![[Horizontal Rules]] |\n|before\u003Chr>after|{{{\u003Chr>}}} or \u003Cbr>{{{----}}} on its own line|\n|>| ![[HTML Entities]] |\n|>|You can use HTML entities...|\n|&#632;&trade; |{{{&#632;&trade;}}}|\n| ![[Macros]] |>|\n|>|macros are called by enclosing the macro name in {{{\u003C\u003C}}} and {{{>>}}}|\n|\u003C\u003Cversion>> |{{{\u003C\u003Cversion>>}}}|\n|>| ![[Hidden Text|Basic Formatting]] |\n|This is hidden: |{{{This is hidden: /% secret comment %/}}}|\n\n"},

{"title":"Suppressing Formatting","created":"20130211143136000","creator":"tobibeer","modified":"20140415164021461","modifier":"andrewstern","tags":"Formatting","type":"text/x-tiddlywiki","text":"!Summary\nTiddlyWiki markup rules can be suppressed for any given section of text by enclosing it in three ''double'' quotes or wrapping it using the {{{\u003Cnowiki>}}} markup...\n* when you just don't want that text to be TiddlyWiki markup\n* when you want to prevent WikiWords\n* when you copy & paste from other sources\n!Markup\n{{{\n» neither is this italicised or a \"\"\"//WikiWord//\"\"\"\n» nor is this \u003Cnowiki>__underlined__\u003C/nowiki>\n}}}\n» neither is this italicised or a \"\"\"//WikiWord//\"\"\"\n» nor is this \u003Cnowiki>__underlined__\u003C/nowiki>\n\nIn addition, you can suppress auto-linking for WikiWords, use the tilde prefix {{{~}}}:\n{{{\n~WikiWord\n}}}\n~WikiWord\n!!Also see\n*[[Comment Formatting]]\n*[[Code Formatting]]\n"},
{"title":"Tables","created":"20130205062438000","creator":"tobibeer","modified":"20140901062133767","modifier":"andrewstern","tags":"Formatting","type":"text/x-tiddlywiki","text":"!Summary\nTiddlyWiki provides flexible means to output tables.\n!!\"\"\"Simple Tables\"\"\"\n{{{\n|North West|North|North East|\n|West|Here|East|\n|South West|South|South East|\n}}}\n|North West|North|North East|\n|West|Here|East|\n|South West|South|South East|\n!!\"\"\"Cell Formatting\"\"\"\n*Insert a space before cell content to right justify cell\n*Insert a space after cell content to left justify cell\n*Insert spaces before and after cell content to centre justify cell\n*Insert an exclamation mark ({{{!}}}) as the first non-space character of a cell to turn it into a header cell\n{{{\n|!First column|!Second column|!Third column|\n|left | centre | right|\n}}}\n|!First column|!Second column|!Third column|\n|left | centre | right|\n!!\"\"\"Table Headers and Footers\"\"\"\n* Mark a table row as a header by adding an 'h' to the end\n* Mark a table row as a footer by adding an 'f' to the end\n{{{\n|NW|N|NE|h\n|W|X|E|\n|SW|S|SE|f\n}}}\n|NW|N|NE|h\n|W|X|E|\n|SW|S|SE|f\nUse  an exclamation mark to turn an individual cell into a header cell of type {{{\u003Cth}}}...\n{{{\n| NW| !N |NE |h\n| !W| X |!E |\n| SW| !S |SE |f\n}}}\n| NW| !N |NE |h\n| !W| X |!E |\n| SW| !S |SE |f\n!!\"\"\"Table Caption\"\"\"\nA caption can be added to a table by adding a {{{c}}} after the last column either before the main table...\n{{{\n|A caption above the table|c\n|North West|North|North East|\n|West|Here|East|\n|South West|South|South East|\n}}}\n|A caption above the table|c\n|North West|North|North East|h\n|West|Here|East|\n|South West|South|South East|\nor after the main table...\n{{{\n|North West|North|North East|\n|West|Here|East|\n|South West|South|South East|\n|A caption below the table|c\n}}}\n|North West|North|North East|h\n|West|Here|East|\n|South West|South|South East|\n|A caption below the table|c\n!!\"\"\"Merging Table Cells\"\"\"\nMerge a cell horizontally with the one to its right using greater-than {{{>}}}...\n{{{\n|North West|North|North East|\n|>|>|West and Here and East|\n|South West|South|South East|\n}}}\n|North West|North|North East|\n|>|>|West and Here and East|\n|South West|South|South East|\nMerge a cell vertically with the one above using a tilde {{{~}}}...\n{{{\n|Westerly|North|North East|\n|~|Here|East|\n|~|South|South East|\n}}}\n|Westerly|North|North East|\n|~|Here|East|\n|~|South|South East|\n!!\"\"\"CSS Formatting for Tables\"\"\"\nA CSS class can be added to an entire table using a special first row that ends with a {{{k}}}...\n{{{\n|myClass|k\n|North West|North|North East|\n|West|Here|East|\n|South West|South|South East|\n}}}\nUse your StyleSheet tiddler to define the desired styles.\n\nCSS properties can also be added to individual table cells by appending the CSS syntax directly after the delimiting pipe {{{|}}}.\n{{{\n|color:red; North West|opacity:0.5;North|North East|\n|color(green):West|Here|East|\n|South West|South|South East|\n}}}\n|color:red; North West|opacity:0.5;North|North East|\n|color(green):West|Here|East|\n|South West|South|South East|\n!!\"\"\"Alternating Row Colors\"\"\"\nTiddlyWiki automatically assigns the classes {{{oddRow}}} and {{{evenRow}}} to table row elements {{{\u003CTR>}}}. These can then be styled using the StyleSheet tiddler:\n{{{\ntr.oddRow { background-color: #fff; }\ntr.evenRow { background-color: #ffe; }\n}}}\n"},
{"title":"text/x-tiddlywiki typeblock","created":"20140416193948971","modified":"20140901082129041","type":"text/vnd.tiddlywiki","text":"This is a tiddlywiki5 tiddler containing a Classic type-block.\n\n!!Demo text:\n\n```\n!!Tw5 Here\n\n$$$text/x-tiddlywiki\n!Classic Here\n\u003C\u003Cslider $:/temp/xxx slidertest \"click me»\" \"more\" >>\n$$$\n```\n!!Demo results:\n\n!!Tw5 Here\n\n$$$text/x-tiddlywiki\n!Classic Here\n\u003C\u003Cslider $:/temp/xxx slidertest \"click me»\" \"more\" >>\n$$$\n"}
